<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRAINING WORKS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Barlow:wght@600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
  --bg: #1e2535;
  --surface: #252d3d;
  --card: #2d3748;
  --border: #3a4555;
  --blue: #1e90ff;
  --yellow: #e8ff00;
  --text: #f0f0f0;
  --muted: #8a9bb5;
  --danger: #ff4444;
  --warning: #ff9800;
  --success: #4caf50;
  --green: #00e5a0;
  --warn: #ff3b5c;
  --radius: 10px;
  --mobile-nav-h: 64px;
  --mobile-header-h: 56px;
}

    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #0d2040 0%, #0a0a0a 70%);
      padding: 20px;
    }
    .login-box {
      width: 100%; max-width: 400px; padding: 48px 40px;
      background: #111; border: 1px solid #1e90ff33; border-radius: 16px;
      text-align: center;
    }
    @media (max-width: 480px) { .login-box { padding: 36px 24px; } }
    .login-logo { font-family: 'Bebas Neue'; font-size: 42px; color: var(--blue); letter-spacing: 2px; }
    .login-sub { font-family: 'Barlow'; font-size: 11px; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }
    .login-label { font-size: 12px; color: var(--muted); text-align: left; display: block; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
    .login-input {
      width: 100%; padding: 13px 16px; background: #0d0d0d; border: 1px solid #2a2a2a;
      color: var(--text); border-radius: 8px; font-family: 'DM Sans'; font-size: 15px;
      outline: none; transition: border .15s; margin-bottom: 20px; letter-spacing: 2px;
    }
    .login-input:focus { border-color: var(--blue); }
    .login-btn {
      width: 100%; padding: 14px; background: var(--blue); color: #fff;
      border: none; border-radius: 8px; font-family: 'Bebas Neue'; font-size: 20px;
      letter-spacing: 2px; cursor: pointer; transition: filter .15s;
    }
    .login-btn:hover { filter: brightness(1.1); }
    .login-error { color: #ff6b6b; font-size: 13px; margin-bottom: 12px; }

    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .main { margin-left: 240px; flex: 1; padding: 32px; min-height: 100vh; }
    .page-title { font-family: 'Bebas Neue'; font-size: 36px; letter-spacing: 1px; margin-bottom: 6px; }
    .n-wrap { max-width: 960px; margin: 0 auto; padding: 22px 18px; }
    .n-field { display: flex; flex-direction: column; gap: 5px; }
    .n-label { font-size: .62rem; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }
    .n-inp, .n-sel { font-size: .86rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; color: var(--text); transition: border-color .18s; width: 100%; }
    .n-inp:focus, .n-sel:focus { outline: none; border-color: var(--blue); }
    .n-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 10px; text-align: center; }
    .n-stat-val { font-size: 2.2rem; font-weight: 700; color: var(--blue); line-height: 1; }
    .n-stat-label { font-size: .78rem; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .n-meal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; margin-bottom: 12px; overflow: visible; }
    .n-meal-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 15px; background: linear-gradient(90deg, rgba(30,144,255,.06), transparent); border-bottom: 1px solid var(--border); }
    .n-meal-name { font-size: 1.1rem; font-weight: 700; }
    .n-meal-body { padding: 10px 14px; }
    .n-food-row { padding: 8px 0; border-bottom: 1px solid rgba(30,144,255,.05); }
    .n-food-row:last-child { border-bottom: none; }
    .n-food-main-line { display: grid; grid-template-columns: 1fr 58px 38px 38px 38px 38px; align-items: center; gap: 6px; margin-bottom: 6px; }
    .n-food-name { font-size: 1rem; font-weight: 600; }
    .n-food-grams { font-size: .92rem; color: #ffc840; text-align: right; }
    .n-food-macro { font-size: .88rem; text-align: right; }
    .n-food-hdr { font-size: .74rem; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); text-align: right; }
    .ng4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    @media(max-width: 680px) { .ng4 { grid-template-columns: repeat(2, 1fr); } }

  </style>
</head>
<body>
<div id="root"></div>
<script>
// Configuración Supabase
const SUPABASE_URL = 'https://wietxwxebyqncslgsdxx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eOWtUHB4vkqYlX26jVvDBA_5REbkLDl';

// ═══════════════════════════════════════════════════════════════════
// CALCULADORA NUTRICIONAL - VERSIÓN CORREGIDA
// ═══════════════════════════════════════════════════════════════════

let nutriForm = {
  genero: 'hombre',
  edad: 30,
  peso: 75,
  altura: 175,
  actividad: 1.5,
  objetivo: 'mantenimiento',
  ecuacion: 'harris',
  proteinaPct: 30,
  grasaPct: 30,
  carboPct: 40,
  comidas: 4,
  mealPlan: []
};

// Ecuaciones de gasto calórico
const ecuaciones = {
  harris: (genero, edad, peso, altura) => {
    if (genero === 'hombre') {
      return 88.362 + (13.397 * peso) + (4.799 * altura) - (5.677 * edad);
    } else {
      return 447.593 + (9.247 * peso) + (3.098 * altura) - (4.330 * edad);
    }
  },
  mifflin: (genero, edad, peso, altura) => {
    let tmb = (10 * peso) + (6.25 * altura) - (5 * edad);
    if (genero === 'hombre') tmb += 5;
    else tmb -= 161;
    return tmb;
  },
  katch: (genero, edad, peso, altura, grasa = 20) => {
    const masaMagra = peso * (1 - grasa / 100);
    return 370 + (21.6 * masaMagra);
  }
};

// Calcular TMB
function calcularTMB() {
  const { genero, edad, peso, altura, ecuacion } = nutriForm;
  const fnEcuacion = ecuaciones[ecuacion];
  if (!fnEcuacion) return 0;
  return Math.round(fnEcuacion(genero, edad, peso, altura));
}

// Calcular TDEE
function calcularTDEE() {
  const tmb = calcularTMB();
  return Math.round(tmb * nutriForm.actividad);
}

// Calcular calorías objetivo
function calcularCaloriasObjetivo() {
  let tdee = calcularTDEE();
  switch (nutriForm.objetivo) {
    case 'definir': return Math.round(tdee * 0.85);
    case 'mantenimiento': return tdee;
    case 'ganar': return Math.round(tdee * 1.15);
    default: return tdee;
  }
}

// Calcular macros
function calcularMacros() {
  const calorias = calcularCaloriasObjetivo();
  const proteina = Math.round((calorias * (nutriForm.proteinaPct / 100)) / 4);
  const grasa = Math.round((calorias * (nutriForm.grasaPct / 100)) / 9);
  const carbos = Math.round((calorias * (nutriForm.carboPct / 100)) / 4);
  return { calorias, proteina, grasa, carbos };
}

// Generar plan de comidas CON CARBOHIDRATOS
function generarPlanComidas() {
  const { calorias, proteina, grasa, carbos } = calcularMacros();
  const numComidas = nutriForm.comidas;
  
  const mealPlan = [];
  for (let i = 0; i < numComidas; i++) {
    mealPlan.push({
      nombre: `Comida ${i + 1}`,
      calorias: Math.round(calorias / numComidas),
      proteina: Math.round(proteina / numComidas),
      grasa: Math.round(grasa / numComidas),
      carbos: Math.round(carbos / numComidas),
      alimentos: []
    });
  }
  return mealPlan;
}

// Actualizar formulario
function actualizarNutri(campo, valor) {
  nutriForm[campo] = isNaN(valor) ? valor : Number(valor);
  renderNutri();
}

// RENDER NUTRICIONAL
function renderNutri() {
  const root = document.getElementById('root');
  const macros = calcularMacros();
  const mealPlan = generarPlanComidas();

  root.innerHTML = `
    <div class="n-wrap">
      <h1 class="page-title">CALCULADORA NUTRICIONAL</h1>
      
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;">
        <div class="n-field">
          <label class="n-label">Género</label>
          <select class="n-sel" onchange="actualizarNutri('genero', this.value)">
            <option value="hombre" ${nutriForm.genero === 'hombre' ? 'selected' : ''}>Hombre</option>
            <option value="mujer" ${nutriForm.genero === 'mujer' ? 'selected' : ''}>Mujer</option>
          </select>
        </div>
        <div class="n-field">
          <label class="n-label">Edad (años)</label>
          <input type="number" class="n-inp" value="${nutriForm.edad}" onchange="actualizarNutri('edad', this.value)" />
        </div>
        <div class="n-field">
          <label class="n-label">Peso (kg)</label>
          <input type="number" class="n-inp" value="${nutriForm.peso}" onchange="actualizarNutri('peso', this.value)" />
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;">
        <div class="n-field">
          <label class="n-label">Altura (cm)</label>
          <input type="number" class="n-inp" value="${nutriForm.altura}" onchange="actualizarNutri('altura', this.value)" />
        </div>
        <div class="n-field">
          <label class="n-label">Actividad</label>
          <select class="n-sel" onchange="actualizarNutri('actividad', this.value)">
            <option value="1.2" ${nutriForm.actividad === 1.2 ? 'selected' : ''}>Sedentario (1.2)</option>
            <option value="1.5" ${nutriForm.actividad === 1.5 ? 'selected' : ''}>Ligero (1.5)</option>
            <option value="1.75" ${nutriForm.actividad === 1.75 ? 'selected' : ''}>Moderado (1.75)</option>
            <option value="2.0" ${nutriForm.actividad === 2.0 ? 'selected' : ''}>Muy Activo (2.0)</option>
          </select>
        </div>
        <div class="n-field">
          <label class="n-label">Objetivo</label>
          <select class="n-sel" onchange="actualizarNutri('objetivo', this.value)">
            <option value="definir" ${nutriForm.objetivo === 'definir' ? 'selected' : ''}>Definir (-15%)</option>
            <option value="mantenimiento" ${nutriForm.objetivo === 'mantenimiento' ? 'selected' : ''}>Mantenimiento</option>
            <option value="ganar" ${nutriForm.objetivo === 'ganar' ? 'selected' : ''}>Ganar (+15%)</option>
          </select>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px;">
        <div class="n-field">
          <label class="n-label">Ecuación</label>
          <select class="n-sel" onchange="actualizarNutri('ecuacion', this.value)">
            <option value="harris" ${nutriForm.ecuacion === 'harris' ? 'selected' : ''}>Harris-Benedict</option>
            <option value="mifflin" ${nutriForm.ecuacion === 'mifflin' ? 'selected' : ''}>Mifflin-St Jeor</option>
            <option value="katch" ${nutriForm.ecuacion === 'katch' ? 'selected' : ''}>Katch-McArdle</option>
          </select>
        </div>
        <div class="n-field">
          <label class="n-label">Comidas al día</label>
          <input type="number" class="n-inp" value="${nutriForm.comidas}" onchange="actualizarNutri('comidas', this.value)" min="2" max="8" />
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;">
        <div class="n-field">
          <label class="n-label">Proteína %</label>
          <input type="number" class="n-inp" value="${nutriForm.proteinaPct}" onchange="actualizarNutri('proteinaPct', this.value)" />
        </div>
        <div class="n-field">
          <label class="n-label">Grasas %</label>
          <input type="number" class="n-inp" value="${nutriForm.grasaPct}" onchange="actualizarNutri('grasaPct', this.value)" />
        </div>
        <div class="n-field">
          <label class="n-label">Carbohidratos %</label>
          <input type="number" class="n-inp" value="${nutriForm.carboPct}" onchange="actualizarNutri('carboPct', this.value)" />
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px;">
        <div class="n-stat">
          <div class="n-stat-label">TMB (kcal)</div>
          <div class="n-stat-val">${calcularTMB()}</div>
        </div>
        <div class="n-stat">
          <div class="n-stat-label">TDEE (kcal)</div>
          <div class="n-stat-val">${calcularTDEE()}</div>
        </div>
        <div class="n-stat">
          <div class="n-stat-label">Calorías Objetivo</div>
          <div class="n-stat-val">${macros.calorias}</div>
        </div>
        <div style="display: none;"></div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px;">
        <div class="n-stat">
          <div class="n-stat-label">Proteína (g)</div>
          <div class="n-stat-val">${macros.proteina}</div>
        </div>
        <div class="n-stat">
          <div class="n-stat-label">Grasas (g)</div>
          <div class="n-stat-val">${macros.grasa}</div>
        </div>
        <div class="n-stat">
          <div class="n-stat-label">Carbohidratos (g)</div>
          <div class="n-stat-val">${macros.carbos}</div>
        </div>
        <div style="display: none;"></div>
      </div>

      <h2 style="font-size: 1.5rem; margin-top: 32px; margin-bottom: 16px;">📋 PLAN DE COMIDAS</h2>
      <div>
        ${mealPlan.map((meal, idx) => `
          <div class="n-meal-card">
            <div class="n-meal-header">
              <div class="n-meal-name">${meal.nombre}</div>
              <div style="font-size: 0.9rem; color: #1e90ff; font-weight: 700;">${meal.calorias} kcal</div>
            </div>
            <div class="n-meal-body">
              <div class="n-food-main-line">
                <div class="n-food-hdr">MACRO</div>
                <div class="n-food-hdr">GRAMOS</div>
                <div class="n-food-hdr">PROTEÍNA</div>
                <div class="n-food-hdr">GRASAS</div>
                <div class="n-food-hdr">CARBOS</div>
              </div>
              <div class="n-food-row">
                <div class="n-food-name">Proteína</div>
                <div class="n-food-grams">${meal.proteina}g</div>
                <div class="n-food-macro" style="color: #ff6b9d;">●</div>
                <div class="n-food-macro">-</div>
                <div class="n-food-macro">-</div>
              </div>
              <div class="n-food-row">
                <div class="n-food-name">Grasas</div>
                <div class="n-food-grams">${meal.grasa}g</div>
                <div class="n-food-macro">-</div>
                <div class="n-food-macro" style="color: #ffc840;">●</div>
                <div class="n-food-macro">-</div>
              </div>
              <div class="n-food-row">
                <div class="n-food-name">Carbohidratos</div>
                <div class="n-food-grams">${meal.carbos}g</div>
                <div class="n-food-macro">-</div>
                <div class="n-food-macro">-</div>
                <div class="n-food-macro" style="color: #00e5a0;">●</div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// Iniciar app
renderNutri();
</script>
</body>
</html>

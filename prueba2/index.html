<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRAINING WORKS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Barlow:wght@600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
  --bg: #1e2535;
  --surface: #252d3d;
  --card: #2d3748;
  --border: #3a4555;
  --blue: #1e90ff;
  --yellow: #e8ff00;
  --text: #f0f0f0;
  --muted: #8a9bb5;
  --danger: #ff4444;
  --warning: #ff9800;
  --success: #4caf50;
  --green: #00e5a0;
  --warn: #ff3b5c;
  --radius: 10px;
  --mobile-nav-h: 64px;
  --mobile-header-h: 56px;
}

    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #0d2040 0%, #0a0a0a 70%);
      padding: 20px;
    }
    .login-box {
      width: 100%; max-width: 400px; padding: 48px 40px;
      background: #111; border: 1px solid #1e90ff33; border-radius: 16px;
      text-align: center;
    }
    @media (max-width: 480px) { .login-box { padding: 36px 24px; } }
    .login-logo { font-family: 'Bebas Neue'; font-size: 42px; color: var(--blue); letter-spacing: 2px; }
    .login-sub { font-family: 'Barlow'; font-size: 11px; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }
    .login-label { font-size: 12px; color: var(--muted); text-align: left; display: block; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
    .login-input {
      width: 100%; padding: 13px 16px; background: #0d0d0d; border: 1px solid #2a2a2a;
      color: var(--text); border-radius: 8px; font-family: 'DM Sans'; font-size: 15px;
      outline: none; transition: border .15s; margin-bottom: 20px; letter-spacing: 2px;
    }
    .login-input:focus { border-color: var(--blue); }
    .login-btn {
      width: 100%; padding: 14px; background: var(--blue); color: #fff;
      border: none; border-radius: 8px; font-family: 'Bebas Neue'; font-size: 20px;
      letter-spacing: 2px; cursor: pointer; transition: filter .15s;
    }
    .login-btn:hover { filter: brightness(1.1); }
    .login-error { color: #ff6b6b; font-size: 13px; margin-bottom: 12px; }

    /* ── LAYOUT ── */
    .app { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
    }
    .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo .brand { font-family: 'Bebas Neue'; font-size: 22px; color: var(--blue); letter-spacing: 1px; }
    .sidebar-logo .role { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: 8px; cursor: pointer; color: var(--muted); font-size: 14px;
      font-weight: 500; transition: all .15s; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: #1a1a1a; color: var(--text); }
    .nav-item.active { background: #0d2040; color: var(--blue); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
    .btn-logout {
      width: 100%; padding: 10px; background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; font-family: 'DM Sans'; font-size: 13px;
      cursor: pointer; transition: all .15s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── MOBILE HEADER ── */
    .mobile-header {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      height: var(--mobile-header-h); background: var(--surface);
      border-bottom: 1px solid var(--border); z-index: 100;
      align-items: center; padding: 0 16px; justify-content: space-between;
    }
    .mobile-header .brand { font-family: 'Bebas Neue'; font-size: 22px; color: var(--blue); letter-spacing: 1px; }
    .mobile-logout-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 7px; font-family: 'DM Sans'; font-size: 12px;
      padding: 6px 12px; cursor: pointer; transition: all .15s;
    }
    .mobile-logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── MOBILE BOTTOM NAV ── */
    .mobile-bottom-nav {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--mobile-nav-h); background: var(--surface);
      border-top: 1px solid var(--border); z-index: 100;
      align-items: stretch; padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .mobile-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; cursor: pointer; background: none; border: none;
      color: var(--muted); font-family: 'DM Sans'; font-size: 10px; font-weight: 600;
      letter-spacing: .5px; text-transform: uppercase; transition: color .15s; padding: 8px 4px;
    }
    .mobile-nav-item.active { color: var(--blue); }
    .mobile-nav-item .nav-icon { font-size: 20px; width: auto; }
    .mobile-nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--blue); opacity: 0; transition: opacity .15s; margin-top: 2px; }
    .mobile-nav-item.active .mobile-nav-dot { opacity: 1; }

    /* ── MAIN ── */
    .main { margin-left: 240px; flex: 1; padding: 32px; min-height: 100vh; }
    .page-title { font-family: 'Bebas Neue'; font-size: 36px; letter-spacing: 1px; margin-bottom: 6px; }
    .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    /* ── STATS ROW ── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 6px; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-family: 'Bebas Neue'; font-size: 40px; color: var(--blue); line-height: 1; }
    .stat-note { font-size: 12px; color: var(--muted); }

    /* ── CARDS ── */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .card-title { font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: .05em; color: var(--text); }

    /* ── ALERTS / RENOVACIONES ── */
    .alert-row {
      display: flex; align-items: center; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .alert-row:last-child { border-bottom: none; }
    .alert-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .alert-dot.urgent { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
    .alert-dot.soon { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
    .alert-dot.ok { background: var(--success); }
    .alert-info { flex: 1; }
    .alert-name { font-weight: 600; font-size: 14px; }
    .alert-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .alert-badge {
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .alert-badge.urgent { background: #1a0000; color: var(--danger); border: 1px solid #3a0000; }
    .alert-badge.soon { background: #1a0e00; color: var(--warning); border: 1px solid #3a2000; }
    .alert-badge.ok { background: #001a00; color: var(--success); border: 1px solid #003a00; }
    .renov-input-wrap { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    .renov-input {
      background: #0d0d0d; border: 1px solid #2a2a2a; color: var(--text);
      border-radius: 6px; font-family: 'DM Sans'; font-size: 13px;
      padding: 5px 10px; outline: none; width: 150px; transition: border .15s;
    }
    .renov-input:focus { border-color: var(--blue); }
    .btn-renov-save {
      background: var(--blue); color: #fff; border: none; border-radius: 6px;
      font-family: 'DM Sans'; font-size: 12px; font-weight: 600;
      padding: 5px 12px; cursor: pointer; transition: filter .15s;
    }
    .btn-renov-save:hover { filter: brightness(1.1); }

    /* ── GENERADOR RUTINAS PDF ── */
    .pdf-ex-table { width: 100%; border-collapse: collapse; min-width: 640px; }
    .pdf-ex-table th { text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; padding: 0 6px 8px; }
    .pdf-ex-table td { padding: 4px 6px; }
    .pdf-ex-input {
      width: 100%; padding: 8px 10px; background: #0d0d0d; border: 1px solid #2a2a2a;
      color: var(--text); border-radius: 6px; font-family: 'DM Sans'; font-size: 13px; outline: none;
    }
    .pdf-ex-input:focus { border-color: var(--blue); }
    .pdf-ex-input-sm { width: 70px; }
    .btn-pdf-remove {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; width: 30px; height: 30px; cursor: pointer; transition: all .15s;
    }
    .btn-pdf-remove:hover { border-color: var(--danger); color: var(--danger); }

    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 7px; border: none;
      font-family: 'DM Sans'; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: #444; }
    .btn-danger { background: #1a0000; color: var(--danger); border: 1px solid #330000; }
    .btn-danger:hover { background: #220000; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-xs { padding: 4px 10px; font-size: 12px; }

    /* ── CLIENT GRID ── */
    .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .client-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
    }
    .client-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--blue); opacity: 0; transition: opacity .2s;
    }
    .client-card:hover { border-color: #333; transform: translateY(-1px); }
    .client-card:hover::before { opacity: 1; }
    .client-name { font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: .5px; margin-bottom: 8px; }
    .client-code { font-family: monospace; font-size: 12px; color: var(--blue); background: #0d2040; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
    .client-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: .5px; }
   .tag-1mes         { background: #001a2a; color: #00bcd4; border: 1px solid #003a4a; }
.tag-3meses       { background: #1a0010; color: #ff6b9d; border: 1px solid #3a0020; }
.tag-6meses       { background: #1a1a00; color: var(--yellow); border: 1px solid #3a3a00; }
.tag-activo       { background: #001a00; color: #4caf50; border: 1px solid #003a00; }
.tag-inactivo     { background: #1a0000; color: #ff4444; border: 1px solid #3a0000; }
.tag-sesion_suelta { background: #1a0a00; color: #ff9500; border: 1px solid #3a2000; }
.tag-bono_8       { background: #0d001a; color: #bf7fff; border: 1px solid #2a0040; }
.tag-bono_12      { background: #001a10; color: #00e676; border: 1px solid #003a20; }
.clients-section-header {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Bebas Neue'; font-size: 16px; letter-spacing: 1px;
  color: var(--muted); margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.clients-section-count {
  font-family: 'DM Sans'; font-size: 12px; font-weight: 700;
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); padding: 2px 8px; border-radius: 10px; margin-left: 4px;
}

    /* ── INPUTS ── */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 15px; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 13px; background: #0d0d0d; border: 1px solid #2a2a2a;
      color: var(--text); border-radius: 7px; font-family: 'DM Sans'; font-size: 14px;
      outline: none; transition: border .15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--blue); }
    .form-select option { background: #111; }
    .form-row { display: grid; gap: 12px; }
    .form-row.col2 { grid-template-columns: 1fr 1fr; }
    .form-row.col3 { grid-template-columns: 1fr 1fr 1fr; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--surface); border: 1px solid #2a2a2a; border-radius: 14px;
      padding: 32px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-family: 'Bebas Neue'; font-size: 26px; margin-bottom: 6px; color: var(--blue); }
    .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* ── DETAIL VIEW ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 14px;
      cursor: pointer; margin-bottom: 20px; background: none; border: none; padding: 0; transition: color .15s;
    }
    .back-btn:hover { color: var(--text); }
    .detail-header {
      background: linear-gradient(135deg, #0d1a30, #111827);
      border: 1px solid #1e3a5f; border-radius: var(--radius);
      padding: 24px; margin-bottom: 20px;
    }
    .detail-name { font-family: 'Bebas Neue'; font-size: 38px; letter-spacing: 1px; }
    .detail-meta { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; align-items: center; }

    /* ── ROUTINE SECTION ── */
    .routine-block { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
    .routine-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px; background: #141414; border-bottom: 1px solid #1a1a1a; cursor: pointer;
    }
    .routine-name { font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: .5px; }
    .routine-code { font-family: monospace; font-size: 11px; color: var(--blue); }
    .routine-body { padding: 12px 18px; }
    .ex-row {
      display: grid; grid-template-columns: 1fr 50px 60px 40px 70px;
      gap: 8px; padding: 10px 0; border-bottom: 1px solid #1a1a1a; align-items: center; font-size: 13px;
    }
    .ex-row:last-child { border-bottom: none; }
    .ex-name { font-weight: 600; font-size: 14px; }
   .ex-val {   text-align: center;   color: var(--blue);   font-weight: 700;   white-space: nowrap;   overflow: hidden;   text-overflow: ellipsis; }
    .ex-head { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }

    /* ── CHARTS ── */
    .charts-section { margin-bottom: 24px; }
    .charts-title {
      font-family: 'Bebas Neue'; font-size: 16px; letter-spacing: .05em;
      color: var(--muted); margin-bottom: 14px; text-transform: uppercase;
    }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .chart-card {
      background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 8px; padding: 16px;
    }
    .chart-ex-name {
      font-size: 12px; font-weight: 700; color: var(--blue); text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 10px;
    }
    .chart-canvas-wrap { position: relative; height: 140px; }
    .chart-no-data { font-size: 12px; color: var(--muted); text-align: center; padding: 20px 0; }
    .chart-stat-row { display: flex; gap: 16px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1a1a1a; }
    .chart-stat { text-align: center; flex: 1; }
    .chart-stat-val { font-family: 'Bebas Neue'; font-size: 20px; color: var(--blue); }
    .chart-stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .chart-stat-delta { font-size: 11px; font-weight: 700; }
    .chart-stat-delta.up { color: var(--success); }
    .chart-stat-delta.down { color: var(--danger); }

    /* ── HISTORY ── */
   .history-session{
  position:relative;
  background:linear-gradient(180deg,#0a0a0a,#070707);
  border:1px solid rgba(255,255,255,.05);
  border-radius:18px;
  padding:22px;
  margin-bottom:18px;
  overflow:hidden;
  animation:fadeUp .35s ease;
}

.history-session::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  width:4px;
  height:100%;
  background:linear-gradient(180deg,#1e90ff,#2563eb);
  box-shadow:0 0 18px rgba(37,99,235,.5);
}
     
   .history-date{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  color:#9ca3af;
  letter-spacing:1px;
  margin-bottom:14px;
  text-transform:uppercase;
}
    .history-routine {
  font-family:'Bebas Neue';
  font-size:22px;
  font-weight:700;
  color:var(--blue);
  margin-bottom:16px;
  letter-spacing:.5px;
  text-transform:uppercase;
}
    .history-ex { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid #151515; }
    .history-ex:last-child { border-bottom: none; }

    /* ── LOADING / EMPTY ── */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .loading-spin { font-size: 30px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }

    /* ── ALERTS ── */
    .alert { padding: 12px 16px; border-radius: 7px; font-size: 13px; margin-bottom: 12px; }
    .alert-success { background: #001a00; border: 1px solid #003a00; color: #4caf50; }
    .alert-error { background: #1a0000; border: 1px solid #3a0000; color: #ff6b6b; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #111; border-radius: 9px; padding: 4px; border: 1px solid var(--border); }
    .tab { flex: 1; padding: 9px; border-radius: 6px; border: none; font-family: 'DM Sans'; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--muted); transition: all .2s; }
    .tab.active { background: var(--card); color: var(--text); border: 1px solid var(--border); }

    /* ══ RESPONSIVE TABLET ══ */
    @media (max-width: 1024px) {
      .sidebar { width: 200px; }
      .main { margin-left: 200px; padding: 28px 24px; }
      .dashboard-grid { grid-template-columns: 1fr; }
    }

    /* ══ RESPONSIVE MOBILE ══ */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .mobile-header { display: flex; }
      .mobile-bottom-nav { display: flex; }
      .main { margin-left: 0; padding: 16px; padding-top: calc(var(--mobile-header-h) + 16px); padding-bottom: calc(var(--mobile-nav-h) + 16px); }
      .page-title { font-size: 28px; margin-bottom: 4px; }
      .page-sub { margin-bottom: 20px; }
      .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
      .stat-card { padding: 16px; gap: 4px; }
      .stat-value { font-size: 36px; }
      .stat-label { font-size: 10px; }
      .dashboard-grid { grid-template-columns: 1fr; }
      .client-grid { grid-template-columns: 1fr; gap: 10px; }
      .card { padding: 16px; }

const SUPABASE_URL = 'https://wietxwxebyqncslgsdxx.supabase.co';

const TRAINER_EMAIL = 'jctrainingworks@gmail.com';

// ── AUTH (Supabase Auth real, ya no hay contraseña en texto plano) ──
let authAccessToken = null;
let authRefreshToken = null;

async function authLogin(password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: TRAINER_EMAIL, password })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'Credenciales incorrectas');
  authAccessToken = data.access_token;
  authRefreshToken = data.refresh_token;
}

async function authRefresh() {
  if (!authRefreshToken) return false;
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: authRefreshToken })
    });
    if (!res.ok) return false;
    const data = await res.json();
    authAccessToken = data.access_token;
    authRefreshToken = data.refresh_token;
    return true;
  } catch { return false; }
}

function authLogout() {
  authAccessToken = null;
  authRefreshToken = null;
  state.screen = 'login';
  render();
}

async function supabase(table, options = {}) {
  const { method = 'GET', filter = '', body = null, select = '*', single = false } = options;
  let url = `${SUPABASE_URL}/rest/v1/${table}?select=${select}`;
  if (filter) url += `&${filter}`;
  if (single) url += '&limit=1';
  const doFetch = () => fetch(url, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${authAccessToken || SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': (method === 'POST' || method === 'DELETE') ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : null
  });
  let res = await doFetch();
  if (res.status === 401 && authRefreshToken) {
    const ok = await authRefresh();
    if (ok) res = await doFetch();
    else { authLogout(); throw new Error('Tu sesión ha caducado, vuelve a iniciar sesión'); }
  }
  if (!res.ok) { const err = await res.json(); throw new Error(err.message || res.statusText); }
  return res.status === 204 ? [] : res.json();
}

async function supabaseRPC(fn, params = {}) {
  const doFetch = () => fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${authAccessToken || SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(params)
  });
  let res = await doFetch();
  if (res.status === 401 && authRefreshToken) {
    const ok = await authRefresh();
    if (ok) res = await doFetch();
    else { authLogout(); throw new Error('Tu sesión ha caducado, vuelve a iniciar sesión'); }
  }
  if (!res.ok) { const err = await res.json(); throw new Error(err.message || res.statusText); }
  return res.json();
}

 expandedRoutine: null,

// Filtra el historial de un cliente según el rango de fechas y el ejercicio elegidos en la pestaña Historial.
// Compartido entre renderDetailHistorial (que pinta las tarjetas) e initCharts (que dibuja los canvas),
// para que ambos trabajen siempre sobre el mismo subconjunto de datos.
function getHistorialFiltradoParaCharts(historialCompleto) {
  // OJO: ya NO recortamos por state.historialRango (Última semana/4 semanas). Antes, si un ejercicio
  // solo tenía registros fuera de esa ventana, la gráfica se quedaba sin puntos y parecía un ejercicio
  // nuevo aunque hubiera histórico real. Las gráficas de Progreso muestran siempre el histórico
  // completo del ejercicio; el rango de fechas ha dejado de aplicarles a ellas.
  const filtroEj = state.historialEjercicio || '';
  return filtroEj ? historialCompleto.filter(s => s.ejercicio === filtroEj) : historialCompleto;
}

// Parsea el texto de series_detalle guardado por la app cliente (formato "SERIE 1: 80kg x 10",
// o isométricos "SERIE 1: 30seg (+5kg)") en series individuales {peso, reps} para poder comparar
// serie a serie entre sesiones. El progreso no es solo subir peso: la 3ª serie pasando de 8 a 9
// reps con el mismo peso TAMBIÉN es progreso, y con el texto en bruto eso no se veía.
function parseSeriesDetalle(texto) {
  if (!texto) return [];
  return texto.split('\n').map(l => l.trim()).filter(Boolean).map((linea, idx) => {
    const mKgX = linea.match(/(\d+(?:\.\d+)?)\s*kg\s*[xX]\s*(\d+(?:\.\d+)?)/i);
    const mSeg = linea.match(/(\d+(?:\.\d+)?)\s*seg/i);
    let peso = null, reps = null, seg = null;
    if (mKgX) {
      peso = parseFloat(mKgX[1]);
      reps = parseFloat(mKgX[2]);
    } else if (mSeg) {
      seg = parseFloat(mSeg[1]);
      const mExtra = linea.match(/\+\s*(\d+(?:\.\d+)?)\s*kg/i);
      if (mExtra) peso = parseFloat(mExtra[1]);
    } else {
      // Fallback para formatos antiguos/libres: "10x80" (reps x peso)
      const mLibre = linea.match(/(\d+(?:\.\d+)?)\s*[xX]\s*(\d+(?:\.\d+)?)/);
      if (mLibre) { reps = parseFloat(mLibre[1]); peso = parseFloat(mLibre[2]); }
    }
    return { serie: idx + 1, peso, reps, seg, texto: linea };
  });
}

// Compara la misma serie (por posición: serie 1 con serie 1, etc.) entre la sesión actual y la
// sesión anterior de ESE MISMO ejercicio. 'sube' = ha progresado (más peso, o mismo peso y más reps).
function compararSerie(actual, anterior) {
  if (!anterior) return { tipo: 'nuevo' };
  if (actual.seg != null || anterior.seg != null) {
    if (actual.seg == null || anterior.seg == null) return { tipo: 'na' };
    if (actual.seg > anterior.seg || (actual.peso || 0) > (anterior.peso || 0)) return { tipo: 'sube' };
    if (actual.seg < anterior.seg || (actual.peso || 0) < (anterior.peso || 0)) return { tipo: 'baja' };
    return { tipo: 'igual' };
  }
  if (actual.peso == null || actual.reps == null || anterior.peso == null || anterior.reps == null) return { tipo: 'na' };
  if (actual.peso > anterior.peso) return { tipo: 'sube' };
  if (actual.peso === anterior.peso && actual.reps > anterior.reps) return { tipo: 'sube' };
  if (actual.peso === anterior.peso && actual.reps === anterior.reps) return { tipo: 'igual' };
  return { tipo: 'baja' };
}

// ── TÉCNICAS DE ALTA INTENSIDAD ──
// Técnicas que se aplican DENTRO de una serie (mismo ejercicio): rest-pause, micropausa, drop set.
// Encoding por serie (alineado por posición con repeticiones/rir/descanso, separado por coma):
//   "normal"                 → serie estándar
//   "rest_pause:N"           → N repeticiones extra de rest-pause (descanso 10-20seg) tras la serie
//   "micropausa:N"           → N repeticiones extra de micropausa (descanso 5-7seg) tras la serie
//   "drop_set:N"             → N drops (bajadas de peso) sin descanso
//   "drop_set:N:P"           → N drops con P% de reducción de peso por drop
const TECNICAS_SERIE = {
  normal:      { label: 'Normal',      corto: '',    color: '#555'   },
  rest_pause:  { label: 'Rest-Pause',  corto: 'RP',  color: '#ff9800' },
  micropausa:  { label: 'Micropausa',  corto: 'MP',  color: '#e8ff00' },
  drop_set:    { label: 'Drop Set',    corto: 'DS',  color: '#ff4444' }
};
// Técnicas que agrupan VARIOS ejercicios distintos como bloque (superserie/triserie)
const TECNICAS_GRUPO = {
  superserie: { label: 'Superserie', corto: 'SS', color: '#1e90ff' },
  triserie:   { label: 'Triserie',   corto: 'TS', color: '#8b5cf6' }
};

function parseTecnicaSerie(str) {
  const s = (str || 'normal').trim();
  if (!s || s === 'normal') return { tipo: 'normal', n: 0, pct: null };
  const partes = s.split(':').map(p => p.trim());
  const tipo = partes[0];
  if (!TECNICAS_SERIE[tipo]) return { tipo: 'normal', n: 0, pct: null };
  return {
    tipo,
    n: parseInt(partes[1]) || 0,
    pct: partes[2] ? (parseInt(partes[2]) || null) : null
  };
}

function formatTecnicaSerie(s) {
  const tipo = s.tecnica || 'normal';
  if (tipo === 'normal') return 'normal';
  const n = parseInt(s.tecnicaN) || 0;
  if (!n) return 'normal';
  if (tipo === 'drop_set' && s.tecnicaPct) return `drop_set:${n}:${parseInt(s.tecnicaPct)}`;
  return `${tipo}:${n}`;
}

function badgeTecnicaSerie(str) {
  const t = parseTecnicaSerie(str);
  if (t.tipo === 'normal' || !t.n) return '';
  const cfg = TECNICAS_SERIE[t.tipo];
  const extra = t.tipo === 'drop_set' && t.pct ? `-${t.pct}%` : `+${t.n}`;
  return `<div title="${cfg.label}" style="margin-top:3px;display:inline-block;padding:1px 6px;border-radius:999px;` +
    `font-size:9px;font-weight:700;letter-spacing:.3px;background:${cfg.color}22;color:${cfg.color};">⚡${cfg.corto} ${extra}</div>`;
}

// Volumen equivalente de un ejercicio: cada serie normal cuenta 1, cada técnica intra-serie (rest-pause/
// micropausa/drop set) suma 0.5 por cada repetición de la técnica (así lo pidió Juan: una serie con
// "2 rest-pause" dentro equivale a 1 (serie base) + 2×0.5 = 2 series de volumen).
function calcVolumenEquivalente(ex) {
  const tecArr = (ex.tecnica || '').split(',').map(s => s.trim()).filter(Boolean);
  const numS = parseInt(ex.series) || tecArr.length || 1;
  let total = 0;
  for (let i = 0; i < numS; i++) {
    total += 1;
    const t = parseTecnicaSerie(tecArr[i] || 'normal');
    if (t.tipo !== 'normal' && t.n) total += t.n * 0.5;
  }
  return total;
}

function parseGrupoTecnica(str) {
  const s = (str || '').trim();
  if (!s) return { tipo: '', codigo: '' };
  const [tipo, ...resto] = s.split(':');
  if (!TECNICAS_GRUPO[tipo]) return { tipo: '', codigo: '' };
  return { tipo, codigo: resto.join(':').trim() };
}

function colorGrupoCodigo(codigo) {
  const colores = ['#1e90ff', '#8b5cf6', '#f59e0b', '#10b981', '#ec4899', '#06b6d4'];
  let h = 0;
  for (let i = 0; i < codigo.length; i++) h = (h * 31 + codigo.charCodeAt(i)) % colores.length;
  return colores[h];
}

// Normaliza nombres de ejercicio para comparar sin fallos por tildes/espacios/mayúsculas
function normalizaNombreEj(s) {
  return (s || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // quita tildes
    .toLowerCase()
    .trim()
    .replace(/\s+/g, ' ');
}

// ── CALCULADORA %1RM (fórmula de Epley: 1RM = peso × (1 + reps/30)) ──
function epley1RM(peso, reps) {
  return peso * (1 + reps / 30);
}
function epleyPesoParaReps(unRM, reps) {
  return unRM / (1 + reps / 30);
}

async function cargarHistorialRM(clienteId) {
  if (!clienteId) { state.rmHistorial = []; state.rmHistorialClienteId = null; render(); return; }
  try {
    state.rmHistorial = await supabase('rm_estimaciones', { filter: `cliente_id=eq.${clienteId}&order=fecha.desc` });
  } catch(e) { state.rmHistorial = []; }
  state.rmHistorialClienteId = clienteId;
  render();
}

async function cargarRutinasRM(clienteId) {
  state.rmRutinaId = ''; state.rmEjercicio = '';
  if (!clienteId) { state.rmRutinas = []; state.rmEjerciciosCliente = []; render(); return; }
  try {
    const rutinas = await supabase('rutinas', { filter: `cliente_id=eq.${clienteId}&order=orden.asc` });
    const ejercicios = await supabase('ejercicios', { filter: `rutina_id=in.(${await getRutinaIds(clienteId)})&order=orden.asc` });
    state.rmRutinas = rutinas;
    state.rmEjerciciosCliente = ejercicios;
  } catch(e) { state.rmRutinas = []; state.rmEjerciciosCliente = []; }
  render();
}

async function guardarRM() {
  const clienteId = state.rmClienteId;
  const ejercicio = (state.rmEjercicio || '').trim();
  const peso = parseFloat(String(state.rmPeso).replace(',', '.'));
  const reps = parseInt(state.rmReps, 10);
  if (!clienteId) { state.alert = { type: 'error', msg: 'Selecciona antes un cliente' }; render(); return; }
  if (!ejercicio) { state.alert = { type: 'error', msg: 'Elige rutina y ejercicio' }; render(); return; }
  if (!(peso > 0) || !(reps > 0)) { state.alert = { type: 'error', msg: 'Falta peso o repeticiones' }; render(); return; }
  const unRM = epley1RM(peso, reps);
  state.rmGuardando = true; render();
  try {
    await supabase('rm_estimaciones', {
      method: 'POST',
      body: { cliente_id: clienteId, ejercicio, un_rm: unRM, peso_base: peso, reps_base: reps, fecha: new Date().toISOString() }
    });
    state.alert = { type: 'success', msg: `✅ 1RM guardado: ${ejercicio} · ${unRM.toFixed(1)}kg` };
    await cargarHistorialRM(clienteId);
  } catch(e) {
    state.alert = { type: 'error', msg: 'Error al guardar: ' + e.message };
  }
  state.rmGuardando = false; render();
}

  inicioSemana.setHours(0,0,0,0);

    const f = new Date(s.fecha);

  });

  // Cliente más activo (últimos 30 días)
  const hace30 = new Date(); hace30.setDate(hace30.getDate() - 30);

function renderRenovacionesCard() {
  const today = new Date();
  const activos = state.clients.filter(c => c.estado === 'ACTIVO');
  const rows = [];

  activos.forEach(c => {
    const isPresencial = (c.modalidad || '').toUpperCase() === 'PRESENCIAL';
    const plan = (c.plan || '').toUpperCase();

    if (isPresencial) {
      if (plan === 'SESION_SUELTA') return; // sesión suelta no aparece aquí

      const total = plan === 'BONO_8' ? 8 : plan === 'BONO_12' ? 12 : 0;
      if (total === 0) return;

      const usadas = (state.dashSesiones || []).filter(s => s.codigo_cliente === c.codigo).length;
      const restantes = Math.max(0, total - usadas);

      let dotClass, badgeClass, badgeText, diasTexto;
      if (restantes <= 0) {
        dotClass = 'urgent'; badgeClass = 'urgent';
        badgeText = 'AGOTADO'; diasTexto = 'Bono agotado — renovar';
      } else if (restantes <= 2) {
        dotClass = 'urgent'; badgeClass = 'urgent';
        badgeText = `${restantes} ses`; diasTexto = `Quedan ${restantes} sesión${restantes !== 1 ? 'es' : ''} — casi agotado`;
      } else if (restantes <= 4) {
        dotClass = 'soon'; badgeClass = 'soon';
        badgeText = `${restantes} ses`; diasTexto = `Quedan ${restantes} sesiones del bono`;
      } else {
        dotClass = 'ok'; badgeClass = 'ok';
        badgeText = `${restantes} ses`; diasTexto = `Quedan ${restantes} de ${total} sesiones`;
      }

      rows.push({ c, diasTexto, dotClass, badgeClass, badgeText, isPresencial: true, restantes, total });

    } else {
      const fechaStr = (() => {
        if (state.renovaciones[c.codigo]) return state.renovaciones[c.codigo];
        if (!c.fecha_inicio) return null;
        const inicio = new Date(c.fecha_inicio);
        const dias = plan === '6MESES' ? 180 : plan === '3MESES' ? 90 : 30;
        inicio.setDate(inicio.getDate() + dias);
        return inicio.toISOString().split('T')[0];
      })();

      let diasTexto = 'Sin fecha configurada';
      let dotClass = 'ok', badgeClass = 'ok', badgeText = 'OK';

      if (fechaStr) {
        const fecha = new Date(fechaStr);
        const diff = Math.ceil((fecha - today) / (1000 * 60 * 60 * 24));
        if (diff <= 0) {
          dotClass = 'urgent'; badgeClass = 'urgent';
          badgeText = 'VENCIDO'; diasTexto = 'Plan vencido';
        } else if (diff <= 5) {
          dotClass = 'urgent'; badgeClass = 'urgent';
          badgeText = `${diff}d`; diasTexto = `Renueva en ${diff} día${diff !== 1 ? 's' : ''}`;
        } else if (diff <= 10) {
          dotClass = 'soon'; badgeClass = 'soon';
          badgeText = `${diff}d`; diasTexto = `Renueva en ${diff} días`;
        } else {
          dotClass = 'ok'; badgeClass = 'ok';
          badgeText = `${diff}d`; diasTexto = `Próx. renovación: ${formatDateShort2(fecha)}`;
        }
      }

      rows.push({ c, diasTexto, dotClass, badgeClass, badgeText, isPresencial: false, fechaStr });
    }
  });

  rows.sort((a, b) => {
    const order = { urgent: 0, soon: 1, ok: 2 };
    return (order[a.dotClass] ?? 3) - (order[b.dotClass] ?? 3);
  });

  const urgentes = rows.filter(r => r.dotClass === 'urgent' || r.dotClass === 'soon').length;

  return `
    <div class="card">
      <div class="card-header" style="margin-bottom:12px;">
        <div class="card-title">🔔 Renovaciones${urgentes > 0 ? ` <span style="background:var(--danger);color:#fff;font-size:11px;padding:2px 7px;border-radius:10px;font-family:'DM Sans';font-weight:700;">${urgentes}</span>` : ''}</div>
      </div>
      ${rows.length === 0
        ? '<div class="empty" style="padding:20px 0;">Sin alertas de renovación</div>'
        : rows.map(r => {
            if (r.isPresencial) {
              const pct = Math.round((r.restantes / r.total) * 100);
              const barColor = r.restantes <= 2 ? 'var(--danger)' : r.restantes <= 4 ? 'var(--warning)' : 'var(--success)';
              return `
                <div class="alert-row">
                  <div class="alert-dot ${r.dotClass}"></div>
                  <div class="alert-info">
                    <div class="alert-name">${r.c.nombre}</div>
                    <div class="alert-detail">${r.diasTexto}</div>
                    <div style="margin-top:8px;width:140px;">
                      <div style="background:#1a1a1a;border-radius:999px;height:5px;overflow:hidden;">
                        <div style="width:${pct}%;height:100%;background:${barColor};border-radius:999px;transition:width .3s;"></div>
                      </div>
                      <div style="font-size:10px;color:var(--muted);margin-top:3px;">${r.restantes}/${r.total} sesiones</div>
                    </div>
                  </div>
                  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                    <span class="alert-badge ${r.badgeClass}">${r.badgeText}</span>
                    ${r.c.whatsapp ? `
                      <a href="https://wa.me/${r.c.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(`Hola ${r.c.nombre.split(' ')[0]} 👋, te quedan ${r.restantes} sesión${r.restantes !== 1 ? 'es' : ''} del bono. ¿Renovamos? 💪`)}"
                        target="_blank"
                        style="display:inline-flex;align-items:center;gap:5px;background:#25D366;color:#fff;
                        font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
                        text-decoration:none;white-space:nowrap;">

            } else {

                    <div class="renov-input-wrap">

                      <button class="btn-renov-save" data-renov-save="${r.c.codigo}">Guardar</button>

    </div>
    ${rutinas.length === 0

      : rutinas.map(r => {

              ${expanded ? `

}
 
  function renderDetailHistorial(c) {
  if (state.loadingDetail) return '<div class="loading">⚙ Cargando...</div>';

  const vistaBtns = `
    <div style="display:flex;gap:8px;margin-bottom:18px;">
      <div onclick="setHistorialVista('entrenos')" style="padding:8px 18px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid ${state.historialVista==='entrenos'?'#1e90ff':'#2a2a2a'};background:${state.historialVista==='entrenos'?'#1e90ff':'#111'};color:${state.historialVista==='entrenos'?'#fff':'#888'};transition:all .15s;">💪 Entrenos</div>
      <div onclick="setHistorialVista('corporal')" style="padding:8px 18px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid ${state.historialVista==='corporal'?'#1e90ff':'#2a2a2a'};background:${state.historialVista==='corporal'?'#1e90ff':'#111'};color:${state.historialVista==='corporal'?'#fff':'#888'};transition:all .15s;">📏 Seguimiento corporal</div>
    </div>`;

  if (state.historialVista === 'corporal') return vistaBtns + renderSeguimientoCorporal(c);

  // ESCUDO 1: Leemos registros o historial, lo que venga
  const historialCompleto = c.registros || c.historial || [];

  if (historialCompleto.length === 0) return vistaBtns + '<div class="empty">No hay sesiones registradas 📊</div>';

  // Mapa sesión → sesión anterior del MISMO ejercicio (por fecha ascendente). Se construye siempre
  // sobre el historial COMPLETO (no el filtrado), para que la comparación sea correcta aunque el
  // desplegable esté filtrando por un solo ejercicio.
  const sesionAnteriorMap = new Map();
  {
    const porEjercicio = {};
    [...historialCompleto].sort((a, b) => {
      const fA = a.fecha ? new Date(a.fecha) : new Date(0);
      const fB = b.fecha ? new Date(b.fecha) : new Date(0);
      return fA - fB;
    }).forEach(s => {
      if (!s.ejercicio) return;
      if (!porEjercicio[s.ejercicio]) porEjercicio[s.ejercicio] = [];
      porEjercicio[s.ejercicio].push(s);
    });
    Object.values(porEjercicio).forEach(lista => {
      for (let i = 1; i < lista.length; i++) sesionAnteriorMap.set(lista[i], lista[i - 1]);
    });
  }

  // ⚠️ Detección de estancamiento y bajada de rendimiento, siempre sobre el historial COMPLETO del
  // cliente (sin filtros de rutina/ejercicio/fecha), para que el aviso salga directo arriba del todo.
  //
  // Para cada sesión se compara serie a serie contra la anterior (mismo compararSerie de las tarjetas)
  // Y ADEMÁS se compara el nº total de series: si un día se añade una serie de más, eso también es
  // progreso (más volumen), aunque el peso/reps de las series existentes se mantenga igual.
  //
  // - Estancado: últimas 3 sesiones sin NINGÚN progreso (ni en peso/reps de ninguna serie, ni en nº de series).
  //   Ventana de 3 porque el rendimiento varía sesión a sesión (sueño, estrés, digestión...) y una sola
  //   sesión floja es ruido normal, no estancamiento real.
  // - En bajada: últimas 2 sesiones CONSECUTIVAS en negativo neto (más series bajan que suben, y sin
  //   aumento de series). Ventana más corta que el estancamiento porque una caída sostenida 2 sesiones
  //   seguidas es señal temprana de fatiga acumulada — conviene avisar antes de esperar a la 3ª.
  const ejerciciosEstancados = [];
  const ejerciciosEnBajada = [];
  {
    const porEjercicio = {};
    [...historialCompleto]
      .filter(s => s.ejercicio && s.series)
      .sort((a, b) => (a.fecha ? new Date(a.fecha) : new Date(0)) - (b.fecha ? new Date(b.fecha) : new Date(0)))
      .forEach(s => {
        if (!porEjercicio[s.ejercicio]) porEjercicio[s.ejercicio] = [];
        porEjercicio[s.ejercicio].push(s);
      });

    // Balance de una sesión frente a su anterior: cuenta series que suben/bajan + si aumentó el nº de series.
    const balanceSesion = (s) => {
      const anterior = sesionAnteriorMap.get(s);
      if (!anterior) return null;
      const seriesAct = parseSeriesDetalle(s.series);
      const seriesAnt = parseSeriesDetalle(anterior.series);
      const masSeries = seriesAct.length > seriesAnt.length; // serie extra añadida = progreso de volumen
      let suben = 0, bajan = 0;
      seriesAct.forEach(serie => {
        const tipo = compararSerie(serie, seriesAnt[serie.serie - 1]).tipo;
        if (tipo === 'sube') suben++;
        else if (tipo === 'baja') bajan++;
      });
      return { progreso: masSeries || suben > 0, negativo: !masSeries && bajan > suben };
    };

    Object.entries(porEjercicio).forEach(([nombre, lista]) => {
      // Estancado: necesitamos 3 sesiones con anterior de referencia (4 en total)
      if (lista.length >= 4) {
        const ultimas3 = lista.slice(-3).map(balanceSesion).filter(Boolean);
        if (ultimas3.length === 3 && !ultimas3.some(b => b.progreso)) ejerciciosEstancados.push(nombre);
      }
      // En bajada: solo necesitamos las 2 últimas sesiones consecutivas, ambas en negativo neto
      if (lista.length >= 3) {
        const ultimas2 = lista.slice(-2).map(balanceSesion).filter(Boolean);
        if (ultimas2.length === 2 && ultimas2.every(b => b.negativo)) ejerciciosEnBajada.push(nombre);
      }
    });
  }
  const ejerciciosEstancadosFiltrado = ejerciciosEstancados.filter(n => !ejerciciosEnBajada.includes(n));
  const avisoEstancamientoHtml = ejerciciosEstancadosFiltrado.length > 0 ? `
    <div style="background:#2a1400;border:1px solid #ff9800;border-radius:12px;padding:14px 16px;margin-bottom:12px;">
      <div style="color:#ff9800;font-weight:800;font-size:14px;margin-bottom:4px;">⚠️ Cuidado, esto no progresa</div>
      <div style="color:#ddd;font-size:13px;line-height:1.5;">
        <b>${ejerciciosEstancadosFiltrado.join(', ')}</b> lleva${ejerciciosEstancadosFiltrado.length === 1 ? '' : 'n'} sus últimas 3 sesiones sin ningún progreso (ni peso/reps, ni series de más). Puede que toque cambiar el estímulo (peso, técnica, ejercicio).
      </div>
    </div>` : '';
  const avisoBajadaHtml = ejerciciosEnBajada.length > 0 ? `
    <div style="background:#2a0808;border:1px solid #ef4444;border-radius:12px;padding:14px 16px;margin-bottom:18px;">
      <div style="color:#ef4444;font-weight:800;font-size:14px;margin-bottom:4px;">🔻 Rendimiento a la baja</div>
      <div style="color:#ddd;font-size:13px;line-height:1.5;">
        <b>${ejerciciosEnBajada.join(', ')}</b> lleva${ejerciciosEnBajada.length === 1 ? '' : 'n'} 2 sesiones seguidas bajando (menos peso/reps y sin series de más). Vigila fatiga acumulada — puede tocar bajar volumen o meter una descarga.
      </div>
    </div>` : '';

  // Rutinas del cliente (Torso/Pierna/Fullbody...) para el filtro. rutina_id viaja en cada sesión
  // desde que la app cliente lo guarda al registrar el entreno.
  const rutinasDelCliente = c.rutinas || [];
  const rutinaNombreMap = {};
  rutinasDelCliente.forEach(r => { rutinaNombreMap[r.id] = r.nombre; });

  // Filtro por rutina (se aplica ANTES que el de ejercicio: acota qué ejercicios aparecen en su desplegable)
  const filtroRutina = state.historialRutina || '';
  const historialPorRutina = filtroRutina
    ? historialCompleto.filter(s => String(s.rutina_id ?? '') === String(filtroRutina))
    : historialCompleto;

  // Lista de ejercicios disponibles en el desplegable: solo los de la rutina elegida (si hay filtro)
  const ejerciciosDelCliente = Array.from(new Set(historialPorRutina.map(s => s.ejercicio).filter(Boolean))).sort();

  // Filtro por ejercicio (aplica tanto a gráficas como a la lista de sesiones)
  const filtroEj = state.historialEjercicio || '';
  const historial = filtroEj ? historialPorRutina.filter(s => s.ejercicio === filtroEj) : historialPorRutina;
  const hoy = new Date();

  const historialParaCharts = getHistorialFiltradoParaCharts(historialPorRutina);

  const exerciseMap = {};

  historialParaCharts.forEach(s => {
    if (s.ejercicio && s.series) {
      if (!exerciseMap[s.ejercicio]) exerciseMap[s.ejercicio] = [];
      
      // ⚡ ESCUDO 2 CORREGIDO: Buscamos números después de una 'x' o números sueltos seguidos de kg
      let pesosEnSerie = [];
      const textoSeries = s.series.toLowerCase();

      // Intento 1: Buscar el formato clásico "Repeticiones x Peso" (ej: 10x80 o 10 x 80)
      // Formato "10kg x 12" → peso es el número ANTES de kg
const matchesKgX = [...textoSeries.matchAll(/(\d+(?:\.\d+)?)\s*kg\s*[xX]\s*\d+/g)];
const matchesX   = [...textoSeries.matchAll(/(?:\d+\s*[xX]\s*)(\d+(?:\.\d+)?)/g)];
const matchesKg  = [...textoSeries.matchAll(/(\d+(?:\.\d+)?)\s*kg/g)];

if (matchesKgX.length > 0) {
  pesosEnSerie = matchesKgX.map(m => Math.round(parseFloat(m[1])));
} else if (matchesX.length > 0) {
  pesosEnSerie = matchesX.map(m => Math.round(parseFloat(m[1])));
} else if (matchesKg.length > 0) {
  pesosEnSerie = matchesKg.map(m => Math.round(parseFloat(m[1])));
}

      const pesoMaximo = pesosEnSerie.length > 0 ? Math.max(...pesosEnSerie) : 0;

      exerciseMap[s.ejercicio].push({ 
        fecha: s.fecha || "", 
        peso: pesoMaximo 
      });
    }
  });

  // ESCUDO 3: El sort a prueba de fallos que vimos en la conversación
  const exercisesWithData = Object.entries(exerciseMap).map(([nombre, data]) => ({
    nombre,
    data: data.sort((a, b) => {
      const fA = a.fecha ? new Date(a.fecha) : new Date(0);
      const fB = b.fecha ? new Date(b.fecha) : new Date(0);
      return fA - fB;
    })
  })).filter(e => e.data.some(d => d.peso > 0));

  // ── Barra de controles: rango de fechas + desplegable de rutina + desplegable de ejercicio ──
  const opcionesRutina = rutinasDelCliente.map(r =>
    `<option value="${r.id}" ${String(filtroRutina) === String(r.id) ? 'selected' : ''}>${r.nombre}</option>`
  ).join('');
  const opcionesEjercicio = ejerciciosDelCliente.map(nombre =>
    `<option value="${nombre.replace(/"/g, '&quot;')}" ${filtroEj === nombre ? 'selected' : ''}>${nombre}</option>`
  ).join('');

  let controlesHtml = `
    <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center;">
      <div style="flex:1;"></div>
      ${rutinasDelCliente.length > 0 ? `
      <select onchange="setHistorialRutina(this.value)" style="background:#111;color:#e2e8f0;border:1px solid #2a2a2a;border-radius:8px;padding:7px 10px;font-size:12px;max-width:180px;">
        <option value="">Todas las rutinas</option>
        ${opcionesRutina}
      </select>` : ''}
      <select onchange="setHistorialEjercicio(this.value)" style="background:#111;color:#e2e8f0;border:1px solid #2a2a2a;border-radius:8px;padding:7px 10px;font-size:12px;max-width:220px;">
        <option value="">Todos los ejercicios</option>
        ${opcionesEjercicio}
      </select>
    </div>`;

  let chartsHtml = '';
  if (exercisesWithData.length > 0) {
    chartsHtml += '<div class="charts-title" style="margin-bottom:15px;">📈 Progreso</div>';
    chartsHtml += '<div class="charts-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;">';
    
    exercisesWithData.forEach(ex => {
      const canvasId = 'chart_' + ex.nombre.replace(/[^a-zA-Z0-9]/g, '_');
      const pesos = ex.data.map(d => d.peso);
      const max = Math.max(...pesos);
      const last = pesos[pesos.length - 1];

      chartsHtml += `
        <div class="chart-card" style="background:#111;padding:15px;border-radius:12px;border:1px solid #222;">
          <div style="color:#fff;font-weight:700;margin-bottom:10px;">${ex.nombre}</div>
          <div style="height:150px;"><canvas id="${canvasId}"></canvas></div>
          <div style="color:#3b82f6;font-size:12px;margin-top:10px;font-weight:bold;">
            ÚLTIMO: ${last}kg | MÁXIMO: ${max}kg
          </div>
        </div>`;
    });
    chartsHtml += '</div>';
  } else {
    chartsHtml += '<div class="empty" style="margin-bottom:10px;">Sin datos de peso en este periodo/ejercicio 📊</div>';
  }

  // ── Lista de Sesiones agrupada por fecha en acordeón (evita la lista infinita) ──
  const sesionesLimiteFecha = new Date(hoy);
  sesionesLimiteFecha.setDate(hoy.getDate() - state.sesionesDiasVisibles);

  // Ordenamos todo el historial filtrado (por ejercicio, si aplica) de más reciente a más antiguo
  const historialOrdenado = [...historial].sort((a, b) => {
    const fA = a.fecha ? new Date(a.fecha) : new Date(0);
    const fB = b.fecha ? new Date(b.fecha) : new Date(0);
    return fB - fA;
  });

  // Agrupamos por día (clave YYYY-MM-DD; sin fecha va a un grupo aparte)
  const grupos = {}; // clave -> { fechaObj, sesiones: [] }
  const ordenClaves = [];
  historialOrdenado.forEach(s => {
    const clave = s.fecha ? new Date(s.fecha).toISOString().slice(0, 10) : 'sin-fecha';
    if (!grupos[clave]) {
      grupos[clave] = { fechaObj: s.fecha ? new Date(s.fecha) : null, sesiones: [] };
      ordenClaves.push(clave);
    }
    grupos[clave].sesiones.push(s);
  });

  const clavesRecientes = ordenClaves.filter(clave => clave === 'sin-fecha' || grupos[clave].fechaObj >= sesionesLimiteFecha);
  const clavesAntiguas = ordenClaves.filter(clave => !clavesRecientes.includes(clave));

  // Pinta las series de una sesión comparadas serie a serie contra la sesión anterior del mismo
  // ejercicio: verde = progresa (más peso, o mismo peso con más reps), rojo = baja, gris = igual.
  const renderSeriesComparadas = (s) => {
    const seriesActuales = parseSeriesDetalle(s.series);
    if (seriesActuales.length === 0) {
      return `<div style="color:#eee;font-family:monospace;background:#0a0a0a;padding:8px;border-radius:6px;border:1px solid #1a1a1a;font-size:13px;">${s.series}</div>`;
    }
    const anterior = sesionAnteriorMap.get(s);
    const seriesAnteriores = anterior ? parseSeriesDetalle(anterior.series) : [];
    const colores = { sube: '#22c55e', baja: '#ef4444', igual: '#888', nuevo: '#3b82f6', na: '#888' };
    const iconos = { sube: '↑', baja: '↓', igual: '=', nuevo: '★', na: '' };
    const filas = seriesActuales.map(serie => {
      const cmp = compararSerie(serie, seriesAnteriores[serie.serie - 1]);
      let texto;
      if (serie.seg != null) texto = serie.peso ? `${serie.seg}seg (+${serie.peso}kg)` : `${serie.seg}seg`;
      else if (serie.peso != null && serie.reps != null) texto = `${serie.peso}kg x ${serie.reps}`;
      else texto = serie.texto;
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #151515;">
        <span style="color:#888;font-size:12px;">Serie ${serie.serie}</span>
        <span style="color:${colores[cmp.tipo]};font-weight:700;font-size:13px;">${texto} ${iconos[cmp.tipo]}</span>
      </div>`;
    }).join('');
    return `<div style="background:#0a0a0a;padding:6px 10px;border-radius:6px;border:1px solid #1a1a1a;">${filas}</div>`;
  };

  const renderGrupo = (clave) => {
    const grupo = grupos[clave];
    const fechaTexto = grupo.fechaObj ? formatDate(grupo.fechaObj.toISOString()) : 'Sin fecha registrada';
    const abierto = !!state.sesionesAbiertas[clave];
    const claveEscapada = clave.replace(/'/g, "\\'");
    return `
      <div style="margin-bottom:10px;border:1px solid #333;border-radius:12px;background:#080808;overflow:hidden;">
        <div onclick="toggleSesionFecha('${claveEscapada}')" style="display:flex;justify-content:space-between;align-items:center;padding:12px 15px;cursor:pointer;">
          <div style="color:#3b82f6;font-weight:700;font-size:14px;">${fechaTexto} <span style="color:#888;font-weight:400;font-size:12px;">(${grupo.sesiones.length} ejercicio${grupo.sesiones.length !== 1 ? 's' : ''})</span></div>
          <div style="color:#888;font-size:12px;">${abierto ? '▲' : '▼'}</div>
        </div>
        ${abierto ? `<div style="padding:0 15px 15px;">
          ${grupo.sesiones.map(s => `
            <div class="history-session" style="margin-bottom:10px;padding:12px;border:1px solid #222;border-radius:10px;background:#000;">
              <div style="font-weight:700;color:#3b82f6;margin-bottom:5px;font-size:14px;">${s.ejercicio}</div>
              ${renderSeriesComparadas(s)}
            </div>`).join('')}
        </div>` : ''}
      </div>`;
  };

  const etiquetaFiltro = [filtroRutina ? rutinaNombreMap[filtroRutina] : '', filtroEj].filter(Boolean).join(' — ');
  let sesionesHtml = `<div class="charts-title" style="margin-top:25px; margin-bottom:15px;">📋 Sesiones ${etiquetaFiltro ? `— ${etiquetaFiltro}` : ''}</div>`;
  sesionesHtml += `<div style="color:#666;font-size:11px;margin-bottom:10px;">↑ progresa &nbsp; = mantiene &nbsp; ↓ baja &nbsp; ★ primera vez registrada</div>`;
  sesionesHtml += clavesRecientes.map(renderGrupo).join('');

  if (clavesAntiguas.length > 0) {
    sesionesHtml += `
      <div onclick="verSesionesMasAntiguas()" style="text-align:center;padding:12px;margin-top:6px;border:1px dashed #333;border-radius:12px;color:#888;font-size:13px;cursor:pointer;">
        Ver más antiguo (${clavesAntiguas.length} día${clavesAntiguas.length !== 1 ? 's' : ''} más)
      </div>`;
  }

  return vistaBtns + avisoEstancamientoHtml + avisoBajadaHtml + controlesHtml + chartsHtml + sesionesHtml;
}

// Convierte el historial en una lectura tipo informe: ritmo real de cambio de peso, comparando el
// último registro tanto contra el inmediatamente anterior ("corto plazo", puede depender de un solo día)
// como contra el registro más cercano a ~4 semanas atrás ("tendencia", ventana igual a la que ya usa
// generarInsightsSeguimiento — se evita que un pesaje puntual distorsione la lectura). Qué están diciendo
// los perímetros de adiposidad (abdomen/cuello) frente a los entrenados (brazo/muslo/pantorrilla), y una
// recomendación en una frase por ventana. A diferencia de generarInsightsSeguimiento (que solo habla cuando
// algo supera un umbral de alarma), esto siempre da una lectura, aunque sea "sigue igual, no toques nada".
function calcVentanaInforme(last, prev, semanas) {
  const deltaPeso = rnd(last.peso - prev.peso, 1);
  const pctSemana = semanas > 0 ? rnd((deltaPeso / prev.peso) / semanas * 100, 2) : 0;
  const kgSemana = semanas > 0 ? rnd(deltaPeso / semanas, 2) : 0;

  let ritmoLabel, ritmoColor, ritmoIcon;
  if (pctSemana > 0.15) { ritmoLabel = 'Ganando peso'; ritmoColor = '#f59e0b'; ritmoIcon = '📈'; }
  else if (pctSemana > -0.3) { ritmoLabel = 'Casi estancado'; ritmoColor = '#eab308'; ritmoIcon = '➖'; }
  else if (pctSemana >= -1.0) { ritmoLabel = 'Ritmo óptimo'; ritmoColor = '#22c55e'; ritmoIcon = '✅'; }
  else { ritmoLabel = 'Ritmo agresivo'; ritmoColor = '#ef4444'; ritmoIcon = '⚠️'; }

  const deltaCampo = k => (last[k] == null || prev[k] == null) ? null : rnd(last[k] - prev[k], 1);
  const adip = [{ k: 'abdomen', lbl: 'Abdomen' }, { k: 'cuello', lbl: 'Cuello' }]
    .map(c => ({ ...c, delta: deltaCampo(c.k) })).filter(c => c.delta !== null);
  const musc = [{ k: 'brazo', lbl: 'Brazo' }, { k: 'muslo', lbl: 'Muslo' }, { k: 'pantorrilla', lbl: 'Pantorrilla' }]
    .map(c => ({ ...c, delta: deltaCampo(c.k) })).filter(c => c.delta !== null);

  let patronTxt;
  if (adip.length && adip.every(c => c.delta < 0) && musc.length && musc.every(c => c.delta >= 0)) {
    patronTxt = `La pérdida se concentra en zonas de acumulación de grasa (${adip.map(c => `${c.lbl.toLowerCase()} ${c.delta}cm`).join(', ')}), mientras las zonas entrenadas (${musc.map(c => c.lbl.toLowerCase()).join(', ')}) se mantienen o suben. Es el patrón que se busca: grasa a la baja con músculo preservado.`;
  } else if (adip.length && adip.every(c => c.delta < 0)) {
    patronTxt = `Los perímetros de adiposidad bajan (${adip.map(c => `${c.lbl} ${c.delta}cm`).join(', ')}) — buena señal de pérdida de grasa.`;
  } else if (adip.length && adip.every(c => c.delta > 0)) {
    patronTxt = `Los perímetros de adiposidad suben (${adip.map(c => `${c.lbl} +${c.delta}cm`).join(', ')}) — vigilar si el peso también sube o si es solo retención puntual.`;
  } else {
    patronTxt = 'Perímetros mixtos o sin datos suficientes todavía para ver un patrón claro — hacen falta un par de registros más para confirmar tendencia.';
  }

  let recomendacion;
  if (ritmoLabel === 'Ritmo óptimo') recomendacion = 'Mantén las mismas calorías y el mismo entrenamiento — está funcionando, no toques nada todavía.';
  else if (ritmoLabel === 'Casi estancado') recomendacion = 'Si llevas 2-3 semanas así, valora bajar 100-150 kcal o revisar la adherencia real a la dieta.';
  else if (ritmoLabel === 'Ganando peso') recomendacion = 'Si el objetivo es perder grasa, baja 150-200 kcal. Si el objetivo es volumen/recomposición, este ritmo puede ser el esperado.';
  else recomendacion = 'Sube la ingesta 150-300 kcal y asegura proteína alta (2.2-2.6 g/kg) — el ritmo actual es demasiado rápido para minimizar la pérdida de masa magra (evidencia: Garthe et al.).';

  return { semanas: rnd(semanas, 1), deltaPeso, pctSemana, kgSemana, ritmoLabel, ritmoColor, ritmoIcon, patronTxt, recomendacion,
    pesoInicial: prev.peso, pesoActual: last.peso };
}

function generarInformeCorporal(datos) {
  const conPeso = datos.filter(d => d.peso);
  if (conPeso.length < 2) return null;
  const last = conPeso[conPeso.length - 1];
  const prevCorto = conPeso[conPeso.length - 2];

  const fechaLast = new Date(last.fecha);
  const objetivoLargo = new Date(fechaLast);
  objetivoLargo.setDate(objetivoLargo.getDate() - 28);
  let prevLargo = null, mejorDif = Infinity;
  conPeso.slice(0, -1).forEach(d => {
    const dif = Math.abs(new Date(d.fecha) - objetivoLargo);
    if (dif < mejorDif) { mejorDif = dif; prevLargo = d; }
  });

  const ventanas = [{ tag: 'Corto plazo', prev: prevCorto }];
  if (prevLargo && prevLargo.id !== prevCorto.id) {
    const semanasLargo = (fechaLast - new Date(prevLargo.fecha)) / 86400000 / 7;
    if (semanasLargo >= 2) ventanas.push({ tag: 'Tendencia (~4 sem)', prev: prevLargo });
  }

  return ventanas.map(({ tag, prev }) => {
    const semanas = (fechaLast - new Date(prev.fecha)) / 86400000 / 7;
    return { tag, ...calcVentanaInforme(last, prev, semanas) };
  });
}

            <div style="font-size:12px;color:${inf.ritmoColor};font-weight:700;margin-top:8px;">${inf.ritmoLabel}</div>

    </div>`;
}

// Borra TODOS los registros de seguimiento_corporal de este cliente (medidas + composición calculada).
// Pensado para pruebas: útil para resetear al cliente de prueba sin tener que borrar fila a fila en Supabase.
async function borrarSeguimientoCorporal(clienteId) {
  if (!confirm('¿Borrar TODO el historial de seguimiento corporal de este cliente? Esta acción no se puede deshacer.')) return;
  try {
    await supabase('seguimiento_corporal', { method: 'DELETE', filter: `cliente_id=eq.${clienteId}` });
    if (state.clientDetail && String(state.clientDetail.id) === String(clienteId)) {
      state.clientDetail.seguimientoCorporal = [];
    }
    state.seguimientoGraficasAbierto = false;
    render();
  } catch (e) {
    alert('No se pudo borrar el historial: ' + e.message);
  }
}

// Motor de avisos: compara el último registro contra el anterior inmediato ("corto plazo", para actuar
// rápido) y contra el registro más cercano a ~4 semanas atrás ("tendencia", para ver el patrón real).
// Solo reglas con respaldo (ritmo de pérdida de peso vs. pérdida de masa magra según Garthe et al. y
// meta-análisis de Murphy & Koehler: no bajar de ~1%/semana para minimizar la pérdida muscular; WHtR/WHR
// como marcadores de riesgo cardiovascular ya usados en el resto de la app). Nada inventado ni genérico.
function generarInsightsSeguimiento(datos) {
  if (datos.length < 2) return [];
  const last = datos[datos.length - 1];
  const prevCorto = datos[datos.length - 2];

  const fechaLast = new Date(last.fecha);
  const objetivoLargo = new Date(fechaLast);
  objetivoLargo.setDate(objetivoLargo.getDate() - 28);
  let prevLargo = null, mejorDif = Infinity;
  datos.slice(0, -1).forEach(d => {
    const dif = Math.abs(new Date(d.fecha) - objetivoLargo);
    if (dif < mejorDif) { mejorDif = dif; prevLargo = d; }
  });

  const ventanas = [{ tag: 'Corto plazo', prev: prevCorto }];
  if (prevLargo && prevLargo.id !== prevCorto.id) ventanas.push({ tag: 'Tendencia (~4 sem)', prev: prevLargo });

  const insights = [];
  ventanas.forEach(({ tag, prev }) => {
    const semanas = (new Date(last.fecha) - new Date(prev.fecha)) / 86400000 / 7;
    if (semanas < 0.2) return; // demasiado cerca en el tiempo para sacar conclusiones de ritmo

    const compL = last.composicion, compP = prev.composicion;

    if (last.peso && prev.peso && compL?.comp && compP?.comp) {
      const deltaPeso = last.peso - prev.peso;
      const pctSemana = (deltaPeso / prev.peso) / semanas * 100;
      const deltaMagra = compL.comp.masaMagra - compP.comp.masaMagra;
      const deltaGrasaPct = compL.bf.media - compP.bf.media;

      if (pctSemana <= -1 && deltaMagra < -0.2) {
        insights.push({ tag, icon: '⚠️', color: '#ef4444',
          txt: `Ritmo de pérdida ~${Math.abs(pctSemana).toFixed(1)}%/semana con caída de masa magra (${deltaMagra.toFixed(1)}kg). La evidencia (Garthe et al.) recomienda no bajar de ~1%/semana para minimizar la pérdida muscular.`,
          rec: 'Sube la ingesta 150-300 kcal y asegura proteína alta (2.2-2.6 g/kg, el rango de corte de la app). Mantén el volumen de fuerza — no lo recortes en déficit.' });
      }
      if (deltaGrasaPct > 0.5 && deltaMagra <= 0) {
        insights.push({ tag, icon: '⚠️', color: '#f97316',
          txt: `% graso +${deltaGrasaPct.toFixed(1)}pts sin ganancia de masa magra.`,
          rec: 'El superávit probablemente sea demasiado alto para lo que se puede construir de músculo ahora mismo. Baja 100-200 kcal y prioriza la progresión de cargas para dirigir el extra a masa muscular.' });
      }
      if (deltaMagra > 0.2 && deltaGrasaPct <= 0) {
        insights.push({ tag, icon: '✅', color: '#22c55e',
          txt: `Masa magra +${deltaMagra.toFixed(1)}kg con % graso estable o a la baja — la recomposición está funcionando.`,
          rec: 'Mantén las calorías y el entrenamiento tal cual — está funcionando, no cambies nada todavía.' });
      }
    }

    if (compL?.w && compP?.w && NIVEL_SCORE[compL.w.nivel] < NIVEL_SCORE[compP.w.nivel]) {
      insights.push({ tag, icon: '⚠️', color: '#ef4444', txt: 'El riesgo cardiovascular por cintura/altura (WHtR) ha empeorado.',
        rec: 'Añade cardio moderado (~150 min/semana) y revisa el sueño/estrés si el abdomen crece más que el resto del cuerpo — puede indicar retención o cortisol elevado.' });
    }
    if (compL?.r2 && compP?.r2 && NIVEL_SCORE[compL.r2.nivel] < NIVEL_SCORE[compP.r2.nivel]) {
      insights.push({ tag, icon: '⚠️', color: '#ef4444', txt: 'El riesgo por distribución cintura/cadera (WHR) ha empeorado.',
        rec: 'Revisa la tendencia de peso/grasa general — un WHR peor suele acompañar ganancia de grasa visceral, no es solo un tema local.' });
    }
    if (compL?.irr && compP?.irr) {
      const rL = IRR_RANK.indexOf(compL.irr.label), rP = IRR_RANK.indexOf(compP.irr.label);
      if (rL >= 0 && rP >= 0 && rL < rP) {
        insights.push({ tag, icon: '😴', color: '#a78bfa', txt: `La recuperación ha empeorado (${compP.irr.label} → ${compL.irr.label}).`,
          rec: 'Valora una semana de descarga (baja el volumen ~20-30%) y prioriza dormir 7-9h antes de seguir progresando cargas.' });
      }
    }
    if (compL?.comp && compP?.comp) {
      const deltaFFMI = compL.comp.ffmi - compP.comp.ffmi;
      if (deltaFFMI > 0.3) {
        insights.push({ tag, icon: '🏋️', color: '#8b5cf6', txt: `FFMI +${deltaFFMI.toFixed(1)} — buen progreso de masa muscular.`,
          rec: 'Sigue con la progresión actual de cargas; si la recuperación acompaña, hay margen para subir un poco el volumen semanal.' });
      }
    }
  });

  if (last.composicion?.ire?.cat === 'RESPONDEDOR BAJO') {
    insights.push({ tag: 'Estado actual', icon: '💪', color: '#ef4444', txt: 'Respondedor bajo al estímulo actual.',
      rec: 'Valora subir el volumen semanal (series efectivas) o introducir técnicas de alta intensidad (rest-pause, drop set) durante 4-6 semanas antes de reevaluar.' });
  }

  return insights;
}

function renderInsightsSeguimiento(datos) {
  const insights = generarInsightsSeguimiento(datos);
  if (insights.length === 0) return '';
  return `
    <div style="background:#111;border:1px solid #222;border-radius:12px;padding:15px;margin-bottom:16px;">
      <div style="color:#fff;font-weight:700;margin-bottom:10px;">💡 Lo que dicen tus datos</div>
      ${insights.map(i => `
        <div style="margin-bottom:12px;">
          <div style="display:flex;gap:8px;align-items:flex-start;">
            <span>${i.icon}</span>
            <div style="font-size:12px;color:#ddd;">
              <span style="color:${i.color};font-weight:700;">${i.tag}:</span> ${i.txt}
            </div>
          </div>
          ${i.rec ? `<div style="margin-left:24px;margin-top:4px;font-size:12px;color:#999;">🎯 <b style="color:#bbb;">Recomendación:</b> ${i.rec}</div>` : ''}
        </div>`).join('')}

}

// Una gráfica por cada dato que tenga al menos 2 registros, agrupadas en categorías plegables
// (Perímetros, Composición, Salud, Rendimiento) para no mostrar 20 tarjetas de golpe.
function renderGraficasSeguimiento(datos) {
  const ultimoConComp = datos.slice().reverse().find(d => d.composicion?.ire || d.composicion?.ipo);
  let totalGeneral = 0;
  let html = '';

  CATEGORIAS_SEGUIMIENTO.forEach(cat => {
    if (cat.id === 'informe') {
      const conPeso = datos.filter(d => d.peso);
      if (conPeso.length < 2) return; // sin suficientes datos, no se muestra esta pestaña todavía
      totalGeneral += 1;
      const catAbierta = !!(state.seguimientoCategoriaAbierta || {})[cat.id];
      html += `
        <div style="border:1px solid #1a1a1a;border-radius:10px;margin-bottom:10px;overflow:hidden;">
          <div onclick="toggleSeguimientoCategoria('${cat.id}')" style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#0a0a0a;cursor:pointer;">
            <span style="color:#fff;font-weight:700;font-size:13px;">${cat.lbl}</span>
            <span style="color:#3b82f6;font-size:12px;">${catAbierta ? '▲' : '▼'}</span>
          </div>
          ${catAbierta ? `<div style="padding:14px;">${renderInformeCorporal(datos)}</div>` : ''}
        </div>`;
      return; // categoría gestionada aparte, no pasa por el bucle de campos normal
    }
    const camposCat = CAMPOS_SEGUIMIENTO.filter(campo => campo.categoria === cat.id);
    let contenidoCat = '<div class="charts-grid">';
    let countCat = 0;

    camposCat.forEach(campo => {
      const serie = datos.filter(d => campo.get(d) !== null && campo.get(d) !== undefined && campo.get(d) !== '');
      if (serie.length < 2) return;
      countCat++;
      const valores = serie.map(d => Number(campo.get(d)));
      const last = valores[valores.length - 1];
      const lastD = serie[serie.length - 1];
      const canvasId = 'chartcorp_' + campo.id;
      let statHtml;
      if (campo.esNivel) {
        const nivelActual = campo.getNivel(lastD);
        const colorActual = NIVEL_COLOR_MAP[nivelActual] || '#888';
        statHtml = `<div style="color:${colorActual};font-size:12px;margin-top:10px;font-weight:bold;">ACTUAL: ${campo.getDesc(lastD) || nivelActual}</div>`;
      } else {
        const first = valores[0];
        const delta = Math.round((last - first) * 100) / 100;
        statHtml = `<div style="color:${campo.color};font-size:12px;margin-top:10px;font-weight:bold;">
            ACTUAL: ${last}${campo.unidad} | ${delta > 0 ? '+' : ''}${delta}${campo.unidad} desde el primer registro
          </div>`;
      }
      contenidoCat += `
        <div class="chart-card" style="background:#111;padding:15px;border-radius:12px;border:1px solid #222;">
          <div style="color:#fff;font-weight:700;margin-bottom:10px;">${campo.lbl}</div>
          <div style="height:150px;"><canvas id="${canvasId}"></canvas></div>
          ${statHtml}
        </div>`;
    });

    // IRE/IPO (no numéricos) van dentro de la categoría "Rendimiento"
    if (cat.id === 'rendimiento' && ultimoConComp) {
      const cp = ultimoConComp.composicion;
      if (cp.ire) {
        countCat++;
        contenidoCat += `
          <div class="chart-card" style="background:#111;padding:15px;border-radius:12px;border:1px solid #222;">
            <div style="color:#fff;font-weight:700;margin-bottom:10px;">Tipo de respondedor (IRE)</div>
            <div style="font-size:18px;font-weight:800;color:${cp.ire.color};">${cp.ire.cat}</div>
            <div style="font-size:12px;color:#999;margin-top:4px;">${cp.ire.sub}</div>
          </div>`;
      }
      if (cp.ipo) {
        countCat++;
        contenidoCat += `
          <div class="chart-card" style="background:#111;padding:15px;border-radius:12px;border:1px solid #222;">
            <div style="color:#fff;font-weight:700;margin-bottom:10px;">Prioridad (IPO)</div>
            <div style="font-size:18px;font-weight:800;color:${cp.ipo.color};">${cp.ipo.prioridad}</div>
            <div style="font-size:12px;color:#999;margin-top:4px;">${cp.ipo.desc}</div>
          </div>`;
      }
    }
    contenidoCat += '</div>';

    if (countCat === 0) return; // esta categoría no tiene datos suficientes todavía, no la mostramos
    totalGeneral += countCat;

    const catAbierta = !!(state.seguimientoCategoriaAbierta || {})[cat.id];
    html += `
      <div style="border:1px solid #1a1a1a;border-radius:10px;margin-bottom:10px;overflow:hidden;">
        <div onclick="toggleSeguimientoCategoria('${cat.id}')" style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#0a0a0a;cursor:pointer;">
          <span style="color:#fff;font-weight:700;font-size:13px;">${cat.lbl} <span style="color:#666;font-weight:400;font-size:11px;">(${countCat})</span></span>
          <span style="color:#3b82f6;font-size:12px;">${catAbierta ? '▲' : '▼'}</span>
        </div>
        ${catAbierta ? `<div style="padding:14px;">${contenidoCat}</div>` : ''}
      </div>`;
  });

  if (totalGeneral === 0) {
    return '<div class="empty">Necesitas al menos 2 registros con el mismo dato para ver su evolución 📏<br><span style="font-size:12px;color:#666;">Calcula composición otra vez en Nutrición para añadir un segundo punto.</span></div>';
  }
  return html;
}

function initChartsCorporal(datos) {
  if (!datos || datos.length === 0) return;
  const serieOrdenada = datos.slice().sort((a, b) => new Date(a.fecha) - new Date(b.fecha));

  CAMPOS_SEGUIMIENTO.forEach(campo => {
    const serie = serieOrdenada.filter(d => campo.get(d) !== null && campo.get(d) !== undefined && campo.get(d) !== '');
    if (serie.length < 2) return;
    const canvasId = 'chartcorp_' + campo.id;
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    if (window.chartInstances && window.chartInstances[canvasId]) {
      window.chartInstances[canvasId].destroy();
    }
    if (!window.chartInstances) window.chartInstances = {};

    const colorLinea = campo.esNivel ? '#888' : campo.color;
    const puntoColores = campo.esNivel ? serie.map(d => NIVEL_COLOR_MAP[campo.getNivel(d)] || '#888') : campo.color;

    window.chartInstances[canvasId] = new Chart(canvas, {
      type: 'line',
      data: {
        labels: serie.map(d => formatDateShort(d.fecha)),
        datasets: [{
          data: serie.map(d => Number(campo.get(d))),
          borderColor: colorLinea,
          backgroundColor: colorLinea + '1a',
          pointBackgroundColor: puntoColores,
          fill: true,
          tension: 0.4,
          pointRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: campo.esNivel
            ? { min: 0.5, max: 4.5, grid: { color: '#222' }, ticks: { stepSize: 1, color: '#666', callback: v => ({1:'🔴',2:'🟠',3:'🟡',4:'🟢'}[v] || '') } }
            : { grid: { color: '#222' }, ticks: { color: '#666' } },
          x: { grid: { display: false }, ticks: { color: '#666' } }
        }
      }
    });
  });
}

// Suma las macros de todos los alimentos de un combo, reutilizando nutriItemMacros (mismo cálculo que el resto de la app).
function nutriComboTotales(combo) {
  let p = 0, c = 0, f = 0, k = 0;
  (combo.alimentos || []).forEach(a => {
    const m = nutriItemMacros(a.key, a.grams);
    p += m.p; c += m.c; f += m.f; k += m.k;
  });
  return { p: Math.round(p), c: Math.round(c), f: Math.round(f), k: Math.round(k) };
}

// Añade un combo real como UNA MÁS de las opciones de una comida (hasta 3), sin pisar las que ya había.
// Así el cliente puede elegir entre 2-3 comidas reales distintas ese día, todas dentro del mismo hueco del plan.
function nutriAsignarOpcion(tipo, comboId, mealIdx) {
  const f = state.nutricionForm;
  if (!f || !f.comidas || !f.comidas[mealIdx]) {
    alert('Pulsa antes "➕ Añadir comida" para tener una franja donde asignar esta opción.');
    return;
  }
  const comida = f.comidas[mealIdx];
  if (!comida.opciones) comida.opciones = [];
  if (comida.opciones.some(o => o.comboId === comboId)) {
    alert('Esa comida ya está añadida como opción en esta franja.');
    return;
  }
  if (comida.opciones.length >= 3) {
    alert('Máximo 3 opciones por comida — quita una para añadir otra.');
    return;
  }
  const combo = (NUTRI_COMBOS[tipo] || []).find(x => x.id === comboId);
  if (!combo) return;

  const items = combo.alimentos.map(a => {
    const mk = nutriItemMacros(a.key, a.grams);
    return { foodKey: a.key, nombre: NUTRI_FOODS[a.key]?.n || a.key, grams: a.grams, p: mk.p, c: mk.c, f: mk.f, k: mk.k };
  });
  let mP = 0, mC = 0, mF = 0, mK = 0;
  items.forEach(it => { mP += it.p; mC += it.c; mF += it.f; mK += it.k; });

  comida.opciones.push({ comboId, origenCombo: combo.titulo, items, kcal: mK, proteina: Math.round(mP), carbo: Math.round(mC), grasa: Math.round(mF) });

  // La app del cliente (TrackLift) por ahora solo lee items/kcal/etc a nivel de comida (no de opción),
  // así que espejamos ahí la primera opción. Cuando la app muestre las 3 opciones, esto se puede quitar.
  comida.items = comida.opciones[0].items;
  comida.kcal = comida.opciones[0].kcal;
  comida.proteina = comida.opciones[0].proteina;
  comida.carbo = comida.opciones[0].carbo;
  comida.grasa = comida.opciones[0].grasa;
  render();
}

// Quita una opción concreta de una comida (por su índice dentro de comida.opciones).
function nutriQuitarOpcion(mealIdx, opcionIdx) {
  const f = state.nutricionForm;
  const comida = f?.comidas?.[mealIdx];
  if (!comida || !comida.opciones) return;
  comida.opciones.splice(opcionIdx, 1);
  comida.items = comida.opciones[0]?.items || [];
  comida.kcal = comida.opciones[0]?.kcal || 0;
  comida.proteina = comida.opciones[0]?.proteina || 0;
  comida.carbo = comida.opciones[0]?.carbo || 0;
  comida.grasa = comida.opciones[0]?.grasa || 0;
  render();
}

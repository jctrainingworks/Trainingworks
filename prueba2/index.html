const rnd = (n,d=1) => Math.round(n*10**d)/10**d;
const clamp = (n,a,b) => Math.min(Math.max(n,a),b);
const DOT = { verde:'nrdk-g', amarillo:'nrdk-y', naranja:'nrdk-o', rojo:'nrdk-r' };
/* ═══ % GRASO ═══ */
const calcNavy = d => {
  if(d.sexo==='hombre'){
    const diff=d.abdomen-d.cuello; if(diff<=0) return null;
    const den=1.0324-0.19077*Math.log10(diff)+0.15456*Math.log10(d.altura);
    return rnd((4.95/den-4.5)*100);
  } else {
    const sum=d.abdomen+d.cadera-d.cuello; if(sum<=0) return null;
    const den=1.29579-0.35004*Math.log10(sum)+0.22100*Math.log10(d.altura);
    return rnd((4.95/den-4.5)*100);
  }
};
const calcCustom = d => {
  const ac = d.activo4h === 'si'; let bf;
  if(d.sexo==='hombre'){
    bf=d.edad<=26 ? d.brazo*1.45+d.abdomen*0.51-d.antebrazo*2.13-(ac?14.2:10.2)
                  : d.cadera*0.41+d.abdomen*0.35-d.antebrazo*1.18-(ac?19:15);
  } else {
    bf=d.edad<=26 ? d.abdomen*0.53+d.muslo*0.82-d.antebrazo*1.7-(ac?22.6:19.6)
                  : d.abdomen*0.47+d.muslo*0.49-d.pantorrilla*0.57-(ac?21.4:18.4);
  }
  return rnd(bf);
};
// ACSM 2023 — clasificación %G por sexo y edad
const calcBFCat = (pct, sexo, edad) => {
  const e = parseFloat(edad) || 30;
  if (sexo === 'hombre') {
    const r = e < 40 ? [8,20,25] : e < 60 ? [11,22,28] : [13,25,30];
    return pct < r[0] ? 'Bajo en grasa' : pct < r[1] ? '✅ Saludable' : pct < r[2] ? '⚠️ Sobrepeso' : '🔴 Obesidad';
  } else {
    const r = e < 40 ? [16,28,39] : e < 60 ? [18,30,40] : [20,32,42];
    return pct < r[0] ? 'Bajo en grasa' : pct < r[1] ? '✅ Saludable' : pct < r[2] ? '⚠️ Sobrepeso' : '🔴 Obesidad';
  }
};
const calcBF = d => {const navy=calcNavy(d),custom=calcCustom(d);return{navy,custom,media:navy!==null?rnd((navy+custom)/2):custom};};

function mapNivelATier(nivelAtleta) {
  // Novato/Principiante -> Principiante | Intermedio -> Intermedio | Avanzado/Muy avanzado/Atleta máster -> Avanzado
  if (nivelAtleta === 'Intermedio') return 'Intermedio';
  if (nivelAtleta === 'Avanzado' || nivelAtleta === 'Muy avanzado' || nivelAtleta === 'Atleta máster') return 'Avanzado';
  return 'Principiante';
}
function sugerirNivelAtleta(anos, edad) {
  const a = parseFloat(anos);
  if (isNaN(a)) return '';
  const e = parseFloat(edad);
  if (a >= 8 && !isNaN(e) && e > 40) return 'Atleta máster';
  if (a < 0.5) return 'Novato';
  if (a < 4) return 'Principiante';
  if (a < 8) return 'Intermedio';
  if (a < 15) return 'Avanzado';
  return 'Muy avanzado';
}

/* ═══ COMPOSICIÓN ═══ */
const calcComp = (p,h,bf) => {
  const m=h/100,mg=rnd(p*bf/100),mm=rnd(p-mg),imc=rnd(p/m**2),ffmi=rnd(mm/m**2);
  return{masaGrasa:mg,masaMagra:mm,imc,imcCat:imc<18.5?'Bajo peso':imc<25?'Normal':imc<30?'Sobrepeso':'Obesidad',
    ffmi,ffmiCat:ffmi<17?'Masa baja':ffmi<18?'Básico':ffmi<20?'Intermedio':ffmi<22?'Buen nivel':ffmi<24?'Alto nivel':'Élite'};
};

/* ═══ SALUD ═══ */
const calcWHtR=(c,h)=>{const v=rnd(c/h,2);return{v,nivel:v<0.4?'amarillo':v<0.5?'verde':v<0.6?'amarillo':v<0.7?'naranja':'rojo',desc:v<0.4?'Posible bajo peso':v<0.5?'Saludable':v<0.6?'Moderado — vigilar':v<0.7?'Riesgo CV elevado':'Riesgo CV muy alto'};};
const calcWHR=(c,ca,s)=>{const v=rnd(c/ca,2),ok=s==='hombre'?v<0.9:v<0.8,med=s==='hombre'?v<1:v<0.85;return{v,nivel:ok?'verde':med?'amarillo':'rojo',desc:ok?'Bajo riesgo':med?'Riesgo moderado':'Riesgo alto'};};
const calcRCV=(c,s)=>{const[u1,u2]=s==='hombre'?[94,102]:[80,88];return c<=u1?{nivel:'verde',desc:'Sin riesgo abdominal'}:c<=u2?{nivel:'amarillo',desc:`Elevado (>${u1}cm)`}:{nivel:'rojo',desc:`Muy elevado (>${u2}cm)`};};
const calcRH=(bf,s)=>s==='hombre'?(bf<8?{nivel:'naranja',desc:'Riesgo supresión T'}:bf<=20?{nivel:'verde',desc:'Sin riesgo hormonal'}:bf<=25?{nivel:'amarillo',desc:'Inicio aromatización T→E'}:{nivel:'rojo',desc:'Aromatización significativa'}):(bf<15?{nivel:'rojo',desc:'Riesgo amenorrea'}:bf<=25?{nivel:'verde',desc:'Sin riesgo hormonal'}:bf<=32?{nivel:'amarillo',desc:'Vigilar estrógeno-dominancia'}:{nivel:'rojo',desc:'Riesgo hormonal elevado'});
const calcRI=(c,bf,s)=>{const aC=s==='hombre'?94:80,aB=s==='hombre'?20:28;return c>aC+8&&bf>aB?{nivel:'rojo',desc:'Riesgo alto insulínico'}:(c>aC||bf>aB)?{nivel:'amarillo',desc:'Riesgo moderado'}:{nivel:'verde',desc:'Sin indicadores insulínicos'};};
const calcRS=(ff,e,s)=>{const[u1,u2]=s==='hombre'?[17,18.5]:[14,15.5];return ff<u1?{nivel:'rojo',desc:'FFMI crítico — umbral sarcopenia'}:ff<u2?{nivel:e>40?'naranja':'amarillo',desc:'FFMI bajo-moderado'}:{nivel:'verde',desc:'Masa muscular OK'};};

/* ═══ RENDIMIENTO ═══ */
const calcIQF=(ff,bf,s,act)=>{
  const fl=s==='hombre'?[17,18,19,20,21,22,24]:[14,15,16,17,18,19,21],fp=[5,12,20,27,32,36,39,40];
  let pF=fp[fp.length-1];for(let i=0;i<fl.length;i++){if(ff<fl[i]){pF=fp[i];break;}}
  const pB=s==='hombre'?(bf<6?18:bf<10?35:bf<15?40:bf<20?33:bf<25?22:bf<30?12:4):(bf<14?18:bf<20?40:bf<25?35:bf<30?25:bf<35?14:4);
  const isAct=act!=='sedentario';
  const total=clamp(pF+pB+(isAct?20:10),0,100);
  return{valor:total,label:total>=85?'Nivel élite':total>=70?'Buen nivel — margen estético':total>=55?'Nivel intermedio':total>=40?'Nivel básico':'Nivel bajo'};
};
const calcIRR=(e,bf,s,act,an)=>{
  const ep=[[25,30],[30,27],[35,23],[40,19],[45,15],[50,11]];let pE=7;
  for(const[l,p]of ep){if(e<l){pE=p;break;}}
  const aN=parseInt(an)||0,isAct=act!=='sedentario',isHigh=act==='activo'||act==='muy_activo';
  const pC=isHigh&&aN>=3?27:isAct?18:22;
  const[mn,mx]=s==='hombre'?[10,18]:[16,24],pB=bf>=mn&&bf<=mx?20:bf<mn?13:bf<=mx+6?14:7;
  const ap=[[1,4],[2,8],[3,12],[5,16]];let pA=20;for(const[l,p]of ap){if(aN<l){pA=p;break;}}
  const total=clamp(pE+pC+pB+pA,0,100);
  return{valor:total,label:total>=80?'Recuperación óptima':total>=65?'Recuperación buena':total>=50?'Recuperación normal':total>=35?'Recuperación limitada':'Comprometida'};
};
const calcIRE=(ff,s,an)=>{
  const aN=parseInt(an)||0,base=s==='hombre'?17:14,ex=[0,2.5,4.0,5.0,5.5],idx=Math.min(aN>=5?4:aN,4),diff=ff-(base+ex[idx]);
  return diff>1.5?{cat:'RESPONDEDOR ALTO',sub:'Genética favorable',color:'var(--green)'}:diff>=-0.5?{cat:'RESPONDEDOR MEDIO',sub:'Respuesta típica',color:'var(--yellow)'}:{cat:'RESPONDEDOR BAJO',sub:'Ajustar método/volumen',color:'var(--warn)'};
};
const calcIPO=(bf,ff,s)=>{
  const aB=s==='hombre'?bf>20:bf>28,bB=s==='hombre'?bf<12:bf<18,aF=s==='hombre'?ff>=20:ff>=17,bF=s==='hombre'?ff<18:ff<15;
  if(aB&&aF) return{prioridad:'RECOMPOSICIÓN',objetivo:'recomp',color:'#b06bff',desc:'Buena base muscular, grasa por encima del óptimo. Recomposición: calorías de mantenimiento, proteína alta, entrenamiento de fuerza.'};
  if(aB&&bF) return{prioridad:'CORTE PRIORITARIO',objetivo:'corte',color:'var(--warn)',desc:'Alto %G y poca masa muscular. Reduce grasa primero con déficit moderado antes de cualquier fase de volumen.'};
  if(bB&&bF) return{prioridad:'VOLUMEN PRIORITARIO',objetivo:'volumen',color:'var(--green)',desc:'Bajo %G y baja masa muscular. Momento ideal para volumen limpio y construcción muscular progresiva.'};
  if(bB&&aF) return{prioridad:'MANTENIMIENTO / PEAK',objetivo:'mantenimiento',color:'var(--blue)',desc:'Composición excelente. Mantener con foco en rendimiento y optimización metabólica.'};
  return{prioridad:'RECOMPOSICIÓN',objetivo:'recomp',color:'#b06bff',desc:'Situación intermedia. Recomposición corporal como estrategia más equilibrada.'};
};
const suggestRanges = (act,obj,sexo) => {
  const pMap = {corte:[2.2,2.6],volumen:[1.6,2.2],recomp:[1.8,2.2],mantenimiento:[1.6,2.2]};
  const fMap = {corte:sexo==='hombre'?[0.7,0.9]:[0.8,1.0],
                volumen:sexo==='hombre'?[0.8,1.0]:[0.9,1.1],
                recomp:sexo==='hombre'?[0.8,1.0]:[0.9,1.1],
                mantenimiento:sexo==='hombre'?[0.8,1.0]:[0.9,1.1]};
  const p=pMap[obj]||[1.8,2.2];
  const f=fMap[obj]||(sexo==='hombre'?[0.8,1.0]:[0.9,1.1]);
  return{pMin:p[0],pMax:p[1],fMin:f[0],fMax:f[1]};
};

// Rangos de g/kg sugeridos por la literatura deportiva (ISSN / ACSM), según actividad + objetivo + sexo
function nutriSuggestRanges(actividad, objetivo, sexo) {
  // Delegado a suggestRanges() (motor único, rangos con fuente citada: ISSN / Helms 2014 / Iraki 2019).
  return suggestRanges(actividad, objetivo === 'corte' ? 'corte' : objetivo === 'volumen' ? 'volumen' : 'mantenimiento', sexo);
}

function nutriResolveGkg(f) {
  const sr = nutriSuggestRanges(f.actividad, f.objetivoCalorico, f.sexo);
  const pMid = Math.round(((sr.pMin + sr.pMax) / 2) * 10) / 10;
  const fMid = Math.round(((sr.fMin + sr.fMax) / 2) * 10) / 10;
  if (f.macroMode === 'mas_proteina') return { pGkg: Math.round((sr.pMax + 0.3) * 10) / 10, fGkg: sr.fMin, sr };
  if (f.macroMode === 'mas_grasa') return { pGkg: pMid, fGkg: Math.round((sr.fMax + 0.3) * 10) / 10, sr };
  if (f.macroMode === 'personalizado') return { pGkg: parseFloat(f.pGkgManual) || pMid, fGkg: parseFloat(f.fGkgManual) || fMid, sr };
  return { pGkg: pMid, fGkg: fMid, sr }; // 'auto'
}

// Ajuste calórico por defecto según objetivo (solo se usa como precarga en modo Empírico si el trainer no lo ha tocado)
const NUTRI_AJUSTE_DEFAULT = { corte: -350, mantenimiento: 0, volumen: 300 };

function nutriCalcularTDEEEmpirico(f) {
  const pIni = parseFloat(f.empPesoIni), pFin = parseFloat(f.empPesoFin);
  const kcalProm = parseFloat(f.empKcalProm);
  const dias = parseFloat(f.empDias) || 14;
  if (!pIni || !pFin || !kcalProm || !dias) return null;
  const cambioPeso = pFin - pIni; // kg, puede ser negativo/positivo/0
  const tdeeReal = Math.round(kcalProm + (cambioPeso * 7700) / dias);
  return { tdeeReal, cambioPeso, dias };
}

  } else {

      <input class="nutri-input" id="nf_empAjuste" value="${ajusteVal}" placeholder="${ajusteDefault}" style="margin-top:4px;" />

function nutriCalcularTodo() {
  syncNutricionFromDOM();
  const f = state.nutricionForm;
  if (!f) return;
  const peso = parseFloat(f.peso), altura = parseFloat(f.altura), edad = parseFloat(f.edad);
  if (!peso || !altura || !edad) { alert('Rellena peso, altura y edad para calcular.'); return; }

  const sexo = f.sexo || 'hombre';
  const ecuacion = f.ecuacion || 'mifflin';
  const bfPct = f.composicion?.bf?.media || null;
  const mlgKg = bfPct ? peso * (1 - bfPct / 100) : null;
  const actFactor = { sedentario:1.2, ligero:1.5, activo:1.7, muy_activo:2.0 }[f.actividad] || 1.5;

  let bmr, tdee;
  if (ecuacion === 'empirico') {
    const calcEmp = nutriCalcularTDEEEmpirico(f);
    if (!calcEmp) { alert('Modo Empírico: rellena peso inicial, peso final, kcal promedio y días del registro.'); return; }
    tdee = calcEmp.tdeeReal;
    bmr = Math.round(tdee / actFactor);
  } else {
    // Cálculo local de TMB (no depende del módulo N, que está aislado en otra función)
    switch (ecuacion) {
      case 'harris':
        bmr = sexo === 'hombre'
          ? Math.round(88.362 + 13.397*peso + 4.799*altura - 5.677*edad)
          : Math.round(447.593 + 9.247*peso + 3.098*altura - 4.33*edad);
        break;
      case 'cunningham': {
        const ffm = mlgKg || peso * 0.82; // fallback ~18%G si no hay % grasa calculado
        bmr = Math.round(500 + 22 * ffm);
        break;
      }
      case 'mifflin':
      default:
        bmr = Math.round(10*peso + 6.25*altura - 5*edad + (sexo === 'hombre' ? 5 : -161));
    }
    tdee = Math.round(bmr * actFactor);
  }

  let kcalObjetivo = tdee;
  if (ecuacion === 'empirico') {
    const ajuste = (f.empAjuste !== undefined && f.empAjuste !== '' && !isNaN(parseFloat(f.empAjuste)))
      ? parseFloat(f.empAjuste)
      : (NUTRI_AJUSTE_DEFAULT[f.objetivoCalorico] ?? 0);
    kcalObjetivo = tdee + ajuste;
  } else {
    if (f.objetivoCalorico === 'corte') kcalObjetivo = tdee - 350;
    if (f.objetivoCalorico === 'volumen') kcalObjetivo = tdee + 300;
  }

  const { pGkg, fGkg } = nutriResolveGkg(f);
  const protG = Math.round(peso * pGkg);
  const fatG = Math.round(peso * fGkg);
  const carbG = Math.max(0, Math.round((kcalObjetivo - protG * 4 - fatG * 9) / 4));
  const kcalReal = protG * 4 + fatG * 9 + carbG * 4;

  f.bmr = bmr; f.tdee = tdee; f.kcalObjetivo = kcalReal;
  f.pGkg = pGkg; f.fGkg = fGkg;
  f.macros = { proteina: protG, carbo: carbG, grasa: fatG };
  render();
}

// Guarda (o actualiza el historial) de seguimiento corporal: medidas + composición calculada.
// Se llama tanto al pulsar "Calcular" en Nutrición como al guardar el plan completo.
async function guardarSeguimientoCorporal(f, clienteId, origen, forzarNuevo) {
  if (!f || !clienteId) return null;
  if (!f.peso && !f.abdomen) return null; // evita filas vacías
  const hoy = new Date().toISOString().slice(0, 10);
  const filaSeguimiento = {
    cliente_id: clienteId,
    fecha: hoy,
    origen: origen || 'nutricion',
    peso: f.peso ? Number(f.peso) : null,
    cuello: f.cuello ? Number(f.cuello) : null,
    brazo: f.brazo ? Number(f.brazo) : null,
    antebrazo: f.antebrazo ? Number(f.antebrazo) : null,
    abdomen: f.abdomen ? Number(f.abdomen) : null,
    cadera: f.cadera ? Number(f.cadera) : null,
    muslo: f.muslo ? Number(f.muslo) : null,
    pantorrilla: f.pantorrilla ? Number(f.pantorrilla) : null,
    anos_entreno: f.anos ? Number(f.anos) : null,
    activo4h: f.activo4h || null,
    composicion: f.composicion || null
  };
  // Si ya hay un registro de HOY con el mismo origen (ej. recalculaste, o guardaste el plan tras calcular),
  // lo actualizamos en vez de crear una fila duplicada — salvo que se fuerce un registro nuevo (modo prueba).
  const existente = !forzarNuevo && (state.clientDetail?.seguimientoCorporal || [])
    .find(r => r.fecha === hoy && r.origen === (origen || 'nutricion') && String(r.cliente_id) === String(clienteId));
  try {
    if (existente) {
      const actualizado = await supabase('seguimiento_corporal', {
        method: 'PATCH', filter: `id=eq.${existente.id}`, body: filaSeguimiento
      });
      if (actualizado && actualizado[0] && state.clientDetail) {
        state.clientDetail.seguimientoCorporal = state.clientDetail.seguimientoCorporal.map(r =>
          r.id === existente.id ? actualizado[0] : r);
      }
      return (actualizado && actualizado[0]) || null;
    } else {
      const insertado = await supabase('seguimiento_corporal', { method: 'POST', body: filaSeguimiento });
      if (insertado && insertado[0] && state.clientDetail) {
        state.clientDetail.seguimientoCorporal = [insertado[0], ...(state.clientDetail.seguimientoCorporal || [])];
      }
      return (insertado && insertado[0]) || null;
    }
  } catch (e2) {
    console.error('No se pudo guardar en seguimiento_corporal:', e2);
    return null;
  }
}

function nutriCalcularComposicion() {
  syncNutricionFromDOM();
  const f = state.nutricionForm;
  if (!f) return;
  const peso = parseFloat(f.peso), altura = parseFloat(f.altura), edad = parseFloat(f.edad), abdomen = parseFloat(f.abdomen);
  if (!peso || !altura || !edad || !abdomen) { alert('Rellena peso, altura, edad y perímetro de abdomen para calcular.'); return; }
  const sexo = f.sexo || 'hombre';
  const d = {
    sexo, edad, altura, abdomen,
    cuello: parseFloat(f.cuello) || 0, cadera: parseFloat(f.cadera) || 0,
    brazo: parseFloat(f.brazo) || 0, antebrazo: parseFloat(f.antebrazo) || 0,
    muslo: parseFloat(f.muslo) || 0, pantorrilla: parseFloat(f.pantorrilla) || 0,
    activo4h: f.activo4h || 'no'
  };
  const bf = calcBF(d);
  const comp = calcComp(peso, altura, bf.media);
  const w = calcWHtR(abdomen, altura);
  const r2 = d.cadera ? calcWHR(abdomen, d.cadera, sexo) : null;
  const cv = calcRCV(abdomen, sexo);
  const rh = calcRH(bf.media, sexo);
  const ri = calcRI(abdomen, bf.media, sexo);
  const rs = calcRS(comp.ffmi, edad, sexo);
  const anos = parseInt(f.anos) || 0;
  const iqf = calcIQF(comp.ffmi, bf.media, sexo, f.actividad);
  const irr = calcIRR(edad, bf.media, sexo, f.actividad, anos);
  const ire = calcIRE(comp.ffmi, sexo, anos);
  const ipo = calcIPO(bf.media, comp.ffmi, sexo);
  f.composicion = { bf, comp, w, r2, cv, rh, ri, rs, iqf, irr, ire, ipo };
  render();
  // Se guarda solo al Calcular, sin necesidad de guardar el plan/menú completo.
  const clienteId = state.clientDetail?.id;
  if (clienteId) {
    guardarSeguimientoCorporal(f, clienteId, 'nutricion', !!state.nutricionForzarNuevo).then(guardado => {
      if (guardado) {
        state.alert = { type: 'success', msg: state.nutricionForzarNuevo ? '✅ Nuevo registro guardado (modo prueba)' : '✅ Composición calculada y guardada en Seguimiento corporal' };
        render();
      }
    });
  }
}

function nutriGramsForRole(foodKey, role, targetG) {
  const fd = NUTRI_FOODS[foodKey]; if (!fd) return 100;
  const macroVal = (role === 'prot' || role === 'prot_lac') ? fd.p : role === 'carb' ? fd.c : fd.f;
  if (!macroVal || macroVal < 0.5) return 100;
  if (foodKey === 'aove') return Math.min(15, Math.round(targetG / (fd.f / 100)));
  const minProt = (role === 'prot' || role === 'prot_lac') ? 30 : 0;
  const minG = minProt > 0 ? Math.round(minProt / (fd.p / 100)) : 10;
  const rawG = Math.round(targetG / (macroVal / 100));
  const cappedG = fd.maxG ? Math.min(rawG, fd.maxG) : rawG;
  return Math.max(minG, Math.min(cappedG, 500));
}

function nutriItemMacros(foodKey, grams) {
  const fd = NUTRI_FOODS[foodKey]; if (!fd || !grams) return { p:0, c:0, f:0, k:0 };
  return {
    p: Math.round(grams * fd.p / 100 * 10) / 10,
    c: Math.round(grams * fd.c / 100 * 10) / 10,
    f: Math.round(grams * fd.f / 100 * 10) / 10,
    k: Math.round(grams * fd.k / 100)
  };
}

function nutriEliminarComida(idx) {

async function toggleNutricion(clienteId, nuevoValor) {

  if (!confirm('⚠️ ¿Borrar TODO el historial de avisos de este cliente?\n\nEsta acción no se puede deshacer.')) return;

function actualizarSugerenciaDisc() {
  const box = document.getElementById('discSugerenciaBox');
  if (!box) return;
  const scores = { D: 0, I: 0, S: 0, C: 0 };
  let respondidas = 0;
  DISC_PREGUNTAS.forEach((_, i) => {
    const val = document.getElementById('disc_q' + i)?.value;
    if (val) { scores[val]++; respondidas++; }
  });
  if (!respondidas) { box.innerHTML = ''; return; }
  const maxScore = Math.max(...Object.values(scores));
  const ganadores = Object.keys(scores).filter(k => scores[k] === maxScore && maxScore > 0);
  if (!ganadores.length) { box.innerHTML = ''; return; }
  const empatado = ganadores.length > 1;
  const sugerido = ganadores[0];
  box.innerHTML = `
    <div style="background:#0d0d0d;border:1px solid #2a2a2a;border-left:3px solid #4caf50;border-radius:6px;padding:10px 12px;">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">${respondidas}/6 respondidas · ${empatado ? 'Empate entre: ' + ganadores.map(g => DISC_INFO[g].label).join(' / ') : 'Perfil sugerido: <b style="color:#4caf50;">' + DISC_INFO[sugerido].label + '</b>'}</div>
      ${!empatado ? `<button class="btn btn-primary btn-sm" onclick="aplicarSugerenciaDisc('${sugerido}')">Usar esta sugerencia</button>` : `<div style="font-size:11px;color:var(--muted);">Responde alguna pregunta más para desempatar, o elige tú directamente arriba.</div>`}
    </div>`;
}

function renderMiniRMs(rms) {
  if (!rms.length) return '<div style="font-size:13px;color:var(--muted);">Sin registros todavía.</div>';
  const porEjercicio = {};
  rms.forEach(r => {
    if (!porEjercicio[r.ejercicio] || new Date(r.fecha) > new Date(porEjercicio[r.ejercicio].fecha)) {
      porEjercicio[r.ejercicio] = r;
    }
  });
  const filas = Object.values(porEjercicio).sort((a, b) => a.ejercicio.localeCompare(b.ejercicio));
  return `
    <table class="pdf-ex-table">
      <thead><tr><th>Ejercicio</th><th>1RM est.</th><th>Fecha</th></tr></thead>
      <tbody>
        ${filas.map(r => `<tr><td>${r.ejercicio}</td><td>${Number(r.un_rm).toFixed(1)} kg</td><td>${String(r.fecha).split('T')[0]}</td></tr>`).join('')}
      </tbody>
    </table>
  `;
}

// ── Tarjeta "🍔 Comidas reales": packs de comidas de verdad, 3-4 alternativas por franja con macros parecidas ──
// Compara el objetivo diario (f.macros / f.kcalObjetivo) con lo que ya llevas montado en "Menú del día".
// Como cada comida puede tener 2-3 opciones distintas, no hay un total único: se calcula la MEDIA
// (si el cliente eligiera un poco de cada) y el RANGO min-max (según qué combinación elija ese día).
function nutriResumenDia(f) {
  const objetivo = { kcal: f.kcalObjetivo || 0, p: f.macros?.proteina || 0, c: f.macros?.carbo || 0, g: f.macros?.grasa || 0 };
  const sum = { avgK:0, avgP:0, avgC:0, avgG:0, minK:0, minP:0, minC:0, minG:0, maxK:0, maxP:0, maxC:0, maxG:0 };
  let comidasVacias = 0;
  (f.comidas || []).forEach(m => {
    const ops = m.opciones || [];
    if (!ops.length) { comidasVacias++; return; }
    const n = ops.length;
    sum.avgK += ops.reduce((a,o)=>a+o.kcal,0)/n;     sum.avgP += ops.reduce((a,o)=>a+o.proteina,0)/n;
    sum.avgC += ops.reduce((a,o)=>a+o.carbo,0)/n;    sum.avgG += ops.reduce((a,o)=>a+o.grasa,0)/n;
    sum.minK += Math.min(...ops.map(o=>o.kcal));     sum.minP += Math.min(...ops.map(o=>o.proteina));
    sum.minC += Math.min(...ops.map(o=>o.carbo));    sum.minG += Math.min(...ops.map(o=>o.grasa));
    sum.maxK += Math.max(...ops.map(o=>o.kcal));     sum.maxP += Math.max(...ops.map(o=>o.proteina));
    sum.maxC += Math.max(...ops.map(o=>o.carbo));    sum.maxG += Math.max(...ops.map(o=>o.grasa));
  });
  const r = v => Math.round(v);
  return {
    objetivo,
    promedio: { kcal:r(sum.avgK), p:r(sum.avgP), c:r(sum.avgC), g:r(sum.avgG) },
    min: { kcal:r(sum.minK), p:r(sum.minP), c:r(sum.minC), g:r(sum.minG) },
    max: { kcal:r(sum.maxK), p:r(sum.maxP), c:r(sum.maxC), g:r(sum.maxG) },
    comidasVacias, totalComidas: (f.comidas || []).length
  };
}

// Pinta el bloque "🎯 Objetivo vs. lo montado" encima del menú del día. Colorea cada fila según lo cerca
// que esté la MEDIA del objetivo: verde = dentro de ~8%, ámbar = hasta ~18%, rojo = más desviado.
function renderResumenDiaHtml(f) {
  if (!f.macros || !f.macros.proteina) {
    return `<div class="empty" style="margin-bottom:14px;">Pulsa "Calcular automáticamente" en 📏 Datos y objetivo para fijar el objetivo diario primero.</div>`;
  }
  const r = nutriResumenDia(f);
  const estado = (actual, obj) => {
    if (!obj) return '#888';
    const dev = Math.abs(actual - obj) / obj;
    return dev <= 0.08 ? '#3ecf6a' : dev <= 0.18 ? '#f5c542' : '#ff5c5c';
  };
  const fila = (label, obj, prom, mn, mx) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1c1c1c;gap:8px;">
      <span style="font-size:12px;color:var(--muted);width:46px;">${label}</span>
      <span style="font-size:12px;color:#fff;flex:1;">Obj. ${obj}</span>
      <span style="font-size:13px;font-weight:700;color:${estado(prom,obj)};">~${prom}</span>
      <span style="font-size:11px;color:var(--muted);width:80px;text-align:right;">(${mn}–${mx})</span>
    </div>`;
  return `
    <div style="background:#141414;border:1px solid #222;border-radius:10px;padding:12px 14px;margin-bottom:14px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">🎯 Objetivo · media de lo montado · (rango según qué elija el cliente)</div>
      ${fila('Kcal', r.objetivo.kcal, r.promedio.kcal, r.min.kcal, r.max.kcal)}
      ${fila('Prote', r.objetivo.p, r.promedio.p, r.min.p, r.max.p)}
      ${fila('Carbo', r.objetivo.c, r.promedio.c, r.min.c, r.max.c)}
      ${fila('Grasa', r.objetivo.g, r.promedio.g, r.min.g, r.max.g)}
      ${r.comidasVacias > 0 ? `<div style="font-size:11px;color:#f5c542;margin-top:8px;">⚠️ ${r.comidasVacias} de ${r.totalComidas} comida(s) sin opciones todavía — el total de arriba está incompleto hasta que las rellenes.</div>` : ''}
    </div>`;
}

function renderComidasRealesCard(f) {

      <span class="n-act-text">${t.label}</span>
    </button>`).join('');

  const hayMenu = !!(f && f.comidas && f.comidas.length);
  const combos = NUTRI_COMBOS[tabActivo] || [];
  const combosHtml = combos.map(combo => {
    const tot = nutriComboTotales(combo);
    const alimentosHtml = combo.alimentos.map(a => {
      const fd = NUTRI_FOODS[a.key];
      return `<div style="font-size:12px;color:var(--muted);padding:3px 0;">${fd?.n || a.key} — <span style="color:#fff;">${a.grams}g</span></div>`;
    }).join('');
    const asignarHtml = hayMenu
      ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
          ${f.comidas.map((m, mi) => {
            const opciones = m.opciones || [];
            const yaEsta = opciones.some(o => o.comboId === combo.id);
            const llena = opciones.length >= 3;
            const disabled = yaEsta || llena;
            const label = yaEsta ? `✓ ${m.nombre}` : `→ ${m.nombre} (${opciones.length}/3)`;
            return `<button type="button" ${disabled ? 'disabled' : ''} style="background:${disabled ? '#333' : 'var(--blue)'};color:#fff;border:none;border-radius:6px;font-size:11px;padding:5px 9px;cursor:${disabled ? 'default' : 'pointer'};opacity:${disabled ? '.6' : '1'};" onclick="nutriAsignarOpcion('${tabActivo}','${combo.id}',${mi})">${label}</button>`;

    return `

function renderDetailVolumen(c) {
  const historial = c.registros || c.historial || [];
  if (!historial.length) return '<div class="empty">No hay sesiones registradas para calcular volumen 📊</div>';

  const rangoSel = state.volumenRango || '4semanas';
  const metricaSel = state.volumenMetrica || 'tonelaje';

  const hoy = new Date();
  const dias = rangoSel === '1semana' ? 7 : rangoSel === '4semanas' ? 28 : null;
const desde = dias ? new Date(hoy.getTime() - dias * 86400000) : null;

  function getMuscle(nombre) {
    const n = normalizaNombreEj(nombre);
    const enBiblioteca = (state.biblioteca || []).find(b => normalizaNombreEj(b.nombre_es) === n);
    if (enBiblioteca) return enBiblioteca.musculo || 'Otro';
    const found = EXERCISE_DB_LOCAL.find(e => normalizaNombreEj(e.name) === n);
    if (found) return found.muscle;
    if (nombre) console.warn('[Volumen] Ejercicio sin músculo asignado (no está en tu Biblioteca ni en el catálogo):', nombre);
    return 'Otro';
  }

  const porMusculo = {};
  historial.forEach(s => {
    if (!s.fecha) return; 
    if (desde && new Date(s.fecha) < desde) return;
    const musculo = getMuscle(s.ejercicio);
    if (!porMusculo[musculo]) porMusculo[musculo] = { series: 0, reps: 0, tonelaje: 0 };

    const bloques = (s.series || '').split(/\n|,/).map(b => b.trim()).filter(Boolean);
    
    bloques.forEach(b => {
      porMusculo[musculo].series += 1;
      let peso = 0;
      let reps = 0;

      const matchKgX = b.match(/(\d+(?:\.\d+)?)\s*kg\s*[xX]\s*(\d+)/i);
      const matchX   = b.match(/(\d+)\s*[xX]\s*(\d+(?:\.\d+)?)/);

      if (matchKgX) {
        peso = parseFloat(matchKgX[1]);
        reps = parseInt(matchKgX[2]);
      } else if (matchX) {
        reps = parseInt(matchX[1]);
        peso = parseFloat(matchX[2]);
      } else {
        const matchKg  = b.match(/(\d+(?:\.\d+)?)\s*kg/i);
        const matchRep = b.match(/(\d+)\s*rep/i);
        if (matchKg) peso = parseFloat(matchKg[1]);
        if (matchRep) reps = parseInt(matchRep[1]);
      }

      porMusculo[musculo].reps     += reps;
      porMusculo[musculo].tonelaje += (peso * reps);
    });
  });

const haceUnaSemana = new Date(hoy); haceUnaSemana.setDate(hoy.getDate() - 7);

historial.forEach(s => {

    porMusculoSemActual[musculo] += bloques.length || 1;

    porMusculoSemAnt[musculo] += bloques.length || 1;
  }
});

function initCharts(data) {
  // ESCUDO 5: Por si le pasamos 'c' entero o 'c.registros' o 'c.historial' desde fuera
  const historial = Array.isArray(data) ? data : (data && data.registros ? data.registros : []);
  if (!historial || historial.length === 0) return;

  const exerciseMap = {};
  historial.forEach(s => {
    if (s.ejercicio && s.series) {
      if (!exerciseMap[s.ejercicio]) exerciseMap[s.ejercicio] = [];
      const pesosEnSerie = [...s.series.matchAll(/(\d+(?:\.\d+)?)\s*kg/g)].map(m => Math.round(parseFloat(m[1])));
      const pesoMaximo = pesosEnSerie.length > 0 ? Math.max(...pesosEnSerie) : 0;
      exerciseMap[s.ejercicio].push({ fecha: s.fecha || "", peso: pesoMaximo });
    }
  });

  Object.entries(exerciseMap).forEach(([nombre, data]) => {
    const pesosValidos = data.filter(d => d.peso > 0).sort((a,b) => {
      const fA = a.fecha ? new Date(a.fecha) : new Date(0);
      const fB = b.fecha ? new Date(b.fecha) : new Date(0);
      return fA - fB;
    });

    if (pesosValidos.length < 1) return;

    const canvasId = 'chart_' + nombre.replace(/[^a-zA-Z0-9]/g, '_');
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    if (window.chartInstances && window.chartInstances[canvasId]) {
      window.chartInstances[canvasId].destroy();
    }
    if (!window.chartInstances) window.chartInstances = {};

    window.chartInstances[canvasId] = new Chart(canvas, {
      type: 'line',
      data: {
        // ESCUDO 6: Protegemos formatDateShort contra fechas vacías en la gráfica
        labels: pesosValidos.map(d => d.fecha && typeof formatDateShort === 'function' ? formatDateShort(d.fecha) : ""),
        datasets: [{
          data: pesosValidos.map(d => d.peso),
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59, 130, 246, 0.1)',
          fill: true,
          tension: 0.4,
          pointRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { 
          y: { grid: { color: '#222' }, ticks: { color: '#666' } },
          x: { grid: { display: false }, ticks: { color: '#666' } }
        }
      }
    });
  });
}

 // ── CATÁLOGO DE EJERCICIOS ──
  // Ya no vive embebido aquí (eran 344 ejercicios, 1736 líneas, ~400KB).
  // Ahora se carga desde /catalogo-ejercicios/*.json (1.324 ejercicios,
  // uno por músculo, con equipo ya etiquetado desde el dataset original).
  // Se cachea en memoria tras la primera carga.
  const CATALOGO_MUSCULOS = ['pecho','espalda','cuadriceps','isquiotibiales','gluteos','hombros','biceps','triceps','core','gemelos','trapecios','cardio','espalda-lumbar','antebrazo','aductores','abductores'];
  let catalogoEjerciciosCache = null;

  async function cargarCatalogoEjercicios() {
    if (catalogoEjerciciosCache) return catalogoEjerciciosCache;
    const partes = await Promise.all(
      CATALOGO_MUSCULOS.map(m => fetch(`catalogo-ejercicios/${m}.json`).then(r => r.ok ? r.json() : []).catch(() => []))
    );
    catalogoEjerciciosCache = partes.flat().map(e => ({
      name: e.name_en,
      muscle: e.muscle,
      equipo: e.equipo,
      esRehabilitacion: false,
      origen: 'catalogo',
      gif: `https://raw.githubusercontent.com/jctrainingworks/exercises-gifs/main/assets/${e.gif}`,
      steps: e.instructions_en
    }));
    return catalogoEjerciciosCache;
  }

  let EXERCISE_DB_LOCAL = [];
  async function initCatalogoEjercicios() {
    EXERCISE_DB_LOCAL = await cargarCatalogoEjercicios();
  }


  const ISOMETRIC_KEYWORDS = ['plancha','hollow','wall sit','wall-sit','dead hang','deadhang','l-sit','l sit','farmer','isométric','isometric','vacío abdominal','sostenid'];
  function esNombreIsometrico(nombre) {
    const n = (nombre || '').toLowerCase();
    return ISOMETRIC_KEYWORDS.some(k => n.includes(k));
  }
  function setExerciseTipo(esIso) {
    if (!state.modalData) state.modalData = {};
    state.modalData.esIsometrico = esIso;
    render();
  }

async function searchExDB(query) {
  const dropdown = document.getElementById('exdbDropdown');
  if (!dropdown) return;

  const q = (query || '').toLowerCase();
  const muscleFilter = state.exMuscleFilter || 'Todos';
  const equipoFilter = state.exEquipoFilter || 'Todos';
  const tipoFilter = state.exTipoFilter || 'Normal';
  const quiereRehab = tipoFilter === 'Rehabilitación';

  // Combina el catálogo (1.324, siempre "Normal") con tu biblioteca propia
  // (tus ejercicios guardados, que sí pueden estar marcados como rehabilitación)
  const bibliotecaComoExDB = (state.biblioteca || []).map(b => ({
    name: b.nombre_es,
    muscle: b.musculo,
    equipo: b.equipo || 'Otro',
    esRehabilitacion: !!b.es_rehabilitacion,
    gif: b.gif_url,
    steps: b.pasos || []
  }));
  // En "Añadir a Biblioteca" se busca en el catálogo completo (para descubrir ejercicios nuevos).
  // En cualquier otro sitio (crear/editar ejercicio de una rutina) SOLO se busca en tu Biblioteca propia.
  const fuente = state.modal === 'addBib'
    ? [...bibliotecaComoExDB, ...EXERCISE_DB_LOCAL]
    : bibliotecaComoExDB;

  let results = fuente.filter(e => {
    const matchMuscle = muscleFilter === 'Todos' || e.muscle === muscleFilter;
    const matchEquipo = equipoFilter === 'Todos' || e.equipo === equipoFilter;
    const matchTipo = quiereRehab ? e.esRehabilitacion === true : e.esRehabilitacion !== true;
    const matchQuery = !q || e.name.toLowerCase().includes(q);
    return matchMuscle && matchEquipo && matchTipo && matchQuery;
  }).slice(0, 40);

  if (!results.length) { dropdown.style.display = 'none'; return; }
  dropdown.style.display = 'block';
  dropdown.innerHTML = results.map(ex => {
    const name = ex.name.replace(/'/g, "\\'");
    const muscle = ex.muscle.replace(/'/g, "\\'");
    const equipo = (ex.equipo || '').replace(/'/g, "\\'");
    return `
      <div onclick='selectExDB("${name}","${ex.gif}","${muscle}","${equipo}",${JSON.stringify(JSON.stringify(ex.steps || []))})'
        style="padding:10px 14px;cursor:pointer;font-size:13px;
        border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:10px;"
        onmouseover="this.style.background='#1a1a1a'"
        onmouseout="this.style.background='transparent'">
        <img src="${ex.gif}" style="width:52px;height:52px;object-fit:cover;border-radius:4px;flex-shrink:0;" onerror="this.style.display='none'" />
        <div>
          <div style="color:#fff;font-weight:600;">${ex.name}</div>
          <div style="color:#555;font-size:11px;text-transform:uppercase;">${ex.muscle}${ex.equipo ? ' · ' + ex.equipo : ''}</div>
        </div>
      </div>`;
  }).join('');
}

function selectExDB(name, gifUrl, bodyPart, equipment, pasosJson) {
  const dropdown = document.getElementById('exdbDropdown');
  if (dropdown) dropdown.style.display = 'none';

  let pasos = [];
  try { pasos = pasosJson ? JSON.parse(pasosJson) : []; } catch { pasos = []; }

  // Si estamos en modal de ejercicio (añadir o editar)
  const exNombre = document.getElementById('f_exNombre');
  const exGifUrl = document.getElementById('f_exGifUrl');
  const exPasos  = document.getElementById('f_exPasos');
 if (exNombre) exNombre.value = name;
  if (exGifUrl) exGifUrl.value = gifUrl;
  if (exPasos) exPasos.value = JSON.stringify(pasos);
  const exEquipo = document.getElementById('f_exEquipo');
  if (exEquipo) exEquipo.value = equipment || '';
  if (!state.modalData) state.modalData = {};
  state.modalData.nombreTemp = name;
  state.modalData.gifUrlTemp = gifUrl;
  state.modalData.pasosTemp = pasos;
  state.modalData.esIsometrico = esNombreIsometrico(name);

  // Si estamos en modal de biblioteca
  const gifPreview  = document.getElementById('bib_gifPreview');
  const previewBox  = document.getElementById('bib_preview');
  const previewName = document.getElementById('bib_previewName');
  const previewMeta = document.getElementById('bib_previewMeta');
  if (gifPreview) gifPreview.src = gifUrl;
  if (previewName) previewName.textContent = name;
  if (previewMeta) previewMeta.textContent = bodyPart;
  if (previewBox) previewBox.style.display = 'flex';
  const set = (id,v) => { const el=document.getElementById(id); if(el) el.value=v; };
  set('bib_nombreEn', name);
  set('bib_gifUrl',   gifUrl);
  set('bib_musculo',  bodyPart);
  set('bib_equipo',   equipment);
  set('bib_pasos',    JSON.stringify(pasos));
  const nombreEs = document.getElementById('bib_nombreEs');
  if (nombreEs && !nombreEs.value) nombreEs.value = name;
}

function filterBibSearch(query) {
  const q = (query||"").toLowerCase();
  const dropdown = document.getElementById('bibExDropdown');
  if (!dropdown) return;
  const matches = state.biblioteca.filter(e =>
    !q || e.nombre_es.toLowerCase().includes(q)
  );
  if (!matches.length) { dropdown.style.display='none'; return; }
  dropdown.style.display = 'block';
  dropdown.innerHTML = matches.map(e => {
    const nm = e.nombre_es.replace(/'/g,"\\'");
    const gif = e.gif_url.replace(/'/g,"\\'");
    const pasosJson = JSON.stringify(JSON.stringify(e.pasos || []));
    return `
<div onclick='pickFromBib("${nm}","${gif}",${pasosJson})'
        style="padding:10px 14px;cursor:pointer;font-size:13px;
        border-bottom:1px solid #1a1a1a;display:flex;
        align-items:center;gap:10px;"
        onmouseover="this.style.background='#1a1a1a'"
        onmouseout="this.style.background='transparent'">
        ${e.gif_url
          ? `<img src="${e.gif_url}" style="width:36px;height:36px;
              border-radius:4px;object-fit:cover;" />`
          : ''}
<div style="color:#fff;font-weight:600;">${e.nombre_es}</div>
</div>`;
  }).join('');
}

function pickFromBib(nombre, gifUrl, pasosJson) {
  const dd = document.getElementById('bibExDropdown');
  if (dd) dd.style.display = 'none';
  let pasos = [];
  try { pasos = pasosJson ? JSON.parse(pasosJson) : []; } catch { pasos = []; }
  const n = document.getElementById('f_exNombre');
  const g = document.getElementById('f_exGifUrl');
  const p = document.getElementById('f_exPasos');
  if (n) n.value = nombre;
  if (g) g.value = gifUrl;
  if (p) p.value = JSON.stringify(pasos);
  if (!state.modalData) state.modalData = {};
  state.modalData.pasosTemp = pasos;
}

function syncPdfDiasFromDOM() {
  const nombreInput = document.getElementById('pdfClienteNombre');
  if (nombreInput) state.pdfClienteNombre = nombreInput.value;

  document.querySelectorAll('.pdf-day-name').forEach(input => {
    const di = parseInt(input.dataset.dayIdx);
    if (state.pdfDias[di]) state.pdfDias[di].nombre = input.value;
  });

  document.querySelectorAll('.pdf-ex-row').forEach(row => {
    const di = parseInt(row.dataset.dayIdx);
    const ei = parseInt(row.dataset.pdfIdx);
    if (!state.pdfDias[di] || !state.pdfDias[di].ejercicios[ei]) return;
    row.querySelectorAll('[data-pdf-f]').forEach(input => {
      state.pdfDias[di].ejercicios[ei][input.dataset.pdfF] = input.value;
    });
  });
}

// ── NUTRICIÓN: sync, cálculo y guardado ──
function syncNutricionFromDOM() {
  if (!state.nutricionForm) return;
  const f = state.nutricionForm;

  const getVal = id => { const el = document.getElementById(id); return el ? el.value : undefined; };
  if (getVal('nf_peso') !== undefined) f.peso = getVal('nf_peso');
  if (getVal('nf_altura') !== undefined) f.altura = getVal('nf_altura');
  if (getVal('nf_edad') !== undefined) f.edad = getVal('nf_edad');
  if (getVal('nf_sexo') !== undefined) f.sexo = getVal('nf_sexo');
  if (getVal('nf_actividad') !== undefined) f.actividad = getVal('nf_actividad');
  if (getVal('nf_objetivo') !== undefined) f.objetivoCalorico = getVal('nf_objetivo');
  if (getVal('nf_macroMode') !== undefined) f.macroMode = getVal('nf_macroMode');

  document.querySelectorAll('[data-equiv-idx][data-equiv-f]').forEach(input => {

  document.querySelectorAll('[data-suple-idx][data-suple-f]').forEach(input => {

  });
}

async function guardarPlanNutricion() {
  syncNutricionFromDOM();
  const f = state.nutricionForm;
  const clienteId = state.clientDetail?.id;
  if (!f || !clienteId) return;

  const btn = document.getElementById('guardarNutricionBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  const payload = {
    cliente_id: clienteId,
    peso: f.peso ? Number(f.peso) : null,
    altura: f.altura ? Number(f.altura) : null,
    edad: f.edad ? parseInt(f.edad) : null,
    sexo: f.sexo,
    actividad: f.actividad,
    objetivo_calorico: f.objetivoCalorico,
    macro_mode: f.macroMode,
    p_gkg_manual: f.pGkgManual ? Number(f.pGkgManual) : null,
    f_gkg_manual: f.fGkgManual ? Number(f.fGkgManual) : null,
    bmr: f.bmr ? Number(f.bmr) : null,
    tdee: f.tdee ? Number(f.tdee) : null,
    kcal_objetivo: f.kcalObjetivo ? Number(f.kcalObjetivo) : null,
    macros: f.macros,
    comidas: f.comidas,
    ecuacion_tmb: f.ecuacion || 'mifflin',
    tdee_empirico: f.tdeeEmpirico || '',
    emp_peso_ini: f.empPesoIni ? Number(f.empPesoIni) : null,
    emp_peso_fin: f.empPesoFin ? Number(f.empPesoFin) : null,
    emp_kcal_prom: f.empKcalProm ? Number(f.empKcalProm) : null,
    emp_dias: f.empDias ? Number(f.empDias) : 14,
    emp_ajuste: (f.empAjuste !== undefined && f.empAjuste !== '') ? Number(f.empAjuste) : null,
    num_comidas: (f.comidas && f.comidas.length) || 0,
    meal_macros: JSON.stringify(f.mealMacros || {}),
    equivalencias: f.equivalencias,
    suplementos: f.suplementos,
    notas: f.notas,
    perimetros: {
      anos: f.anos, activo4h: f.activo4h,
      abdomen: f.abdomen, cuello: f.cuello, brazo: f.brazo, antebrazo: f.antebrazo,
      cadera: f.cadera, muslo: f.muslo, pantorrilla: f.pantorrilla
    },
    composicion: f.composicion || null,
    updated_at: new Date().toISOString()
  };

  try {
    if (f.id) {
      await supabase('planes_nutricion', { method: 'PATCH', filter: `id=eq.${f.id}`, body: payload });
    } else {
      const inserted = await supabase('planes_nutricion', { method: 'POST', body: payload });
      if (inserted && inserted[0]) f.id = inserted[0].id;
    }
    // Además de la "foto" actual en planes_nutricion, dejamos constancia en el historial de seguimiento corporal
    // (esto normalmente ya se guardó al pulsar "Calcular"; se repite aquí por si guardó el plan sin recalcular).
    await guardarSeguimientoCorporal(f, clienteId, 'nutricion');
    state.alert = { type: 'success', msg: 'Plan de nutrición guardado ✅' };
  } catch (e) {
    console.error(e);
    state.alert = { type: 'error', msg: 'Error al guardar el plan' };
  }
  render();
}

function generateResumen(notaEntrenador) {
  const c = state.clientDetail;
  if (!c) return;

  const historial = c.registros || c.historial || [];
  const hoy = new Date();
  const hace30 = new Date(); hace30.setDate(hace30.getDate() - 30);
  const sesionesUltimoMes = historial.filter(s => s.fecha && new Date(s.fecha) >= hace30);
  const totalSesiones = sesionesUltimoMes.length;

  function getMuscleLocal(nombre) {
    const n = normalizaNombreEj(nombre);
    const enBiblioteca = (state.biblioteca || []).find(b => normalizaNombreEj(b.nombre_es) === n);
    if (enBiblioteca) return enBiblioteca.musculo || 'Otro';
    const found = EXERCISE_DB_LOCAL.find(e => normalizaNombreEj(e.name) === n);
    return found ? found.muscle : 'Otro';
  }

  // Progreso ejercicios
  const ejerciciosUnicos = [...new Set(historial.map(s => s.ejercicio).filter(Boolean))];
  const progresoEjercicios = [];
  ejerciciosUnicos.forEach(nombre => {
    const sesEj = historial
      .filter(s => s.ejercicio === nombre && s.fecha)
      .sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
    if (sesEj.length < 2) return;
    const getPeso = s => {
      const pesos = [...(s.series||'').matchAll(/(\d+)\s*kg/g)].map(m => parseInt(m[1]));
      return pesos.length ? Math.max(...pesos) : 0;
    };
    const pesoInicio = getPeso(sesEj[0]);
    const pesoFinal  = getPeso(sesEj[sesEj.length-1]);
    if (pesoInicio > 0 && pesoFinal > 0)
      progresoEjercicios.push({ nombre, inicio: pesoInicio, final: pesoFinal, diff: pesoFinal - pesoInicio });
  });
  progresoEjercicios.sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff));
  const top5 = progresoEjercicios.slice(0,5);

  // Volumen por músculo
  const MCOLORS = {
    'Pecho':'#3b82f6','Espalda':'#8b5cf6','Cuádriceps':'#10b981',
    'Isquiotibiales':'#f59e0b','Glúteos':'#ec4899','Hombros':'#06b6d4',
    'Bíceps':'#f97316','Tríceps':'#ef4444','Core':'#84cc16',
    'Gemelos':'#a78bfa','Trapecios':'#fb7185','Otro':'#6b7280'
  };
  const porMusculo = {};
  sesionesUltimoMes.forEach(s => {
    const m = getMuscleLocal(s.ejercicio);
    if (!porMusculo[m]) porMusculo[m] = 0;
    const bloques = (s.series||'').split('\n').filter(Boolean);
    porMusculo[m] += bloques.length || 1;
  });
  const musculosSorted = Object.entries(porMusculo).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxSeries = musculosSorted.length ? Math.max(...musculosSorted.map(m=>m[1])) : 1;
  const musculoPrincipal = musculosSorted[0]?.[0] || '—';

  // Tonelaje
  let volumenTotal = 0;
  sesionesUltimoMes.forEach(s => {
    (s.series||'').split('\n').filter(Boolean).forEach(b => {
      const pesos = [...b.matchAll(/(\d+(?:\.\d+)?)\s*kg/g)].map(m=>parseFloat(m[1]));
      const reps  = [...b.matchAll(/(\d+)\s*rep/g)].map(m=>parseInt(m[1]));
      volumenTotal += (pesos.length ? Math.max(...pesos) : 0) * (reps.length ? reps[0] : 0);
    });
  });

  const mesActual = hoy.toLocaleDateString('es-ES',{month:'long',year:'numeric'});

  const progressRows = top5.map(ex => {
    const arrow = ex.diff > 0 ? '↑' : ex.diff < 0 ? '↓' : '→';
    const color = ex.diff > 0 ? '#16a34a' : ex.diff < 0 ? '#dc2626' : '#888';
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;
        padding:12px 0;border-bottom:1px solid #f0f0f0;">
        <div style="font-size:14px;font-weight:600;color:#1a1a1a;flex:1;">${ex.nombre}</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:13px;color:#888;">${ex.inicio}kg</span>
          <span style="font-size:20px;font-weight:900;color:${color};">${arrow}</span>
          <span style="font-size:15px;font-weight:700;color:${color};">${ex.final}kg</span>
          <span style="font-size:12px;font-weight:700;color:#fff;background:${color};
            padding:2px 8px;border-radius:999px;">${ex.diff>0?'+':''}${ex.diff}kg</span>
        </div>
      </div>`;
  }).join('');

  const muscleBars = musculosSorted.map(([m,series]) => {
    const pct = maxSeries > 0 ? (series/maxSeries*100) : 0;
    const color = MCOLORS[m] || '#6b7280';
    return `
      <div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;">

        </div>
        <div style="background:#e5e7eb;border-radius:999px;height:8px;overflow:hidden;">
          <div style="width:${pct}%;height:100%;background:${color};border-radius:999px;"></div>
        </div>
      </div>`;
  }).join('');

  const html = `<!DOCTYPE html>

<head>
<meta charset="UTF-8"/>
<title>Resumen ${c.nombre} — ${mesActual}</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>

      <div style="font-size:11px;color:#888;letter-spacing:3px;text-transform:uppercase;margin-top:2px;">Entrenamiento Personal · Madrid</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;">Informe mensual</div>
      <div style="font-family:'Bebas Neue';font-size:22px;color:#1a1a1a;text-transform:capitalize;">${mesActual}</div>

      ${c.plan?`<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;background:#e5e7eb;color:#555;text-transform:uppercase;">${c.plan}</span>`:''}

    </div>

        ${volumenTotal>1000?(Math.round(volumenTotal/100)/10)+'T':Math.round(volumenTotal)+'kg'}
      </div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.9;">Tonelaje total</div>

  ${top5.length>0?`

function captureModalExFields() {
  if (!state.modalData) state.modalData = {};
  const n  = document.getElementById('f_exNombre');
  const o  = document.getElementById('f_exOrden');
  const no = document.getElementById('f_exNotas');
  const g  = document.getElementById('f_exGifUrl');
  const gc = document.getElementById('f_exGrupoCodigo');
  if (n)  state.modalData.nombreTemp = n.value;
  if (o)  state.modalData.ordenTemp  = o.value;
  if (no) state.modalData.notasTemp  = no.value;
  if (g)  state.modalData.gifUrlTemp = g.value;
  if (gc) state.modalData.grupoCodigoTemp = gc.value;
}

function syncModalSeriesFromDOM() {
  state.modalSeries.forEach((s, i) => {
    const r = document.getElementById(`ms_reps_${i}`);
    const v = document.getElementById(`ms_rir_${i}`);
    const d = document.getElementById(`ms_desc_${i}`);
    const n = document.getElementById(`ms_tecN_${i}`);
    const p = document.getElementById(`ms_tecPct_${i}`);
    if (r) s.reps = r.value;
    if (v) s.rir  = v.value;
    if (d) s.desc = d.value;
    if (n) s.tecnicaN = n.value;
    if (p) s.tecnicaPct = p.value;
  });
}

function addModalSerie() {
  syncModalSeriesFromDOM();
  captureModalExFields();
  const ultima = state.modalSeries[state.modalSeries.length - 1];
  state.modalSeries.push(ultima
    ? { reps: ultima.reps, rir: ultima.rir, desc: ultima.desc, tecnica: 'normal', tecnicaN: '', tecnicaPct: '' }
    : { reps: '10-12', rir: '1-2', desc: '90seg', tecnica: 'normal', tecnicaN: '', tecnicaPct: '' });
  render();
}

function removeModalSerie(idx) {
  syncModalSeriesFromDOM();
  captureModalExFields();
  if (state.modalSeries.length > 1) { state.modalSeries.splice(idx, 1); render(); }
}

function updateModalSerie(idx, field, value) {
  if (state.modalSeries[idx]) state.modalSeries[idx][field] = value;
}

function setSerieTecnica(idx, tipo) {
  syncModalSeriesFromDOM();
  captureModalExFields();
  if (state.modalSeries[idx]) {
    state.modalSeries[idx].tecnica = tipo;
    if (!state.modalSeries[idx].tecnicaN) state.modalSeries[idx].tecnicaN = tipo === 'normal' ? '' : '1';
  }
  render();
}

function setGrupoTecnicaTipo(tipo) {
  captureModalExFields();
  if (!state.modalData) state.modalData = {};
  state.modalData.grupoTipoTemp = tipo;
  render();
}

  function formatDescField(input) {
  const v = (input.value || '').trim();
  if (/^\d+$/.test(v)) {
    input.value = v + 'seg';
    input.dispatchEvent(new Event('input', { bubbles: true }));
  }
}

async function handleModalConfirm() {
  const alertEl = document.getElementById('modalAlert');

  if (state.modal === 'addClient') {
    const nombre = document.getElementById('f_nombre')?.value?.trim().toUpperCase();
    const plan = document.getElementById('f_plan')?.value?.toUpperCase();
    const modalidad = document.getElementById('f_modalidad')?.value?.toUpperCase();
    const revision = modalidad === 'PRESENCIAL' ? null : 'SEMANAL';
    const objetivo = document.getElementById('f_objetivo')?.value?.toUpperCase();
    const estadopago = document.getElementById('f_estadopago')?.value?.toUpperCase();
    const genero = document.getElementById('f_genero')?.value?.toUpperCase();
    const edad = document.getElementById('f_edad')?.value;
    const altura = document.getElementById('f_altura')?.value;
    const email = document.getElementById('f_email')?.value?.trim().toUpperCase();
    const whatsapp = document.getElementById('f_whatsapp')?.value?.trim().toUpperCase();
    const origen = document.getElementById('f_origen')?.value?.toUpperCase();
    const fecha = document.getElementById('f_fecha')?.value;
    const condicion = document.getElementById('f_condicion')?.value?.trim().toUpperCase();
    const notas = document.getElementById('f_notas')?.value?.trim() || '';
    const letras = nombre.substring(0,3).toUpperCase();
    const numeros = Math.floor(1000 + Math.random() * 9000);
    const codigo = `${letras}${numeros}`;
       
    if (!nombre) { alertEl.innerHTML = '<div class="alert alert-error">El nombre es obligatorio</div>'; return; }

    const btn = document.getElementById('modalConfirm');
    const isEdit = !!state.clientDetail?.codigo;

    btn.textContent = isEdit ? 'Guardando...' : 'Creando...';
    btn.disabled = true;

    try {
      const payload = {
        nombre,
        codigo: isEdit ? state.clientDetail.codigo : codigo,
        plan,
        modalidad,
        revision,
        objetivo,
        genero,
        edad: edad !== '' && edad !== undefined ? parseInt(edad) : null,
        altura: altura !== '' && altura !== undefined ? parseFloat(altura) : null,
        estadopago,
        email,
        whatsapp,
        origen,
        fecha,
        condicion
      };

      let data;
      if (isEdit) {
        await supabase('clientes', {
          method: 'PATCH',
          filter: `codigo=eq.${state.clientDetail.codigo}`,
          body: {
            nombre: payload.nombre || null,
            codigo: payload.codigo || null,
            plan: payload.plan || null,
            modalidad: payload.modalidad || null,
            revision: payload.revision || null,
            objetivo: payload.objetivo || null,
            genero: payload.genero || null,
            edad: payload.edad,
            altura: payload.altura,
            estado_pago: payload.estadopago || null,
            estado_cliente: 'ACTIVO',
            email: payload.email || null,
            whatsapp: payload.whatsapp || null,
            origen: payload.origen || null,
            fecha_inicio: payload.fecha || null,
            condicion_medica: payload.condicion || null,
            notas: payload.notas || null
          }
        });
        data = { ok: true };
      } else {
        await supabase('clientes', {
          method: 'POST',
          body: {
            nombre: payload.nombre,
            codigo: payload.codigo,
            plan: payload.plan,
            modalidad: payload.modalidad,
            revision: payload.revision,
            objetivo: payload.objetivo,
            genero: payload.genero,
            edad: payload.edad,
            altura: payload.altura,
            estado_pago: payload.estadopago,
            estado_cliente: 'ACTIVO',
            email: payload.email,
            whatsapp: payload.whatsapp,
            origen: payload.origen,
            fecha_inicio: payload.fecha || null,
            condicion_medica: payload.condicion,
            notas: payload.notas || null
          }
        });
        data = { ok: true, codigo: payload.codigo };
      }

      state.modal = null;
      state.alert = {
        type: 'success',
        msg: isEdit
          ? `✅ Cliente ${nombre} actualizado`

    const btn = document.getElementById('modalConfirm');

    const es_isometrico = !!state.modalData.esIsometrico;

      await supabase('ejercicios', {
        method: 'PATCH',
        filter: `id=eq.${ex.id}`,

      state.expandedRoutine = ex.rutina_id;
      state.alert = { type: 'success', msg: `✅ Ejercicio "${nombre}" actualizado` };

      document.getElementById('modalAlert').innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
      btn.textContent = 'Guardar Cambios'; btn.disabled = false;
    }

  }

    const nota = document.getElementById('f_notaResumen')?.value?.trim() || '';

  if (state.modal === 'addExercise') {
    const nombre = document.getElementById('f_exNombre')?.value?.trim();

    const rir = state.modalSeries.map(s => s.rir || '0').join(', ');

    const btn = document.getElementById('modalConfirm');
    btn.textContent = 'Añadiendo...'; btn.disabled = true;
    const gif_url = document.getElementById('f_exGifUrl')?.value || '';
    const es_isometrico = !!state.modalData.esIsometrico;
    const lastre_kg = es_isometrico ? (parseFloat(document.getElementById('f_exLastre')?.value) || null) : null;
    let pasos = [];
    try { pasos = JSON.parse(document.getElementById('f_exPasos')?.value || '[]'); } catch { pasos = []; }
    try {
      const exId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'ex-' + Math.random().toString(36).substr(2, 9);
      await supabase('ejercicios', {
        method: 'POST',

  if (state.modal === 'addBib') {

      await supabase('ejercicios_biblioteca', {

    const gif_url = gifNombre ? `https://raw.githubusercontent.com/jctrainingworks/exercises-gifs/main/assets/${gifNombre}` : '';
    const pasosTxt = document.getElementById('man_pasos')?.value || '';
    const pasos = pasosTxt.split('\n').map(p => p.trim()).filter(Boolean);
    if (!nombre_es || !musculo) {
      alertEl.innerHTML = '<div class="alert alert-error">Nombre y músculo son obligatorios</div>';
      return;
    }
    const btn = document.getElementById('modalConfirm');
    btn.textContent = 'Guardando...'; btn.disabled = true;
    try {
      await supabase('ejercicios_biblioteca', {
        method: 'POST',
        body: { nombre_es, nombre_en: '', gif_url, musculo, equipo, pasos, es_rehabilitacion }
      });
      state.modal = null;
      state.alert = { type:'success', msg:`✅ "${nombre_es}" guardado en biblioteca` };
      await loadBiblioteca();
    } catch(e) {
      alertEl.innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
      btn.textContent = 'Guardar en Biblioteca'; btn.disabled = false;
    }
    return;
  }

// ── API ──
async function loadClients() {
  state.loadingClients = true; render();
  try {
    const data = await supabase('clientes', { select: '*', filter: 'order=nombre.asc' });
    state.clients = data.map(c => ({
      ...c,
      estado: c.estado_cliente
    }));
  } catch(e) { console.error(e); state.clients = []; }
  state.loadingClients = false;
  // Cargar sesiones para el dashboard
  try {
    const sesiones = await supabase('sesiones', { filter: 'order=fecha.desc' });
    state.dashSesiones = sesiones;
  } catch(e) { state.dashSesiones = []; }
  render();
}

async function loadBiblioteca() {
  state.loadingBiblioteca = true; render();
  try {
    const data = await supabase('ejercicios_biblioteca', { filter: 'order=nombre_es.asc' });
    state.biblioteca = data;
  } catch(e) { state.biblioteca = []; }
  state.loadingBiblioteca = false; render();
}

async function loadClientDetail(codigo) {
  state.screen = 'detail'; state.loadingDetail = true;
  state.activeTab = 'rutinas'; state.expandedRoutine = null; state.nutricionForm = null; state.historialVista = 'entrenos';
  state.clientDetail = state.clients.find(c => c.codigo === codigo) || null;
  render();
  try {
    const cliente = state.clients.find(c => c.codigo === codigo);
    const clienteId = cliente?.id;
    await cargarAvisosCliente(clienteId);
    const [rutinas, ejercicios, sesiones, rms, seguimientoCorporal] = await Promise.all([
      supabase('rutinas', { filter: `cliente_id=eq.${clienteId}&order=orden.asc` }),
      supabase('ejercicios', { filter: `rutina_id=in.(${await getRutinaIds(clienteId)})&order=orden.asc` }),
      supabase('sesiones', { filter: `codigo_cliente=eq.${codigo}&order=fecha.desc` }),
      supabase('rm_estimaciones', { filter: `cliente_id=eq.${clienteId}&order=fecha.desc` }).catch(() => []),
      supabase('seguimiento_corporal', { filter: `cliente_id=eq.${clienteId}&order=fecha.desc` }).catch(() => [])
    ]);
    state.clientDetail = {
      ...state.clientDetail,
      rutinas,
      ejercicios,
      rms,
      seguimientoCorporal,
      historial: sesiones.map(s => ({
        fecha: s.fecha,
        ejercicio: s.ejercicio,
        series: s.series_detalle,
        rutina_id: s.rutina_id ?? null
      }))
    };
  } catch(e) {
    console.error(e);
    state.clientDetail = { ...state.clientDetail, rutinas: [], ejercicios: [], historial: [], rms: [], seguimientoCorporal: [] };
  }
  state.loadingDetail = false; render();
}

async function getRutinaIds(clienteId) {
  try {
    const r = await supabase('rutinas', { select: 'id', filter: `cliente_id=eq.${clienteId}` });
    if (!r.length) return 'null';
    return r.map(x => x.id).join(',');
  } catch { return 'null'; }
}

// ── UTILS ──
function formatDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' }); }
  catch { return iso; }
}
function formatDateShort(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }); }
  catch { return iso; }
}
function formatDateShort2(date) {
  try { return date.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' }); }
  catch { return ''; }
}

  const el = document.getElementById('nf-ecuacion-note');

    mifflin: 'Válida para población general. Error ±10%.',

function nfSetActividad(val, btn) {
  const el = document.getElementById('nf_actividad');
  if (el) el.value = val;
  btn.closest('.n-act-btns').querySelectorAll('.n-act-btn').forEach(b => b.classList.remove('n-selected'));
  btn.classList.add('n-selected');
  syncNutricionFromDOM();
  render();
}

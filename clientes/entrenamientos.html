<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Training Works</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .card { background: linear-gradient(145deg, #111, #080808); border-left: 5px solid #3b82f6; border-radius: 15px; padding: 1.5rem; margin-bottom: 1.2rem; }
    </style>
</head>
<body>
    <div class="p-6 max-w-md mx-auto">
        <h1 id="nombre-cliente" class="text-4xl font-black text-blue-500 mb-1 uppercase italic text-center tracking-tighter">...</h1>
        <p class="text-gray-600 text-[10px] tracking-[0.3em] mb-8 font-black uppercase text-center">Work Hard • Eat Clean</p>
        <div id="lista-ejercicios" class="space-y-4">
            <p class="text-gray-500 animate-pulse text-center">Cargando rutina...</p>
        </div>
    </div>

    <script>
        const DATABASE_ID = "34a9d61e520c800e8c83d42aa29406b9";
        const NOTION_TOKEN = "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";

        const urlParams = new URLSearchParams(window.location.search);
        const clienteNombre = (urlParams.get('cliente') || "PEPE MACARIO").trim().toUpperCase();
        document.getElementById('nombre-cliente').innerText = clienteNombre;

        async function cargarEntreno() {
            const proxy = "https://corsproxy.io/?";
            const url = `https://api.notion.com/v1/databases/${DATABASE_ID}/query`;

            try {
                const response = await fetch(proxy + encodeURIComponent(url), {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${NOTION_TOKEN}`,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    },
                    body: JSON.stringify({
                        filter: {
                            property: "CLIENTE_TXT",
                            rich_text: { equals: clienteNombre }
                        }
                    })
                });

                const data = await response.json();
                const container = document.getElementById('lista-ejercicios');
                container.innerHTML = "";

                if (!data.results || data.results.length === 0) {
                    container.innerHTML = "<p class='text-center text-gray-500'>No hay datos. Revisa CLIENTE_TXT en Notion.</p>";
                    return;
                }

                data.results.forEach(item => {
                    const p = item.properties;
                    
                    // LEEMOS EL ROLLUP O LA RELACIÓN
                    const ejercicio = p.NOMBRE_EJERCICIO?.rollup?.array?.[0]?.title?.[0]?.plain_text || 
                                     p.NOMBRE_EJERCICIO?.rollup?.array?.[0]?.rich_text?.[0]?.plain_text ||
                                     p.EJERCICIOS?.title?.[0]?.plain_text || "Ejercicio";

                    const series = p.SERIES?.number || "0";
                    const repes = p.REPETICIONES?.number || "0";
                    const peso = p["PESO (KG)"]?.number || "0";

                    container.innerHTML += `
                        <div class="card">
                            <h2 class="text-xl font-bold mb-4 text-white uppercase italic">${ejercicio}</h2>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="bg-black/50 p-2 rounded text-center">
                                    <p class="text-[8px] text-gray-500 font-bold uppercase">Series</p>
                                    <p class="text-xl font-bold font-mono">${series}</p>
                                </div>
                                <div class="bg-black/50 p-2 rounded text-center">
                                    <p class="text-[8px] text-gray-500 font-bold uppercase">Repes</p>
                                    <p class="text-xl font-bold font-mono">${repes}</p>
                                </div>
                                <div class="bg-blue-900/20 p-2 rounded text-center border border-blue-500/30">
                                    <p class="text-[8px] text-blue-400 font-bold uppercase">Peso</p>
                                    <p class="text-xl font-bold text-blue-500 font-mono">${peso}kg</p>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (error) {
                container.innerHTML = "<p class='text-red-500 text-center uppercase font-black'>Error de sistema</p>";
            }
        }
        cargarEntreno();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Training Works</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">
    <div class="max-w-md mx-auto">
        <h1 id="nombre-cliente" class="text-4xl font-black text-blue-500 mb-6 uppercase text-center italic">Cargando...</h1>
        <div id="lista-ejercicios" class="space-y-4">
            <p class="text-gray-500 text-center animate-pulse">Sincronizando con la tabla...</p>
        </div>
    </div>

    <script>
        const DATABASE_ID = "34a9d61e520c800e8c83d42aa29406b9";
        const NOTION_TOKEN = "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";

        const urlParams = new URLSearchParams(window.location.search);
        let clienteNombre = urlParams.get('cliente');
        if (!clienteNombre) { clienteNombre = "PEPE MACARIO"; }
        clienteNombre = clienteNombre.trim().toUpperCase();

        document.getElementById('nombre-cliente').innerText = clienteNombre;

        async function cargarEntreno() {
            const proxy = "https://corsproxy.io/?";
            const url = "https://api.notion.com/v1/databases/" + DATABASE_ID + "/query";

            try {
                const response = await fetch(proxy + encodeURIComponent(url), {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + NOTION_TOKEN,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    },
                    body: JSON.stringify({}) 
                });

                const data = await response.json();
                const container = document.getElementById('lista-ejercicios');
                container.innerHTML = "";

                if (!data || !data.results) {
                    container.innerHTML = "<p class='text-red-500 text-center'>Error al conectar con Notion.</p>";
                    return;
                }

                let encontrados = 0;

                data.results.forEach(function(item) {
                    const p = item.properties;
                    
                    // SACAMOS EL NOMBRE DEL CLIENTE (SIN CÓDIGO QUE ROMPA EL NAVEGADOR)
                    let nombreTabla = "";
                    if (p.CLIENTE_TXT && p.CLIENTE_TXT.rich_text && p.CLIENTE_TXT.rich_text.length > 0) {
                        nombreTabla = p.CLIENTE_TXT.rich_text[0].plain_text;
                    } else if (p.CLIENTE_TXT && p.CLIENTE_TXT.title && p.CLIENTE_TXT.title.length > 0) {
                        nombreTabla = p.CLIENTE_TXT.title[0].plain_text;
                    }

                    // SI COINCIDE, PINTAMOS LA TARJETA
                    if (nombreTabla.trim().toUpperCase() === clienteNombre) {
                        encontrados++;

                        let ejercicio = "Ejercicio sin nombre";
                        if (p.EJERCICIOS && p.EJERCICIOS.title && p.EJERCICIOS.title.length > 0) {
                            ejercicio = p.EJERCICIOS.title[0].plain_text;
                        } else if (p.EJERCICIOS && p.EJERCICIOS.rich_text && p.EJERCICIOS.rich_text.length > 0) {
                            ejercicio = p.EJERCICIOS.rich_text[0].plain_text;
                        }

                        let series = "-";
                        if (p.SERIES && p.SERIES.number !== null) series = p.SERIES.number;
                        
                        let repes = "-";
                        if (p.REPETICIONES && p.REPETICIONES.number !== null) repes = p.REPETICIONES.number;
                        
                        let peso = "-";
                        if (p["PESO (KG)"] && p["PESO (KG)"].number !== null) peso = p["PESO (KG)"].number;

                        // Tarjeta HTML a la vieja usanza
                        container.innerHTML += 
                            "<div style='background: #111; border-left: 5px solid #3b82f6; border-radius: 12px; padding: 20px; margin-bottom: 15px;'>" +
                                "<h2 style='font-size: 1.25rem; font-weight: 800; margin-bottom: 15px; color: white; text-transform: uppercase; font-style: italic;'>" + ejercicio + "</h2>" +
                                "<div style='display: flex; justify-content: space-between; text-align: center;'>" +
                                    "<div><p style='font-size: 10px; color: gray; font-weight: bold;'>SERIES</p><p style='font-size: 1.5rem; font-weight: 900; color: white;'>" + series + "</p></div>" +
                                    "<div><p style='font-size: 10px; color: gray; font-weight: bold;'>REPES</p><p style='font-size: 1.5rem; font-weight: 900; color: white;'>" + repes + "</p></div>" +
                                    "<div><p style='font-size: 10px; color: #3b82f6; font-weight: bold;'>PESO</p><p style='font-size: 1.5rem; font-weight: 900; color: #3b82f6;'>" + peso + "kg</p></div>" +
                                "</div>" +
                            "</div>";
                    }
                });

                if (encontrados === 0) {
                    container.innerHTML = "<p class='text-yellow-500 text-center font-bold'>Base de datos conectada, pero no encuentro a " + clienteNombre + ".</p>";
                }

            } catch (error) {
                document.getElementById('lista-ejercicios').innerHTML = "<p class='text-red-500 text-center'>Error crítico: " + error.message + "</p>";
            }
        }
        
        cargarEntreno();
    </script>
</body>
</html>

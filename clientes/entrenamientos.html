<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Training Works</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .card { background: #111; border-left: 5px solid #3b82f6; border-radius: 15px; padding: 1.5rem; margin-bottom: 1.2rem; }
    </style>
</head>
<body>
    <div class="p-6 max-w-md mx-auto">
        <h1 id="nombre-cliente" class="text-3xl font-black text-blue-500 mb-6 uppercase italic text-center tracking-tighter italic">Cargando...</h1>
        <div id="lista-ejercicios" class="space-y-4">
            <p class="text-gray-500 text-center animate-pulse italic text-sm">Conectando con Sesiones...</p>
        </div>
    </div>

    <script>
        const DATABASE_ID = "34a9d61e520c800e8c83d42aa29406b9";
        const NOTION_TOKEN = "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";

        const urlParams = new URLSearchParams(window.location.search);
        // Limpiamos el nombre de la URL para que no tenga símbolos raros
        const clienteNombre = decodeURIComponent(urlParams.get('cliente') || "PEPE MACARIO").trim().toUpperCase();
        document.getElementById('nombre-cliente').innerText = clienteNombre;

        async function cargarEntreno() {
            const proxy = "https://corsproxy.io/?";
            const url = `https://api.notion.com/v1/databases/${DATABASE_ID}/query`;

            try {
                const response = await fetch(proxy + encodeURIComponent(url), {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${NOTION_TOKEN}`,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    },
                    body: JSON.stringify({}) // Pedimos todo para filtrar nosotros y que no falle por tipos de columna
                });

                const data = await response.json();
                const container = document.getElementById('lista-ejercicios');
                container.innerHTML = "";

                // FILTRO MANUAL: Buscamos en CLIENTE_TXT sin importar si Notion dice que es Título o Texto
                const ejercicios = data.results.filter(item => {
                    const props = item.properties.CLIENTE_TXT;
                    const textoNotion = props?.title?.[0]?.plain_text || props?.rich_text?.[0]?.plain_text || "";
                    return textoNotion.trim().toUpperCase() === clienteNombre;
                });

                if (ejercicios.length === 0) {
                    container.innerHTML = `<p class='text-orange-500 text-center text-xs'>No se encuentran filas para "${clienteNombre}".<br>Revisa que en Notion pongas el nombre igual, sin espacios extra.</p>`;
                    return;
                }

                ejercicios.forEach(item => {
                    const p = item.properties;
                    
                    // Sacamos el nombre del ejercicio (Probamos Rollup NOMBRE_EJERCICIO o el principal)
                    const nombreEj = p.NOMBRE_EJERCICIO?.rollup?.array?.[0]?.title?.[0]?.plain_text || 
                                     p.EJERCICIOS?.title?.[0]?.plain_text || 
                                     "Ejercicio";

                    const series = p.SERIES?.number || "0";
                    const repes = p.REPETICIONES?.number || "0";
                    const peso = p["PESO (KG)"]?.number || "0";

                    container.innerHTML += `
                        <div class="card">
                            <h2 class="text-xl font-bold mb-4 text-white uppercase italic">${nombreEj}</h2>
                            <div class="grid grid-cols-3 gap-2 text-center">
                                <div class="bg-black/50 p-2 rounded">
                                    <p class="text-[8px] text-gray-500 font-bold uppercase">Series</p>
                                    <p class="text-xl font-bold">${series}</p>
                                </div>
                                <div class="bg-black/50 p-2 rounded text-center">
                                    <p class="text-[8px] text-gray-500 font-bold uppercase">Repes</p>
                                    <p class="text-xl font-bold">${repes}</p>
                                </div>
                                <div class="bg-blue-900/20 p-2 rounded border border-blue-500/30">
                                    <p class="text-[8px] text-blue-400 font-bold uppercase">Peso</p>
                                    <p class="text-xl font-bold text-blue-500">${peso}kg</p>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (error) {
                container.innerHTML = "<p class='text-red-500 text-center uppercase font-black'>Error de carga</p>";
            }
        }
        cargarEntreno();
    </script>
</body>
</html>

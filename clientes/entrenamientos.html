<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Training Works</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">
    <div class="max-w-md mx-auto">
        <h1 id="nombre-cliente" class="text-4xl font-black text-blue-500 mb-6 uppercase text-center italic tracking-tighter">...</h1>
        <div id="lista-ejercicios" class="space-y-4">
            <p class="text-gray-500 text-center animate-pulse italic">Conectando con Notion...</p>
        </div>
    </div>

    <script>
        const DATABASE_ID = "3539d61e520c8118bfc5000bbcead0e9"; 
        const NOTION_TOKEN = "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";

        const urlParams = new URLSearchParams(window.location.search);
        let cliente = (urlParams.get('cliente') || "PEPE MACARIO").trim().toUpperCase();
        document.getElementById('nombre-cliente').innerText = cliente;

        async function cargar() {
            const proxy = "https://corsproxy.io/?";
            const url = "https://api.notion.com/v1/databases/" + DATABASE_ID + "/query";
            const container = document.getElementById('lista-ejercicios');

            try {
                const response = await fetch(proxy + encodeURIComponent(url), {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + NOTION_TOKEN,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    },
                    body: JSON.stringify({})
                });

                const data = await response.json();
                container.innerHTML = "";

                if (data.object === "error") {
                    container.innerHTML = `
                        <div class="text-center p-4 border border-red-500/50 rounded-xl bg-red-900/20">
                            <p class="text-red-500 font-bold uppercase text-xs">Falta Conectar la App</p>
                            <p class="text-[10px] text-gray-400 mt-2 italic">Ve a tu tabla en Notion > Clic en '...' > 'Add connections' > Elige 'JC Training App'</p>
                        </div>`;
                    return;
                }

                let encontrados = 0;
                data.results.forEach(item => {
                    const p = item.properties;
                    let cNombre = "";
                    
                    // Leemos el cliente (probando varios campos por si acaso)
                    if (p.CLIENTE_TXT?.rich_text?.[0]) cNombre = p.CLIENTE_TXT.rich_text[0].plain_text;
                    else if (p.CLIENTE_TXT?.title?.[0]) cNombre = p.CLIENTE_TXT.title[0].plain_text;

                    if (cNombre.trim().toUpperCase() === cliente) {
                        encontrados++;
                        let ej = "Ejercicio";
                        // Nombre del ejercicio desde la columna EJERCICIOS
                        if (p.EJERCICIOS?.title?.[0]) ej = p.EJERCICIOS.title[0].plain_text;
                        else if (p.EJERCICIOS?.rich_text?.[0]) ej = p.EJERCICIOS.rich_text[0].plain_text;

                        const s = p.SERIES?.number ?? "-";
                        const r = p.REPETICIONES?.number ?? "-";
                        const w = p["PESO (KG)"]?.number ?? "0";

                        container.innerHTML += `
                            <div class="bg-zinc-900 border-l-4 border-blue-600 p-5 rounded-r-xl shadow-2xl mb-4">
                                <h2 class="text-xl font-black uppercase italic mb-4 text-white">${ej}</h2>
                                <div class="flex justify-between text-center">
                                    <div class="flex-1"><p class="text-[10px] text-gray-500 font-bold uppercase">Series</p><p class="text-2xl font-black">${s}</p></div>
                                    <div class="flex-1 border-x border-white/5"><p class="text-[10px] text-gray-500 font-bold uppercase">Repes</p><p class="text-2xl font-black">${r}</p></div>
                                    <div class="flex-1"><p class="text-[10px] text-blue-400 font-bold uppercase">Peso</p><p class="text-2xl font-black text-blue-500">${w}kg</p></div>
                                </div>
                            </div>`;
                    }
                });

                if (encontrados === 0) {
                    container.innerHTML = "<p class='text-center text-gray-500 text-sm'>No hay ejercicios hoy para " + cliente + "</p>";
                }

            } catch (e) {
                container.innerHTML = "<p class='text-red-500 text-center uppercase font-black'>Error de red</p>";
            }
        }
        cargar();
    </script>
</body>
</html>

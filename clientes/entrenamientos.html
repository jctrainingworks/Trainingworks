<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Training Works - App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .card { background: #111; border-left: 4px solid #3b82f6; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="p-6 max-w-md mx-auto">
        <h1 id="nombre-cliente" class="text-3xl font-extrabold text-blue-500 mb-2 uppercase tracking-tighter">Cargando...</h1>
        <p class="text-gray-500 text-sm mb-6 uppercase tracking-widest font-bold">Plan de Entrenamiento</p>
        
        <div id="lista-ejercicios" class="space-y-4">
            <p class="text-gray-400 animate-pulse">Conectando con Notion...</p>
        </div>
    </div>

    <script>
        const DATABASE_ID = "34a9d61e520c800e8c83d42aa29406b9";
        const NOTION_TOKEN = "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";

        const urlParams = new URLSearchParams(window.location.search);
        const clienteNombre = urlParams.get('cliente') || "PEPE MACARIO";
        document.getElementById('nombre-cliente').innerText = clienteNombre;

        async function cargarEntreno() {
            const proxy = "https://corsproxy.io/?";
            const url = `https://api.notion.com/v1/databases/${DATABASE_ID}/query`;

            try {
                const response = await fetch(proxy + encodeURIComponent(url), {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${NOTION_TOKEN}`,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    },
                    body: JSON.stringify({
                        filter: {
                            property: "CLIENTE_TXT", // La columna Rollup que acabas de crear
                            rollup: {
                                any: {
                                    rich_text: { equals: clienteNombre }
                                }
                            }
                        }
                    })
                });

                const data = await response.json();
                const container = document.getElementById('lista-ejercicios');
                container.innerHTML = "";

                if (!data.results || data.results.length === 0) {
                    container.innerHTML = `<div class='text-yellow-500 bg-yellow-500/10 p-4 rounded-lg'>No hay ejercicios para "${clienteNombre}". Revisa la columna CLIENTE_TXT en Notion.</div>`;
                    return;
                }

                data.results.forEach(item => {
                    const p = item.properties;
                    const ejercicio = p.EJERCICIOS?.title?.[0]?.plain_text || "Ejercicio";
                    const series = p.SERIES?.number || "-";
                    const repes = p.REPETICIONES?.number || "-";
                    const peso = p["PESO (KG)"]?.number || "-";

                    container.innerHTML += `
                        <div class="card text-white">
                            <h2 class="text-xl font-bold mb-3 border-b border-gray-800 pb-2">${ejercicio}</h2>
                            <div class="flex justify-between items-center">
                                <div class="text-center">
                                    <p class="text-[10px] text-gray-500 font-black">SERIES</p>
                                    <p class="text-2xl font-bold text-white">${series}</p>
                                </div>
                                <div class="text-center border-x border-gray-800 px-8">
                                    <p class="text-[10px] text-gray-500 font-black">REPES</p>
                                    <p class="text-2xl font-bold text-white">${repes}</p>
                                </div>
                                <div class="text-center">
                                    <p class="text-[10px] text-gray-500 font-black">PESO</p>
                                    <p class="text-2xl font-bold text-blue-500">${peso}kg</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('lista-ejercicios').innerHTML = `<p class='text-red-500'>Error crítico: ${error.message}</p>`;
            }
        }
        cargarEntreno();
    </script>
</body>
</html>

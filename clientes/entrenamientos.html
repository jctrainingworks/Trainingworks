<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Training Works - Entreno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .card { background: #111; border-left: 4px solid #3b82f6; border-radius: 8px; padding: 1.2rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="p-6">
        <h1 id="nombre-cliente" class="text-2xl font-bold text-blue-500 mb-4 uppercase">Cargando...</h1>
        <div id="lista-ejercicios">
            <p class="text-gray-500 italic text-sm">Conectando con Notion...</p>
        </div>
    </div>

    <script>
        // TUS DATOS DE CONEXIÓN
        const DATABASE_ID = "34a9d61e520c800e8c83d42aa29406b9";
        const NOTION_TOKEN = "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";

        // COGEMOS EL NOMBRE DEL CLIENTE DE LA URL (ej: ?cliente=PEPE MACARIO)
        const urlParams = new URLSearchParams(window.location.search);
        const clienteNombre = urlParams.get('cliente') || "PEPE MACARIO";
        document.getElementById('nombre-cliente').innerText = clienteNombre;

        async function cargarEntreno() {
            const proxy = "https://corsproxy.io/?";
            const url = `https://api.notion.com/v1/databases/${DATABASE_ID}/query`;

            try {
                const response = await fetch(proxy + encodeURIComponent(url), {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${NOTION_TOKEN}`,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    },
                    body: JSON.stringify({
                        filter: {
                            property: "CLIENTES",
                            rich_text: { equals: clienteNombre }
                        }
                    })
                });

                const data = await response.json();
                const container = document.getElementById('lista-ejercicios');
                container.innerHTML = "";

                data.results.forEach(item => {
                    const props = item.properties;
                    const ejercicio = props.EJERCICIOS.title[0]?.plain_text || "Sin nombre";
                    const series = props.SERIES.number || "-";
                    const repes = props.REPETICIONES.number || "-";

                    container.innerHTML += `
                        <div class="card">
                            <h2 class="text-lg font-bold mb-2">${ejercicio}</h2>
                            <div class="flex gap-4 text-sm uppercase text-gray-400">
                                <div>Series: <span class="text-white font-bold text-lg">${series}</span></div>
                                <div>Repes: <span class="text-white font-bold text-lg">${repes}</span></div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('lista-ejercicios').innerText = "Error al conectar. Revisa la conexión.";
            }
        }

        cargarEntreno();
    </script>
</body>
</html>

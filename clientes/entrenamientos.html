<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Training Works - App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .card { background: #111; border-left: 4px solid #3b82f6; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="p-6 max-w-md mx-auto">
        <h1 id="nombre-cliente" class="text-3xl font-extrabold text-blue-500 mb-2 uppercase italic">Cargando...</h1>
        <div id="lista-ejercicios" class="space-y-4">
            <p class="text-gray-500 italic">Conectando con Notion...</p>
        </div>
    </div>

    <script>
        const DATABASE_ID = "34a9d61e520c800e8c83d42aa29406b9";
        const NOTION_TOKEN = "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";

        const urlParams = new URLSearchParams(window.location.search);
        const clienteNombre = (urlParams.get('cliente') || "PEPE MACARIO").trim().toUpperCase();
        document.getElementById('nombre-cliente').innerText = clienteNombre;

        async function cargarEntreno() {
            const proxy = "https://corsproxy.io/?";
            const url = `https://api.notion.com/v1/databases/${DATABASE_ID}/query`;

            try {
                const response = await fetch(proxy + encodeURIComponent(url), {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${NOTION_TOKEN}`,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    },
                    body: JSON.stringify({}) // Pedimos TODO sin filtros para que Notion no se líe
                });

                const data = await response.json();
                const container = document.getElementById('lista-ejercicios');
                container.innerHTML = "";

                // Filtramos nosotros manualmente aquí dentro
                const ejerciciosFiltrados = data.results.filter(item => {
                    const txt = item.properties.CLIENTE_TXT?.rich_text?.[0]?.plain_text || "";
                    return txt.toUpperCase() === clienteNombre;
                });

                if (ejerciciosFiltrados.length === 0) {
                    container.innerHTML = `<p class="text-orange-500 text-sm">No hay ejercicios para ${clienteNombre}. Hay ${data.results.length} filas en la tabla, pero ninguna coincide.</p>`;
                    return;
                }

                ejerciciosFiltrados.forEach(item => {
                    const p = item.properties;
                    const ejercicio = p.EJERCICIOS?.title?.[0]?.plain_text || "Ejercicio";
                    const series = p.SERIES?.number || "-";
                    const repes = p.REPETICIONES?.number || "-";
                    const peso = p["PESO (KG)"]?.number || "0";

                    container.innerHTML += `
                        <div class="card">
                            <h2 class="text-lg font-bold mb-3 border-b border-gray-800 pb-2">${ejercicio}</h2>
                            <div class="flex justify-between items-center">
                                <div class="text-center">
                                    <p class="text-[10px] text-gray-500 font-bold uppercase">Series</p>
                                    <p class="text-xl font-bold">${series}</p>
                                </div>
                                <div class="text-center">
                                    <p class="text-[10px] text-gray-500 font-bold uppercase">Repes</p>
                                    <p class="text-xl font-bold">${repes}</p>
                                </div>
                                <div class="text-center text-blue-500">
                                    <p class="text-[10px] text-gray-400 font-bold uppercase">Peso</p>
                                    <p class="text-xl font-bold">${peso}kg</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('lista-ejercicios').innerHTML = "Error: " + error.message;
            }
        }
        cargarEntreno();
    </script>
</body>
</html>

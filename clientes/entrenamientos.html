<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Training Works</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; }
        .card { background: #111; border-left: 5px solid #3b82f6; border-radius: 15px; padding: 1.5rem; margin-bottom: 1.2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="p-6 max-w-md mx-auto">
        <h1 id="nombre-cliente" class="text-4xl font-black text-blue-500 mb-1 uppercase italic text-center tracking-tighter italic">...</h1>
        <p class="text-gray-600 text-[10px] tracking-[0.3em] mb-8 font-black uppercase text-center">Work Hard • Eat Clean</p>
        
        <div id="lista-ejercicios" class="space-y-4">
            <p class="text-gray-500 animate-bounce text-center text-sm">Cargando tu hierro...</p>
        </div>
    </div>

    <script>
        const DATABASE_ID = "34a9d61e520c800e8c83d42aa29406b9";
        const NOTION_TOKEN = "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";

        const urlParams = new URLSearchParams(window.location.search);
        const clienteNombre = (urlParams.get('cliente') || "PEPE MACARIO").trim().toUpperCase();
        document.getElementById('nombre-cliente').innerText = clienteNombre;

        async function cargarEntreno() {
            const proxy = "https://corsproxy.io/?";
            const url = `https://api.notion.com/v1/databases/${DATABASE_ID}/query`;

            try {
                const response = await fetch(proxy + encodeURIComponent(url), {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${NOTION_TOKEN}`,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    },
                    body: JSON.stringify({
                        filter: {
                            property: "CLIENTE_TXT",
                            rich_text: { contains: clienteNombre }
                        }
                    })
                });

                const data = await response.json();
                const container = document.getElementById('lista-ejercicios');
                container.innerHTML = "";

                if (!data.results || data.results.length === 0) {
                    container.innerHTML = `<div class="text-center p-8 border-2 border-dashed border-gray-800 rounded-2xl">
                        <p class="text-orange-500 font-bold mb-2">¡OJO!</p>
                        <p class="text-gray-500 text-xs text-balance text-center">Asegúrate de que en Notion escribiste <b>${clienteNombre}</b> en la columna <b>CLIENTE_TXT</b> (que sea tipo texto).</p>
                    </div>`;
                    return;
                }

                data.results.forEach(item => {
                    const p = item.properties;
                    
                    // REGLA DE ORO PARA RELACIONES:
                    // Si EJERCICIOS es relación, el nombre viene en el título de la página
                    const ejercicio = p.EJERCICIOS?.title?.[0]?.plain_text || 
                                     p.EJERCICIOS?.rich_text?.[0]?.plain_text || 
                                     "Ejercicio";

                    const series = p.SERIES?.number || "0";
                    const repes = p.REPETICIONES?.number || "0";
                    const peso = p["PESO (KG)"]?.number || "0";

                    container.innerHTML += `
                        <div class="card">
                            <h2 class="text-xl font-extrabold mb-4 text-white uppercase tracking-tight italic">${ejercicio}</h2>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="bg-black/50 p-2 rounded-lg text-center">
                                    <p class="text-[8px] text-gray-500 font-bold uppercase">Series</p>
                                    <p class="text-2xl font-black text-white">${series}</p>
                                </div>
                                <div class="bg-black/50 p-2 rounded-lg text-center">
                                    <p class="text-[8px] text-gray-500 font-bold uppercase">Repes</p>
                                    <p class="text-2xl font-black text-white">${repes}</p>
                                </div>
                                <div class="bg-blue-900/20 p-2 rounded-lg text-center border border-blue-500/20">
                                    <p class="text-[8px] text-blue-400 font-bold uppercase">Peso</p>
                                    <p class="text-2xl font-black text-blue-500">${peso}<span class="text-xs">kg</span></p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                container.innerHTML = "<p class='text-red-500 text-center font-bold'>ERROR DE CONEXIÓN</p>";
            }
        }
        cargarEntreno();
    </script>
</body>
</html>

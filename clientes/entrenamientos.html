<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Training Works</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: ui-sans-serif, system-ui, sans-serif; }
        .card { 
            background: linear-gradient(145deg, #111, #0a0a0a); 
            border-left: 5px solid #3b82f6; 
            border-radius: 16px; 
            padding: 1.5rem; 
            margin-bottom: 1.25rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="p-6 max-w-md mx-auto">
        <h1 id="nombre-cliente" class="text-4xl font-black text-blue-500 mb-1 uppercase italic text-center tracking-tighter italic">...</h1>
        <p class="text-gray-600 text-[10px] tracking-[0.3em] mb-8 font-black uppercase text-center">Work Hard • Eat Clean</p>
        
        <div id="lista-ejercicios" class="space-y-4">
            <p class="text-gray-500 animate-pulse text-center text-sm italic">Sincronizando con Notion...</p>
        </div>
    </div>

    <script>
        // Configuración de IDs
        const DATABASE_ID = "34a9d61e520c800e8c83d42aa29406b9";
        const NOTION_TOKEN = "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";

        // Obtener nombre del cliente de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const clienteNombre = (urlParams.get('cliente') || "PEPE MACARIO").trim().toUpperCase();
        document.getElementById('nombre-cliente').innerText = clienteNombre;

        async function cargarEntreno() {
            const proxy = "https://corsproxy.io/?";
            const url = `https://api.notion.com/v1/databases/${DATABASE_ID}/query`;

            try {
                const response = await fetch(proxy + encodeURIComponent(url), {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${NOTION_TOKEN}`,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    },
                    body: JSON.stringify({
                        filter: {
                            property: "CLIENTE_TXT",
                            rich_text: { 
                                contains: clienteNombre // Búsqueda flexible por si hay espacios
                            }
                        }
                    })
                });

                const data = await response.json();
                const container = document.getElementById('lista-ejercicios');
                container.innerHTML = "";

                // Si no hay resultados
                if (!data.results || data.results.length === 0) {
                    container.innerHTML = `
                        <div class="text-center p-8 border-2 border-dashed border-gray-800 rounded-2xl">
                            <p class="text-orange-500 font-bold mb-2 uppercase">Sin ejercicios</p>
                            <p class="text-gray-500 text-[10px] uppercase">Revisa que en Notion pongas "${clienteNombre}" en la columna CLIENTE_TXT.</p>
                        </div>`;
                    return;
                }

                // Generar tarjetas de ejercicios
                data.results.forEach(item => {
                    const p = item.properties;
                    
                    // Extraer nombre del ejercicio (Probando Rollup primero, luego relación)
                    const ejercicio = p.NOMBRE_EJERCICIO?.rollup?.array?.[0]?.title?.[0]?.plain_text || 
                                     p.NOMBRE_EJERCICIO?.rollup?.array?.[0]?.rich_text?.[0]?.plain_text ||
                                     p.EJERCICIOS?.title?.[0]?.plain_text || 
                                     "Ejercicio";

                    const series = p.SERIES?.number || "0";
                    const repes = p.REPETICIONES?.number || "0";
                    const peso = p["PESO (KG)"]?.number || "0";

                    container.innerHTML += `
                        <div class="card">
                            <h2 class="text-xl font-extrabold mb-4 text-white uppercase italic tracking-tight">${ejercicio}</h2>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="bg-black/40 p-2 rounded-xl text-center border border-white/5">
                                    <p class="text-[8px] text-gray-500 font-bold uppercase">Series</p>
                                    <p class="text-2xl font-black text-white">${series}</p>
                                </div>
                                <div class="bg-black/40 p-2 rounded-xl text-center border border-white/5">
                                    <p class="text-[8px] text-gray-500 font-bold uppercase">Repes</p>
                                    <p class="text-2xl font-black text-white">${repes}</p>
                                </div>
                                <div class="bg-blue-900/10 p-2 rounded-xl text-center border border-blue-500/20">
                                    <p class="text-[8px] text-blue-400 font-bold uppercase">Peso</p>
                                    <p class="text-2xl font-black text-blue-500">${peso}<span class="text-xs ml-0.5">kg</span></p>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (error) {
                document.getElementById('lista-ejercicios').innerHTML = "<p class='text-red-500 text-center font-bold uppercase text-xs'>Error de conexión</p>";
            }
        }

        // Ejecutar carga
        cargarEntreno();
    </script>
</body>
</html>

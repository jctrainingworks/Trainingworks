<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Training Works - App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .card { background: #111; border-left: 4px solid #3b82f6; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="p-6 max-w-md mx-auto">
        <h1 id="nombre-cliente" class="text-3xl font-extrabold text-blue-500 mb-1 uppercase italic text-center">Cargando...</h1>
        <p class="text-gray-500 text-[10px] tracking-[0.2em] mb-6 font-bold uppercase text-center">Plan Personalizado</p>
        
        <div id="lista-ejercicios" class="space-y-4">
            <p class="text-gray-500 animate-pulse text-sm text-center">Sincronizando con Biblioteca...</p>
        </div>
    </div>

    <script>
        const DATABASE_ID = "34a9d61e520c800e8c83d42aa29406b9";
        const NOTION_TOKEN = "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";

        const urlParams = new URLSearchParams(window.location.search);
        const clienteNombre = (urlParams.get('cliente') || "PEPE MACARIO").trim().toUpperCase();
        document.getElementById('nombre-cliente').innerText = clienteNombre;

        async function cargarEntreno() {
            const proxy = "https://corsproxy.io/?";
            const url = `https://api.notion.com/v1/databases/${DATABASE_ID}/query`;

            try {
                const response = await fetch(proxy + encodeURIComponent(url), {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${NOTION_TOKEN}`,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    },
                    body: JSON.stringify({
                        filter: {
                            property: "CLIENTE_TXT",
                            rich_text: { equals: clienteNombre }
                        }
                    })
                });

                const data = await response.json();
                const container = document.getElementById('lista-ejercicios');
                container.innerHTML = "";

                if (!data.results || data.results.length === 0) {
                    container.innerHTML = `<p class="text-gray-500 text-center">No hay ejercicios hoy para ${clienteNombre}</p>`;
                    return;
                }

                data.results.forEach(item => {
                    const p = item.properties;
                    
                    // CORRECCIÓN PARA BIBLIOTECA:
                    // Si EJERCICIOS es relación, el nombre suele estar en 'title' del objeto relacionado
                    // pero Notion en la consulta de base de datos lo entrega así:
                    const ejercicio = p.EJERCICIOS?.title?.[0]?.plain_text || 
                                     p.EJERCICIOS?.rich_text?.[0]?.plain_text || 
                                     "Ejercicio"; // Fallback si no encuentra el nombre

                    const series = p.SERIES?.number || "0";
                    const repes = p.REPETICIONES?.number || "0";
                    const peso = p["PESO (KG)"]?.number || "0";

                    container.innerHTML += `
                        <div class="card border-l-4 border-blue-600 bg-neutral-900 shadow-xl">
                            <h2 class="text-lg font-bold mb-3 text-white uppercase tracking-tight">${ejercicio}</h2>
                            <div class="flex justify-between items-center text-center">
                                <div class="flex-1">
                                    <p class="text-[9px] text-gray-500 font-black uppercase">Series</p>
                                    <p class="text-xl font-bold">${series}</p>
                                </div>
                                <div class="flex-1 border-x border-neutral-800">
                                    <p class="text-[9px] text-gray-500 font-black uppercase">Repes</p>
                                    <p class="text-xl font-bold">${repes}</p>
                                </div>
                                <div class="flex-1">
                                    <p class="text-[9px] text-blue-500/50 font-black uppercase">Peso</p>
                                    <p class="text-xl font-bold text-blue-500">${peso}kg</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('lista-ejercicios').innerHTML = "<p class='text-red-500 text-center'>Error de conexión</p>";
            }
        }
        cargarEntreno();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Training Works - DEBUG</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-mono">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-black text-red-500 mb-6 uppercase text-center">Modo Chivato 🕵️‍♂️</h1>
        <div id="pantalla-error" class="space-y-4">
            <p class="text-gray-500 text-center animate-pulse">Preguntando a Notion qué narices le pasa...</p>
        </div>
    </div>

    <script>
        const DATABASE_ID = "34a9d61e520c800e8c83d42aa29406b9";
        const NOTION_TOKEN = "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";

        async function chivato() {
            const proxy = "https://corsproxy.io/?";
            const url = "https://api.notion.com/v1/databases/" + DATABASE_ID + "/query";
            const caja = document.getElementById('pantalla-error');

            try {
                const response = await fetch(proxy + encodeURIComponent(url), {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + NOTION_TOKEN,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    }
                    // Le hemos quitado el "body" para ver si era eso lo que bloqueaba
                });

                const textoCrudo = await response.text(); 
                
                try {
                    const data = JSON.parse(textoCrudo);
                    if (data.object === "error") {
                        caja.innerHTML = "<div class='bg-red-900/50 p-4 rounded border border-red-500 text-xs break-words'><b>NOTION SE QUEJA DE ESTO:</b><br><br>" + JSON.stringify(data, null, 2) + "</div>";
                    } else if (data.results) {
                        caja.innerHTML = "<div class='bg-green-900/50 p-4 rounded border border-green-500 text-xs break-words'><b>¡HAY CONEXIÓN!</b><br><br>Notion ha devuelto " + data.results.length + " filas. El error estaba en cómo leíamos los datos.</div>";
                    } else {
                        caja.innerHTML = "<div class='bg-yellow-900/50 p-4 rounded border border-yellow-500 text-xs break-words'><b>RESPUESTA RARA:</b><br><br>" + textoCrudo + "</div>";
                    }
                } catch (e) {
                    caja.innerHTML = "<div class='bg-orange-900/50 p-4 rounded border border-orange-500 text-xs break-words'><b>EL PROXY HA PETADO (No es culpa de Notion):</b><br><br>" + textoCrudo + "</div>";
                }

            } catch (error) {
                caja.innerHTML = "<div class='bg-red-900 p-4 rounded text-xs break-words'><b>ERROR DE RED:</b><br><br>" + error.message + "</div>";
            }
        }
        
        chivato();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JC Training Works — Plataforma</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Barlow:wght@600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: radial-gradient(circle at top right, #1a1a1a, #000); 
      color: #fff; 
      font-family: 'DM Sans', sans-serif; 
      min-height: 100vh;
    }
    .bebas { font-family: 'Bebas Neue', sans-serif; }
    .gold-text { color: #d4af37; } /* Dorado pro, no amarillo */
    
    /* Tu Banner Original */
    .banner {
      width: 100%;
      height: 220px;
      background: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop') center/cover;
      position: relative;
      border-bottom: 2px solid #d4af37;
    }
    .banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent, #000);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
    }

    .card-ejercicio {
      background: rgba(255,255,255,0.03);
      border-left: 3px solid #d4af37;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 12px;
    }
    .nav-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      padding: 15px;
      border-top: 1px solid rgba(212,175,55,0.3);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const WORKER_URL = 'https://jc-training-notion.jctrainingworks.workers.dev';

    function ClientView({ client, onLogout }) {
      const [data, setData] = useState({ rutinas: [], ejercicios: [] });
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch(`${WORKER_URL}/rutinas`)
          .then(res => res.json())
          .then(json => { setData(json); setLoading(false); });
      }, []);

      return (
        <div style={{ paddingBottom: '100px' }}>
          <div className="banner">
            <div className="banner-overlay">
              <h1 className="bebas" style={{ fontSize: '42px', lineHeight: '0.9' }}>
                WELCOME BACK,<br /><span className="gold-text">{client.nombre.toUpperCase()}</span>
              </h1>
            </div>
          </div>

          <div style={{ padding: '20px' }}>
            <h2 className="bebas" style={{ letterSpacing: '1px', marginBottom: '20px' }}>MY WORKOUT PLAN</h2>
            
            {loading ? <p>Cargando plan...</p> : data.rutinas.map(rutina => (
              <div key={rutina.id} style={{ marginBottom: '30px' }}>
                <h3 className="gold-text" style={{ fontFamily: 'Barlow', fontSize: '20px', marginBottom: '15px' }}>
                  {rutina.nombre}
                </h3>
                {data.ejercicios
                  .filter(ej => ej.rutina_id === rutina.codigo)
                  .map(ej => (
                    <div key={ej.id} className="card-ejercicio">
                      <div style={{ fontWeight: '600', fontSize: '16px' }}>{ej.nombre}</div>
                      <div style={{ color: '#aaa', fontSize: '13px', marginTop: '5px' }}>
                        {ej.series} SETS x {ej.repeticiones} REPS | RIR {ej.rir}
                      </div>
                      <div style={{ color: '#d4af37', fontSize: '12px', fontWeight: 'bold' }}>
                        REST: {ej.descanso}
                      </div>
                    </div>
                  ))}
              </div>
            ))}
          </div>

          <div className="nav-bar">
            <span className="gold-text" style={{ fontSize: '12px', fontWeight: 'bold' }}>ROUTINES</span>
            <span style={{ color: '#555', fontSize: '12px' }}>PROGRESS</span>
            <span style={{ color: '#555', fontSize: '12px' }}>PROFILE</span>
          </div>
        </div>
      );
    }

    // El resto de la App (Login y Root) se mantiene igual...
    function App() {
      const [clientData, setClientData] = useState(null);
      const [view, setView] = useState('login');

      if (view === 'login') {
        return (
          <div style={{ padding: '50px 20px', textAlign: 'center' }}>
            <h1 className="bebas" style={{ fontSize: '50px' }}>JC <span className="gold-text">TRAINING</span></h1>
            <input 
              placeholder="CÓDIGO CLIENTE" 
              style={{ background: '#111', border: '1px solid #333', padding: '15px', width: '100%', color: '#fff', marginTop: '40px' }}
              onKeyDown={(e) => e.key === 'Enter' && setView('client')}
            />
            <button 
              onClick={() => {
                // Simulamos login para la prueba
                setClientData({ nombre: 'Juan' });
                setView('client');
              }}
              style={{ background: '#d4af37', color: '#000', width: '100%', padding: '15px', marginTop: '20px', fontWeight: 'bold', border: 'none' }}
            >
              ENTRAR
            </button>
          </div>
        );
      }
      return <ClientView client={clientData} onLogout={() => setView('login')} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

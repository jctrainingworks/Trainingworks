<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JC Training Works — Plataforma</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Barlow:wght@600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --card:     #1e1e1e;
      --border:   #2a2a2a;
      --accent:   #e8ff00;
      --accent2:  #ff4d4d;
      --text:     #f0f0f0;
      --muted:    #888;
      --radius:   10px;
      color-scheme: dark;
    }

    html {
      background: #0d0d0d;
    }

    body {
      background: #0d0d0d;
      background-color: #0d0d0d;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── LAYOUT ── */
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }

    /* ── HEADER ── */
    .site-header {
      display: flex; align-items: center; gap: 14px;
      padding: 22px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .logo-mark {
      width: 40px; height: 40px; border-radius: 8px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark span { font-family:'Bebas Neue'; font-size: 20px; color: #000; line-height:1; }
    .site-name { font-family:'Bebas Neue'; font-size: 22px; letter-spacing: .04em; color: var(--text); }
    .site-tag  { font-size: 12px; color: var(--muted); margin-top: -2px; }
    .header-spacer { flex: 1; }
    .btn-logout {
      font-size: 12px; color: var(--muted); background: none; border: 1px solid var(--border);
      padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans';
      transition: all .2s;
    }
    .btn-logout:hover { color: var(--text); border-color: var(--muted); }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 16px;
    }
    .card-title {
      font-family:'Bebas Neue'; font-size: 18px; letter-spacing: .05em;
      color: var(--accent); margin-bottom: 14px;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 7px; border: none;
      font-family: 'DM Sans'; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all .15s;
    }
    .btn-primary  { background: var(--accent);  color: #000; }
    .btn-primary:hover  { filter: brightness(1.1); }
    .btn-danger   { background: #2a1515; color: var(--accent2); border: 1px solid #3a1515; }
    .btn-danger:hover   { background: #3a1515; }
    .btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover    { color: var(--text); border-color: var(--muted); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }

    /* ── INPUTS ── */
    input, select, textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 9px 12px;
      font-family: 'DM Sans';
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    select option { background: var(--surface); }
    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 5px; }
    .form-group { margin-bottom: 12px; }
    .form-row { display: grid; gap: 10px; }
    .form-row.col2 { grid-template-columns: 1fr 1fr; }
    .form-row.col3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-row.col4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

    /* ── BADGE ── */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase;
    }
    .badge-essential { background:#1a1a00; color:#e8ff00; border:1px solid #3a3a00; }
    .badge-premium   { background:#001a1a; color:#00e8e8; border:1px solid #003a3a; }
    .badge-elite     { background:#1a0000; color:#ff4d4d; border:1px solid #3a0000; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border-radius: 9px; padding: 4px; }
    .tab {
      flex: 1; padding: 9px; border-radius: 6px; border: none;
      font-family: 'DM Sans'; font-size: 13px; font-weight: 500;
      cursor: pointer; background: transparent; color: var(--muted); transition: all .2s;
    }
    .tab.active { background: var(--card); color: var(--text); border: 1px solid var(--border); }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; color: var(--muted); text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
    td { padding: 11px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* ── WEIGHT INPUT in session ── */
    .weight-input {
      width: 80px; padding: 7px 10px; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px;
      font-family: 'DM Sans'; font-size: 14px;
    }
    .weight-input:focus { border-color: var(--accent); outline: none; }

    /* ── CHART ── */
    .chart-wrap { position: relative; height: 200px; }

    /* ── LOGIN / CODE SCREENS (CON MEJORAS DE DISEÑO PRO) ── */
    .center-screen {
      min-height: 80vh;
      display: flex; 
      align-items: flex-start;
      justify-content: center;
      padding-top: 40px;
    }

    .login-box {
      background: #111111; 
      border: 1px solid rgba(30, 144, 255, 0.3);
      border-radius: 20px; 
      padding: 40px 32px; 
      width: 100%; 
      max-width: 500px;
      text-align: center;
    }

    /* Clases para el JS nuevo */
    .main-text-pro { font-family: 'Bebas Neue'; font-size: 32px; color: #fff; display: block; margin-bottom: 5px; }
    .sub-text-pro { font-family: 'Barlow', sans-serif; color: #1e90ff; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
    .choice-icon-pro { font-size: 50px; display: block; margin-bottom: 15px; }

    .choice-btn {
      padding: 24px 28px;
      font-size: 18px;
    }

    .choice-icon {
      font-size: 30px;
    }

    .login-logo { font-family:'Bebas Neue'; font-size: 36px; color: var(--accent); margin-bottom: 4px; }
    .login-sub  { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    .login-label { font-size: 13px; color: var(--muted); margin-bottom: 7px; display: block; text-align: left; }
    .login-input {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 11px 14px; font-family:'DM Sans'; font-size: 15px;
      width: 100%; outline: none; margin-bottom: 16px; transition: border .15s;
    }
    .login-input:focus { border-color: #1e90ff; }
    .login-btn {
      width: 100%; padding: 12px; background: #1e90ff; color: #fff;
      border: none; border-radius: 8px; font-family:'DM Sans'; font-size: 15px;
      font-weight: 600; cursor: pointer; transition: filter .15s;
    }
    .login-btn:hover { filter: brightness(1.1); }
    .login-error { color: var(--accent2); font-size: 13px; margin-bottom: 12px; }
    .login-divider { text-align:center; color: var(--muted); font-size: 13px; margin: 18px 0; cursor:pointer; }
    .login-divider:hover { color: var(--text); }

    /* ── HOME selector ── */
    .home-choice { display: flex; flex-direction: column; gap: 12px; }
    .choice-btn {
      padding: 16px 20px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-family:'DM Sans'; font-size: 15px; font-weight: 500;
      cursor: pointer; text-align: left; transition: all .2s; display: flex; align-items: center; gap: 12px;
    }
    .choice-btn:hover { border-color: var(--accent); color: var(--accent); }
    .choice-icon { font-size: 22px; }

    /* ── PROGRESS SECTION ── */
    .ex-progress-list { display: flex; flex-direction: column; gap: 20px; }
    .ex-progress-item { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 16px; }
    .ex-progress-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .ex-last { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .ex-last span { color: var(--accent); font-weight: 600; }

    /* ── CLIENT SESSION ── */
    .session-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .session-title { font-family:'Bebas Neue'; font-size: 24px; letter-spacing:.04em; }
    .success-msg { background: #0d1a00; border: 1px solid #2a4a00; color: #90e040; border-radius: 8px; padding: 12px 16px; font-size: 14px; margin-bottom: 12px; }
    .error-msg   { background: #1a0d00; border: 1px solid #4a2a00; color: #e09040; border-radius: 8px; padding: 12px 16px; font-size: 14px; margin-bottom: 12px; }

    /* ── CLIENT PLAN BANNER ── */
    .plan-banner {
      border-radius: 9px; padding: 14px 18px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .plan-essential { background: #141400; border: 1px solid #3a3a00; }
    .plan-premium   { background: #001414; border: 1px solid #003a3a; }
    .plan-elite     { background: #140000; border: 1px solid #3a0000; }

    /* ── CLIENT LIST ── */
    .client-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .client-row:last-child { border-bottom: none; }
    .client-avatar {
      width: 38px; height: 38px; border-radius: 50%; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-family:'Bebas Neue'; font-size: 18px; color: var(--accent); flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .client-info { flex: 1; }
    .client-name { font-weight: 500; font-size: 15px; }
    .client-code { font-size: 12px; color: var(--muted); font-family: monospace; }

    /* ── ROUTINE EXERCISE ROW ── */
    .ex-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .ex-row:last-child { border-bottom: none; }
    .ex-num { width: 28px; height: 28px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--muted); flex-shrink: 0; margin-top: 2px; }
    .ex-details { flex: 1; }
    .ex-name { font-weight: 500; font-size: 15px; }
    .ex-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .ex-note { font-size: 12px; color: #aaa; margin-top: 4px; font-style: italic; }

    /* ── HISTORY TABLE ── */
    .hist-session { margin-bottom: 20px; }
    .hist-date { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; font-weight: 600; }

    /* ── UTIL ── */
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-8 { gap: 8px; }
    .gap-12 { gap: 12px; }
    .mb-8 { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .mt-16 { margin-top: 16px; }
    .text-muted { color: var(--muted); }
    .text-accent { color: var(--accent); }
    .text-sm { font-size: 13px; }
    .text-right { text-align: right; }
    .font-mono { font-family: monospace; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    @media(max-width:600px) {
      .form-row.col3, .form-row.col4 { grid-template-columns: 1fr 1fr; }
      .form-row.col2 { grid-template-columns: 1fr; }
      .site-name { font-size: 18px; }
    }

    /* ── BANNER ── */
    .site-banner {
      width: 100%;
      display: block;
      line-height: 0;
      background: #0d0d0d;
    }
    .site-banner img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="site-banner">
  <img 
    src="https://raw.githubusercontent.com/jctrainingworks/Trainingworks/main/banner_v3.png"
    alt="JC Training Works"
  />
</div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─────────────── STORAGE ─────────────── */
const STORAGE_KEY = 'jctraining_v2';
const TRAINER_PASSWORD = 'JCTrainer2025';

// Función para asegurar que no se pierdan datos al actualizar código
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return {
    clients: [
      {
        id: 'c1', name: 'Adrián López', plan: 'ELITE',
        code: 'ADR149', createdAt: '2025-01-10',
        routines: [
          {
            id: 'r1', name: 'Empuje A', exercises: [
              { id: 'e1', name: 'Press Banca', sets: 4, reps: '6-8', rir: 2, notes: 'Bajar controlado 2s' },
              { id: 'e2', name: 'Press Inclinado Mancuernas', sets: 3, reps: '8-10', rir: 2, notes: '' },
              { id: 'e3', name: 'Aperturas Cable', sets: 3, reps: '12-15', rir: 1, notes: 'Contracción completa' },
            ]
          }
        ],
        sessions: []
      }
    ]
  };
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function generateCode(name, plan) {
  const prefix = name.trim().substring(0, 3).toUpperCase().replace(/\s/g, 'X');
  const price = plan === 'ELITE' ? '149' : plan === 'PREMIUM' ? '099' : '070';
  return prefix + price;
}

function generateId() {
  return Math.random().toString(36).slice(2, 9);
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

/* ─────────────── CHART COMPONENT ─────────────── */
function ProgressChart({ sessions, exerciseId, exerciseName }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  const data = sessions
    .filter(s => s.weights && s.weights[exerciseId] && !isNaN(parseFloat(s.weights[exerciseId])))
    .sort((a, b) => a.date.localeCompare(b.date))
    .map(s => ({ date: s.date, weight: parseFloat(s.weights[exerciseId]) }));

  useEffect(() => {
    if (!canvasRef.current || data.length < 1) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: {
        labels: data.map(d => formatDate(d.date)),
        datasets: [{
          label: 'kg',
          data: data.map(d => d.weight),
          borderColor: '#1e90ff',
          backgroundColor: 'rgba(30,144,255,0.1)',
          borderWidth: 2,
          pointBackgroundColor: '#1e90ff',
          pointRadius: 4,
          fill: true,
          tension: 0.35,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#2a2a2a' }, ticks: { color: '#888', font: { size: 11 } } },
          y: { grid: { color: '#2a2a2a' }, ticks: { color: '#888', font: { size: 11 } } }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(data)]);

  if (data.length < 2) return <p className="text-muted text-sm">Necesitas al menos 2 sesiones para ver gráfica.</p>;
  return <div className="chart-wrap"><canvas ref={canvasRef} /></div>;
}

/* ─────────────── PANTALLAS DE ACCESO ─────────────── */
function ClientHome({ onStartLogin }) {
  return (
    <div className="center-screen">
      <div className="login-box" onClick={onStartLogin}>
        <span className="choice-icon-pro">💪</span>
        <span className="main-text-pro">ACCEDER A MI PLAN</span>
        <span className="sub-text-pro">JC Training Works</span>
      </div>
    </div>
  );
}

function ClientLogin({ onSuccess, onBack }) {
  const [code, setCode] = useState('');
  const [err, setErr] = useState('');
  function handle() {
    const data = loadData();
    const c = data.clients.find(cl => cl.code.toLowerCase() === code.trim().toLowerCase());
    if (c) onSuccess(c.id);
    else setErr('Código no encontrado.');
  }
  return (
    <div className="center-screen">
      <div className="login-box" style={{ cursor: 'default' }}>
        <span className="main-text-pro" style={{ fontSize: '24px', marginBottom: '15px' }}>INTRODUCE TU CÓDIGO</span>
        {err && <div className="login-error">{err}</div>}
        <label className="login-label">CÓDIGO PERSONAL</label>
        <input className="login-input" value={code} onChange={e => { setCode(e.target.value.toUpperCase()); setErr(''); }}
          onKeyDown={e => e.key === 'Enter' && handle()} placeholder="EJ: ADR149" autoFocus />
        <button className="login-btn" onClick={handle}>ENTRAR</button>
        <div className="login-divider" onClick={onBack}>← Volver</div>
      </div>
    </div>
  );
}

/* ─────────────── TRAINER PANEL ─────────────── */
function TrainerPanel({ onLogout }) {
  const [data, setData] = useState(loadData);
  const [tab, setTab] = useState('clients');
  const [selectedClient, setSelectedClient] = useState(null);
  function update(fn) {
    setData(prev => {
      const next = fn(JSON.parse(JSON.stringify(prev)));
      saveData(next);
      return next;
    });
  }
  const client = selectedClient ? data.clients.find(c => c.id === selectedClient) : null;
  return (
    <>
      <header className="site-header">
        <div><div className="site-name">JC TRAINING <span style={{color:'#1e90ff'}}>WORKS</span></div><div className="site-tag">Gestión Pro</div></div>
        <div className="header-spacer" /><button className="btn-logout" onClick={onLogout}>Salir</button>
      </header>
      <div className="wrap">
        {!selectedClient ? (
          <>
            <div className="tabs" style={{marginTop:20}}>
              <button className={`tab ${tab==='clients'?'active':''}`} onClick={() => setTab('clients')}>Clientes</button>
              <button className={`tab ${tab==='new'?'active':''}`} onClick={() => setTab('new')}>+ Nuevo</button>
            </div>
            {tab === 'clients' && <ClientList data={data} onSelect={setSelectedClient} onUpdate={update} />}
            {tab === 'new' && <NewClientForm data={data} onUpdate={update} onDone={() => setTab('clients')} />}
          </>
        ) : (
          <ClientDetail client={client} data={data} onUpdate={update} onBack={() => setSelectedClient(null)} />
        )}
      </div>
    </>
  );
}

function ClientList({ data, onSelect, onUpdate }) {
  function deleteClient(id) {
    if (!window.confirm('¿Eliminar cliente?')) return;
    onUpdate(d => { d.clients = d.clients.filter(c => c.id !== id); return d; });
  }
  return (
    <div className="card">
      {data.clients.map(c => (
        <div className="client-row" key={c.id}>
          <div className="client-info">
            <div className="client-name">{c.name}</div>
            <div className="client-code">{c.code}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={() => onSelect(c.id)}>Ver</button>
          <button className="btn btn-danger btn-sm" onClick={() => deleteClient(c.id)}>✕</button>
        </div>
      ))}
    </div>
  );
}

function NewClientForm({ data, onUpdate, onDone }) {
  const [name, setName] = useState('');
  const [plan, setPlan] = useState('ELITE');
  function submit() {
    if (!name.trim()) return;
    onUpdate(d => {
      d.clients.push({ id: generateId(), name: name.trim(), plan, code: generateCode(name, plan), routines: [], sessions: [] });
      return d;
    });
    onDone();
  }
  return (
    <div className="card">
      <div className="form-group"><label>Nombre</label><input value={name} onChange={e => setName(e.target.value)} /></div>
      <button className="btn btn-primary" onClick={submit}>Crear</button>
    </div>
  );
}

function ClientDetail({ client, onUpdate, onBack }) {
  const [tab, setTab] = useState('routines');
  return (
    <>
      <button className="btn btn-ghost btn-sm" onClick={onBack} style={{marginTop:20}}>← Volver</button>
      <div className="tabs" style={{marginTop:10}}>
        <button className={`tab ${tab==='routines'?'active':''}`} onClick={() => setTab('routines')}>Rutinas</button>
      </div>
      {tab === 'routines' && <RoutinesTab client={client} onUpdate={onUpdate} />}
    </>
  );
}

function RoutinesTab({ client, onUpdate }) {
  const [routineName, setRoutineName] = useState('');
  function add() {
    if (!routineName.trim()) return;
    onUpdate(d => {
      const c = d.clients.find(x => x.id === client.id);
      c.routines.push({ id: generateId(), name: routineName.trim(), exercises: [] });
      return d;
    });
    setRoutineName('');
  }
  return (
    <div>
      {client.routines.map(r => (
        <div className="card" key={r.id}>
          <div className="card-title">{r.name}</div>
          <AddExerciseForm routineId={r.id} clientId={client.id} onUpdate={onUpdate} />
        </div>
      ))}
      <div className="card">
        <input value={routineName} onChange={e => setRoutineName(e.target.value)} placeholder="Nombre rutina" />
        <button className="btn btn-primary" style={{marginTop:10}} onClick={add}>+ Añadir Rutina</button>
      </div>
    </div>
  );
}

function AddExerciseForm({ routineId, clientId, onUpdate }) {
  const [ex, setEx] = useState({ name:'', sets:'3', reps:'10', rir:'2', notes:'' });
  function add() {
    if (!ex.name) return;
    onUpdate(d => {
      const c = d.clients.find(x=>x.id===clientId);
      const r = c.routines.find(x=>x.id===routineId);
      r.exercises.push({ id: generateId(), ...ex });
      return d;
    });
    setEx({ name:'', sets:'3', reps:'10', rir:'2', notes:'' });
  }
  return (
    <div style={{marginTop:10}}>
      <input value={ex.name} onChange={e=>setEx({...ex, name:e.target.value})} placeholder="Ejercicio" />
      <button className="btn btn-primary btn-sm" style={{marginTop:5}} onClick={add}>Añadir</button>
    </div>
  );
}

/* ─────────────── VISTA CLIENTE ─────────────── */
function ClientView({ clientId, onLogout }) {
  const [data, setData] = useState(loadData());
  const client = data.clients.find(c => c.id === clientId);
  const [tab, setTab] = useState('session');

  if (!client) return null;

  // Sincronizar datos para que aparezcan en historial/progreso
  const refreshData = () => setData(loadData());

  return (
    <>
      <header className="site-header" style={{padding: '20px'}}>
        <div>
          <div className="site-name" style={{fontSize: '22px'}}>JC TRAINING <span style={{color:'#1e90ff'}}>WORKS</span></div>
          <div className="site-tag">Mi entrenamiento</div>
        </div>
        <div className="header-spacer" />
        <button className="btn-logout" style={{background: '#1a1a1a', border: '1px solid #333'}} onClick={onLogout}>Salir</button>
      </header>

      <div className="wrap">
        <div className="plan-banner" style={{
          marginTop: 20, 
          background: 'linear-gradient(90deg, #0a192f 0%, #112240 100%)', 
          borderLeft: '4px solid #1e90ff'
        }}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600, fontSize:18, color: '#fff'}}>{client.name}</div>
            <div style={{fontSize:12, color:'#1e90ff', fontWeight: 700, marginTop:2, textTransform: 'uppercase'}}>
              PANEL DE ENTRENAMIENTO
            </div>
          </div>
          <div style={{fontSize:12, color:'#888', fontFamily:'monospace'}}>{client.code}</div>
        </div>

        <div className="tabs">
          <button className={`tab ${tab==='session'?'active':''}`} onClick={() => setTab('session')}>Entrenar hoy</button>
          <button className={`tab ${tab==='progress'?'active':''}`} onClick={() => setTab('progress')}>Mi progreso</button>
          <button className={`tab ${tab==='history'?'active':''}`} onClick={() => setTab('history')}>Historial</button>
        </div>

        {tab === 'session'  && <ClientSession client={client} clientId={clientId} onSave={refreshData} />}
        {tab === 'progress' && <ClientProgress client={client} />}
        {tab === 'history'  && <ClientHistory  client={client} />}
      </div>
    </>
  );
}

function ClientSession({ client, clientId, onSave }) {
  const [routineId, setRoutineId] = useState(client.routines[0]?.id || '');
  const [weights, setWeights] = useState({});
  const [msg, setMsg] = useState(null);
  const routine = client.routines.find(r => r.id === routineId);

  async function save() {
    const data = loadData();
    const c = data.clients.find(x=>x.id===clientId);
    const today = new Date().toISOString().slice(0,10);
    c.sessions.push({ id: generateId(), routineId, date: today, weights });
    saveData(data);
    onSave(); 

    try {
      const envios = Object.entries(weights).map(([eid, peso]) => {
        const ex = routine.exercises.find(e=>e.id===eid);
        return fetch('https://jc-training-notion.jctrainingworks.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            cliente: c.name, ejercicio: ex?.name, peso: parseFloat(peso),
            series: ex?.sets, repeticiones: ex?.reps, fecha: today, plan: c.plan, sesion: routine.name
          })
        });
      });
      await Promise.all(envios);
    } catch(e) {}

    setMsg({ type:'ok', text:'✅ Sesión guardada con éxito' });
    setTimeout(() => setMsg(null), 3000);
  }

  return (
    <div>
      {msg && <div className="success-msg" style={{background: '#1e90ff22', color: '#1e90ff', border: '1px solid #1e90ff'}}>{msg.text}</div>}
      <div className="card">
        <div className="card-title" style={{color: '#1e90ff'}}>¿QUÉ RUTINA ENTRENAS HOY?</div>
        <select value={routineId} onChange={e => setRoutineId(e.target.value)}>
          {client.routines.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
        </select>
      </div>

      {routine && (
        <div className="card" style={{padding: '10px'}}>
          <div className="session-header" style={{padding: '10px 5px'}}>
            <div className="session-title" style={{fontSize: '20px'}}>{routine.name}</div>
            <div style={{color: '#888', fontSize: 12}}>{new Date().toLocaleDateString('es-ES',{weekday:'long', day:'numeric', month:'long'})}</div>
          </div>
          <div className="table-wrap" style={{overflowX: 'hidden'}}>
            <table style={{width: '100%', tableLayout: 'fixed'}}>
              <thead>
                <tr style={{fontSize: '10px', color: '#555'}}>
                  <th style={{width: '35%', textAlign: 'left'}}>EJERCICIO</th>
                  <th style={{width: '15%', textAlign: 'center'}}>SER</th>
                  <th style={{width: '20%', textAlign: 'center'}}>REPS</th>
                  <th style={{width: '12%', textAlign: 'center'}}>RIR</th>
                  <th style={{width: '18%', textAlign: 'right'}}>KG</th>
                </tr>
              </thead>
              <tbody>
                {routine.exercises.map(ex => (
                  <tr key={ex.id}>
                    <td style={{padding: '10px 0'}}>
                      <div style={{fontWeight:600, color: '#fff', fontSize: '13px', lineHeight: '1.2'}}>{ex.name}</div>
                      {ex.notes && <div style={{fontSize: '10px', color:'#666', marginTop: '2px'}}>{ex.notes}</div>}
                    </td>
                    <td style={{color: '#1e90ff', fontWeight: 700, textAlign: 'center', fontSize: '14px'}}>{ex.sets}</td>
                    <td style={{color: '#1e90ff', fontWeight: 700, textAlign: 'center', fontSize: '14px', whiteSpace: 'nowrap'}}>{ex.reps}</td>
                    <td style={{color: '#1e90ff', fontWeight: 700, textAlign: 'center', fontSize: '14px'}}>{ex.rir}</td>
                    <td style={{textAlign: 'right'}}>
                      <input type="text" className="weight-input" style={{width: '45px', padding: '6px', fontSize: '13px', borderColor: '#333'}}
                        value={weights[ex.id]||''} onChange={e => setWeights({...weights, [ex.id]:e.target.value})} style={{color: '#1e90ff'}} />

                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:20}}>
            <button className="btn" style={{background: '#1e90ff', color: '#fff', width: '100%', padding: '15px', borderRadius: '8px', fontWeight: 700, fontSize: '16px'}} onClick={save}>
              Guardar sesión 💾
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function ClientProgress({ client }) {
  const allExercises = client.routines.flatMap(r => r.exercises);
  return (
    <div className="ex-progress-list">
      {allExercises.length === 0 && <p style={{textAlign:'center', color:'#555', marginTop:20}}>No hay ejercicios asignados</p>}
      {allExercises.map(ex => (
        <div className="card" key={ex.id}>
          <div className="card-title" style={{marginBottom:10}}>{ex.name}</div>
          <ProgressChart sessions={client.sessions} exerciseId={ex.id} exerciseName={ex.name} />
        </div>
      ))}
    </div>
  );
}

function ClientHistory({ client }) {
  const reversedSessions = [...client.sessions].reverse();
  return (
    <div>
      {reversedSessions.length === 0 && <p style={{textAlign:'center', color:'#555', marginTop:20}}>Aún no has guardado sesiones</p>}
      {reversedSessions.map(s => (
        <div className="card" key={s.id}>
          <div style={{color: '#1e90ff', fontWeight: 700, marginBottom: 10, display: 'flex', justifyContent: 'space-between'}}>
            <span>{formatDate(s.date)}</span>
            <span style={{fontSize: '11px', color: '#555'}}>{client.routines.find(r=>r.id===s.routineId)?.name}</span>
          </div>
          {Object.entries(s.weights).map(([eid, w]) => {
            const ex = client.routines.flatMap(r=>r.exercises).find(e=>e.id===eid);
            return <div key={eid} style={{fontSize: 14, marginBottom: 4, display: 'flex', justifyContent: 'space-between'}}>
              <span style={{color: '#aaa'}}>{ex?.name}</span>
              <span style={{fontWeight: 700}}>{w} kg</span>
            </div>
          })}
        </div>
      ))}
    </div>
  );
}

function App() {
  const urlParams = new URLSearchParams(window.location.search);
  const isTrainerMode = urlParams.get('mode') === 'trainer';
  const [screen, setScreen] = useState(isTrainerMode ? 'trainer' : 'home'); 
  const [clientId, setClientId] = useState(null);

  return (
    <>
      {screen === 'home' && <ClientHome onStartLogin={() => setScreen('client-login')} />}
      {screen === 'client-login' && <ClientLogin onSuccess={id => { setClientId(id); setScreen('client'); }} onBack={() => setScreen('home')} />}
      {screen === 'trainer' && <TrainerPanel onLogout={() => setScreen('home')} />}
      {screen === 'client' && <ClientView clientId={clientId} onLogout={() => { setClientId(null); setScreen('home'); }} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>

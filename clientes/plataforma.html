:root {
  --bg:       #0d0d0d;
  --surface:  #161616;
  --card:     #1e1e1e;
  --border:   #2a2a2a;
  --accent:   #e8ff00;
  --accent2:  #ff4d4d;
  --text:     #f0f0f0;
  --muted:    #888;
  --radius:   10px;
  color-scheme: dark;
}

html {
  background: #0d0d0d;
}

body {
  background: #0d0d0d;
  background-color: #0d0d0d;
  color: #f0f0f0;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  min-height: 100vh;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── LAYOUT ── */
.wrap { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }

/* ── HEADER ── */
.site-header {
  display: flex; align-items: center; gap: 14px;
  padding: 22px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.logo-mark {
  width: 40px; height: 40px; border-radius: 8px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark span { font-family:'Bebas Neue'; font-size: 20px; color: #000; line-height:1; }
.site-name { font-family:'Bebas Neue'; font-size: 22px; letter-spacing: .04em; color: var(--text); }
.site-tag  { font-size: 12px; color: var(--muted); margin-top: -2px; }
.header-spacer { flex: 1; }
.btn-logout {
  font-size: 12px; color: var(--muted); background: none; border: 1px solid var(--border);
  padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans';
  transition: all .2s;
}
.btn-logout:hover { color: var(--text); border-color: var(--muted); }

/* ── CARDS ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 16px;
}
.card-title {
  font-family:'Bebas Neue'; font-size: 18px; letter-spacing: .05em;
  color: var(--accent); margin-bottom: 14px;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 7px; border: none;
  font-family: 'DM Sans'; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.btn-primary  { background: var(--accent);  color: #000; }
.btn-primary:hover  { filter: brightness(1.1); }
.btn-danger   { background: #2a1515; color: var(--accent2); border: 1px solid #3a1515; }
.btn-danger:hover   { background: #3a1515; }
.btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover    { color: var(--text); border-color: var(--muted); }
.btn-sm { padding: 6px 12px; font-size: 13px; }

/* ── INPUTS ── */
input, select, textarea {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 7px;
  padding: 9px 12px;
  font-family: 'DM Sans';
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: border .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
input::placeholder { color: var(--muted); }
select option { background: var(--surface); }
label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 5px; }
.form-group { margin-bottom: 12px; }
.form-row { display: grid; gap: 10px; }
.form-row.col2 { grid-template-columns: 1fr 1fr; }
.form-row.col3 { grid-template-columns: 1fr 1fr 1fr; }
.form-row.col4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

/* ── BADGE ── */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase;
}
.badge-essential { background:#1a1a00; color:#e8ff00; border:1px solid #3a3a00; }
.badge-premium   { background:#001a1a; color:#00e8e8; border:1px solid #003a3a; }
.badge-elite     { background:#1a0000; color:#ff4d4d; border:1px solid #3a0000; }

/* ── TABS ── */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border-radius: 9px; padding: 4px; }
.tab {
  flex: 1; padding: 9px; border-radius: 6px; border: none;
  font-family: 'DM Sans'; font-size: 13px; font-weight: 500;
  cursor: pointer; background: transparent; color: var(--muted); transition: all .2s;
}
.tab.active { background: var(--card); color: var(--text); border: 1px solid var(--border); }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { font-size: 11px; color: var(--muted); text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
td { padding: 11px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.02); }

/* ── WEIGHT INPUT in session ── */
.weight-input {
  width: 80px; padding: 7px 10px; text-align: center;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px;
  font-family: 'DM Sans'; font-size: 14px;
}
.weight-input:focus { border-color: var(--accent); outline: none; }

/* ── CHART ── */
.chart-wrap { position: relative; height: 200px; }

/* ── LOGIN / CODE SCREENS ── */
.center-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 380px;
}
.login-logo { font-family:'Bebas Neue'; font-size: 36px; color: var(--accent); margin-bottom: 4px; }
.login-sub  { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
.login-label { font-size: 13px; color: var(--muted); margin-bottom: 7px; display: block; }
.login-input {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 11px 14px; font-family:'DM Sans'; font-size: 15px;
  width: 100%; outline: none; margin-bottom: 16px; transition: border .15s;
}
.login-input:focus { border-color: var(--accent); }
.login-btn {
  width: 100%; padding: 12px; background: var(--accent); color: #000;
  border: none; border-radius: 8px; font-family:'DM Sans'; font-size: 15px;
  font-weight: 600; cursor: pointer; transition: filter .15s;
}
.login-btn:hover { filter: brightness(1.1); }
.login-error { color: var(--accent2); font-size: 13px; margin-bottom: 12px; }
.login-divider { text-align:center; color: var(--muted); font-size: 13px; margin: 18px 0; cursor:pointer; }
.login-divider:hover { color: var(--text); }

/* ── HOME selector ── */
.home-choice { display: flex; flex-direction: column; gap: 12px; }
.choice-btn {
  padding: 16px 20px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-family:'DM Sans'; font-size: 15px; font-weight: 500;
  cursor: pointer; text-align: left; transition: all .2s; display: flex; align-items: center; gap: 12px;
}
.choice-btn:hover { border-color: var(--accent); color: var(--accent); }
.choice-icon { font-size: 22px; }

/* ── PROGRESS SECTION ── */
.ex-progress-list { display: flex; flex-direction: column; gap: 20px; }
.ex-progress-item { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 16px; }
.ex-progress-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.ex-last { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
.ex-last span { color: var(--accent); font-weight: 600; }

/* ── CLIENT SESSION ── */
.session-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.session-title { font-family:'Bebas Neue'; font-size: 24px; letter-spacing:.04em; }
.success-msg { background: #0d1a00; border: 1px solid #2a4a00; color: #90e040; border-radius: 8px; padding: 12px 16px; font-size: 14px; margin-bottom: 12px; }
.error-msg   { background: #1a0d00; border: 1px solid #4a2a00; color: #e09040; border-radius: 8px; padding: 12px 16px; font-size: 14px; margin-bottom: 12px; }

/* ── CLIENT PLAN BANNER ── */
.plan-banner {
  border-radius: 9px; padding: 14px 18px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.plan-essential { background: #141400; border: 1px solid #3a3a00; }
.plan-premium   { background: #001414; border: 1px solid #003a3a; }
.plan-elite     { background: #140000; border: 1px solid #3a0000; }

/* ── CLIENT LIST ── */
.client-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.client-row:last-child { border-bottom: none; }
.client-avatar {
  width: 38px; height: 38px; border-radius: 50%; background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-family:'Bebas Neue'; font-size: 18px; color: var(--accent); flex-shrink: 0;
  border: 1px solid var(--border);
}
.client-info { flex: 1; }
.client-name { font-weight: 500; font-size: 15px; }
.client-code { font-size: 12px; color: var(--muted); font-family: monospace; }

/* ── ROUTINE EXERCISE ROW ── */
.ex-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.ex-row:last-child { border-bottom: none; }
.ex-num { width: 28px; height: 28px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--muted); flex-shrink: 0; margin-top: 2px; }
.ex-details { flex: 1; }
.ex-name { font-weight: 500; font-size: 15px; }
.ex-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.ex-note { font-size: 12px; color: #aaa; margin-top: 4px; font-style: italic; }

/* ── HISTORY TABLE ── */
.hist-session { margin-bottom: 20px; }
.hist-date { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; font-weight: 600; }

/* ── UTIL ── */
.flex { display: flex; }
.items-center { align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mt-16 { margin-top: 16px; }
.text-muted { color: var(--muted); }
.text-accent { color: var(--accent); }
.text-sm { font-size: 13px; }
.text-right { text-align: right; }
.font-mono { font-family: monospace; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
hr.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

@media(max-width:600px) {
  .form-row.col3, .form-row.col4 { grid-template-columns: 1fr 1fr; }
  .form-row.col2 { grid-template-columns: 1fr; }
  .site-name { font-size: 18px; }
}

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─────────────── STORAGE ─────────────── */
const STORAGE_KEY = 'jctraining_v2';
const TRAINER_PASSWORD = 'JCTrainer2025';

const demoData = {
  clients: [
    {
      id: 'c1', name: 'Adrián López', plan: 'ELITE',
      code: 'ADR149', createdAt: '2025-01-10',
      routines: [
        {
          id: 'r1', name: 'Empuje A', exercises: [
            { id: 'e1', name: 'Press Banca', sets: 4, reps: '6-8', rir: 2, notes: 'Bajar controlado 2s' },
            { id: 'e2', name: 'Press Inclinado Mancuernas', sets: 3, reps: '8-10', rir: 2, notes: '' },
            { id: 'e3', name: 'Aperturas Cable', sets: 3, reps: '12-15', rir: 1, notes: 'Contracción completa' },
          ]
        },
        {
          id: 'r2', name: 'Tirón B', exercises: [
            { id: 'e4', name: 'Dominadas', sets: 4, reps: '6-8', rir: 2, notes: '' },
            { id: 'e5', name: 'Remo Barra', sets: 3, reps: '8-10', rir: 2, notes: 'Omóplatos juntos' },
            { id: 'e6', name: 'Curl Barra', sets: 3, reps: '10-12', rir: 1, notes: '' },
          ]
        }
      ],
      sessions: [
        {
          id: 's1', routineId: 'r1', date: '2025-04-20',
          weights: { e1: '80', e2: '24', e3: '15' }
        },
        {
          id: 's2', routineId: 'r1', date: '2025-04-27',
          weights: { e1: '82.5', e2: '26', e3: '15' }
        },
        {
          id: 's3', routineId: 'r2', date: '2025-04-22',
          weights: { e4: 'PC', e5: '70', e6: '40' }
        }
      ]
    },
    {
      id: 'c2', name: 'María García', plan: 'PREMIUM',
      code: 'MAR099', createdAt: '2025-02-01',
      routines: [
        {
          id: 'r3', name: 'Full Body A', exercises: [
            { id: 'e7', name: 'Sentadilla Goblet', sets: 4, reps: '10-12', rir: 2, notes: 'Rodillas fuera' },
            { id: 'e8', name: 'Hip Thrust', sets: 4, reps: '12-15', rir: 1, notes: '' },
            { id: 'e9', name: 'Press Hombros Mancuernas', sets: 3, reps: '10-12', rir: 2, notes: '' },
          ]
        }
      ],
      sessions: [
        {
          id: 's4', routineId: 'r3', date: '2025-04-19',
          weights: { e7: '20', e8: '40', e9: '10' }
        },
        {
          id: 's5', routineId: 'r3', date: '2025-04-26',
          weights: { e7: '22', e8: '45', e9: '10' }
        }
      ]
    }
  ]
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return demoData;
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function generateCode(name, plan) {
  const prefix = name.trim().substring(0, 3).toUpperCase().replace(/\s/g, 'X');
  const price = plan === 'ELITE' ? '149' : plan === 'PREMIUM' ? '099' : '070';
  return prefix + price;
}

function generateId() {
  return Math.random().toString(36).slice(2, 9);
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

/* ─────────────── CHART COMPONENT ─────────────── */
function ProgressChart({ sessions, exerciseId, exerciseName }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  const data = sessions
    .filter(s => s.weights && s.weights[exerciseId] && !isNaN(parseFloat(s.weights[exerciseId])))
    .sort((a, b) => a.date.localeCompare(b.date))
    .map(s => ({ date: s.date, weight: parseFloat(s.weights[exerciseId]) }));

  useEffect(() => {
    if (!canvasRef.current || data.length < 1) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: {
        labels: data.map(d => formatDate(d.date)),
        datasets: [{
          label: 'kg',
          data: data.map(d => d.weight),
          borderColor: '#e8ff00',
          backgroundColor: 'rgba(232,255,0,0.08)',
          borderWidth: 2,
          pointBackgroundColor: '#e8ff00',
          pointRadius: 4,
          fill: true,
          tension: 0.35,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#2a2a2a' }, ticks: { color: '#888', font: { size: 11 } } },
          y: { grid: { color: '#2a2a2a' }, ticks: { color: '#888', font: { size: 11 } } }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(data)]);

  if (data.length < 2) return <p className="text-muted text-sm">Necesitas al menos 2 sesiones para ver gráfica.</p>;
  return <div className="chart-wrap"><canvas ref={canvasRef} /></div>;
}

/* ─────────────── LOGIN / HOME ─────────────── */
function HomeScreen({ onTrainer, onClient }) {
  return (
    <div className="center-screen">
      <div className="login-box">
        <div className="login-logo">JC Training Works</div>
        <div className="login-sub">Plataforma de entrenamiento online</div>
        <div className="home-choice">
          <button className="choice-btn" onClick={onTrainer}>
            <span className="choice-icon">🏋️</span>
            <div>
              <div style={{fontWeight:600}}>Soy entrenador</div>
              <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Acceder al panel de gestión</div>
            </div>
          </button>
          <button className="choice-btn" onClick={onClient}>
            <span className="choice-icon">💪</span>
            <div>
              <div style={{fontWeight:600}}>Soy cliente</div>
              <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Entrar con mi código personal</div>
            </div>
          </button>
        </div>
      </div>
    </div>
  );
}

function TrainerLogin({ onSuccess, onBack }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  function handle() {
    if (pw === TRAINER_PASSWORD) onSuccess();
    else setErr('Contraseña incorrecta');
  }
  return (
    <div className="center-screen">
      <div className="login-box">
        <div className="login-logo">Panel Entrenador</div>
        <div className="login-sub">Acceso restringido</div>
        {err && <div className="login-error">{err}</div>}
        <label className="login-label">Contraseña</label>
        <input type="password" className="login-input" value={pw} onChange={e => { setPw(e.target.value); setErr(''); }}
          onKeyDown={e => e.key === 'Enter' && handle()} placeholder="••••••••" />
        <button className="login-btn" onClick={handle}>Entrar</button>
        <div className="login-divider" onClick={onBack}>← Volver</div>
      </div>
    </div>
  );
}

function ClientLogin({ onSuccess, onBack }) {
  const [code, setCode] = useState('');
  const [err, setErr] = useState('');
  function handle(data) {
    const c = data.clients.find(cl => cl.code.toLowerCase() === code.trim().toLowerCase());
    if (c) onSuccess(c.id);
    else setErr('Código no encontrado. Comprueba con tu entrenador.');
  }
  return (
    <div className="center-screen">
      <div className="login-box">
        <div className="login-logo">Mi Entrenamiento</div>
        <div className="login-sub">Introduce tu código personal</div>
        {err && <div className="login-error">{err}</div>}
        <label className="login-label">Código de cliente</label>
        <input className="login-input" value={code} onChange={e => { setCode(e.target.value.toUpperCase()); setErr(''); }}
          onKeyDown={e => { if(e.key==='Enter'){ const d=loadData(); handle(d); } }}
          placeholder="ej: ADR149" style={{letterSpacing:'.08em', fontFamily:'monospace', fontSize:18}} />
        <button className="login-btn" onClick={() => { const d=loadData(); handle(d); }}>Acceder</button>
        <div className="login-divider" onClick={onBack}>← Volver</div>
      </div>
    </div>
  );
}

/* ─────────────── TRAINER PANEL ─────────────── */
function TrainerPanel({ onLogout }) {
  const [data, setData] = useState(loadData);
  const [tab, setTab] = useState('clients');
  const [selectedClient, setSelectedClient] = useState(null);

  function update(fn) {
    setData(prev => {
      const next = fn(JSON.parse(JSON.stringify(prev)));
      saveData(next);
      return next;
    });
  }

  const client = selectedClient ? data.clients.find(c => c.id === selectedClient) : null;

  return (
    <>
      <header className="site-header">
        <div className="logo-mark"><span>JC</span></div>
        <div>
          <div className="site-name">JC Training Works</div>
          <div className="site-tag">Panel Entrenador</div>
        </div>
        <div className="header-spacer" />
        <button className="btn-logout" onClick={onLogout}>Salir</button>
      </header>

      <div className="wrap">
        {!selectedClient ? (
          <>
            <div className="tabs" style={{marginTop:20}}>
              <button className={`tab ${tab==='clients'?'active':''}`} onClick={() => setTab('clients')}>Clientes</button>
              <button className={`tab ${tab==='new'?'active':''}`} onClick={() => setTab('new')}>+ Nuevo cliente</button>
            </div>
            {tab === 'clients' && <ClientList data={data} onSelect={setSelectedClient} onUpdate={update} />}
            {tab === 'new'     && <NewClientForm data={data} onUpdate={update} onDone={() => setTab('clients')} />}
          </>
        ) : (
          <ClientDetail
            client={client} data={data}
            onUpdate={update}
            onBack={() => setSelectedClient(null)}
          />
        )}
      </div>
    </>
  );
}

function ClientList({ data, onSelect, onUpdate }) {
  function deleteClient(id) {
    if (!window.confirm('¿Eliminar este cliente y todos sus datos?')) return;
    onUpdate(d => { d.clients = d.clients.filter(c => c.id !== id); return d; });
  }
  if (!data.clients.length) return <div className="empty-state">No hay clientes todavía. Crea uno en la pestaña "Nuevo cliente".</div>;
  return (
    <div className="card">
      <div className="card-title">Clientes activos</div>
      {data.clients.map(c => (
        <div className="client-row" key={c.id}>
          <div className="client-avatar">{c.name.charAt(0)}</div>
          <div className="client-info">
            <div className="client-name">{c.name}</div>
            <div className="client-code">{c.code} · {c.routines.length} rutina{c.routines.length!==1?'s':''} · {c.sessions.length} sesión{c.sessions.length!==1?'es':''}</div>
          </div>
          <span className={`badge badge-${c.plan.toLowerCase()}`}>{c.plan}</span>
          <button className="btn btn-ghost btn-sm" onClick={() => onSelect(c.id)}>Ver</button>
          <button className="btn btn-danger btn-sm" onClick={() => deleteClient(c.id)}>✕</button>
        </div>
      ))}
    </div>
  );
}

function NewClientForm({ data, onUpdate, onDone }) {
  const [name, setName] = useState('');
  const [plan, setPlan] = useState('ESSENTIAL');
  function submit() {
    if (!name.trim()) return;
    const code = generateCode(name, plan);
    onUpdate(d => {
      d.clients.push({ id: generateId(), name: name.trim(), plan, code, createdAt: new Date().toISOString().slice(0,10), routines: [], sessions: [] });
      return d;
    });
    onDone();
  }
  return (
    <div className="card">
      <div className="card-title">Nuevo cliente</div>
      <div className="form-row col2">
        <div className="form-group">
          <label>Nombre completo</label>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="Ej: Juan Pérez" />
        </div>
        <div className="form-group">
          <label>Plan</label>
          <select value={plan} onChange={e => setPlan(e.target.value)}>
            <option value="ESSENTIAL">ESSENTIAL — 70€/mes</option>
            <option value="PREMIUM">PREMIUM — 99€/mes</option>
            <option value="ELITE">ELITE — 149€/mes</option>
          </select>
        </div>
      </div>
      {name && <p className="text-muted text-sm mb-16">Código generado: <span className="text-accent font-mono" style={{fontSize:16}}>{generateCode(name, plan)}</span></p>}
      <button className="btn btn-primary" onClick={submit}>Crear cliente</button>
    </div>
  );
}

function ClientDetail({ client, data, onUpdate, onBack }) {
  const [tab, setTab] = useState('routines');

  return (
    <>
      <div style={{display:'flex',alignItems:'center',gap:12,marginTop:20,marginBottom:20}}>
        <button className="btn btn-ghost btn-sm" onClick={onBack}>← Volver</button>
        <div className="client-avatar">{client.name.charAt(0)}</div>
        <div>
          <div style={{fontWeight:600,fontSize:16}}>{client.name}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}><span className={`badge badge-${client.plan.toLowerCase()}`}>{client.plan}</span> · <span className="font-mono">{client.code}</span></div>
        </div>
      </div>

      <div className="tabs">
        <button className={`tab ${tab==='routines'?'active':''}`} onClick={() => setTab('routines')}>Rutinas</button>
        <button className={`tab ${tab==='progress'?'active':''}`} onClick={() => setTab('progress')}>Progreso</button>
        <button className={`tab ${tab==='history'?'active':''}`} onClick={() => setTab('history')}>Historial</button>
      </div>

      {tab === 'routines'  && <RoutinesTab client={client} onUpdate={onUpdate} />}
      {tab === 'progress'  && <ProgressTab client={client} />}
      {tab === 'history'   && <HistoryTab  client={client} />}
    </>
  );
}

/* ── ROUTINES TAB ── */
function RoutinesTab({ client, onUpdate }) {
  const [showNewRoutine, setShowNewRoutine] = useState(false);
  const [routineName, setRoutineName] = useState('');
  const [openRoutine, setOpenRoutine] = useState(null);

  function addRoutine() {
    if (!routineName.trim()) return;
    onUpdate(d => {
      const c = d.clients.find(x => x.id === client.id);
      c.routines.push({ id: generateId(), name: routineName.trim(), exercises: [] });
      return d;
    });
    setRoutineName(''); setShowNewRoutine(false);
  }

  function deleteRoutine(rid) {
    if (!window.confirm('¿Eliminar esta rutina?')) return;
    onUpdate(d => {
      const c = d.clients.find(x => x.id === client.id);
      c.routines = c.routines.filter(r => r.id !== rid);
      return d;
    });
  }

  return (
    <div>
      {client.routines.map(r => (
        <div className="card" key={r.id}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
            <div className="card-title" style={{margin:0,flex:1}}>{r.name}</div>
            <button className="btn btn-ghost btn-sm" onClick={() => setOpenRoutine(openRoutine===r.id?null:r.id)}>
              {openRoutine===r.id?'Cerrar':'Gestionar ejercicios'}
            </button>
            <button className="btn btn-danger btn-sm" onClick={() => deleteRoutine(r.id)}>✕</button>
          </div>

          {r.exercises.map((ex, i) => (
            <div className="ex-row" key={ex.id}>
              <div className="ex-num">{i+1}</div>
              <div className="ex-details">
                <div className="ex-name">{ex.name}</div>
                <div className="ex-meta">{ex.sets} series · {ex.reps} reps · RIR {ex.rir}</div>
                {ex.notes && <div className="ex-note">{ex.notes}</div>}
              </div>
              <button className="btn btn-danger btn-sm" style={{marginLeft:'auto'}} onClick={() => {
                onUpdate(d => {
                  const c = d.clients.find(x=>x.id===client.id);
                  const ro = c.routines.find(x=>x.id===r.id);
                  ro.exercises = ro.exercises.filter(e=>e.id!==ex.id);
                  return d;
                });
              }}>✕</button>
            </div>
          ))}

          {!r.exercises.length && <p className="text-muted text-sm mb-16">Sin ejercicios todavía.</p>}

          {openRoutine === r.id && (
            <AddExerciseForm routineId={r.id} clientId={client.id} onUpdate={onUpdate} />
          )}
        </div>
      ))}

      {showNewRoutine ? (
        <div className="card">
          <div className="card-title">Nueva rutina</div>
          <div className="form-group">
            <label>Nombre de la rutina</label>
            <input value={routineName} onChange={e => setRoutineName(e.target.value)}
              onKeyDown={e => e.key==='Enter' && addRoutine()} placeholder="Ej: Empuje A, Full Body..." />
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary" onClick={addRoutine}>Crear</button>
            <button className="btn btn-ghost" onClick={() => setShowNewRoutine(false)}>Cancelar</button>
          </div>
        </div>
      ) : (
        <button className="btn btn-primary" onClick={() => setShowNewRoutine(true)}>+ Nueva rutina</button>
      )}
    </div>
  );
}

function AddExerciseForm({ routineId, clientId, onUpdate }) {
  const [ex, setEx] = useState({ name:'', sets:'3', reps:'8-10', rir:'2', notes:'' });
  function set(k, v) { setEx(p => ({...p,[k]:v})); }
  function add() {
    if (!ex.name.trim()) return;
    onUpdate(d => {
      const c = d.clients.find(x=>x.id===clientId);
      const r = c.routines.find(x=>x.id===routineId);
      r.exercises.push({ id: generateId(), ...ex, name: ex.name.trim() });
      return d;
    });
    setEx({ name:'', sets:'3', reps:'8-10', rir:'2', notes:'' });
  }
  return (
    <div style={{background:'var(--surface)',borderRadius:8,padding:14,marginTop:12,border:'1px solid var(--border)'}}>
      <p className="text-muted text-sm mb-8" style={{fontWeight:600}}>Añadir ejercicio</p>
      <div className="form-row col2" style={{marginBottom:8}}>
        <div className="form-group" style={{marginBottom:0}}>
          <label>Ejercicio</label>
          <input value={ex.name} onChange={e=>set('name',e.target.value)} placeholder="Nombre del ejercicio" />
        </div>
        <div className="form-group" style={{marginBottom:0}}>
          <label>Notas</label>
          <input value={ex.notes} onChange={e=>set('notes',e.target.value)} placeholder="Técnica, indicaciones..." />
        </div>
      </div>
      <div className="form-row col3" style={{marginBottom:12}}>
        <div className="form-group" style={{marginBottom:0}}>
          <label>Series</label>
          <input type="number" value={ex.sets} onChange={e=>set('sets',e.target.value)} min="1" />
        </div>
        <div className="form-group" style={{marginBottom:0}}>
          <label>Reps</label>
          <input value={ex.reps} onChange={e=>set('reps',e.target.value)} placeholder="8-10" />
        </div>
        <div className="form-group" style={{marginBottom:0}}>
          <label>RIR</label>
          <select value={ex.rir} onChange={e=>set('rir',e.target.value)}>
            {[0,1,2,3,4].map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>
      </div>
      <button className="btn btn-primary btn-sm" onClick={add}>Añadir ejercicio</button>
    </div>
  );
}

/* ── PROGRESS TAB ── */
function ProgressTab({ client }) {
  const allExercises = client.routines.flatMap(r => r.exercises.map(e => ({...e, routineName: r.name})));
  if (!allExercises.length) return <div className="empty-state">Sin ejercicios todavía.</div>;
  return (
    <div className="ex-progress-list">
      {allExercises.map(ex => {
        const sessions = client.sessions.filter(s => s.weights?.[ex.id]);
        const last = [...sessions].sort((a,b)=>b.date.localeCompare(a.date))[0];
        const lastW = last?.weights?.[ex.id];
        return (
          <div className="ex-progress-item" key={ex.id}>
            <div className="ex-progress-name">{ex.name}</div>
            <div className="ex-last">
              Último peso registrado: <span>{lastW ? lastW + ' kg' : '—'}</span>
              {last && <> · {formatDate(last.date)}</>}
            </div>
            <ProgressChart sessions={client.sessions} exerciseId={ex.id} exerciseName={ex.name} />
          </div>
        );
      })}
    </div>
  );
}

/* ── HISTORY TAB ── */
function HistoryTab({ client }) {
  const sorted = [...client.sessions].sort((a,b)=>b.date.localeCompare(a.date));
  if (!sorted.length) return <div className="empty-state">Sin sesiones registradas.</div>;
  return (
    <div>
      {sorted.map(s => {
        const routine = client.routines.find(r=>r.id===s.routineId);
        return (
          <div className="hist-session" key={s.id}>
            <div className="hist-date">{formatDate(s.date)} — {routine?.name || 'Rutina eliminada'}</div>
            <div className="card" style={{marginBottom:8,padding:'8px 0'}}>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Ejercicio</th><th>Peso</th></tr></thead>
                  <tbody>
                    {Object.entries(s.weights||{}).map(([eid,w]) => {
                      const ex = client.routines.flatMap(r=>r.exercises).find(e=>e.id===eid);
                      return (
                        <tr key={eid}>
                          <td>{ex?.name || eid}</td>
                          <td><span className="text-accent font-mono">{w} kg</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ─────────────── CLIENT VIEW ─────────────── */
function ClientView({ clientId, onLogout }) {
  const data = loadData();
  const client = data.clients.find(c => c.id === clientId);
  const [tab, setTab] = useState('session');

  if (!client) return <div className="center-screen"><div style={{color:'var(--muted)'}}>Cliente no encontrado.</div></div>;

  const planClass = `plan-${client.plan.toLowerCase()}`;

  return (
    <>
      <header className="site-header">
        <div className="logo-mark"><span>JC</span></div>
        <div>
          <div className="site-name">JC Training Works</div>
          <div className="site-tag">Mi entrenamiento</div>
        </div>
        <div className="header-spacer" />
        <button className="btn-logout" onClick={onLogout}>Salir</button>
      </header>

      <div className="wrap">
        <div className={`plan-banner ${planClass}`} style={{marginTop:20}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:16}}>{client.name}</div>
            <div style={{fontSize:13,color:'var(--muted)',marginTop:2}}>
              Plan <span className={`badge badge-${client.plan.toLowerCase()}`}>{client.plan}</span>
            </div>
          </div>
          <div style={{fontSize:12,color:'var(--muted)',fontFamily:'monospace'}}>{client.code}</div>
        </div>

        <div className="tabs">
          <button className={`tab ${tab==='session'?'active':''}`} onClick={() => setTab('session')}>Entrenar hoy</button>
          <button className={`tab ${tab==='progress'?'active':''}`} onClick={() => setTab('progress')}>Mi progreso</button>
          <button className={`tab ${tab==='history'?'active':''}`} onClick={() => setTab('history')}>Historial</button>
        </div>

        {tab === 'session'  && <ClientSession client={client} clientId={clientId} />}
        {tab === 'progress' && <ClientProgress client={client} />}
        {tab === 'history'  && <ClientHistory  client={client} />}
      </div>
    </>
  );
}

function ClientSession({ client, clientId }) {
  const [routineId, setRoutineId] = useState(client.routines[0]?.id || '');
  const [weights, setWeights] = useState({});
  const [msg, setMsg] = useState(null);

  const routine = client.routines.find(r => r.id === routineId);

  async function save() {
    if (!routine) return;
    const filled = Object.entries(weights).filter(([,v]) => v.trim()).length;
    if (!filled) { setMsg({ type:'error', text:'Introduce al menos un peso antes de guardar.' }); return; }

    const data = loadData();
    const c = data.clients.find(x=>x.id===clientId);
    const today = new Date().toISOString().slice(0,10);
    c.sessions.push({
      id: generateId(),
      routineId,
      date: today,
      weights: Object.fromEntries(Object.entries(weights).filter(([,v])=>v.trim()))
    });
    saveData(data);

    // Enviar a Notion via Cloudflare Worker
    try {
      const envios = Object.entries(weights).filter(([,v])=>v.trim()).map(([eid, peso]) => {
        const ex = routine.exercises.find(e=>e.id===eid);
        return fetch('https://jc-training-notion.jctrainingworks.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            cliente: c.name,
            ejercicio: ex?.name || eid,
            peso: parseFloat(peso),
            series: ex?.sets || 0,
            repeticiones: ex?.reps || 0,
            fecha: today,
            plan: c.plan,
            sesion: routine.name,
            notas: ex?.notes || ''
          })
        });
      });
      await Promise.all(envios);
    } catch(e) {
      console.warn('Error enviando a Notion:', e);
    }

    setWeights({});
    setMsg({ type:'ok', text:'✅ Sesión guardada correctamente. ¡Buen trabajo!' });
    setTimeout(() => setMsg(null), 4000);
  }


  if (!client.routines.length) return <div className="empty-state">Tu entrenador todavía no ha creado ninguna rutina. ¡Pronto la tendrás lista!</div>;

  return (
    <div>
      {msg && <div className={msg.type==='ok'?'success-msg':'error-msg'}>{msg.text}</div>}

      <div className="card">
        <div className="card-title">¿Qué rutina entrenas hoy?</div>
        <select value={routineId} onChange={e => { setRoutineId(e.target.value); setWeights({}); }}>
          {client.routines.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
        </select>
      </div>

      {routine && (
        <div className="card">
          <div className="session-header">
            <div className="session-title">{routine.name}</div>
            <div className="text-muted text-sm">{new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
          </div>

          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Ejercicio</th>
                  <th>Series</th>
                  <th>Reps</th>
                  <th>RIR</th>
                  <th>Peso (kg)</th>
                </tr>
              </thead>
              <tbody>
                {routine.exercises.map(ex => {
                  // last recorded weight for this exercise
                  const prev = [...client.sessions]
                    .sort((a,b)=>b.date.localeCompare(a.date))
                    .find(s=>s.weights?.[ex.id]);
                  return (
                    <tr key={ex.id}>
                      <td>
                        <div style={{fontWeight:500}}>{ex.name}</div>
                        {ex.notes && <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{ex.notes}</div>}
                        {prev && <div style={{fontSize:11,color:'#666',marginTop:2}}>Anterior: {prev.weights[ex.id]} kg</div>}
                      </td>
                      <td>{ex.sets}</td>
                      <td>{ex.reps}</td>
                      <td>{ex.rir}</td>
                      <td>
                        <input
                          type="text"
                          className="weight-input"
                          value={weights[ex.id]||''}
                          onChange={e => setWeights(p=>({...p,[ex.id]:e.target.value}))}
                          placeholder="—"
                        />
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:18,display:'flex',justifyContent:'flex-end'}}>
            <button className="btn btn-primary" onClick={save}>Guardar sesión 💾</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ClientProgress({ client }) {
  const allExercises = client.routines.flatMap(r => r.exercises);
  if (!allExercises.length) return <div className="empty-state">Sin ejercicios asignados todavía.</div>;
  return (
    <div className="ex-progress-list">
      {allExercises.map(ex => {
        const sessions = client.sessions.filter(s=>s.weights?.[ex.id]);
        const last = [...sessions].sort((a,b)=>b.date.localeCompare(a.date))[0];
        const lastW = last?.weights?.[ex.id];
        return (
          <div className="ex-progress-item" key={ex.id}>
            <div className="ex-progress-name">{ex.name}</div>
            <div className="ex-last">
              Último peso: <span>{lastW ? lastW+' kg' : '—'}</span>
              {last && <> · {formatDate(last.date)}</>}
            </div>
            <ProgressChart sessions={client.sessions} exerciseId={ex.id} exerciseName={ex.name} />
          </div>
        );
      })}
    </div>
  );
}

function ClientHistory({ client }) {
  const sorted = [...client.sessions].sort((a,b)=>b.date.localeCompare(a.date));
  if (!sorted.length) return <div className="empty-state">Aún no tienes sesiones registradas. ¡Entrena y guarda tu primera sesión!</div>;
  return (
    <div>
      {sorted.map(s => {
        const routine = client.routines.find(r=>r.id===s.routineId);
        return (
          <div className="hist-session" key={s.id}>
            <div className="hist-date">{formatDate(s.date)} — {routine?.name || 'Rutina eliminada'}</div>
            <div className="card" style={{marginBottom:8,padding:'8px 0'}}>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Ejercicio</th><th>Peso registrado</th></tr></thead>
                  <tbody>
                    {Object.entries(s.weights||{}).map(([eid,w]) => {
                      const ex = client.routines.flatMap(r=>r.exercises).find(e=>e.id===eid);
                      return (
                        <tr key={eid}>
                          <td>{ex?.name||eid}</td>
                          <td><span className="text-accent font-mono" style={{fontWeight:600}}>{w} kg</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ─────────────── ROOT APP ─────────────── */
function App() {
  const [screen, setScreen] = useState('home'); // home | trainer-login | client-login | trainer | client
  const [clientId, setClientId] = useState(null);

  return (
    <>
      {screen === 'home'         && <HomeScreen onTrainer={() => setScreen('trainer-login')} onClient={() => setScreen('client-login')} />}
      {screen === 'trainer-login'&& <TrainerLogin onSuccess={() => setScreen('trainer')} onBack={() => setScreen('home')} />}
      {screen === 'client-login' && <ClientLogin  onSuccess={id => { setClientId(id); setScreen('client'); }} onBack={() => setScreen('home')} />}
      {screen === 'trainer'      && <TrainerPanel onLogout={() => setScreen('home')} />}
      {screen === 'client'       && <ClientView   clientId={clientId} onLogout={() => { setClientId(null); setScreen('home'); }} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

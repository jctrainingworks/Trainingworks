<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JC TRAINING WORKS | VIP PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1e90ff;
            --bg: #050505;
            --card-bg: #111111;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; overflow-x: hidden; }

        /* BANNER INTELIGENTE (Adaptable PC y Móvil) */
        .header-banner {
            width: 100%;
            background-image: url('https://raw.githubusercontent.com/jctrainingworks/Trainingworks/main/banner_v3.png');
            background-repeat: no-repeat;
            background-position: center center;
            border-bottom: 2px solid var(--blue);
            
            /* Ajuste para MÓVIL */
            height: 250px; 
            background-size: cover; 
        }

        /* Ajuste para ORDENADOR */
        @media (min-width: 768px) {
            .header-banner {
                height: 450px; 
                background-size: cover;
                background-position: center 20%; /* Centramos el logo un poco más arriba */
            }
        }

        /* BIENVENIDA */
        .welcome-section {
            text-align: center;
            padding: 40px 20px 10px;
        }

        .welcome-section p {
            color: var(--blue);
            font-weight: 900;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .welcome-section h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 8vw, 4rem); /* Tamaño fluido */
            letter-spacing: 2px;
            line-height: 1;
        }

        .welcome-section h2 span { color: var(--blue); }

        /* CONTENEDOR CENTRAL (Para que en PC no se estire demasiado) */
        .container { 
            padding: 20px; 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto 50px; 
        }

        /* TARJETAS DE EJERCICIO */
        .exercise-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .ex-title { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 1.8rem; 
            color: #fff; 
            margin-bottom: 20px;
            display: block;
            border-left: 4px solid var(--blue);
            padding-left: 15px;
        }

        .series-grid { 
            display: grid; 
            grid-template-columns: 40px 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 15px; 
            align-items: center; 
        }
        
        .label-mini { font-size: 0.6rem; color: var(--blue); font-weight: 800; text-align: center; text-transform: uppercase; }
        .serie-number { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: #444; text-align: center; }
        
        input {
            background: #000;
            border: 1px solid #222;
            color: #fff;
            padding: 15px 5px;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
            width: 100%;
        }

        input:focus { border-color: var(--blue); outline: none; }

        /* BOTÓN WHATSAPP */
        .wa-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(30,144,255,0.05);
            border: 1px dashed var(--blue);
            padding: 12px;
            border-radius: 8px;
            color: var(--blue);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* BOTÓN FINALIZAR */
        .btn-submit {
            background: var(--blue);
            color: white;
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 10px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(30,144,255,0.4);
            margin-top: 20px;
        }

        textarea {
            width: 100%; background: #111; border: 1px solid #222; border-radius: 8px; 
            padding: 15px; color: white; margin-top: 10px; font-family: inherit; resize: none;
        }

        .footer { text-align: center; padding: 60px 20px; font-size: 0.7rem; color: #333; text-transform: uppercase; letter-spacing: 2px; }

    </style>
</head>
<body>

    <div class="header-banner"></div>

    <div class="welcome-section">
        <p>Elite Performance</p>
        <h2>HOLA, <span>PEPE</span></h2>
    </div>

    <div class="container">
        <form action="https://formspree.io/f/TU_ID_AQUI" method="POST">
            
            <div class="exercise-card">
                <span class="ex-title">Press de Banca</span>
                
                <div class="series-grid">
                    <div></div>
                    <div class="label-mini">PESO (KG)</div>
                    <div class="label-mini">REPES</div>
                </div>

                <div class="series-grid">
                    <span class="serie-number">S1</span>
                    <input type="number" name="pb_s1_kg" placeholder="0">
                    <input type="number" name="pb_s1_rep" placeholder="0">
                </div>
                
                <div class="series-grid">
                    <span class="serie-number">S2</span>
                    <input type="number" name="pb_s2_kg" placeholder="0">
                    <input type="number" name="pb_s2_rep" placeholder="0">
                </div>

                <a href="https://wa.me/34TU_NUMERO?text=Hola%20JC!%20Aquí%20va%20el%20vídeo%20de%20mi%20última%20serie" class="wa-btn">
                    🎥 GRABAR ÚLTIMA SERIE (OPCIONAL)
                </a>
            </div>

            <p style="font-size: 0.7rem; color: var(--blue); font-weight: 700; letter-spacing: 1px;">COMENTARIOS DE LA SESIÓN</p>
            <textarea name="feedback" rows="3" placeholder="¿Cómo te has sentido hoy?"></textarea>

            <button type="submit" class="btn-submit">GUARDAR ENTRENAMIENTO</button>
        </form>
    </div>

    <div class="footer">JC TRAINING WORKS // EST. 2026</div>

</body>
</html>

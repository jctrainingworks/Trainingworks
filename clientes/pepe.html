<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JC TRAINING WORKS | VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1e90ff;
            --bg: #050505;
            --card-bg: #111111;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; overflow-x: hidden; }

        /* HERO AJUSTADO */
        .hero-app {
            position: relative;
            height: 300px; /* Altura fija para controlar mejor el diseño */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-image: url('https://raw.githubusercontent.com/jctrainingworks/Trainingworks/main/banner_v3.png');
            background-size: cover;
            background-position: center 20%; /* Ajustamos para que se vea mejor el logo del banner */
            border-bottom: 2px solid var(--blue);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, var(--bg) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding-top: 40px;
        }

        .hero-content h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .hero-content h2 span { color: var(--blue); }

        .container { 
            position: relative; 
            z-index: 3; 
            margin-top: -30px; /* Subida suave */
            padding: 0 20px 40px; 
            width: 100%; 
            max-width: 500px; 
            margin-left: auto; 
            margin-right: auto; 
        }

        /* TARJETAS MEJORADAS */
        .exercise-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .ex-title { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 1.8rem; 
            color: #fff; 
            margin-bottom: 20px;
            display: block;
            border-left: 4px solid var(--blue);
            padding-left: 15px;
            line-height: 1;
        }

        .series-grid { 
            display: grid; 
            grid-template-columns: 40px 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 15px; 
            align-items: center; 
        }
        
        .label-mini { font-size: 0.6rem; color: var(--blue); font-weight: 800; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .serie-number { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: #444; text-align: center; }
        
        input {
            background: #000;
            border: 1px solid #222;
            color: #fff;
            padding: 15px 5px;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
            width: 100%;
        }

        input:focus { border-color: var(--blue); outline: none; }

        .wa-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(30,144,255,0.05);
            border: 1px dashed var(--blue);
            padding: 12px;
            border-radius: 8px;
            color: var(--blue);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-submit {
            background: var(--blue);
            color: white;
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(30,144,255,0.3);
            margin-top: 20px;
        }

        textarea {
            width: 100%; background: #111; border: 1px solid #222; border-radius: 8px; 
            padding: 15px; color: white; margin-top: 10px; font-family: inherit;
        }

        .footer { text-align: center; padding: 40px; font-size: 0.7rem; color: #333; }
    </style>
</head>
<body>

    <div class="hero-app">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <p style="color: var(--blue); font-weight: 900; font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 5px;">TRAINING WORKS</p>
            <h2>HOLA, <span>PEPE</span></h2>
        </div>
    </div>

    <div class="container">
        <form>
            <div class="exercise-card">
                <span class="ex-title">Press de Banca</span>
                
                <div class="series-grid" style="margin-bottom: 5px;">
                    <div></div>
                    <div class="label-mini">PESO (KG)</div>
                    <div class="label-mini">REPES</div>
                </div>

                <div class="series-grid">
                    <span class="serie-number">S1</span>
                    <input type="number" placeholder="0">
                    <input type="number" placeholder="0">
                </div>
                
                <div class="series-grid">
                    <span class="serie-number">S2</span>
                    <input type="number" placeholder="0">
                    <input type="number" placeholder="0">
                </div>

                <a href="#" class="wa-btn">🎥 GRABAR ÚLTIMA SERIE (OPCIONAL)</a>
            </div>

            <p style="font-size: 0.7rem; color: var(--blue); font-weight: 700; margin-left: 5px;">FEEDBACK DE LA SESIÓN</p>
            <textarea rows="3" placeholder="¿Cómo te has sentido hoy?"></textarea>

            <button type="submit" class="btn-submit">GUARDAR ENTRENAMIENTO</button>
        </form>
    </div>

    <div class="footer">JC TRAINING WORKS // 2026</div>

</body>
</html>

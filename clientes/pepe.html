<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JC TRAINING WORKS | VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1e90ff;
            --bg: #050505;
            --card-bg: rgba(18, 18, 18, 0.9); /* Un poco de transparencia para el toque pro */
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; overflow-x: hidden; }

        /* HERO ADAPTADO DE TU WEB */
        .hero-app {
            position: relative;
            height: 45vh; /* Más bajo que en la web para que se vea la rutina rápido */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            background-image: url('https://raw.githubusercontent.com/jctrainingworks/Trainingworks/main/banner_v3.png');
            background-size: cover;
            background-position: center top;
            border-bottom: 3px solid var(--blue);
            image-rendering: -webkit-optimize-contrast;
        }

        /* El degradado oscuro para que se lean los textos */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, var(--bg) 0%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        .hero-content img {
            max-width: 200px; /* Tu logo discreto como en la web */
            height: auto;
            margin-bottom: 10px;
        }

        .hero-content h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hero-content h2 span { color: var(--blue); }

        .container { 
            position: relative; 
            z-index: 3; 
            margin-top: -40px; /* Hace que las tarjetas "floten" sobre el banner */
            padding: 20px; 
            width: 100%; 
            max-width: 480px; 
            margin-left: auto; 
            margin-right: auto; 
        }

        /* TARJETAS ESTILO ELITE */
        .exercise-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px); /* Efecto cristal de iPhone */
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .ex-title { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 1.8rem; 
            color: #fff; 
            margin-bottom: 20px;
            display: block;
            border-bottom: 1px solid var(--blue);
            padding-bottom: 5px;
        }

        /* GRILLA DE SERIES */
        .series-grid { 
            display: grid; 
            grid-template-columns: 0.5fr 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 15px; 
            align-items: center; 
        }
        
        .label-mini { font-size: 0.65rem; color: var(--blue); font-weight: 900; text-align: center; text-transform: uppercase; }
        .serie-number { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: #555; }
        
        input {
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            text-align: center;
        }

        input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 15px rgba(30,144,255,0.3); }

        /* WHATSAPP */
        .wa-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px dashed #444;
            padding: 12px;
            border-radius: 8px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .btn-submit {
            background: var(--blue);
            color: white;
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 12px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(30,144,255,0.3);
        }

        .footer { text-align: center; padding: 40px; font-size: 0.7rem; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="hero-app">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <p style="color: var(--blue); font-weight: 900; font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 5px;">TRAINING WORKS</p>
            <h2>HOLA, <span>PEPE</span></h2>
        </div>
    </div>

    <div class="container">
        <form action="TU_ID_FORMSPREE" method="POST">
            
            <div class="exercise-card">
                <span class="ex-title">Press de Banca</span>
                
                <div class="series-grid">
                    <div></div>
                    <div class="label-mini">PESO (KG)</div>
                    <div class="label-mini">REPES</div>
                </div>

                <div class="series-grid">
                    <span class="serie-number">S1</span>
                    <input type="number" name="p_banca_s1_kg" placeholder="0">
                    <input type="number" name="p_banca_s1_re" placeholder="0">
                </div>
                
                <div class="series-grid">
                    <span class="serie-number">S2</span>
                    <input type="number" name="p_banca_s2_kg" placeholder="0">
                    <input type="number" name="p_banca_s2_re" placeholder="0">
                </div>

                <a href="https://wa.me/34600000000?text=Vídeo técnica" class="wa-btn">
                    🎥 GRABAR ÚLTIMA SERIE (OPCIONAL)
                </a>
            </div>

            <p style="font-size: 0.7rem; color: var(--blue); margin-bottom: 10px; font-weight: 700; letter-spacing: 1px;">FEEDBACK DE LA SESIÓN</p>
            <textarea name="feedback" style="width: 100%; background: #121212; border: 1px solid #333; border-radius: 10px; padding: 15px; color: white; margin-bottom: 25px;" rows="3" placeholder="¿Cómo te has sentido hoy?"></textarea>

            <button type="submit" class="btn-submit">GUARDAR ENTRENAMIENTO</button>
        </form>
    </div>

    <div class="footer">JC TRAINING WORKS // EST. 2026</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JC TRAINING WORKS | VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1e90ff;
            --bg: #050505;
            --card-bg: #111111;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; }

        /* BANNER CORREGIDO: Se verá la sala entera */
        .header-banner {
            width: 100%;
            /* Usamos aspect-ratio para que mantenga la proporción de la foto original */
            aspect-ratio: 16 / 9; 
            max-height: 400px;
            background-image: url('https://raw.githubusercontent.com/jctrainingworks/Trainingworks/main/banner_v3.png');
            background-size: contain; /* Cambiado a contain para que no recorte los lados */
            background-repeat: no-repeat;
            background-position: center top;
            background-color: #000; /* Fondo negro por si la imagen no ocupa todo el ancho */
            border-bottom: 2px solid var(--blue);
        }

        /* BIENVENIDA */
        .welcome-section {
            text-align: center;
            padding: 30px 20px 10px;
        }

        .welcome-section p {
            color: var(--blue);
            font-weight: 900;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .welcome-section h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 2px;
        }

        .welcome-section h2 span { color: var(--blue); }

        .container { padding: 20px; width: 100%; max-width: 500px; margin: 0 auto; }

        .exercise-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ex-title { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 1.8rem; 
            border-left: 4px solid var(--blue);
            padding-left: 15px;
            margin-bottom: 20px;
        }

        .series-grid { 
            display: grid; 
            grid-template-columns: 40px 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 10px; 
            align-items: center; 
        }
        
        .label-mini { font-size: 0.6rem; color: var(--blue); font-weight: 800; text-align: center; }
        .serie-number { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: #444; text-align: center; }
        
        input {
            background: #000; border: 1px solid #222; color: #fff; padding: 15px 5px;
            border-radius: 6px; font-size: 1.2rem; font-weight: 700; text-align: center; width: 100%;
        }

        .wa-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(30,144,255,0.05); border: 1px dashed var(--blue);
            padding: 12px; border-radius: 8px; color: var(--blue); text-decoration: none;
            font-size: 0.7rem; font-weight: 700; margin-top: 10px;
        }

        .btn-submit {
            background: var(--blue); color: white; width: 100%; padding: 22px;
            border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem; cursor: pointer; margin-top: 20px;
        }

        textarea {
            width: 100%; background: #111; border: 1px solid #222; border-radius: 8px; 
            padding: 15px; color: white; margin-top: 10px; resize: none;
        }

        .footer { text-align: center; padding: 60px 20px; font-size: 0.7rem; color: #333; letter-spacing: 2px; }

    </style>
</head>
<body>

    <div class="header-banner"></div>

    <div class="welcome-section">
        <p>Elite Performance</p>
        <h2>HOLA, <span>PEPE</span></h2>
    </div>

    <div class="container">
        <form>
            <div class="exercise-card">
                <span class="ex-title">Press de Banca</span>
                <div class="series-grid">
                    <div></div><div class="label-mini">PESO (KG)</div><div class="label-mini">REPES</div>
                </div>
                <div class="series-grid">
                    <span class="serie-number">S1</span>
                    <input type="number" placeholder="0">
                    <input type="number" placeholder="0">
                </div>
                <div class="series-grid">
                    <span class="serie-number">S2</span>
                    <input type="number" placeholder="0">
                    <input type="number" placeholder="0">
                </div>
                <a href="#" class="wa-btn">🎥 GRABAR ÚLTIMA SERIE (OPCIONAL)</a>
            </div>
            <button type="submit" class="btn-submit">GUARDAR ENTRENAMIENTO</button>
        </form>
    </div>

    <div class="footer">JC TRAINING WORKS // 2026</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTRENO PEPE | JC Training Works</title>
    <style>
        :root {
            --primary: #00ffcc; /* Tu verde neón */
            --bg: #050505;
            --card: #121212;
            --text: #ffffff;
            --gray: #888;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--primary);
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        h1 { margin-top: 10px; font-size: 1.5rem; }

        .workout-container {
            width: 100%;
            max-width: 450px;
        }

        .exercise-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #222;
            box-shadow: 0 4px 15px rgba(0,255,204,0.05);
        }

        .ex-title {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .ex-info {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: block;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.75rem;
            color: var(--gray);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            background: #222;
        }

        .btn-submit {
            background: var(--primary);
            color: black;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .btn-submit:active {
            transform: scale(0.95);
        }

        footer {
            margin-top: 40px;
            color: #444;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">JC Training Works</div>
        <h1>Sesión de Empuje</h1>
    </header>

    <div class="workout-container">
        <form action="https://formspree.io/f/TU_ID_AQUI" method="POST">
            
            <div class="exercise-card">
                <span class="ex-title">Press Banca</span>
                <span class="ex-info">3 series x 10 repes | ⏱ 2 min descanso</span>
                
                <input type="hidden" name="Ejercicio1" value="Press Banca">
                
                <div class="input-row">
                    <div class="input-group">
                        <label>Peso (kg)</label>
                        <input type="number" name="P1_Peso" placeholder="0" required>
                    </div>
                    <div class="input-group">
                        <label>RPE / Notas</label>
                        <input type="text" name="P1_Notas" placeholder="Fácil, duro...">
                    </div>
                </div>
            </div>

            <div style="padding: 10px; color: var(--gray); font-size: 0.85rem; text-align: center; margin-bottom: 10px;">
                ¿Has terminado todo, Pepe? Dale al botón de abajo.
            </div>

            <button type="submit" class="btn-submit">GUARDAR SESIÓN</button>

        </form>
    </div>

    <footer>
        &copy; 2024 JC Training Works | Sistema Elite
    </footer>

</body>
</html>

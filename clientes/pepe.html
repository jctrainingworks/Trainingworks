<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTRENO | JC Training Works</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1e90ff;
            --blue-dark: #0066cc;
            --bg: #0a0a0a;
            --bg2: #111111;
            --text: #f0f0f0;
            --muted: #888;
            --border: rgba(30,144,255,0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cabecera igual a tu NAV */
        header {
            width: 100%;
            max-width: 500px;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo span { color: var(--blue); }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .welcome {
            margin-bottom: 25px;
        }

        .welcome h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 1px;
            line-height: 1;
        }

        .session-tag {
            color: var(--blue);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Tarjetas de ejercicio estilo mod-card */
        .exercise-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .exercise-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--blue);
        }

        .ex-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
        }

        .ex-info {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 20px;
            display: block;
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: #000;
            border: 1px solid #222;
            color: #fff;
            padding: 14px;
            border-radius: 4px;
            font-family: 'Barlow', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--blue);
            outline: none;
        }

        /* Botón estilo btn-primary */
        .btn-finish {
            background: var(--blue);
            color: #fff;
            padding: 18px;
            width: 100%;
            border: none;
            font-family: 'Barlow', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-finish:hover {
            background: var(--blue-dark);
            transform: translateY(-2px);
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">JC <span>TRAINING</span> WORKS</div>
    </header>

    <div class="container">
        <div class="welcome">
            <span class="session-tag">Entrenamiento de hoy</span>
            <h2>HOLA, PEPE</h2>
        </div>

        <form action="https://formspree.io/f/TU_ID_AQUI" method="POST">
            
            <div class="exercise-card">
                <span class="ex-title">Press Banca</span>
                <span class="ex-info">3 SERIES X 10 REPES | ⏱ 2' DESC.</span>
                
                <input type="hidden" name="Ejercicio_1" value="Press Banca">
                
                <div class="input-grid">
                    <div class="field">
                        <label>PESO LEVANTADO</label>
                        <input type="number" name="P1_Peso" placeholder="KG" required>
                    </div>
                    <div class="field">
                        <label>REPS / RPE</label>
                        <input type="text" name="P1_Notas" placeholder="10 / 8">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-finish">FINALIZAR Y ENVIAR</button>
        </form>
    </div>

    <footer>
        © 2024 JC TRAINING WORKS | PERFORMANCE HUB
    </footer>

</body>
</html>

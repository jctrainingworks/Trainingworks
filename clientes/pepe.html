<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JC TRAINING WORKS | WORKOUT</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1e90ff;
            --blue-dark: #0066cc;
            --bg: #0a0a0a;
            --bg2: #111111;
            --text: #f0f0f0;
            --muted: #888;
            --border: rgba(30,144,255,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 500px;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo span { color: var(--blue); }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .welcome {
            margin-bottom: 30px;
        }

        .welcome h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 1px;
            line-height: 1;
        }

        .session-tag {
            color: var(--blue);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 5px;
        }

        .exercise-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .ex-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
            color: #fff;
        }

        .ex-info {
            font-size: 0.8rem;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            display: block;
            margin-bottom: 20px;
        }

        .series-header {
            display: grid;
            grid-template-columns: 0.8fr 1.1fr 1.1fr;
            gap: 10px;
            margin-bottom: 8px;
            opacity: 0.4;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
        }

        .series-row {
            display: grid;
            grid-template-columns: 0.8fr 1.1fr 1.1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }

        .series-n {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
        }

        input {
            background: #000;
            border: 1px solid #222;
            color: #fff;
            padding: 14px;
            border-radius: 6px;
            font-family: 'Barlow', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            width: 100%;
        }

        input:focus {
            border-color: var(--blue);
            outline: none;
        }

        /* BOTÓN WHATSAPP OPCIONAL */
        .wa-video-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            padding: 10px;
            background: rgba(30,144,255,0.05);
            border: 1px dashed var(--blue);
            border-radius: 8px;
            color: var(--blue);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .wa-video-btn:hover {
            background: rgba(30,144,255,0.1);
        }

        .obs-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--blue);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Barlow', sans-serif;
            margin-bottom: 30px;
            resize: none;
        }

        .btn-finish {
            background: var(--blue);
            color: #fff;
            padding: 20px;
            width: 100%;
            border: none;
            font-family: 'Barlow', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(30,144,255,0.2);
        }

        footer {
            padding: 40px 20px;
            font-size: 0.7rem;
            color: #333;
            text-align: center;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">JC <span>TRAINING</span> WORKS</div>
    </header>

    <div class="container">
        <div class="welcome">
            <span class="session-tag">Push Day | Hipertrofia</span>
            <h2>HOLA, PEPE</h2>
        </div>

        <form action="https://formspree.io/f/TU_ID_AQUI" method="POST">
            
            <div class="exercise-card">
                <span class="ex-title">Press Banca</span>
                <span class="ex-info">3 Series x 10 Repes | 120s Descanso</span>
                
                <input type="hidden" name="Ej1_Nombre" value="Press Banca">
                
                <div class="series-container">
                    <div class="series-header">
                        <span></span>
                        <span>PESO (KG)</span>
                        <span>REPS</span>
                    </div>

                    <div class="series-row">
                        <span class="series-n">SERIE 1</span>
                        <input type="number" name="Ej1_S1_Kg" placeholder="--">
                        <input type="number" name="Ej1_S1_Reps" placeholder="--">
                    </div>

                    <div class="series-row">
                        <span class="series-n">SERIE 2</span>
                        <input type="number" name="Ej1_S2_Kg" placeholder="--">
                        <input type="number" name="Ej1_S2_Reps" placeholder="--">
                    </div>

                    <div class="series-row">
                        <span class="series-n">SERIE 3</span>
                        <input type="number" name="Ej1_S3_Kg" placeholder="--">
                        <input type="number" name="Ej1_S3_Reps" placeholder="--">
                    </div>
                </div>

                <a href="https://wa.me/34615980526?text=Hola%20Juancar!%20Aquí%20te%20paso%20el%20vídeo%20de%20mi%20última%20serie%20para%20revisar%20técnica" class="wa-video-btn">
    🎥 GRABAR ÚLTIMA SERIE (OPCIONAL)
</a>
            </div>

            <label class="obs-label">Observaciones / Feedback</label>
            <textarea name="feedback" rows="3" placeholder="¿Cómo han sido las sensaciones hoy?"></textarea>

            <button type="submit" class="btn-finish">FINALIZAR ENTRENAMIENTO</button>
        </form>
    </div>

    <footer>
        © 2024 JC TRAINING WORKS | HIGH PERFORMANCE
    </footer>

</body>
</html>

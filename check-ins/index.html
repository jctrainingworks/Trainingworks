<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Check-in · JC Training Works</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 48px}
.card{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:20px;padding:28px 24px;width:100%;max-width:420px}
.header{display:flex;align-items:center;gap:8px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #2e2e2e}
.logo{font-size:13px;font-weight:600;color:#a0a0a0;letter-spacing:.5px}
.step-ctr{margin-left:auto;font-size:12px;color:#666}
.prog-bar{height:3px;background:#2e2e2e;border-radius:99px;margin-bottom:28px;overflow:hidden;display:none}
.prog-fill{height:100%;background:#4f9cf9;border-radius:99px;transition:width .3s}
h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;text-transform:uppercase;line-height:1;margin-bottom:10px;color:#f0f0f0}
p.sub{font-size:14px;color:#888;line-height:1.7;margin-bottom:28px}
label{display:block;font-size:13px;color:#888;margin-bottom:8px}
input[type=text],input[type=number],textarea{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #2e2e2e;background:#111;color:#f0f0f0;font-size:15px;font-family:inherit;outline:none;transition:border .2s}
input:focus,textarea:focus{border-color:#4f9cf9}
textarea{resize:none;margin-top:4px}
.sec-title{font-size:15px;font-weight:600;color:#f0f0f0;margin-bottom:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.q-title{font-size:16px;font-weight:500;color:#f0f0f0;margin-bottom:24px;line-height:1.4}
.rating{display:flex;gap:10px;justify-content:center;margin-bottom:10px}
.rating button{width:52px;height:52px;border-radius:50%;border:1px solid #2e2e2e;background:#111;color:#888;font-size:17px;font-weight:600;cursor:pointer;transition:all .15s}
.rating button.sel{background:#1a3a5c;border-color:#4f9cf9;color:#4f9cf9}
.r-labels{display:flex;justify-content:space-between;font-size:11px;color:#555;margin-bottom:20px;padding:0 2px}
.btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:opacity .2s,transform .1s}
.btn:active{transform:scale(.98)}
.btn-p{background:#4f9cf9;color:#fff}
.btn-s{background:#22c55e;color:#fff}
.btn-g{background:#222;color:#aaa;border:1px solid #2e2e2e}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-row{display:flex;gap:10px;margin-top:20px}
.sum-box{background:#111;border:1px solid #2e2e2e;border-radius:14px;padding:0 16px;margin-bottom:20px}
.sum-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:1px solid #1e1e1e;font-size:13px}
.sum-row:last-child{border-bottom:none}
.sum-lbl{color:#666}
.sum-val{color:#f0f0f0;font-weight:500;text-align:right;max-width:55%}
.sum-note{font-size:11px;color:#555;margin-top:2px}
.sum-sec{font-size:11px;color:#4f9cf9;text-transform:uppercase;letter-spacing:.8px;padding:14px 0 6px;font-weight:600}
.ok-icon{width:68px;height:68px;border-radius:50%;background:#14532d;border:1px solid #22c55e;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px}
.ico-circle{width:56px;height:56px;border-radius:50%;background:#111;border:1px solid #2e2e2e;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px}
.fg{margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <span>🏋️</span>
    <span class="logo">JC TRAINING WORKS</span>
    <span class="step-ctr" id="sc"></span>
  </div>
  <div class="prog-bar" id="pb"><div class="prog-fill" id="pf"></div></div>
  <div id="app"></div>
</div>
<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyafv8QBYJQ8FX6QwGqZMKxZjqXvcPvSTVOCmnb5z2nKVJ45hjREh9dw2Jmz6QQF/exec";
var TOTAL = 9;
var QS = [
  {id:"sensaciones",label:"Como te has sentido esta semana en general?",icon:"😊",low:"Fatal",high:"Excelente"},
  {id:"adherencia", label:"Como has seguido la dieta?",                 icon:"🥗",low:"Nula", high:"Perfecta"},
  {id:"sueno",      label:"Como ha sido la calidad de tu sueno?",       icon:"🌙",low:"Pesimo",high:"Excelente"},
  {id:"energia",    label:"Cual ha sido tu nivel de energia?",          icon:"⚡",low:"Sin energia",high:"Altisima"},
  {id:"molestias",  label:"Has tenido dolores o molestias fisicas?",    icon:"🩺",low:"Mucho dolor",high:"Sin molestias"}
];
var SHORT = ["Sensaciones","Dieta","Sueno","Energia","Molestias"];
var MEDS = [
  {id:"cuello",    label:"Cuello"},
  {id:"brazo",     label:"Brazo"},
  {id:"antebrazo", label:"Antebrazo"},
  {id:"abdomen",   label:"Abdomen"},
  {id:"cadera",    label:"Cadera / Nalgas"},
  {id:"muslo",     label:"Muslo"},
  {id:"pantorrilla",label:"Pantorrilla"}
];

var step = 0;
var form = {nombre:””,peso:””};
MEDS.forEach(function(m){form[m.id]=””;});
QS.forEach(function(q){form[q.id]=0;form[q.id+”_nota”]=””;});
form.notas = “”;

function prog(){
var pb=document.getElementById(“pb”);
var pf=document.getElementById(“pf”);
var sc=document.getElementById(“sc”);
if(step>=1&&step<=TOTAL){
pb.style.display=“block”;
pf.style.width=Math.round(step/TOTAL*100)+”%”;
sc.textContent=step+”/”+TOTAL;
} else {
pb.style.display=“none”;
sc.textContent=””;
}
}

function canGo(){
if(step===1) return form.nombre.trim()!==””&&form.peso.toString().trim()!==””;
if(step>=3&&step<=7) return form[QS[step-3].id]>0;
return true;
}

function render(){
prog();
document.getElementById(“app”).innerHTML=build();
bind();
}

function build(){
if(step===0){
return ‘<div style="text-align:center;padding:8px 0">’+
‘<div class="ico-circle">🏋️</div>’+
‘<h1>CHECK-IN</h1>’+
‘<p class="sub">Tómate unos minutos para registrar tus sensaciones.<br><br>Revisaré cada dato personalmente y ajustaré tu entrenamiento y tu plan en función de cómo estés evolucionando.</p>’+
‘<button class="btn btn-p" id="bn">Empezar →</button>’+
‘</div>’;
}

if(step===1){
var dis=canGo()?””:” disabled”;
return ‘<p class="sec-title">Datos básicos</p>’+
‘<div class="fg"><label>Tu nombre *</label><input type="text" id="fn" placeholder="Nombre y apellido" value="'+form.nombre+'"/></div>’+
‘<div class="fg"><label>Peso actual *</label><input type="number" id="fp" placeholder="ej: 72.5" step="0.1" value="'+form.peso+'"/></div>’+
‘<div class="btn-row"><button class=“btn btn-p” id=“bn”’+dis+’>Siguiente →</button></div>’;
}

if(step===2){
var inputs=””;
MEDS.forEach(function(m){
inputs+=’<div class="fg" style="margin-bottom:0"><label>’+m.label+’ <span style="color:#444">cm</span></label><input type="number" id="fm-'+m.id+'" placeholder="—" step="0.1" value="'+form[m.id]+'"/></div>’;
});
return ‘<p class="sec-title">📏 Medidas corporales</p>’+
‘<div class="grid2">’+inputs+’</div>’+
‘<div class="btn-row" style="margin-top:20px"><button class="btn btn-g" id="bb">← Atrás</button><button class="btn btn-p" id="bn">Siguiente →</button></div>’;
}

if(step>=3&&step<=7){
var q=QS[step-3];
var dis2=canGo()?””:” disabled”;
var btns=””;
for(var n=1;n<=5;n++){
var sel=form[q.id]===n?” sel”:””;
btns+=’<button class="rating-btn'+sel+'" data-val="'+n+'" data-qid="'+q.id+'">’+n+’</button>’;
}
return ‘<p class="q-title">’+q.icon+’ ¿’+q.label+’</p>’+
‘<div class="rating">’+btns+’</div>’+
‘<div class="r-labels"><span>1 — ‘+q.low+’</span><span>5 — ‘+q.high+’</span></div>’+
‘<textarea id="fn2" rows="3" placeholder="Comentario opcional...">’+form[q.id+”_nota”]+’</textarea>’+
‘<div class="btn-row"><button class="btn btn-g" id="bb">← Atrás</button><button class=“btn btn-p” id=“bn”’+dis2+’>Siguiente →</button></div>’;
}

if(step===8){
return ‘<p class="q-title">💬 ¿Algo más que quieras contarme?</p>’+
‘<textarea id="fnotas" rows="5" placeholder="Cómo te has visto, alguna duda, algo que haya cambiado...">’+form.notas+’</textarea>’+
‘<div class="btn-row"><button class="btn btn-g" id="bb">← Atrás</button><button class="btn btn-p" id="bn">Revisar →</button></div>’;
}

if(step===9){
var anyM=MEDS.some(function(m){return form[m.id]!==””;});
var mRows=””;
if(anyM){
mRows+=’<div class="sum-row"><span class="sum-sec">Medidas</span></div>’;
MEDS.forEach(function(m){
if(form[m.id]) mRows+=’<div class="sum-row"><span class="sum-lbl">’+m.label+’</span><span class="sum-val">’+form[m.id]+’ cm</span></div>’;
});
}
var qRows=””;
qRows+=’<div class="sum-row"><span class="sum-sec">Sensaciones</span></div>’;
QS.forEach(function(q,i){
var nota=form[q.id+”_nota”]?’<div class="sum-note">’+form[q.id+”_nota”]+’</div>’:””;
qRows+=’<div class="sum-row"><span class="sum-lbl">’+q.icon+’ ‘+SHORT[i]+’</span><div class="sum-val">’+form[q.id]+’/5’+nota+’</div></div>’;
});
var notaRow=form.notas?’<div class="sum-row"><span class="sum-lbl">💬 Notas</span><span class="sum-val">’+form.notas+’</span></div>’:””;
return ‘<p style="font-size:13px;color:#666;margin-bottom:14px">Revisa tu check-in antes de enviar</p>’+
‘<div class="sum-box">’+
‘<div class="sum-row"><span class="sum-lbl">Cliente</span><span class="sum-val">’+form.nombre+’</span></div>’+
‘<div class="sum-row"><span class="sum-lbl">Fecha</span><span class="sum-val">’+new Date().toLocaleDateString(“es-ES”)+’</span></div>’+
‘<div class="sum-row"><span class="sum-lbl">Peso</span><span class="sum-val">’+form.peso+’ kg</span></div>’+
mRows+qRows+notaRow+
‘</div>’+
‘<div class="btn-row"><button class="btn btn-g" id="bb">← Atrás</button><button class="btn btn-s" id="bsend">✓ Enviar check-in</button></div>’;
}

if(step===10){
return ‘<div style="text-align:center;padding:8px 0">’+
‘<div class="ok-icon">✓</div>’+
‘<h1 style="color:#22c55e;font-family:\'Bebas Neue\',sans-serif;font-size:48px;letter-spacing:3px">ENVIADO</h1>’+
‘<p class="sub" style="margin-top:10px">Ya tengo tus datos. Nos vemos en el próximo entrenamiento. Sigue así 💪</p>’+
‘</div>’;
}
return “”;
}

function collect(){
if(step===1){
form.nombre=document.getElementById(“fn”)&&document.getElementById(“fn”).value||form.nombre;
form.peso=document.getElementById(“fp”)&&document.getElementById(“fp”).value||form.peso;
}
if(step===2){
MEDS.forEach(function(m){
var el=document.getElementById(“fm-”+m.id);
if(el) form[m.id]=el.value;
});
}
if(step>=3&&step<=7){
var el=document.getElementById(“fn2”);
if(el) form[QS[step-3].id+”_nota”]=el.value;
}
if(step===8){
var el2=document.getElementById(“fnotas”);
if(el2) form.notas=el2.value;
}
}

function bind(){
var bn=document.getElementById(“bn”);
var bb=document.getElementById(“bb”);
var bs=document.getElementById(“bsend”);
if(bn) bn.addEventListener(“click”,function(){collect();if(canGo()){step++;render();}});
if(bb) bb.addEventListener(“click”,function(){step–;render();});
if(bs) bs.addEventListener(“click”,send);

document.querySelectorAll(”.rating-btn”).forEach(function(b){
b.addEventListener(“click”,function(){
form[b.dataset.qid]=parseInt(b.dataset.val);
render();
});
});

var fn=document.getElementById(“fn”);
var fp=document.getElementById(“fp”);
if(fn) fn.addEventListener(“input”,function(){form.nombre=fn.value;var nb=document.getElementById(“bn”);if(nb)nb.disabled=!canGo();});
if(fp) fp.addEventListener(“input”,function(){form.peso=fp.value;var nb=document.getElementById(“bn”);if(nb)nb.disabled=!canGo();});
}

function send(){
collect();
var btn=document.getElementById(“bsend”);
btn.textContent=“Enviando…”;
btn.disabled=true;
var p=new URLSearchParams({
fecha:new Date().toLocaleDateString(“es-ES”),
nombre:form.nombre,peso:form.peso,
cuello:form.cuello,brazo:form.brazo,antebrazo:form.antebrazo,
abdomen:form.abdomen,cadera:form.cadera,muslo:form.muslo,pantorrilla:form.pantorrilla,
sensaciones:form.sensaciones,sensaciones_nota:form.sensaciones_nota,
adherencia:form.adherencia,adherencia_nota:form.adherencia_nota,
sueno:form.sueno,sueno_nota:form.sueno_nota,
energia:form.energia,energia_nota:form.energia_nota,
molestias:form.molestias,molestias_nota:form.molestias_nota,
notas:form.notas
});
fetch(SCRIPT_URL+”?”+p,{method:“GET”,mode:“no-cors”}).catch(function(){}).finally(function(){
step=10;render();
});
}

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Check-in - JC Training Works</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{   font-family:-apple-system,BlinkMacSystemFont,sans-serif;   background:#000000;   color:#f0f0f0;   min-height:100dvh;   display:flex;   justify-content:center;   padding:14px 16px; }
.card{   background:#000000;   border:2px solid rgba(30,144,255,.28);   box-shadow:0 0 25px rgba(30,144,255,.08);   border-radius:20px;   padding:18px 24px 22px;   width:100%;   max-width:420px;   margin:auto 0; }
.hdr{display:flex;align-items:center;gap:8px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #2e2e2e}
.logo{font-size:13px;font-weight:600;color:#a0a0a0;letter-spacing:.5px}
.sc{margin-left:auto;font-size:12px;color:#666}
#pb{height:3px;background:#2e2e2e;border-radius:99px;margin-bottom:28px;overflow:hidden;display:none}
#pf{height:100%;background:#4f9cf9;border-radius:99px;transition:width .3s}
h1.title{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;line-height:1;margin-bottom:10px;color:#f0f0f0}
.sub{font-size:14px;color:#888;line-height:1.7;margin-bottom:28px}
label{display:block;font-size:13px;color:#888;margin-bottom:8px}
input,textarea{width:100%;padding:15px 16px;border-radius:10px;border:1px solid #2e2e2e;background:#0a0a0a;color:#f0f0f0;font-size:15px;font-family:inherit;outline:none}
input:focus,textarea:focus{border-color:#4f9cf9}
textarea{resize:none}
.stitle{font-size:15px;font-weight:600;color:#f0f0f0;margin-bottom:18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.qtitle{font-size:16px;font-weight:500;color:#f0f0f0;margin-bottom:24px;line-height:1.4}
.stars{display:flex;gap:10px;justify-content:center;margin-bottom:10px}
.star{width:52px;height:52px;border-radius:50%;border:1px solid #2e2e2e;background:#0a0a0a;color:#888;font-size:17px;font-weight:600;cursor:pointer}
.star.on{background:#1a3a5c;border-color:#4f9cf9;color:#4f9cf9}
.rlbl{display:flex;justify-content:space-between;font-size:11px;color:#555;margin-bottom:20px}
.btn{   width:100%;   padding:16px;   border-radius:14px;   font-size:16px;   font-weight:700;   cursor:pointer;   border:none; }
.bp{   background:linear-gradient(135deg,#1e90ff,#1877f2);   color:#fff;   transition:all .25s ease; }  .bp:hover{   transform:translateY(-2px);   box-shadow:0 8px 20px rgba(30,144,255,.35); }
.bs{background:#22c55e;color:#fff}
.bg{background:#222;color:#aaa;border:1px solid #2e2e2e}
.btn:disabled{opacity:.35;cursor:not-allowed}
.brow{display:flex;gap:10px;margin-top:20px}
.sbox{background:#0a0a0a;border:1px solid #222;border-radius:14px;padding:0 16px;margin-bottom:20px}
.srow{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:1px solid #1e1e1e;font-size:13px}
.srow:last-child{border-bottom:none}
.sl{color:#666}
.sv{color:#f0f0f0;font-weight:500;text-align:right;max-width:55%}
.sn{font-size:11px;color:#555;margin-top:2px}
.ssec{font-size:11px;color:#4f9cf9;text-transform:uppercase;letter-spacing:.8px;padding:14px 0 6px;font-weight:600}
.okicon{width:68px;height:68px;border-radius:50%;background:#14532d;border:1px solid #22c55e;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px}
.icircle{width:56px;height:56px;border-radius:50%;background:#0a0a0a;border:1px solid #222;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px}
.fg{margin-bottom:16px}
#err{background:#5c1a1a;color:#fca5a5;padding:12px;border-radius:10px;font-size:12px;margin-top:12px;word-break:break-all;display:none}
</style>
</head>
<body>
<div class="card">
  <span class="sc" id="sc" style="display:block;text-align:right;font-size:12px;color:#666;margin-bottom:8px"></span>
  <div id="pb"><div id="pf"></div></div>
  <div id="app"></div>
  <div id="err"></div>
</div>
<script>
try {

var URL2 = "https://script.google.com/macros/s/AKfycbyafv8QBYJQ8FX6QwGqZMKxZjqXvcPvSTVOCmnb5z2nKVJ45hjREh9dw2Jmj8Wz6QQF/exec";
var TOTAL = 9;

var QS = [
  {id:"sensaciones", lbl:"¿Como te has sentido esta semana en general?", ico:"😊", lo:"Fatal",       hi:"Excelente"},
  {id:"adherencia",  lbl:"¿Como has seguido la dieta?",                  ico:"🥗", lo:"Nula",        hi:"Perfecta"},
  {id:"sueño",       lbl:"¿Como ha sido la calidad de tu sueño?",        ico:"🌙", lo:"Pesimo",      hi:"Excelente"},
  {id:"energia",     lbl:"¿Cual ha sido tu nivel de energia?",           ico:"⚡", lo:"Sin energia", hi:"Altisima"},
  {id:"molestias",   lbl:"¿Has tenido dolores o molestias fisicas?",     ico:"🩺", lo:"Mucho dolor", hi:"Sin molestias"}
];
var QSHORT = ["Sensaciones","Dieta","sueño","Energia","Molestias"];

var MEDS = [
  {id:"cuello",     lbl:"Cuello"},
  {id:"brazo",      lbl:"Brazo"},
  {id:"antebrazo",  lbl:"Antebrazo"},
  {id:"abdomen",    lbl:"Abdomen"},
  {id:"cadera",     lbl:"Cadera/Nalgas"},
  {id:"muslo",      lbl:"Muslo"},
  {id:"pantorrilla",lbl:"Pantorrilla"}
];

var step = 0;
var form = {nombre:"", peso:""};
for (var mi = 0; mi < MEDS.length; mi++) { form[MEDS[mi].id] = ""; }
for (var qi = 0; qi < QS.length; qi++) { form[QS[qi].id] = 0; form[QS[qi].id + "_nota"] = ""; }
form.notas = "";

function prog() {
  var pb = document.getElementById("pb");
  var pf = document.getElementById("pf");
  var sc = document.getElementById("sc");
  if (step >= 1 && step <= TOTAL) {
    pb.style.display = "block";
    pf.style.width = Math.round(step / TOTAL * 100) + "%";
    sc.textContent = step + "/" + TOTAL;
  } else {
    pb.style.display = "none";
    sc.textContent = "";
  }
}

function canGo() {
  if (step === 1) return form.nombre.trim() !== "" && String(form.peso).trim() !== "";
  if (step >= 3 && step <= 7) return form[QS[step - 3].id] > 0;
  return true;
}

function h(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function build() {
  var dis = canGo() ? "" : " disabled";

 if (step === 0) {
  return '<div style="text-align:center;padding:8px 0">' +
    '<img src="../banner_v3.png" style="width:calc(100% + 48px);margin:-36px -24px 20px -24px;border-radius:20px 20px 0 0;display:block;">' +
    '<h1 class="title">CHECK-IN</h1>' +
    '<p class="sub">Tómate unos minutos para registrar tus sensaciones.<br><br>' +
    'Revisaré cada dato personalmente y ajustaré tu entrenamiento y tu plan en función de cómo estés evolucionando.</p>' +
    '<button class="btn bp" id="bn">Empezar &#8594;</button>' +
    '</div>';
}

  if (step === 1) {
    return '<p class="stitle">Datos básicos</p>' +
      '<div class="fg"><label>Tu nombre *</label>' +
      '<input type="text" id="fn" placeholder="Nombre y apellido" value="' + h(form.nombre) + '"/></div>' +
      '<div class="fg"><label>Peso actual *</label>' +
      '<input type="text" inputmode="decimal" id="fp" placeholder="ej: 72.5" value="' + h(form.peso) + '"/></div>' +
      '<div class="brow"><button class="btn bp" id="bn"' + dis + '>Siguiente &#8594;</button></div>';
  }

  if (step === 2) {
    var inp = "";
    for (var i = 0; i < MEDS.length; i++) {
      inp += '<div class="fg" style="margin-bottom:0"><label>' + MEDS[i].lbl + ' <span style="color:#444">cm</span></label>' +
       '<input type="text" inputmode="decimal" id="fm' + i + '" placeholder="&#8212;" value="' + h(form[MEDS[i].id]) + '"/></div>';
    }

    return '<p class="stitle">&#128207; Medidas corporales</p>' +
      '<div class="grid">' + inp + '</div>' +
      '<div class="brow" style="margin-top:20px">' +
      '<button class="btn bg" id="bb">&#8592; Atrás</button>' +
      '<button class="btn bp" id="bn">Siguiente &#8594;</button></div>';
  }

  if (step >= 3 && step <= 7) {
    var q = QS[step - 3];
    var btns = "";

    for (var n = 1; n <= 5; n++) {
      var cls = form[q.id] === n ? ' on' : '';
      btns += '<button class="star' + cls + '" data-n="' + n + '" data-id="' + q.id + '">' + n + '</button>';
    }

    return '<p class="qtitle">' + q.ico + ' ' + q.lbl + '</p>' +
      '<div class="stars">' + btns + '</div>' +
      '<div class="rlbl"><span>1 &#8212; ' + q.lo + '</span><span>5 &#8212; ' + q.hi + '</span></div>' +
      '<textarea id="fnt" rows="3" placeholder="Comentario opcional...">' + h(form[q.id + "_nota"]) + '</textarea>' +
      '<div class="brow">' +
      '<button class="btn bg" id="bb">&#8592; Atrás</button>' +
      '<button class="btn bp" id="bn"' + dis + '>Siguiente &#8594;</button></div>';
  }

  if (step === 8) {
    return '<p class="qtitle">&#128172; Algo mas que quieras contarme?</p>' +
      '<textarea id="fnotas" rows="5" placeholder="Como te has visto, alguna duda, algo que haya cambiado...">' + h(form.notas) + '</textarea>' +
      '<div class="brow">' +
      '<button class="btn bg" id="bb">&#8592; Atrás</button>' +
      '<button class="btn bp" id="bn">Revisar &#8594;</button></div>';
  }

  if (step === 9) {
    var anyM = false;

    for (var mi2 = 0; mi2 < MEDS.length; mi2++) {
      if (form[MEDS[mi2].id]) {
        anyM = true;
        break;
      }
    }

    var mrows = "";

    if (anyM) {
      mrows = '<div class="srow"><span class="ssec">Medidas</span></div>';

      for (var mi3 = 0; mi3 < MEDS.length; mi3++) {
        if (form[MEDS[mi3].id]) {
          mrows += '<div class="srow"><span class="sl">' + MEDS[mi3].lbl + '</span><span class="sv">' + h(form[MEDS[mi3].id]) + ' cm</span></div>';
        }
      }
    }

    var qrows = '<div class="srow"><span class="ssec">Sensaciones</span></div>';

    for (var qi2 = 0; qi2 < QS.length; qi2++) {
      var nota = form[QS[qi2].id + "_nota"]
        ? '<div class="sn">' + h(form[QS[qi2].id + "_nota"]) + '</div>'
        : '';

      qrows += '<div class="srow"><span class="sl">' + QS[qi2].ico + ' ' + QSHORT[qi2] + '</span>' +
        '<div class="sv">' + form[QS[qi2].id] + '/5' + nota + '</div></div>';
    }

    var nrow = form.notas
      ? '<div class="srow"><span class="sl">Notas</span><span class="sv">' + h(form.notas) + '</span></div>'
      : '';

    return '<p style="font-size:13px;color:#666;margin-bottom:14px">Revisa tu check-in antes de enviar</p>' +
      '<div class="sbox">' +
      '<div class="srow"><span class="sl">Cliente</span><span class="sv">' + h(form.nombre) + '</span></div>' +
      '<div class="srow"><span class="sl">Fecha</span><span class="sv">' + new Date().toLocaleDateString("es-ES") + '</span></div>' +
      '<div class="srow"><span class="sl">Peso</span><span class="sv">' + h(form.peso) + ' kg</span></div>' +
      mrows + qrows + nrow +
      '</div>' +
      '<div class="brow">' +
      '<button class="btn bg" id="bb">&#8592; Atrás</button>' +
      '<button class="btn bs" id="bsend">&#10003; Enviar check-in</button></div>';
  }

  if (step === 10) {
    return '<div style="text-align:center;padding:8px 0">' +
      '<div class="okicon">&#10003;</div>' +
      '<h1 class="title" style="color:#22c55e">ENVIADO</h1>' +
      '<p class="sub" style="margin-top:10px">Ya tengo tus datos. Nos vemos en el próximo entrenamiento. Sigue así &#128170;</p>' +
      '</div>';
  }

  return '<p style="color:red">Error: step desconocido ' + step + '</p>';
}

function collect() {
  if (step === 1) {
    var fn = document.getElementById("fn");
    var fp = document.getElementById("fp");
    if (fn) form.nombre = fn.value;
    if (fp) form.peso = fp.value;
  }
  if (step === 2) {
    for (var i = 0; i < MEDS.length; i++) {
      var el = document.getElementById("fm" + i);
      if (el) form[MEDS[i].id] = el.value;
    }
  }
  if (step >= 3 && step <= 7) {
    var fnt = document.getElementById("fnt");
    if (fnt) form[QS[step - 3].id + "_nota"] = fnt.value;
  }
  if (step === 8) {
    var fnotas = document.getElementById("fnotas");
    if (fnotas) form.notas = fnotas.value;
  }
}

function bind() {
  var bn = document.getElementById("bn");
  var bb = document.getElementById("bb");
  var bsend = document.getElementById("bsend");

  if (bn) {
    bn.onclick = function() {
      collect();
      if (canGo()) { step++; render(); }
    };
  }
  if (bb) {
    bb.onclick = function() { step--; render(); };
  }
  if (bsend) {
    bsend.onclick = send;
  }

  var stars = document.querySelectorAll(".star");
  for (var i = 0; i < stars.length; i++) {
    (function(btn) {
      btn.onclick = function() {
        form[btn.getAttribute("data-id")] = parseInt(btn.getAttribute("data-n"));
        render();
      };
    })(stars[i]);
  }

  var fn = document.getElementById("fn");
  var fp = document.getElementById("fp");
  if (fn) {
    fn.oninput = function() {
      form.nombre = fn.value;
      var nb = document.getElementById("bn");
      if (nb) nb.disabled = !canGo();
    };
  }
  if (fp) {
    fp.oninput = function() {
      form.peso = fp.value;
      var nb = document.getElementById("bn");
      if (nb) nb.disabled = !canGo();
    };
  }
}

function render() {
  prog();
  document.getElementById("app").innerHTML = build();
  bind();
}

function send() {
  collect();
  var btn = document.getElementById("bsend");
  if (btn) { btn.textContent = "Enviando..."; btn.disabled = true; }
  var p = "fecha=" + encodeURIComponent(new Date().toLocaleDateString("es-ES")) +
    "&nombre=" + encodeURIComponent(form.nombre) +
    "&peso=" + encodeURIComponent(form.peso) +
    "&cuello=" + encodeURIComponent(form.cuello) +
    "&brazo=" + encodeURIComponent(form.brazo) +
    "&antebrazo=" + encodeURIComponent(form.antebrazo) +
    "&abdomen=" + encodeURIComponent(form.abdomen) +
    "&cadera=" + encodeURIComponent(form.cadera) +
    "&muslo=" + encodeURIComponent(form.muslo) +
    "&pantorrilla=" + encodeURIComponent(form.pantorrilla) +
    "&sensaciones=" + encodeURIComponent(form.sensaciones) +
    "&sensaciones_nota=" + encodeURIComponent(form.sensaciones_nota) +
    "&adherencia=" + encodeURIComponent(form.adherencia) +
    "&adherencia_nota=" + encodeURIComponent(form.adherencia_nota) +
    "&sueño=" + encodeURIComponent(form.sueño) +
    "&sueño_nota=" + encodeURIComponent(form.sueño_nota) +
    "&energia=" + encodeURIComponent(form.energia) +
    "&energia_nota=" + encodeURIComponent(form.energia_nota) +
    "&molestias=" + encodeURIComponent(form.molestias) +
    "&molestias_nota=" + encodeURIComponent(form.molestias_nota) +
    "&notas=" + encodeURIComponent(form.notas);

  var xhr = new XMLHttpRequest();
  xhr.open("GET", URL2 + "?" + p, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) { step = 10; render(); }
  };
  xhr.onerror = function() { step = 10; render(); };
  xhr.send();
}

render();

} catch(e) {
  var errDiv = document.getElementById("err");
  if (errDiv) { errDiv.style.display = "block"; errDiv.textContent = "ERROR JS: " + e.message + " (linea " + e.lineNumber + ")"; }
}
</script>
</body>
</html>

<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Check-in · JC Training Works</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px 48px;
  }
  .card {
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 420px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #2e2e2e;
  }
  .header-logo { font-size: 13px; font-weight: 600; color: #a0a0a0; letter-spacing: 0.5px; }
  .header-step { margin-left: auto; font-size: 12px; color: #666; }
  .progress-bar { height: 3px; background: #2e2e2e; border-radius: 99px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; background: #4f9cf9; border-radius: 99px; transition: width 0.3s ease; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; color: #f0f0f0; }
  p.sub { font-size: 14px; color: #888; line-height: 1.7; margin-bottom: 28px; }
  label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; }
  input[type=text], input[type=number], textarea {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    border: 1px solid #2e2e2e; background: #111;
    color: #f0f0f0; font-size: 15px; font-family: inherit;
    outline: none; transition: border 0.2s;
  }
  input:focus, textarea:focus { border-color: #4f9cf9; }
  textarea { resize: none; margin-top: 4px; }
  .section-title { font-size: 15px; font-weight: 600; color: #f0f0f0; margin-bottom: 18px; }
  .medidas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 4px; }
  .question-title { font-size: 16px; font-weight: 500; color: #f0f0f0; margin-bottom: 24px; line-height: 1.4; }
  .rating { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
  .rating button {
    width: 52px; height: 52px; border-radius: 50%;
    border: 1px solid #2e2e2e; background: #111;
    color: #888; font-size: 17px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .rating button.sel { background: #1a3a5c; border-color: #4f9cf9; color: #4f9cf9; }
  .rating-labels { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-bottom: 20px; padding: 0 2px; }
  .btn { width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.2s, transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #4f9cf9; color: #fff; }
  .btn-success { background: #22c55e; color: #fff; }
  .btn-ghost { background: #222; color: #aaa; border: 1px solid #2e2e2e; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .summary-box { background: #111; border: 1px solid #2e2e2e; border-radius: 14px; padding: 0 16px; margin-bottom: 20px; }
  .summary-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid #1e1e1e; font-size: 13px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-label { color: #666; }
  .summary-value { color: #f0f0f0; font-weight: 500; text-align: right; max-width: 55%; }
  .summary-note { font-size: 11px; color: #555; margin-top: 2px; }
  .summary-section { font-size: 11px; color: #4f9cf9; text-transform: uppercase; letter-spacing: 0.8px; padding: 14px 0 6px; font-weight: 600; }
  .success-icon { width: 68px; height: 68px; border-radius: 50%; background: #14532d; border: 1px solid #22c55e; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 20px; }
  .icon-circle { width: 56px; height: 56px; border-radius: 50%; background: #111; border: 1px solid #2e2e2e; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 18px; }
  .field-group { margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <span>🏋️</span>
    <span class="header-logo">JC TRAINING WORKS</span>
    <span class="header-step" id="step-counter"></span>
  </div>
  <div class="progress-bar" id="progress-bar" style="display:none">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div id="content"></div>
</div>

<script>
// Steps: 0=bienvenida | 1=datos+peso | 2=medidas | 3-7=preguntas | 8=notas | 9=resumen | 10=éxito
const TOTAL = 9;

const QUESTIONS = [
  { id:"sensaciones", label:"¿Cómo te has sentido esta semana en general?", icon:"😊", low:"Fatal",       high:"Excelente"     },
  { id:"adherencia",  label:"¿Cómo has seguido la dieta?",                 icon:"🥗", low:"Nula",        high:"Perfecta"      },
  { id:"sueno",       label:"¿Cómo ha sido la calidad de tu sueño?",       icon:"🌙", low:"Pésimo",      high:"Excelente"     },
  { id:"energia",     label:"¿Cuál ha sido tu nivel de energía?",          icon:"⚡", low:"Sin energía", high:"Altísima"      },
  { id:"molestias",   label:"¿Has tenido dolores o molestias físicas?",    icon:"🩺", low:"Mucho dolor", high:"Sin molestias" },
];
const SHORT = ["Sensaciones","Dieta","Sueño","Energía","Molestias"];

const MEDIDAS = [
  { id:"cuello",     label:"Cuello"          },
  { id:"brazo",      label:"Brazo"           },
  { id:"antebrazo",  label:"Antebrazo"       },
  { id:"abdomen",    label:"Abdomen"         },
  { id:"cadera",     label:"Cadera / Nalgas" },
  { id:"muslo",      label:"Muslo"           },
  { id:"pantorrilla",label:"Pantorrilla"     },
];

let step = 0;
let form = { nombre:"", peso:"" };
MEDIDAS.forEach(m => form[m.id] = "");
QUESTIONS.forEach(q => { form[q.id]=0; form[q.id+"_nota"]=""; });
form.notas = "";

function setProgress() {
  const bar  = document.getElementById("progress-bar");
  const fill = document.getElementById("progress-fill");
  const ctr  = document.getElementById("step-counter");
  if (step >= 1 && step <= TOTAL) {
    bar.style.display = "block";
    fill.style.width  = Math.round(step/TOTAL*100)+"%";
    ctr.textContent   = step+"/"+TOTAL;
  } else {
    bar.style.display = "none";
    ctr.textContent   = "";
  }
}

function canProceed() {
  if (step===1) return form.nombre.trim()!=="" && form.peso.toString().trim()!=="";
  if (step>=3 && step<=7) return form[QUESTIONS[step-3].id] > 0;
  return true;
}

function render() {
  setProgress();
  document.getElementById("content").innerHTML = buildStep();
  attachEvents();
}

function buildStep() {
  // 0 — Bienvenida
  if (step===0) return `
    <div style="text-align:center;padding:8px 0">
      <div class="icon-circle">🏋️</div>
      <h1 style="font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;text-transform:uppercase;line-height:1">CHECK-IN</h1>
      <p class="sub">Tómate unos minutos para registrar tus sensaciones.<br><br>Revisaré cada dato personalmente y ajustaré tu entrenamiento y tu plan en función de cómo estés evolucionando.</p>
      <button class="btn btn-primary" id="btn-next">Empezar →</button>
    </div>`;

  // 1 — Nombre y peso
  if (step===1) return `
    <p class="section-title">Datos básicos</p>
    <div class="field-group">
      <label>Tu nombre *</label>
      <input type="text" id="f-nombre" placeholder="Nombre y apellido" value="${form.nombre}" />
    </div>
    <div class="field-group">
      <label>Peso actual *</label>
      <input type="number" id="f-peso" placeholder="ej: 72.5" step="0.1" value="${form.peso}" />
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-next" ${canProceed()?'':'disabled'}>Siguiente →</button>
    </div>`;

  // 2 — Medidas corporales
  if (step===2) return `
    <p class="section-title">📏 Medidas corporales</p>
    <div class="medidas-grid">
      ${MEDIDAS.map(m => `
        <div class="field-group" style="margin-bottom:0">
          <label>${m.label} <span style="color:#444">cm</span></label>
          <input type="number" id="f-${m.id}" placeholder="—" step="0.1" value="${form[m.id]}" />
        </div>`).join('')}
    </div>
    <div class="btn-row" style="margin-top:20px">
      <button class="btn btn-ghost" id="btn-back">← Atrás</button>
      <button class="btn btn-primary" id="btn-next">Siguiente →</button>
    </div>`;

  // 3–7 — Preguntas 1-5
  if (step>=3 && step<=7) {
    const q    = QUESTIONS[step-3];
    const val  = form[q.id];
    const nota = form[q.id+"_nota"];
    const btns = [1,2,3,4,5].map(n =>
      `<button class="rating-btn ${val===n?'sel':''}" data-val="${n}" data-qid="${q.id}">${n}</button>`
    ).join("");
    return `
      <p class="question-title">${q.icon} ${q.label}</p>
      <div class="rating">${btns}</div>
      <div class="rating-labels"><span>1 — ${q.low}</span><span>5 — ${q.high}</span></div>
      <textarea id="f-nota-${q.id}" rows="3" placeholder="Comentario opcional...">${nota}</textarea>

```
  <div class="btn-row">
    <button class="btn btn-ghost" id="btn-back">← Atrás</button>
    <button class="btn btn-primary" id="btn-next" ${canProceed()?'':'disabled'}>Siguiente →</button>
  </div>`;
```

}

// 8 — Notas libres
if (step===8) return ` <p class="question-title">💬 ¿Algo más que quieras contarme?</p> <textarea id="f-notas" rows="5" placeholder="Cómo te has visto, alguna duda, algo que haya cambiado...">${form.notas}</textarea> <div class="btn-row"> <button class="btn btn-ghost" id="btn-back">← Atrás</button> <button class="btn btn-primary" id="btn-next">Revisar →</button> </div>`;

// 9 — Resumen
if (step===9) {
const anyMedida = MEDIDAS.some(m => form[m.id]);
return `<p style="font-size:13px;color:#666;margin-bottom:14px">Revisa tu check-in antes de enviar</p> <div class="summary-box"> <div class="summary-row"><span class="summary-label">Cliente</span><span class="summary-value">${form.nombre}</span></div> <div class="summary-row"><span class="summary-label">Fecha</span><span class="summary-value">${new Date().toLocaleDateString('es-ES')}</span></div> ${form.peso ?`<div class="summary-row"><span class="summary-label">Peso</span><span class="summary-value">${form.peso} kg</span></div>`: ''} ${anyMedida ?`
<div class="summary-row"><span class="summary-section">Medidas</span></div>
${MEDIDAS.filter(m=>form[m.id]).map(m=>` <div class="summary-row"> <span class="summary-label">${m.label}</span> <span class="summary-value">${form[m.id]} cm</span> </div>`).join(’’)}`: ''} <div class="summary-row"><span class="summary-section">Sensaciones</span></div> ${QUESTIONS.map((q,i) =>`
<div class="summary-row">
<span class="summary-label">${q.icon} ${SHORT[i]}</span>
<div class="summary-value">${form[q.id]}/5${form[q.id+”_nota”]?`<div class="summary-note">${form[q.id+"_nota"]}</div>`:’’}</div>
</div>`).join('')} ${form.notas ? `<div class="summary-row"><span class="summary-label">💬 Notas</span><span class="summary-value">${form.notas}</span></div>` : ''} </div> <div class="btn-row"> <button class="btn btn-ghost" id="btn-back">← Atrás</button> <button class="btn btn-success" id="btn-send">✓ Enviar check-in</button> </div>`;
}

// 10 — Éxito
if (step===10) return ` <div style="text-align:center;padding:8px 0"> <div class="success-icon">✓</div> <h1 style="color:#22c55e">¡Check-in enviado!</h1> <p class="sub" style="margin-top:10px">Ya tengo tus datos. Nos vemos en el próximo entrenamiento. Sigue así 💪</p> </div>`;
}

function attachEvents() {
document.getElementById(“btn-next”)?.addEventListener(“click”, () => {
collectCurrent();
if (canProceed()) { step++; render(); }
});
document.getElementById(“btn-back”)?.addEventListener(“click”, () => { step–; render(); });
document.getElementById(“btn-send”)?.addEventListener(“click”, sendForm);

document.querySelectorAll(”.rating-btn”).forEach(btn => {
btn.addEventListener(“click”, () => {
form[btn.dataset.qid] = parseInt(btn.dataset.val);
render();
});
});

document.getElementById(“f-nombre”)?.addEventListener(“input”, e => {
form.nombre = e.target.value;
const nb = document.getElementById(“btn-next”);
if (nb) nb.disabled = !canProceed();
});
document.getElementById(“f-peso”)?.addEventListener(“input”, e => {
form.peso = e.target.value;
const nb = document.getElementById(“btn-next”);
if (nb) nb.disabled = !canProceed();
});
}

function collectCurrent() {
if (step===1) {
form.nombre = document.getElementById(“f-nombre”)?.value || form.nombre;
form.peso   = document.getElementById(“f-peso”)?.value   || form.peso;
}
if (step===2) {
MEDIDAS.forEach(m => {
form[m.id] = document.getElementById(“f-”+m.id)?.value || “”;
});
}
if (step>=3 && step<=7) {
const q = QUESTIONS[step-3];
form[q.id+”_nota”] = document.getElementById(“f-nota-”+q.id)?.value || “”;
}
if (step===8) {
form.notas = document.getElementById(“f-notas”)?.value || “”;
}
}

async function sendForm() {
collectCurrent();
const btn = document.getElementById(“btn-send”);
btn.textContent = “Enviando…”;
btn.disabled = true;

const SCRIPT_URL = “https://script.google.com/macros/s/AKfycbyafv8QBYJQ8FX6QwGqZMKxZjqXvcPvSTVOCmnb5z2nKVJ45hjREh9dw2Jmj8Wz6QQF/exec”;
const params = new URLSearchParams({
fecha: new Date().toLocaleDateString(“es-ES”),
nombre: form.nombre, peso: form.peso,
cuello: form.cuello, brazo: form.brazo, antebrazo: form.antebrazo,
abdomen: form.abdomen, cadera: form.cadera, muslo: form.muslo, pantorrilla: form.pantorrilla,
sensaciones: form.sensaciones, sensaciones_nota: form.sensaciones_nota,
adherencia: form.adherencia,   adherencia_nota:  form.adherencia_nota,
sueno: form.sueno,             sueno_nota:       form.sueno_nota,
energia: form.energia,         energia_nota:     form.energia_nota,
molestias: form.molestias,     molestias_nota:   form.molestias_nota,
notas: form.notas
});

try { await fetch(SCRIPT_URL+”?”+params, { method:“GET”, mode:“no-cors” }); } catch(e){}
step = 10; render();
}

render();
</script>

</body>
</html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --surface:  #161616;
      --card:     #1e1e1e;
      --border:   #2a2a2a;
      --accent:   #1e90ff;

    html {

    }

    body {
      background: #0d0d0d;

      font-family: 'DM Sans', sans-serif;

    /* ── SCROLLBAR ── */

    /* ── LAYOUT ── */
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }

    /* ── HEADER ── */
    .site-header {
      display: flex; align-items: center; gap: 14px;
      padding: 22px 24px;
      background: var(--surface);

      position: sticky; top: 0; z-index: 50;
    }
    .logo-mark {
      width: 40px; height: 40px; border-radius: 8px;

    .site-name { font-family:'Bebas Neue'; font-size: 22px; letter-spacing: .04em; color: var(--text); }

    .btn-primary  { background: var(--accent);  color: #000; }

    .btn-danger   { background: #2a1515; color: var(--accent2); border: 1px solid #3a1515; }
    .btn-danger:hover   { background: #3a1515; }

    .btn-sm { padding: 6px 12px; font-size: 13px; }

    /* ── INPUTS ── */
    input, select, textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 9px 12px;
      font-family: 'DM Sans';
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border .15s;

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─────────────── STORAGE ─────────────── */
const STORAGE_KEY = 'jctraining_v2';
const TRAINER_PASSWORD = 'JCTrainer2025';

// Función para asegurar que no se pierdan datos al actualizar código
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return {
    clients: [
      {
        id: 'c1', name: 'Adrián López', plan: 'ELITE',
        code: 'ADR149', createdAt: '2025-01-10',
        routines: [
          {
            id: 'r1', name: 'Empuje A', exercises: [
              { id: 'e1', name: 'Press Banca', sets: 4, reps: '6-8', rir: 2, notes: 'Bajar controlado 2s' },
              { id: 'e2', name: 'Press Inclinado Mancuernas', sets: 3, reps: '8-10', rir: 2, notes: '' },
              { id: 'e3', name: 'Aperturas Cable', sets: 3, reps: '12-15', rir: 1, notes: 'Contracción completa' },
            ]
          }
        ],
        sessions: []
      }
    ]
  };
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function generateCode(name, plan) {
  const prefix = name.trim().substring(0, 3).toUpperCase().replace(/\s/g, 'X');
  const price = plan === 'ELITE' ? '149' : plan === 'PREMIUM' ? '099' : '070';
  return prefix + price;
}

function generateId() {
  return Math.random().toString(36).slice(2, 9);
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

/* ─────────────── CHART COMPONENT ─────────────── */
function ProgressChart({ sessions, exerciseId, exerciseName }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  const data = sessions
    .filter(s => s.weights && s.weights[exerciseId] && !isNaN(parseFloat(s.weights[exerciseId])))
    .sort((a, b) => a.date.localeCompare(b.date))
    .map(s => ({ date: s.date, weight: parseFloat(s.weights[exerciseId]) }));

  useEffect(() => {
    if (!canvasRef.current || data.length < 1) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: {
        labels: data.map(d => formatDate(d.date)),
        datasets: [{
          label: 'kg',
          data: data.map(d => d.weight),
          borderColor: '#1e90ff',
          backgroundColor: 'rgba(30,144,255,0.1)',
          borderWidth: 2,
          pointBackgroundColor: '#1e90ff',
          pointRadius: 4,
          fill: true,
          tension: 0.35,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#2a2a2a' }, ticks: { color: '#888', font: { size: 11 } } },
          y: { grid: { color: '#2a2a2a' }, ticks: { color: '#888', font: { size: 11 } } }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(data)]);

  if (data.length < 2) return <p className="text-muted text-sm">Necesitas al menos 2 sesiones para ver gráfica.</p>;
  return <div className="chart-wrap"><canvas ref={canvasRef} /></div>;
}

/* ─────────────── PANTALLAS DE ACCESO ─────────────── */
function ClientHome({ onStartLogin }) {
  return (
    <div className="center-screen">
      <div className="login-box" onClick={onStartLogin}>
        <span className="choice-icon-pro">💪</span>
        <span className="main-text-pro">ACCEDER A MI PLAN</span>
        <span className="sub-text-pro">JC Training Works</span>
      </div>
    </div>
  );
}

const WORKER_URL = 'https://jc-training-notion.jctrainingworks.workers.dev';
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyDnEX2CTTSv6XhNmtDtrj8IxzIj6O4-zeU3ZSO1US8-R7n2EFN5KaNOHK-gQ9sV4E2/exec';

/* ─────────────── VISTA LOGIN CLIENTE ─────────────── */
function ClientLogin({ onSuccess, onBack }) {
  const [code, setCode] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
  if (!code) return;

  setLoading(true);
  setError('');

  try {
    const res = await fetch(`${SCRIPT_URL}?action=clientes`);
    const data = await res.json();
    console.log(data);

    console.log('🔍 Login response:', JSON.stringify(data));

    const cliente = data.clientes.find(
  c => (c.codigo || '').trim().toUpperCase() === code.toUpperCase()
);

if (!cliente) {
  setError('Código no encontrado. Contacta con tu entrenador.');
  return;
}

onSuccess(cliente);
    

  } catch (err) {
    setError('Error de conexión. Inténtalo de nuevo.');
  } finally {
    setLoading(false);
  }
};
  return (
    <div className="center-screen">
      <div className="login-box">
        <span className="choice-icon-pro">🔥</span>
        <span className="main-text-pro">¡A ENTRENAR!</span>
        <span className="sub-text-pro">JC Training Works</span>

        <input
          value={code}
          onChange={e => { setCode(e.target.value.toUpperCase()); setError(''); }}
          onKeyDown={e => e.key === 'Enter' && handleLogin()}
          placeholder="EJ: PEPE2025"
          autoFocus
          disabled={loading}
          style={{
            marginTop: '28px',
            textAlign: 'center',
            fontSize: '20px',
            fontFamily: 'Bebas Neue',
            letterSpacing: '3px',
            padding: '14px',
            background: '#0d0d0d',
            border: '1px solid rgba(30,144,255,0.4)',
            borderRadius: '10px',
            color: '#fff',
            width: '100%',
          }}
        />
        {error && <div style={{color:'#ff4d4d', fontSize:'13px', marginTop:'10px'}}>{error}</div>}

        <button
          onClick={handleLogin}
          disabled={loading}
          style={{
            marginTop: '16px',
            width: '100%',
            padding: '14px',
            background: '#1e90ff',
            color: '#fff',
            border: 'none',
            borderRadius: '10px',
            fontFamily: 'Bebas Neue',
            fontSize: '20px',
            letterSpacing: '2px',
            cursor: loading ? 'not-allowed' : 'pointer',
            opacity: loading ? 0.7 : 1,
          }}
        >
          {loading ? 'VERIFICANDO...' : 'ENTRAR'}
        </button>

        <div onClick={onBack} style={{marginTop:'20px', color:'#555', fontSize:'13px', cursor:'pointer'}}>
          ← Volver al inicio
        </div>
      </div>
    </div>
  );
}

/* ─────────────── TRAINER PANEL ─────────────── */
function TrainerPanel({ onLogout }) {
  const [data, setData] = useState(loadData);
  const [tab, setTab] = useState('clients');
  const [selectedClient, setSelectedClient] = useState(null);
  function update(fn) {
    setData(prev => {
      const next = fn(JSON.parse(JSON.stringify(prev)));
      saveData(next);
      return next;
    });
  }
  const client = selectedClient ? data.clients.find(c => c.id === selectedClient) : null;
  return (
    <>
      <header className="site-header">
        <div><div className="site-name">JC TRAINING <span style={{color:'#1e90ff'}}>WORKS</span></div><div className="site-tag">Gestión Pro</div></div>
        <div className="header-spacer" /><button className="btn-logout" onClick={onLogout}>Salir</button>
      </header>
      <div className="wrap">
        {!selectedClient ? (

function getLastWeight(sessions, exerciseId) {
  const relevant = (sessions || []).filter(s => s.weights && s.weights[exerciseId] !== undefined && s.weights[exerciseId] !== '');
  if (!relevant.length) return null;
  relevant.sort((a, b) => b.date.localeCompare(a.date));
  return relevant[0].weights[exerciseId];
}

          }}>
           <div style={{ fontSize: '30px', letterSpacing: '8px', opacity: 0.7, marginBottom: '10px' }}>
  {clientData?.genero === 'MUJER' ? 'BIENVENIDA' : 'BIENVENIDO'}
</div>
            <div style={{ 
              fontSize: '100px', // ¡LETRAS GIGANTES!
              color: '#1e90ff', 
              lineHeight: '0.9',
              textShadow: '0 0 50px rgba(30,144,255,1), 0 0 100px rgba(30,144,255,0.5)', // Brillo nuclear
            }}>
              {clientData?.nombre?.split(' ')[0]?.toUpperCase() || 'GUERRERO'}
            </div>
          </div>

          <style>{`
            @keyframes movimientoHumoPro {
              from { transform: scale(1.1) rotate(-2deg) translateY(0); }
              to { transform: scale(1.6) rotate(2deg) translateY(-60px); } /* Escala mucho mayor */
            }
            @keyframes aparecerNombrePro {
              0% { transform: translateY(150px) scale(0.5); opacity: 0; filter: blur(30px); }
              40% { transform: translateY(0) scale(1.1); opacity: 1; filter: blur(0); }
              100% { transform: scale(1); opacity: 1; }
            }
          `}</style>
        </div>
      )}

      {screen === 'home' && <ClientHome onStartLogin={() => setScreen('client-login')} />}
      
      {screen === 'client-login' && (
        <ClientLogin 
          onSuccess={cliente => { 
            setClientData(cliente); 
            setShowIntro(true); 
            // AHORA DURA 5 SEGUNDOS (5000ms) para que de tiempo a leer y flipar
            setTimeout(() => {
              setScreen('client'); 
              setShowIntro(false);
            }, 5000); 
          }} 
          onBack={() => setScreen('home')} 
        />
      )}
      
      {screen === 'trainer' && <TrainerPanel onLogout={() => setScreen('home')} />}
      {screen === 'client' && <ClientView client={clientData} onLogout={() => { setClientData(null); setScreen('home'); }} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --card:     #1e1e1e;
      --border:   #2a2a2a;
      --accent:   #1e90ff;
      --accent2:  #ff4d4d;
      --text:     #f0f0f0;
      --muted:    #888;
      --radius:   10px;
      color-scheme: dark;
    }

    html {
      background: #0d0d0d;
    }

    body {
      background: #0d0d0d;
      background-color: #0d0d0d;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      overflow-anchor: none;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── LAYOUT ── */
    .wrap { max-width: 900px; margin: 0 auto; padding: 6px 16px 10px; }

    /* ── HEADER ── */
    .site-header {
      display: flex; align-items: center; gap: 14px;
      padding: 22px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .logo-mark {
      width: 40px; height: 40px; border-radius: 8px;
      background: #1e90ff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark span { font-family:'Bebas Neue'; font-size: 20px; color: #fff; line-height:1; }
    .site-name { font-family:'Bebas Neue'; font-size: 22px; letter-spacing: .04em; color: var(--text); }
    .site-tag  { font-size: 12px; color: var(--muted); margin-top: -2px; }
    .header-spacer { flex: 1; }
    .btn-logout {
      font-size: 12px; color: var(--muted); background: none; border: 1px solid var(--border);
      padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans';
      transition: all .2s;
    }
    .btn-logout:hover { color: var(--text); border-color: var(--muted); }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 16px;
    }
    .card-title {
      font-family:'Bebas Neue'; font-size: 18px; letter-spacing: .05em;
      color: var(--accent); margin-bottom: 14px;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 7px; border: none;
      font-family: 'DM Sans'; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all .15s;
    }
    .btn-primary  { background: var(--accent);  color: #000; }
    .btn-primary:hover  { filter: brightness(1.1); }
    .btn-danger   { background: #2a1515; color: var(--accent2); border: 1px solid #3a1515; }
    .btn-danger:hover   { background: #3a1515; }
    .btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover    { color: var(--text); border-color: var(--muted); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }

    /* ── INPUTS ── */
    input, select, textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 9px 12px;
      font-family: 'DM Sans';
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    select option { background: var(--surface); }
    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 5px; }
    .form-group { margin-bottom: 12px; }
    .form-row { display: grid; gap: 10px; }
    .form-row.col2 { grid-template-columns: 1fr 1fr; }
    .form-row.col3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-row.col4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

    /* ── BADGE ── */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase;
    }
    .badge-essential { background:#1a1a00; color:#e8ff00; border:1px solid #3a3a00; }
    .badge-premium   { background:#001a1a; color:#00e8e8; border:1px solid #003a3a; }
    .badge-elite     { background:#1a0000; color:#ff4d4d; border:1px solid #3a0000; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border-radius: 9px; padding: 4px; }
    .tab {
      flex: 1; padding: 9px; border-radius: 6px; border: none;
      font-family: 'DM Sans'; font-size: 13px; font-weight: 500;
      cursor: pointer; background: transparent; color: var(--muted); transition: all .2s;
    }
    .tab.active { background: var(--card); color: var(--text); border: 1px solid var(--border); }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; color: var(--muted); text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
    td { padding: 11px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* ── WEIGHT INPUT in session ── */
    .weight-input {
      width: 80px; padding: 7px 10px; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px;
      font-family: 'DM Sans'; font-size: 14px;
    }
    .weight-input:focus { border-color: var(--accent); outline: none; }

    /* ── CHART ── */
    .chart-wrap { position: relative; height: 200px; }

<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;  if ('scrollRestoration' in history) {   history.scrollRestoration = 'manual'; }

/* ─────────────── STORAGE ─────────────── */
const STORAGE_KEY = 'jctraining_v2';
const TRAINER_PASSWORD = 'JCTrainer2025';

// Función para asegurar que no se pierdan datos al actualizar código
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return {
    clients: [
      {
        id: 'c1', name: 'Adrián López', plan: 'ELITE',
        code: 'ADR149', createdAt: '2025-01-10',
        routines: [
          {
            id: 'r1', name: 'Empuje A', exercises: [
              { id: 'e1', name: 'Press Banca', sets: 4, reps: '6-8', rir: 2, notes: 'Bajar controlado 2s' },
              { id: 'e2', name: 'Press Inclinado Mancuernas', sets: 3, reps: '8-10', rir: 2, notes: '' },
              { id: 'e3', name: 'Aperturas Cable', sets: 3, reps: '12-15', rir: 1, notes: 'Contracción completa' },
            ]
          }
        ],
        sessions: []
      }
    ]
  };
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function generateCode(name, plan) {
  const prefix = name.trim().substring(0, 3).toUpperCase().replace(/\s/g, 'X');
  const price = plan === 'ELITE' ? '149' : plan === 'PREMIUM' ? '099' : '070';
  return prefix + price;
}

function generateId() {
  return Math.random().toString(36).slice(2, 9);
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

/* ─────────────── CHART COMPONENT ─────────────── */
function ProgressChart({ sessions, exerciseId, exerciseName }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  const data = sessions
    .filter(s => s.weights && s.weights[exerciseId] && !isNaN(parseFloat(s.weights[exerciseId])))
    .sort((a, b) => a.date.localeCompare(b.date))
    .map(s => ({ date: s.date, weight: parseFloat(s.weights[exerciseId]) }));

  useEffect(() => {
    if (!canvasRef.current || data.length < 1) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: {
        labels: data.map(d => formatDate(d.date)),
        datasets: [{
          label: 'kg',
          data: data.map(d => d.weight),
          borderColor: '#1e90ff',
          backgroundColor: 'rgba(30,144,255,0.1)',
          borderWidth: 2,
          pointBackgroundColor: '#1e90ff',
          pointRadius: 4,
          fill: true,
          tension: 0.35,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#2a2a2a' }, ticks: { color: '#888', font: { size: 11 } } },
          y: { grid: { color: '#2a2a2a' }, ticks: { color: '#888', font: { size: 11 } } }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(data)]);

  if (data.length < 2) return <p className="text-muted text-sm">Necesitas al menos 2 sesiones para ver gráfica.</p>;
  return <div className="chart-wrap"><canvas ref={canvasRef} /></div>;
}

/* ─────────────── PANTALLAS DE ACCESO ─────────────── */
function ClientHome({ onStartLogin }) {
  return (
    <div className="center-screen">
      <div className="login-box" onClick={onStartLogin}>
        <span className="choice-icon-pro">💪</span>
        <span className="main-text-pro">ACCEDER A MI PLAN</span>
        <span className="sub-text-pro">JC Training Works</span>
      </div>
    </div>
  );
}

const SUPABASE_URL = 'https://wietxwxebyqncslgsdxx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eOWtUHB4vkqYlX26jVvDBA_5REbkLDl';

async function sbFetch(table, filter = '') {
  const url = `${SUPABASE_URL}/rest/v1/${table}?select=*${filter ? '&' + filter : ''}`;
  const res = await fetch(url, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sbInsert(table, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

/* ─────────────── VISTA LOGIN CLIENTE ─────────────── */
function ClientLogin({ onSuccess, onBack }) {
  const [code, setCode] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

 const handleLogin = async () => {
    if (!code) return;
    setLoading(true);
    setError('');
    try {
      const data = await sbFetch('clientes', `codigo=eq.${code.toUpperCase()}`);
      if (!data.length) {
        setError('Código no encontrado. Contacta con tu entrenador.');
        return;
      }
      onSuccess(data[0]);
    } catch (err) {
      setError('Error de conexión. Inténtalo de nuevo.');
   } finally {
      setLoading(false);
    }
  };
  return (
    <div className="center-screen">
      <div className="login-box">
        <span className="choice-icon-pro">🔥</span>
        <span className="main-text-pro">¡A ENTRENAR!</span>
        <span className="sub-text-pro">JC Training Works</span>

        <input
          value={code}
          onChange={e => { setCode(e.target.value.toUpperCase()); setError(''); }}
          onKeyDown={e => e.key === 'Enter' && handleLogin()}
          placeholder="EJ: PEPE2025"
          autoFocus
          disabled={loading}
          style={{
            marginTop: '28px',
            textAlign: 'center',
            fontSize: '20px',
            fontFamily: 'Bebas Neue',
            letterSpacing: '3px',
            padding: '14px',
            background: '#0d0d0d',
            border: '1px solid rgba(30,144,255,0.4)',
            borderRadius: '10px',
            color: '#fff',
            width: '100%',
          }}
        />
        {error && <div style={{color:'#ff4d4d', fontSize:'13px', marginTop:'10px'}}>{error}</div>}

        <button
          onClick={handleLogin}
          disabled={loading}
          style={{
            marginTop: '16px',
            width: '100%',
            padding: '14px',
            background: '#1e90ff',
            color: '#fff',
            border: 'none',
            borderRadius: '10px',
            fontFamily: 'Bebas Neue',
            fontSize: '20px',
            letterSpacing: '2px',
            cursor: loading ? 'not-allowed' : 'pointer',
            opacity: loading ? 0.7 : 1,
          }}
        >
          {loading ? 'VERIFICANDO...' : 'ENTRAR'}
        </button>

        <div onClick={onBack} style={{marginTop:'20px', color:'#555', fontSize:'13px', cursor:'pointer'}}>
          ← Volver al inicio
        </div>
      </div>
    </div>
  );
}

/* ─────────────── TRAINER PANEL ─────────────── */
function TrainerPanel({ onLogout }) {
  const [data, setData] = useState(loadData);

  function update(fn) {

  }
  const client = selectedClient ? data.clients.find(c => c.id === selectedClient) : null;
  return (
    <>
      <header className="site-header">
        <div><div className="site-name">JC TRAINING <span style={{color:'#1e90ff'}}>WORKS</span></div><div className="site-tag">Gestión Pro</div></div>
        <div className="header-spacer" /><button className="btn-logout" onClick={onLogout}>Salir</button>
      </header>
      <div className="wrap">
        {!selectedClient ? (
          <>
            <div className="tabs" style={{marginTop:20}}>
              <button className={`tab ${tab==='clients'?'active':''}`} onClick={() => setTab('clients')}>Clientes</button>
              <button className={`tab ${tab==='new'?'active':''}`} onClick={() => setTab('new')}>+ Nuevo</button>
            </div>
            {tab === 'clients' && <ClientList data={data} onSelect={setSelectedClient} onUpdate={update} />}
            {tab === 'new' && <NewClientForm data={data} onUpdate={update} onDone={() => setTab('clients')} />}
          </>
        ) : (
          <ClientDetail client={client} data={data} onUpdate={update} onBack={() => setSelectedClient(null)} />
        )}
      </div>
    </>

}

function ClientList({ data, onSelect, onUpdate }) {
  function deleteClient(id) {
    if (!window.confirm('¿Eliminar cliente?')) return;
    onUpdate(d => { d.clients = d.clients.filter(c => c.id !== id); return d; });
  }
  return (
    <div className="card">
      {data.clients.map(c => (
        <div className="client-row" key={c.id}>
          <div className="client-info">
            <div className="client-name">{c.name}</div>
            <div className="client-code">{c.code}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={() => onSelect(c.id)}>Ver</button>
          <button className="btn btn-danger btn-sm" onClick={() => deleteClient(c.id)}>✕</button>
        </div>
      ))}
    </div>
  );
}

function NewClientForm({ data, onUpdate, onDone }) {
  const [name, setName] = useState('');
  const [plan, setPlan] = useState('ELITE');
  function submit() {
    if (!name.trim()) return;
    onUpdate(d => {
      d.clients.push({ id: generateId(), name: name.trim(), plan, code: generateCode(name, plan), routines: [], sessions: [] });
      return d;
    });
    onDone();
  }
  return (
    <div className="card">
      <div className="form-group"><label>Nombre</label><input value={name} onChange={e => setName(e.target.value)} /></div>
      <button className="btn btn-primary" onClick={submit}>Crear</button>
    </div>
  );
}

function ClientDetail({ client, onUpdate, onBack }) {
  const [tab, setTab] = useState('routines');
  return (
    <>
      <button className="btn btn-ghost btn-sm" onClick={onBack} style={{marginTop:20}}>← Volver</button>
      <div className="tabs" style={{marginTop:10}}>
        <button className={`tab ${tab==='routines'?'active':''}`} onClick={() => setTab('routines')}>Rutinas</button>
      </div>
      {tab === 'routines' && <RoutinesTab client={client} onUpdate={onUpdate} />}
    </>
  );
}

function RoutinesTab({ client, onUpdate }) {
  const [routineName, setRoutineName] = useState('');
  function add() {
    if (!routineName.trim()) return;
    onUpdate(d => {
      const c = d.clients.find(x => x.id === client.id);
      c.routines.push({ id: generateId(), name: routineName.trim(), exercises: [] });
      return d;
    });
    setRoutineName('');
  }
  return (
    <div>
      {client.routines.map(r => (
        <div className="card" key={r.id}>
          <div className="card-title">{r.name}</div>
          <AddExerciseForm routineId={r.id} clientId={client.id} onUpdate={onUpdate} />
        </div>
      ))}
      <div className="card">
        <input value={routineName} onChange={e => setRoutineName(e.target.value)} placeholder="Nombre rutina" />
        <button className="btn btn-primary" style={{marginTop:10}} onClick={add}>+ Añadir Rutina</button>
      </div>
    </div>
  );
}

function AddExerciseForm({ routineId, clientId, onUpdate }) {
  const [ex, setEx] = useState({ name:'', sets:'3', reps:'10', rir:'2', notes:'' });
  function add() {
    if (!ex.name) return;
    onUpdate(d => {
      const c = d.clients.find(x=>x.id===clientId);
      const r = c.routines.find(x=>x.id===routineId);
      r.exercises.push({ id: generateId(), ...ex });
      return d;
    });
    setEx({ name:'', sets:'3', reps:'10', rir:'2', notes:'' });
  }
  return (
    <div style={{marginTop:10}}>
      <input value={ex.name} onChange={e=>setEx({...ex, name:e.target.value})} placeholder="Ejercicio" />
      <button className="btn btn-primary btn-sm" style={{marginTop:5}} onClick={add}>Añadir</button>
    </div>
  );
}

/* ─────────────── HELPERS ─────────────── */
function getLastWeight(sessions, exerciseId) {
  const relevant = (sessions || []).filter(s => s.weights && s.weights[exerciseId] !== undefined && s.weights[exerciseId] !== '');
  if (!relevant.length) return null;
  relevant.sort((a, b) => b.date.localeCompare(a.date));
  return relevant[0].weights[exerciseId];
}
/* ─────────────── VISTA CLIENTE ─────────────── */
function ClientView({ client, onLogout }) {
  const [notionData, setNotionData] = useState({ rutinas: [], ejercicios: [] });
  const [loadingNotion, setLoadingNotion] = useState(true);

  useEffect(() => {
    async function cargarRutinas() {
      try {
        const cliente = await sbFetch('clientes', `codigo=eq.${client.codigo}`);
        if (!cliente.length) return;
        const clienteId = cliente[0].id;
        const rutinas = await sbFetch('rutinas', `cliente_id=eq.${clienteId}&order=orden.asc`);
        const ids = rutinas.map(r => r.id).join(',') || 'null';
        const ejercicios = await sbFetch('ejercicios', `rutina_id=in.(${ids})&order=orden.asc`);
        setNotionData({ rutinas, ejercicios });
      } catch (err) {
        console.error('Error cargando rutinas:', err);
      } finally {
        setLoadingNotion(false);
      }
    }
    cargarRutinas();
  }, []);

  if (!client) {
    return (
      <div style={{ color: '#fff', textAlign: 'center', marginTop: '50px' }}>
        Cargando...
      </div>
    );
  }

  const nombreRaw = client.nombre || client.name || client.Nombre || '';
  const nombreCompleto = nombreRaw.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
  const nombre = nombreCompleto.split(' ')[0];
  const hora = Number(new Date().toLocaleString('es-ES', { hour: 'numeric', hour12: false, timeZone: 'Europe/Madrid' }));
  const saludo = hora >= 6 && hora < 14 ? '¡Buenos días' : hora >= 14 && hora < 21 ? '¡Buenas tardes' : '¡Buenas noches';

  return (
    <div style={{
      height: '100dvh',
      display: 'flex',
      flexDirection: 'column',
      background: '#0d0d0d',
      overflow: 'hidden',
      position: 'relative'
    }}>
      {/* HEADER INTEGRADO EN EL FLUJO — PROTEGIDO CONTRA EL NOTCH */}
      <header style={{
        flexShrink: 0,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        padding: 'calc(env(safe-area-inset-top, 0px) + 14px) 16px 14px 16px',
        background: '#0d0d0d',
        borderBottom: '1px solid #1a1a1a',
        zIndex: 100
      }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
          <div style={{ fontFamily: 'Bebas Neue', fontSize: '22px', color: '#fff', letterSpacing: '1px', lineHeight: 1.2 }}>
            {saludo}, {nombre}! 💪
          </div>
          <div style={{ fontSize: 11, color: '#1e90ff', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '1px' }}>
            A por otra sesión.
          </div>
        </div>

        <button
          onClick={onLogout}
          style={{
            background: 'transparent',
            border: '1px solid #444',
            color: '#aaa',
            padding: '8px 16px',
            borderRadius: '8px',
            cursor: 'pointer',
            fontSize: '14px',
            fontWeight: 600,
            transition: 'all 0.2s'
          }}
        >
          Salir
        </button>
      </header>

      {/* CONTENEDOR CON SCROLL PROPIO QUE RESPETA EL MARGEN INFERIOR DE LOS MÓVILES */}
      <div className="wrap" style={{
        flex: 1,
        overflowY: 'auto',
        padding: '12px 16px calc(env(safe-area-inset-bottom, 0px) + 30px) 16px',
        width: '100%',
        boxSizing: 'border-box'
      }}>
        {loadingNotion
          ? <div className="card" style={{ textAlign: 'center', color: '#1e90ff', padding: '40px' }}>Conectando...</div>
          : <ClientSession client={client} notionData={notionData} />
        }

  );

function ClientSession({ client, notionData }) {
  const [routineId, setRoutineId] = useState('');
  const [weights, setWeights] = useState({});
  const [saved, setSaved] = useState(false);
  const [saving, setSaving] = useState(false);
  const [indexActual, setIndexActual] = React.useState(0);
  const [notaVisible, setNotaVisible] = React.useState(false);
  const [gifModal, setGifModal] = React.useState(null);

  const routine = notionData.rutinas.find(r => r.id == routineId);
  const ejerciciosDeHoy = notionData.ejercicios.filter(ex => String(ex.rutina_id) === String(routineId));

  useEffect(() => {
    if (notionData.rutinas.length > 0 && !routineId) {
      setRoutineId(String(notionData.rutinas[0].id));
    }
  }, [notionData]);

  const nombreRaw = client.nombre || client.name || client.Nombre || '';
  const nombre = nombreRaw.toLowerCase().replace(/\b\w/g, l => l.toUpperCase()).split(' ')[0];

  const frases = [
    `¡Sesión completada, ${nombre}! 🔥 Así se hace.`,
    `¡Brutal, ${nombre}! 💪 Otro día ganado.`,
    `¡Eso es ${nombre}! 🚀 Sigue así y los resultados llegan.`,
    `¡Grande, ${nombre}! 🏆 Un paso más hacia tu objetivo.`,
  ];

  const handleSave = async () => {
    const hayDatos = Object.values(weights).some(v => v !== '' && v !== null);
    if (!hayDatos) return alert('Anota al menos una serie, ¡fiera!');

    setSaving(true);
    const pesosProcesados = {};

    ejerciciosDeHoy.forEach(ex => {
      const seriesTexto = [];
      const numSeries = parseInt(ex.series) || 3;

      for (let i = 1; i <= numSeries; i++) {
        const kg = weights[`${ex.id}_s${i}_kg`];
        const reps = weights[`${ex.id}_s${i}_reps`];

        if (kg || reps) {
          seriesTexto.push(`SERIE ${i}: ${kg || '?'}kg x ${reps || '?'}`);
        }
      }

      if (seriesTexto.length > 0) {
        pesosProcesados[ex.id] = seriesTexto.join('\n');
      }
    });

    try {
      const fecha = new Date().toISOString().slice(0, 10);
      for (const ex of ejerciciosDeHoy) {
        if (!pesosProcesados[ex.id]) continue;
        await sbInsert('sesiones', {
          id: crypto.randomUUID(),
          codigo_cliente: client.codigo,
          rutina_id: routineId,
          ejercicio_id: ex.id,
          ejercicio: ex.nombre,
          series_detalle: pesosProcesados[ex.id],
          fecha
        });
      }
      setSaved(true);
    } catch (e) {
      console.error(e);
      alert('Error de conexión');
    } finally {
      setSaving(false);
    }
  };

  if (saved) return (
    <div style={{
      marginTop: 20, textAlign: 'center', padding: '40px 20px',
      background: 'linear-gradient(135deg, #0a192f, #112240)',
      borderRadius: 16, border: '1px solid #1e90ff'
    }}>
      <div style={{ fontSize: 60, marginBottom: 16 }}>🏆</div>
      <div style={{ fontFamily: 'Bebas Neue', fontSize: 28, color: '#fff', marginBottom: 10 }}>
        {frases[Math.floor(Math.random() * frases.length)]}
      </div>
      <div style={{ color: '#555', fontSize: 13, marginTop: 20 }}>Sesión guardada correctamente</div>
      <button onClick={() => { setSaved(false); setWeights({}); }}
        style={{
          marginTop: 24, background: '#1e90ff', color: '#fff', border: 'none',
          padding: '12px 32px', borderRadius: 8, fontFamily: 'Bebas Neue',
          fontSize: 18, letterSpacing: 2, cursor: 'pointer'
        }}>
        NUEVA SESIÓN
      </button>
    </div>
  );

  const gifOverlay = gifModal ? (
    <div onClick={() => setGifModal(null)} style={{
      position: 'fixed', inset: 0,
      background: 'rgba(0,0,0,0.92)', zIndex: 9999,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      cursor: 'pointer'
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: '#111', borderRadius: 16, padding: 24,
        border: '1px solid #333', maxWidth: 340,
        width: '90%', textAlign: 'center'
      }}>
        <img src={gifModal} style={{ width: '100%', borderRadius: 8, maxHeight: 300, objectFit: 'contain' }} />
        <div style={{ color: '#555', fontSize: 12, marginTop: 12}}>Toca fuera para cerrar</div>
      </div>
    </div>
  ) : null;

  return (
    <>
      {gifOverlay}
      <div style={{ display: 'flex', flexDirection: 'column', width: '100%' }}>
        {/* FILA: SELECTOR + FECHA — SE MUEVEN EN EL SCROLL NATURAL, ADIÓS SOLAPAMIENTOS */}
        <div style={{
          display: 'flex', gap: '8px', alignItems: 'stretch',
          marginBottom: '14px', width: '100%'
        }}>
          {/* Tarjeta selector */}
          <div className="card" style={{ flex: 1, padding: '8px 12px', marginBottom: 0 }}>
            <div style={{ color: '#1e90ff', fontSize: '11px', fontWeight: 700, marginBottom: '4px', textTransform: 'uppercase', letterSpacing: 1 }}>
              ¿Qué rutina toca hoy?
            </div>
            <select
              value={routineId}
              onChange={e => {
                setRoutineId(String(e.target.value));
                setWeights({});
                setIndexActual(0);
              }}
              style={{ background: '#000', color: '#fff', border: '1px solid #333', padding: '9px 10px', width: '100%', borderRadius: '8px', fontSize: 14 }}
            >
              {notionData.rutinas.map(r => <option key={r.id} value={r.id}>{r.nombre}</option>)}
            </select>
          </div>

          {/* Tarjeta fecha */}
          <div style={{
            flex: '0 0 86px',
            background: 'linear-gradient(160deg, #080f1f 0%, #0d1f3c 100%)',
            border: '1px solid rgba(30,144,255,0.25)',
            borderRadius: '10px',
            padding: '5px 4px',
            display: 'flex', flexDirection: 'column',
            justifyContent: 'center', alignItems: 'center',
            gap: '1px'
          }}>
            <div style={{ fontFamily: 'Bebas Neue', fontSize: '32px', color: '#1e90ff', lineHeight: 1, textShadow: '0 0 20px rgba(30,144,255,0.5)' }}>

              {new Date().toLocaleDateString('es-ES', { weekday: 'long' }).replace('.', '').toUpperCase()}

            <div style={{ fontSize: '9px', color: '#555', textTransform: 'uppercase', letterSpacing: '1px', textAlign: 'center' }}>
              {new Date().toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }).toUpperCase()}
            </div>
          </div>
        </div>

        {routine && (
          <>
            {(() => {
              const ex = ejerciciosDeHoy[indexActual];
              if (!ex) return <div style={{ color: '#fff', textAlign: 'center', padding: 20 }}>No hay ejercicios en esta rutina</div>;

                    background: '#0a0a0a', border: '1px solid #1e90ff', borderRadius: '12px',

                    {/* CABECERA: NOMBRE Y PROGRESO */}

                            {ex.nombre.toLowerCase().replace(/\b\w/g, l => l.toUpperCase())}

                        color: indexActual === ejerciciosDeHoy.length - 1 ? '#333' : '#fff',
                        border: 'none', cursor: indexActual === ejerciciosDeHoy.length - 1 ? 'default' : 'pointer'
                      }}
                    >
                      SIGUIENTE →

                  </div>

              );

            {/* BOTÓN GUARDAR — AL FINAL DEL FLUJO DE SCROLL PERFECTO */}

                border: 'none', borderRadius: '12px', fontWeight: 800, fontSize: 16,
                marginTop: '6px', marginBottom: '10px',
                boxShadow: '0 4px 20px rgba(30, 144, 255, 0.4)', cursor: 'pointer'
              }}>
              {saving ? 'GUARDANDO...' : 'GUARDAR SESIÓN 💾'}
            </button>
          </>
        )}
      </div>
    </>
  );
}

function ClientProgress({ client }) {
  const allExercises = client.routines.flatMap(r => r.exercises);
  return (
    <div className="ex-progress-list">
      {allExercises.length === 0 && <p style={{textAlign:'center', color:'#555', marginTop:20}}>No hay ejercicios asignados</p>}
      {allExercises.map(ex => (
        <div className="card" key={ex.id}>
          <div className="card-title" style={{marginBottom:10}}>{ex.name}</div>
          <ProgressChart sessions={client.sessions} exerciseId={ex.id} exerciseName={ex.name} />
        </div>
      ))}
    </div>
  );
}

function ClientHistory({ client }) {
  const reversedSessions = [...client.sessions].reverse();
  return (
    <div>
      {reversedSessions.length === 0 && <p style={{textAlign:'center', color:'#555', marginTop:20}}>Aún no has guardado sesiones</p>}
      {reversedSessions.map(s => (
        <div className="card" key={s.id}>
          <div style={{color: '#1e90ff', fontWeight: 700, marginBottom: 10, display: 'flex', justifyContent: 'space-between'}}>
            <span>{formatDate(s.date)}</span>
            <span style={{fontSize: '11px', color: '#555'}}>{client.routines.find(r=>r.id===s.routineId)?.name}</span>
          </div>
          {Object.entries(s.weights).map(([eid, w]) => {
            const ex = client.routines.flatMap(r=>r.exercises).find(e=>e.id===eid);
            return <div key={eid} style={{fontSize: 14, marginBottom: 4, display: 'flex', justifyContent: 'space-between'}}>
              <span style={{color: '#aaa'}}>{ex?.name}</span>
              <span style={{fontWeight: 700}}>{w} kg</span>
            </div>
          })}
        </div>
      ))}
    </div>
  );
}

function App() {
  const urlParams = new URLSearchParams(window.location.search);
  const isTrainerMode = urlParams.get('mode') === 'trainer';
  const [screen, setScreen] = useState(isTrainerMode ? 'trainer' : 'home'); 
  const [clientData, setClientData] = useState(null);
  const [showIntro, setShowIntro] = useState(false);

  return (
    <>
      {/* --- INTRO ÉPICA XL --- */}
      {showIntro && (
        <div style={{
          position: 'fixed', inset: 0, zIndex: 10000, backgroundColor: '#000',
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          padding: '20px'
        }}>
          {/* Humo con movimiento mucho más exagerado */}
          <div style={{
            position: 'absolute', inset: 0,
            backgroundImage: 'url(intro-humo.png)',
            backgroundSize: 'cover', backgroundPosition: 'bottom center',
            animation: 'movimientoHumoPro 12s infinite alternate ease-in-out', // Más lento y fluido
            opacity: 0.9
          }} />
          
          <div style={{
            position: 'relative', textAlign: 'center', zIndex: 10001,
            fontFamily: 'Bebas Neue', color: '#fff',
            animation: 'aparecerNombrePro 3s ease-out forwards' // Animación de texto más larga
          }}>
           <div style={{ fontSize: '30px', letterSpacing: '8px', opacity: 0.7, marginBottom: '10px' }}>
  {clientData?.genero === 'MUJER' ? 'BIENVENIDA' : 'BIENVENIDO'}
</div>
            <div style={{ 
              fontSize: '100px', // ¡LETRAS GIGANTES!
              color: '#1e90ff', 
              lineHeight: '0.9',
              textShadow: '0 0 50px rgba(30,144,255,1), 0 0 100px rgba(30,144,255,0.5)', // Brillo nuclear
            }}>
              {clientData?.nombre?.split(' ')[0]?.toUpperCase() || 'GUERRERO'}
            </div>
          </div>

          <style>{`
            @keyframes movimientoHumoPro {
              from { transform: scale(1.1) rotate(-2deg) translateY(0); }
              to { transform: scale(1.6) rotate(2deg) translateY(-60px); } /* Escala mucho mayor */
            }
            @keyframes aparecerNombrePro {
              0% { transform: translateY(150px) scale(0.5); opacity: 0; filter: blur(30px); }
              40% { transform: translateY(0) scale(1.1); opacity: 1; filter: blur(0); }
              100% { transform: scale(1); opacity: 1; }
            }
          `}</style>
        </div>
      )}

      {screen === 'home' && <ClientHome onStartLogin={() => setScreen('client-login')} />}
      
      {screen === 'client-login' && (
        <ClientLogin 
          onSuccess={cliente => { 
            setClientData(cliente); 
            setShowIntro(true); 
            // AHORA DURA 5 SEGUNDOS (5000ms) para que de tiempo a leer y flipar
            setTimeout(() => {
              setScreen('client'); 
              setShowIntro(false);
            }, 5000); 
          }} 
          onBack={() => setScreen('home')} 
        />
      )}
      
      {screen === 'trainer' && <TrainerPanel onLogout={() => setScreen('home')} />}
      {screen === 'client' && <ClientView client={clientData} onLogout={() => { setClientData(null); setScreen('home'); }} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC Training Works | Entrenador Personal Madrid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #1e90ff; --blue-dark: #0066cc; --green: #25d366; --bg: #0a0a0a; --bg2: #111111; --bg3: #161616; --text: #f0f0f0; --muted: #888; --border: rgba(30,144,255,0.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-weight:300;line-height:1.6;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:rgba(10,10,10,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.05)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:#fff;text-decoration:none}
.logo span{color:var(--blue)}
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:120px 24px 80px;background:#000}
.hero-content{position:relative;z-index:3;max-width:900px}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,15vw,9rem);line-height:0.85;margin-bottom:15px;text-transform:uppercase}
.hero h1 span{color:var(--blue);display:block}
.btn-main{display:inline-block;background:var(--blue);color:#fff;padding:20px 50px;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;text-decoration:none;border-radius:4px;box-shadow:0 10px 30px rgba(30,144,255,0.3)}
.pricing{padding:100px 24px;background:var(--bg2);text-align:center}
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px;max-width:1200px;margin:50px auto}
.card{background:var(--bg3);padding:40px;border-radius:8px;border:1px solid var(--border)}
.card.popular{border-color:var(--blue);transform:scale(1.05)}
</style>
</head>
<body>
<nav><a href="#" class="logo">JC TRAINING <span>WORKS</span></a></nav>
<section class="hero">
  <div class="hero-content">
    <h1>ENTRENA<span>SIN LÍMITES</span></h1>
    <p>Asesoramiento Online y Presencial en Madrid</p>
    <a href="#tarifas" class="btn-main">VER PLANES</a>
  </div>
</section>
<section id="tarifas" class="pricing">
  <h2 style="font-family:'Bebas Neue'; font-size:3.5rem;">TARIFAS</h2>
  <div class="pricing-grid">
    <div class="card"><h3>MENSUAL</h3><div style="font-size:3rem;margin:20px 0;">60€</div><a href="https://wa.me/34tu-numero" style="color:var(--blue)">Contactar</a></div>
    <div class="card popular"><h3>TRIMESTRAL</h3><div style="font-size:3rem;margin:20px 0;">150€</div><a href="https://wa.me/34tu-numero" style="color:var(--blue)">Contactar</a></div>
  </div>
</section>
</body>
</html>

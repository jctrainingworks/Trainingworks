<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC Training Works | Entrenador Personal Madrid</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --blue: #1e90ff;
  --blue-dark: #0066cc;
  --green: #25d366;
  --bg: #0a0a0a;
  --text: #f0f0f0;
  --muted: #888;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Barlow',sans-serif;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:16px 32px;
  background:#000;
}

.logo img{
  max-width:120px;
  height:auto;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:120px 20px;
}

.hero h1{
  font-size:3rem;
  margin-bottom:10px;
}

.hero p{
  color:var(--muted);
  margin-bottom:20px;
}

.btn{
  background:var(--blue);
  padding:12px 24px;
  text-decoration:none;
  color:white;
  font-weight:600;
}

/* STATS */
.stats{
  display:flex;
  justify-content:center;
  gap:40px;
  margin:60px 0;
  text-align:center;
}

.stats h2{
  font-size:2rem;
  color:var(--blue);
}

.stats p{
  font-size:0.8rem;
  color:var(--muted);
}
</style>
</head>

<body>

<nav>
  <a href="#" class="logo">
    <img src="tu-logo.png" alt="logo">
  </a>
</nav>

<!-- HERO LIMPIO -->
<section class="hero">
  <h1>Entrenamiento 100% personalizado</h1>
  <p>Adaptado a tus objetivos y tu ritmo. Sin excusas. Con resultados.</p>
  <a href="#planes" class="btn">VER PLANES</a>
</section>

<!-- STATS FUERA -->
<section class="stats">
  <div>
    <h2>100%</h2>
    <p>PERSONALIZADO</p>
  </div>
  <div>
    <h2>2</h2>
    <p>MODALIDADES</p>
  </div>
  <div>
    <h2>1ª</h2>
    <p>SESIÓN GRATIS</p>
  </div>
</section>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JC Training — Panel Entrenador</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Barlow:wght@600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
  --bg: #1e2535;
  --surface: #252d3d;
  --card: #2d3748;
  --border: #3a4555;
  --blue: #1e90ff;
  --yellow: #e8ff00;
  --text: #f0f0f0;
  --muted: #8a9bb5;
  --danger: #ff4444;
  --warning: #ff9800;
  --success: #4caf50;
  --radius: 10px;
  --mobile-nav-h: 64px;
  --mobile-header-h: 56px;
}

    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #0d2040 0%, #0a0a0a 70%);
      padding: 20px;
    }
    .login-box {
      width: 100%; max-width: 400px; padding: 48px 40px;
      background: #111; border: 1px solid #1e90ff33; border-radius: 16px;
      text-align: center;
    }
    @media (max-width: 480px) { .login-box { padding: 36px 24px; } }
    .login-logo { font-family: 'Bebas Neue'; font-size: 42px; color: var(--blue); letter-spacing: 2px; }
    .login-sub { font-family: 'Barlow'; font-size: 11px; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }
    .login-label { font-size: 12px; color: var(--muted); text-align: left; display: block; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
    .login-input {
      width: 100%; padding: 13px 16px; background: #0d0d0d; border: 1px solid #2a2a2a;
      color: var(--text); border-radius: 8px; font-family: 'DM Sans'; font-size: 15px;
      outline: none; transition: border .15s; margin-bottom: 20px; letter-spacing: 2px;
    }
    .login-input:focus { border-color: var(--blue); }
    .login-btn {
      width: 100%; padding: 14px; background: var(--blue); color: #fff;
      border: none; border-radius: 8px; font-family: 'Bebas Neue'; font-size: 20px;
      letter-spacing: 2px; cursor: pointer; transition: filter .15s;
    }
    .login-btn:hover { filter: brightness(1.1); }
    .login-error { color: #ff6b6b; font-size: 13px; margin-bottom: 12px; }

    /* ── LAYOUT ── */
    .app { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
    }
    .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo .brand { font-family: 'Bebas Neue'; font-size: 22px; color: var(--blue); letter-spacing: 1px; }
    .sidebar-logo .role { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: 8px; cursor: pointer; color: var(--muted); font-size: 14px;
      font-weight: 500; transition: all .15s; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: #1a1a1a; color: var(--text); }
    .nav-item.active { background: #0d2040; color: var(--blue); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
    .btn-logout {
      width: 100%; padding: 10px; background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; font-family: 'DM Sans'; font-size: 13px;
      cursor: pointer; transition: all .15s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── MOBILE HEADER ── */
    .mobile-header {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      height: var(--mobile-header-h); background: var(--surface);
      border-bottom: 1px solid var(--border); z-index: 100;
      align-items: center; padding: 0 16px; justify-content: space-between;
    }
    .mobile-header .brand { font-family: 'Bebas Neue'; font-size: 22px; color: var(--blue); letter-spacing: 1px; }
    .mobile-logout-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 7px; font-family: 'DM Sans'; font-size: 12px;
      padding: 6px 12px; cursor: pointer; transition: all .15s;
    }
    .mobile-logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── MOBILE BOTTOM NAV ── */
    .mobile-bottom-nav {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--mobile-nav-h); background: var(--surface);
      border-top: 1px solid var(--border); z-index: 100;
      align-items: stretch; padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .mobile-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; cursor: pointer; background: none; border: none;
      color: var(--muted); font-family: 'DM Sans'; font-size: 10px; font-weight: 600;
      letter-spacing: .5px; text-transform: uppercase; transition: color .15s; padding: 8px 4px;
    }
    .mobile-nav-item.active { color: var(--blue); }
    .mobile-nav-item .nav-icon { font-size: 20px; width: auto; }
    .mobile-nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--blue); opacity: 0; transition: opacity .15s; margin-top: 2px; }
    .mobile-nav-item.active .mobile-nav-dot { opacity: 1; }

    /* ── MAIN ── */
    .main { margin-left: 240px; flex: 1; padding: 32px; min-height: 100vh; }
    .page-title { font-family: 'Bebas Neue'; font-size: 36px; letter-spacing: 1px; margin-bottom: 6px; }
    .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    /* ── STATS ROW ── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 6px; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-family: 'Bebas Neue'; font-size: 40px; color: var(--blue); line-height: 1; }
    .stat-note { font-size: 12px; color: var(--muted); }

    /* ── CARDS ── */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .card-title { font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: .05em; color: var(--text); }

    /* ── ALERTS / RENOVACIONES ── */
    .alert-row {
      display: flex; align-items: center; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .alert-row:last-child { border-bottom: none; }
    .alert-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .alert-dot.urgent { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
    .alert-dot.soon { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
    .alert-dot.ok { background: var(--success); }
    .alert-info { flex: 1; }
    .alert-name { font-weight: 600; font-size: 14px; }
    .alert-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .alert-badge {
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .alert-badge.urgent { background: #1a0000; color: var(--danger); border: 1px solid #3a0000; }
    .alert-badge.soon { background: #1a0e00; color: var(--warning); border: 1px solid #3a2000; }
    .alert-badge.ok { background: #001a00; color: var(--success); border: 1px solid #003a00; }
    .renov-input-wrap { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    .renov-input {
      background: #0d0d0d; border: 1px solid #2a2a2a; color: var(--text);
      border-radius: 6px; font-family: 'DM Sans'; font-size: 13px;
      padding: 5px 10px; outline: none; width: 150px; transition: border .15s;
    }
    .renov-input:focus { border-color: var(--blue); }
    .btn-renov-save {
      background: var(--blue); color: #fff; border: none; border-radius: 6px;
      font-family: 'DM Sans'; font-size: 12px; font-weight: 600;
      padding: 5px 12px; cursor: pointer; transition: filter .15s;
    }
    .btn-renov-save:hover { filter: brightness(1.1); }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 7px; border: none;
      font-family: 'DM Sans'; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: #444; }
    .btn-danger { background: #1a0000; color: var(--danger); border: 1px solid #330000; }
    .btn-danger:hover { background: #220000; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-xs { padding: 4px 10px; font-size: 12px; }

    /* ── CLIENT GRID ── */
    .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .client-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
    }
    .client-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--blue); opacity: 0; transition: opacity .2s;
    }
    .client-card:hover { border-color: #333; transform: translateY(-1px); }
    .client-card:hover::before { opacity: 1; }
    .client-name { font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: .5px; margin-bottom: 8px; }
    .client-code { font-family: monospace; font-size: 12px; color: var(--blue); background: #0d2040; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
    .client-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: .5px; }
   .tag-1mes         { background: #001a2a; color: #00bcd4; border: 1px solid #003a4a; }
.tag-3meses       { background: #1a0010; color: #ff6b9d; border: 1px solid #3a0020; }
.tag-6meses       { background: #1a1a00; color: var(--yellow); border: 1px solid #3a3a00; }
.tag-activo       { background: #001a00; color: #4caf50; border: 1px solid #003a00; }
.tag-inactivo     { background: #1a0000; color: #ff4444; border: 1px solid #3a0000; }
.tag-sesion_suelta { background: #1a0a00; color: #ff9500; border: 1px solid #3a2000; }
.tag-bono_8       { background: #0d001a; color: #bf7fff; border: 1px solid #2a0040; }
.tag-bono_12      { background: #001a10; color: #00e676; border: 1px solid #003a20; }
.clients-section-header {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Bebas Neue'; font-size: 16px; letter-spacing: 1px;
  color: var(--muted); margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.clients-section-count {
  font-family: 'DM Sans'; font-size: 12px; font-weight: 700;
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); padding: 2px 8px; border-radius: 10px; margin-left: 4px;
}

    /* ── INPUTS ── */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 13px; background: #0d0d0d; border: 1px solid #2a2a2a;
      color: var(--text); border-radius: 7px; font-family: 'DM Sans'; font-size: 14px;
      outline: none; transition: border .15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--blue); }
    .form-select option { background: #111; }
    .form-row { display: grid; gap: 12px; }
    .form-row.col2 { grid-template-columns: 1fr 1fr; }
    .form-row.col3 { grid-template-columns: 1fr 1fr 1fr; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--surface); border: 1px solid #2a2a2a; border-radius: 14px;
      padding: 32px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-family: 'Bebas Neue'; font-size: 26px; margin-bottom: 6px; color: var(--blue); }
    .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* ── DETAIL VIEW ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 14px;
      cursor: pointer; margin-bottom: 20px; background: none; border: none; padding: 0; transition: color .15s;
    }
    .back-btn:hover { color: var(--text); }
    .detail-header {
      background: linear-gradient(135deg, #0d1a30, #111827);
      border: 1px solid #1e3a5f; border-radius: var(--radius);
      padding: 24px; margin-bottom: 20px;
    }
    .detail-name { font-family: 'Bebas Neue'; font-size: 38px; letter-spacing: 1px; }
    .detail-meta { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; align-items: center; }

    /* ── ROUTINE SECTION ── */
    .routine-block { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
    .routine-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px; background: #141414; border-bottom: 1px solid #1a1a1a; cursor: pointer;
    }
    .routine-name { font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: .5px; }
    .routine-code { font-family: monospace; font-size: 11px; color: var(--blue); }
    .routine-body { padding: 12px 18px; }
    .ex-row {
      display: grid; grid-template-columns: 1fr 50px 60px 40px 70px;
      gap: 8px; padding: 10px 0; border-bottom: 1px solid #1a1a1a; align-items: center; font-size: 13px;
    }
    .ex-row:last-child { border-bottom: none; }
    .ex-name { font-weight: 600; font-size: 14px; }
   .ex-val {   text-align: center;   color: var(--blue);   font-weight: 700;   white-space: nowrap;   overflow: hidden;   text-overflow: ellipsis; }
    .ex-head { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; text-align: center; }

    /* ── CHARTS ── */
    .charts-section { margin-bottom: 24px; }
    .charts-title {
      font-family: 'Bebas Neue'; font-size: 16px; letter-spacing: .05em;
      color: var(--muted); margin-bottom: 14px; text-transform: uppercase;
    }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .chart-card {
      background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 8px; padding: 16px;
    }
    .chart-ex-name {
      font-size: 12px; font-weight: 700; color: var(--blue); text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 10px;
    }
    .chart-canvas-wrap { position: relative; height: 140px; }
    .chart-no-data { font-size: 12px; color: var(--muted); text-align: center; padding: 20px 0; }
    .chart-stat-row { display: flex; gap: 16px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1a1a1a; }
    .chart-stat { text-align: center; flex: 1; }
    .chart-stat-val { font-family: 'Bebas Neue'; font-size: 20px; color: var(--blue); }
    .chart-stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .chart-stat-delta { font-size: 11px; font-weight: 700; }
    .chart-stat-delta.up { color: var(--success); }
    .chart-stat-delta.down { color: var(--danger); }

    /* ── HISTORY ── */
   .history-session{
  position:relative;
  background:linear-gradient(180deg,#0a0a0a,#070707);
  border:1px solid rgba(255,255,255,.05);
  border-radius:18px;
  padding:22px;
  margin-bottom:18px;
  overflow:hidden;
  animation:fadeUp .35s ease;
}

.history-session::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  width:4px;
  height:100%;
  background:linear-gradient(180deg,#1e90ff,#2563eb);
  box-shadow:0 0 18px rgba(37,99,235,.5);
}
     
   .history-date{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  color:#9ca3af;
  letter-spacing:1px;
  margin-bottom:14px;
  text-transform:uppercase;
}
    .history-routine {
  font-family:'Bebas Neue';
  font-size:22px;
  font-weight:700;
  color:var(--blue);
  margin-bottom:16px;
  letter-spacing:.5px;
  text-transform:uppercase;
}
    .history-ex { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid #151515; }
    .history-ex:last-child { border-bottom: none; }

    /* ── LOADING / EMPTY ── */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .loading-spin { font-size: 30px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }

    /* ── ALERTS ── */
    .alert { padding: 12px 16px; border-radius: 7px; font-size: 13px; margin-bottom: 12px; }
    .alert-success { background: #001a00; border: 1px solid #003a00; color: #4caf50; }
    .alert-error { background: #1a0000; border: 1px solid #3a0000; color: #ff6b6b; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #111; border-radius: 9px; padding: 4px; border: 1px solid var(--border); }
    .tab { flex: 1; padding: 9px; border-radius: 6px; border: none; font-family: 'DM Sans'; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--muted); transition: all .2s; }
    .tab.active { background: var(--card); color: var(--text); border: 1px solid var(--border); }

    /* ══ RESPONSIVE TABLET ══ */
    @media (max-width: 1024px) {
      .sidebar { width: 200px; }
      .main { margin-left: 200px; padding: 28px 24px; }
      .dashboard-grid { grid-template-columns: 1fr; }
    }

    /* ══ RESPONSIVE MOBILE ══ */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .mobile-header { display: flex; }
      .mobile-bottom-nav { display: flex; }
      .main { margin-left: 0; padding: 16px; padding-top: calc(var(--mobile-header-h) + 16px); padding-bottom: calc(var(--mobile-nav-h) + 16px); }
      .page-title { font-size: 28px; margin-bottom: 4px; }
      .page-sub { margin-bottom: 20px; }
      .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
      .stat-card { padding: 16px; gap: 4px; }
      .stat-value { font-size: 36px; }
      .stat-label { font-size: 10px; }
      .dashboard-grid { grid-template-columns: 1fr; }
      .client-grid { grid-template-columns: 1fr; gap: 10px; }
      .card { padding: 16px; }
      .card-title { font-size: 16px; }
      .form-row.col2, .form-row.col3 { grid-template-columns: 1fr; }
      .detail-header { padding: 18px; }
      .detail-name { font-size: 30px; }
      .ex-row {   grid-template-columns: 1fr 55px 65px 50px 70px;   gap: 8px;   font-size: 12px;   align-items: center; }
      .ex-name { font-size: 13px; }
      .routine-header { padding: 12px 14px; }
      .routine-body { padding: 10px 14px; }
      .modal-overlay { padding: 12px; align-items: flex-end; }
      .modal { border-radius: 16px 16px 0 0; max-height: 88vh; padding: 24px 20px; }
      .clients-header { flex-direction: column !important; align-items: flex-start !important; gap: 12px; margin-bottom: 20px !important; }
      .clients-header .btn { width: 100%; justify-content: center; }
      .charts-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 380px) {
      .stats-row { grid-template-columns: 1fr; }
      .stat-value { font-size: 40px; }
    }
    @keyframes fadeUp{

async function supabase(table, options = {}) {
  const { method = 'GET', filter = '', body = null, select = '*', single = false } = options;
  let url = `${SUPABASE_URL}/rest/v1/${table}?select=${select}`;
  if (filter) url += `&${filter}`;
  if (single) url += '&limit=1';
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': method === 'POST' ? 'return=representation' : ''
  };
  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });
  if (!res.ok) { const err = await res.json(); throw new Error(err.message || res.statusText); }
  return res.status === 204 ? [] : res.json();
}

async function supabaseRPC(fn, params = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(params)
  });
  if (!res.ok) { const err = await res.json(); throw new Error(err.message || res.statusText); }

}

function renderRenovacionesCard() {
  const today = new Date();
  const activos = state.clients.filter(c => c.estado === 'ACTIVO');
  const rows = [];

  activos.forEach(c => {
    const isPresencial = (c.modalidad || '').toUpperCase() === 'PRESENCIAL';
    const plan = (c.plan || '').toUpperCase();

    if (isPresencial) {
      if (plan === 'SESION_SUELTA') return; // sesión suelta no aparece aquí

      const total = plan === 'BONO_8' ? 8 : plan === 'BONO_12' ? 12 : 0;
      if (total === 0) return;

      const usadas = (state.dashSesiones || []).filter(s => s.codigo_cliente === c.codigo).length;
      const restantes = Math.max(0, total - usadas);

      let dotClass, badgeClass, badgeText, diasTexto;
      if (restantes <= 0) {
        dotClass = 'urgent'; badgeClass = 'urgent';
        badgeText = 'AGOTADO'; diasTexto = 'Bono agotado — renovar';
      } else if (restantes <= 2) {
        dotClass = 'urgent'; badgeClass = 'urgent';
        badgeText = `${restantes} ses`; diasTexto = `Quedan ${restantes} sesión${restantes !== 1 ? 'es' : ''} — casi agotado`;
      } else if (restantes <= 4) {
        dotClass = 'soon'; badgeClass = 'soon';
        badgeText = `${restantes} ses`; diasTexto = `Quedan ${restantes} sesiones del bono`;
      } else {
        dotClass = 'ok'; badgeClass = 'ok';
        badgeText = `${restantes} ses`; diasTexto = `Quedan ${restantes} de ${total} sesiones`;
      }

      rows.push({ c, diasTexto, dotClass, badgeClass, badgeText, isPresencial: true, restantes, total });

    } else {
      const fechaStr = (() => {
        if (state.renovaciones[c.codigo]) return state.renovaciones[c.codigo];
        if (!c.fecha_inicio) return null;
        const inicio = new Date(c.fecha_inicio);
        const dias = plan === '6MESES' ? 180 : plan === '3MESES' ? 90 : 30;
        inicio.setDate(inicio.getDate() + dias);
        return inicio.toISOString().split('T')[0];
      })();

      let diasTexto = 'Sin fecha configurada';
      let dotClass = 'ok', badgeClass = 'ok', badgeText = 'OK';

      if (fechaStr) {
        const fecha = new Date(fechaStr);
        const diff = Math.ceil((fecha - today) / (1000 * 60 * 60 * 24));
        if (diff <= 0) {
          dotClass = 'urgent'; badgeClass = 'urgent';
          badgeText = 'VENCIDO'; diasTexto = 'Plan vencido';
        } else if (diff <= 5) {
          dotClass = 'urgent'; badgeClass = 'urgent';
          badgeText = `${diff}d`; diasTexto = `Renueva en ${diff} día${diff !== 1 ? 's' : ''}`;
        } else if (diff <= 10) {
          dotClass = 'soon'; badgeClass = 'soon';
          badgeText = `${diff}d`; diasTexto = `Renueva en ${diff} días`;
        } else {
          dotClass = 'ok'; badgeClass = 'ok';
          badgeText = `${diff}d`; diasTexto = `Próx. renovación: ${formatDateShort2(fecha)}`;
        }
      }

      rows.push({ c, diasTexto, dotClass, badgeClass, badgeText, isPresencial: false, fechaStr });
    }
  });

  rows.sort((a, b) => {
    const order = { urgent: 0, soon: 1, ok: 2 };
    return (order[a.dotClass] ?? 3) - (order[b.dotClass] ?? 3);
  });

  const urgentes = rows.filter(r => r.dotClass === 'urgent' || r.dotClass === 'soon').length;

  return `
    <div class="card">
      <div class="card-header" style="margin-bottom:12px;">
        <div class="card-title">🔔 Renovaciones${urgentes > 0 ? ` <span style="background:var(--danger);color:#fff;font-size:11px;padding:2px 7px;border-radius:10px;font-family:'DM Sans';font-weight:700;">${urgentes}</span>` : ''}</div>
      </div>
      ${rows.length === 0
        ? '<div class="empty" style="padding:20px 0;">Sin alertas de renovación</div>'
        : rows.map(r => {
            if (r.isPresencial) {
              const pct = Math.round((r.restantes / r.total) * 100);
              const barColor = r.restantes <= 2 ? 'var(--danger)' : r.restantes <= 4 ? 'var(--warning)' : 'var(--success)';
              return `
                <div class="alert-row">
                  <div class="alert-dot ${r.dotClass}"></div>
                  <div class="alert-info">
                    <div class="alert-name">${r.c.nombre}</div>
                    <div class="alert-detail">${r.diasTexto}</div>
                    <div style="margin-top:8px;width:140px;">
                      <div style="background:#1a1a1a;border-radius:999px;height:5px;overflow:hidden;">
                        <div style="width:${pct}%;height:100%;background:${barColor};border-radius:999px;transition:width .3s;"></div>
                      </div>
                      <div style="font-size:10px;color:var(--muted);margin-top:3px;">${r.restantes}/${r.total} sesiones</div>
                    </div>
                  </div>
                  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                    <span class="alert-badge ${r.badgeClass}">${r.badgeText}</span>
                    ${r.c.whatsapp ? `
                      <a href="https://wa.me/${r.c.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(`Hola ${r.c.nombre.split(' ')[0]} 👋, te quedan ${r.restantes} sesión${r.restantes !== 1 ? 'es' : ''} del bono. ¿Renovamos? 💪`)}"
                        target="_blank"
                        style="display:inline-flex;align-items:center;gap:5px;background:#25D366;color:#fff;
                        font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
                        text-decoration:none;white-space:nowrap;">
                        💬 WA
                      </a>` : ''}
                  </div>
                </div>`;
            } else {
              return `
                <div class="alert-row">
                  <div class="alert-dot ${r.dotClass}"></div>
                  <div class="alert-info">
                    <div class="alert-name">${r.c.nombre}</div>
                    <div class="alert-detail">${r.diasTexto}</div>
                    <div class="renov-input-wrap">
                      <input type="date" class="renov-input" data-renov="${r.c.codigo}" value="${r.fechaStr || ''}" />
                      <button class="btn-renov-save" data-renov-save="${r.c.codigo}">Guardar</button>

  function renderDetailHistorial(c) {
  // ESCUDO 1: Leemos registros o historial, lo que venga
  const historial = c.registros || c.historial || [];
  
  if (state.loadingDetail) return '<div class="loading">⚙ Cargando...</div>';
  if (historial.length === 0) return '<div class="empty">No hay sesiones registradas 📊</div>';

  const exerciseMap = {};

  historial.forEach(s => {
    if (s.ejercicio && s.series) {
      if (!exerciseMap[s.ejercicio]) exerciseMap[s.ejercicio] = [];
      
      // ⚡ ESCUDO 2 CORREGIDO: Buscamos números después de una 'x' o números sueltos seguidos de kg
      let pesosEnSerie = [];
      const textoSeries = s.series.toLowerCase();

      // Intento 1: Buscar el formato clásico "Repeticiones x Peso" (ej: 10x80 o 10 x 80)
      // Formato "10kg x 12" → peso es el número ANTES de kg
const matchesKgX = [...textoSeries.matchAll(/(\d+(?:\.\d+)?)\s*kg\s*[xX]\s*\d+/g)];
const matchesX   = [...textoSeries.matchAll(/(?:\d+\s*[xX]\s*)(\d+(?:\.\d+)?)/g)];
const matchesKg  = [...textoSeries.matchAll(/(\d+(?:\.\d+)?)\s*kg/g)];

if (matchesKgX.length > 0) {
  pesosEnSerie = matchesKgX.map(m => Math.round(parseFloat(m[1])));
} else if (matchesX.length > 0) {
  pesosEnSerie = matchesX.map(m => Math.round(parseFloat(m[1])));
} else if (matchesKg.length > 0) {
  pesosEnSerie = matchesKg.map(m => Math.round(parseFloat(m[1])));
}

      const pesoMaximo = pesosEnSerie.length > 0 ? Math.max(...pesosEnSerie) : 0;

      exerciseMap[s.ejercicio].push({ 
        fecha: s.fecha || "", 
        peso: pesoMaximo 
      });
    }
  });

  // ESCUDO 3: El sort a prueba de fallos que vimos en la conversación
  const exercisesWithData = Object.entries(exerciseMap).map(([nombre, data]) => ({
    nombre,
    data: data.sort((a, b) => {
      const fA = a.fecha ? new Date(a.fecha) : new Date(0);
      const fB = b.fecha ? new Date(b.fecha) : new Date(0);
      return fA - fB;
    })
  })).filter(e => e.data.some(d => d.peso > 0));

  let chartsHtml = '';
  if (exercisesWithData.length > 0) {
    chartsHtml += '<div class="charts-title" style="margin-bottom:15px;">📈 Progreso</div>';
    chartsHtml += '<div class="charts-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;">';
    
    exercisesWithData.forEach(ex => {
      const canvasId = 'chart_' + ex.nombre.replace(/[^a-zA-Z0-9]/g, '_');
      const pesos = ex.data.map(d => d.peso);
      const max = Math.max(...pesos);
      const last = pesos[pesos.length - 1];

      chartsHtml += `
        <div class="chart-card" style="background:#111;padding:15px;border-radius:12px;border:1px solid #222;">
          <div style="color:#fff;font-weight:700;margin-bottom:10px;">${ex.nombre}</div>
          <div style="height:150px;"><canvas id="${canvasId}"></canvas></div>
          <div style="color:#3b82f6;font-size:12px;margin-top:10px;font-weight:bold;">
            ÚLTIMO: ${last}kg | MÁXIMO: ${max}kg
          </div>
        </div>`;
    });
    chartsHtml += '</div>';
  }

  let sesionesHtml = '<div class="charts-title" style="margin-top:25px; margin-bottom:15px;">📋 Sesiones</div>';
  
  historial.forEach(s => {
    // ESCUDO 4: Si la fecha viene vacía (""), no llamamos a formatDate para que no explote
    const fechaSegura = s.fecha ? formatDate(s.fecha) : "Sin fecha registrada";

    sesionesHtml += `
      <div class="history-session" style="margin-bottom:15px;padding:15px;border:1px solid #333;border-radius:12px;background:#080808;">
        <div style="color:#888;font-size:12px;">${fechaSegura}</div>
        <div style="font-weight:700;color:#3b82f6;margin:5px 0;font-size:16px;">${s.ejercicio}</div>
        <div style="color:#eee;font-family:monospace;background:#000;padding:8px;border-radius:6px;border:1px solid #1a1a1a;">
          ${s.series}
        </div>
      </div>`;
  });

  return chartsHtml + sesionesHtml;
}
function renderDetailVolumen(c) {
  const historial = c.registros || c.historial || [];
  if (!historial.length) return '<div class="empty">No hay sesiones registradas para calcular volumen 📊</div>';

  const rangoSel = state.volumenRango || '4semanas';
  const metricaSel = state.volumenMetrica || 'tonelaje';

  const hoy = new Date();
  const dias = rangoSel === '1semana' ? 7 : rangoSel === '4semanas' ? 28 : null;
const desde = dias ? new Date(hoy.getTime() - dias * 86400000) : null;

  function getMuscle(nombre) {
    const found = EXERCISE_DB_LOCAL.find(e => e.name.toLowerCase() === (nombre||'').toLowerCase());
    return found ? found.muscle : 'Otro';
  }

  const porMusculo = {};
  historial.forEach(s => {
    if (!s.fecha) return; 
    if (desde && new Date(s.fecha) < desde) return;
    const musculo = getMuscle(s.ejercicio);
    if (!porMusculo[musculo]) porMusculo[musculo] = { series: 0, reps: 0, tonelaje: 0 };

    const bloques = (s.series || '').split(/\n|,/).map(b => b.trim()).filter(Boolean);
    
    bloques.forEach(b => {
      porMusculo[musculo].series += 1;
      let peso = 0;
      let reps = 0;

      const matchKgX = b.match(/(\d+(?:\.\d+)?)\s*kg\s*[xX]\s*(\d+)/i);
      const matchX   = b.match(/(\d+)\s*[xX]\s*(\d+(?:\.\d+)?)/);

      if (matchKgX) {
        peso = parseFloat(matchKgX[1]);
        reps = parseInt(matchKgX[2]);
      } else if (matchX) {
        reps = parseInt(matchX[1]);
        peso = parseFloat(matchX[2]);
      } else {
        const matchKg  = b.match(/(\d+(?:\.\d+)?)\s*kg/i);
        const matchRep = b.match(/(\d+)\s*rep/i);
        if (matchKg) peso = parseFloat(matchKg[1]);
        if (matchRep) reps = parseInt(matchRep[1]);
      }

      porMusculo[musculo].reps     += reps;
      porMusculo[musculo].tonelaje += (peso * reps);
    });
  });

  const musculos = Object.keys(porMusculo).sort((a,b) =>
    porMusculo[b][metricaSel] - porMusculo[a][metricaSel]
  );

  if (!musculos.length) return `<div class="empty">Sin sesiones en ${rangoSel === '1semana' ? 'la última semana' : 'las últimas 4 semanas'} 📊</div>`;

  const maxVal = Math.max(...musculos.map(m => porMusculo[m][metricaSel]));

  const MUSCLE_COLORS = {
    'Pecho':'#3b82f6','Espalda':'#8b5cf6','Cuádriceps':'#10b981',
    'Isquiotibiales':'#f59e0b','Glúteos':'#ec4899','Hombros':'#06b6d4',
    'Bíceps':'#f97316','Tríceps':'#ef4444','Core':'#84cc16',
    'Gemelos':'#a78bfa','Trapecios':'#fb7185','Deltoides Posterior':'#38bdf8',
    'Abductores':'#fbbf24','Aductores':'#34d399','Cardio':'#f43f5e','Otro':'#6b7280'
  };

  const barras = musculos.map(m => {
    const val = porMusculo[m][metricaSel];
    const pct = maxVal > 0 ? (val / maxVal * 100) : 0;
    const color = MUSCLE_COLORS[m] || '#6b7280';
    return `
      <div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <span style="font-size:13px;font-weight:600;color:#e2e8f0;">${m}</span>
          <span style="font-family:'Bebas Neue';font-size:16px;color:${color};">${metricaSel==='tonelaje' ? Math.round(val)+'kg' : metricaSel==='reps' ? val+' reps' : val+' series'}</span>
        </div>
        <div style="background:#1a1a2e;border-radius:999px;height:10px;overflow:hidden;">
          <div style="width:${pct}%;height:100%;background:${color};border-radius:999px;
            transition:width .4s ease;box-shadow:0 0 8px ${color}55;"></div>
        </div>
      </div>`;
  }).join('');

const haceUnaSemana = new Date(hoy); haceUnaSemana.setDate(hoy.getDate() - 7);
const haceDosemanas = new Date(hoy); haceDosemanas.setDate(hoy.getDate() - 14);

const porMusculoSemAnt = {};
historial.forEach(s => {
  if (!s.fecha) return;
  const f = new Date(s.fecha);
  if (f < haceDosemanas || f >= haceUnaSemana) return;

  const bloques = (s.series || '').split(/\n|,/).map(b => b.trim()).filter(Boolean);
  porMusculoSemAnt[musculo] += bloques.length || 1;
});
  
  const filasFatiga = musculos.map(m => {

function initCharts(data) {
  // ESCUDO 5: Por si le pasamos 'c' entero o 'c.registros' o 'c.historial' desde fuera
  const historial = Array.isArray(data) ? data : (data && data.registros ? data.registros : []);
  if (!historial || historial.length === 0) return;

  const exerciseMap = {};
  historial.forEach(s => {
    if (s.ejercicio && s.series) {
      if (!exerciseMap[s.ejercicio]) exerciseMap[s.ejercicio] = [];
      const pesosEnSerie = [...s.series.matchAll(/(\d+(?:\.\d+)?)\s*kg/g)].map(m => Math.round(parseFloat(m[1])));
      const pesoMaximo = pesosEnSerie.length > 0 ? Math.max(...pesosEnSerie) : 0;
      exerciseMap[s.ejercicio].push({ fecha: s.fecha || "", peso: pesoMaximo });
    }
  });

  Object.entries(exerciseMap).forEach(([nombre, data]) => {
    const pesosValidos = data.filter(d => d.peso > 0).sort((a,b) => {
      const fA = a.fecha ? new Date(a.fecha) : new Date(0);
      const fB = b.fecha ? new Date(b.fecha) : new Date(0);
      return fA - fB;
    });

    if (pesosValidos.length < 1) return;

    const canvasId = 'chart_' + nombre.replace(/[^a-zA-Z0-9]/g, '_');
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    if (window.chartInstances && window.chartInstances[canvasId]) {
      window.chartInstances[canvasId].destroy();
    }
    if (!window.chartInstances) window.chartInstances = {};

    window.chartInstances[canvasId] = new Chart(canvas, {
      type: 'line',
      data: {
        // ESCUDO 6: Protegemos formatDateShort contra fechas vacías en la gráfica
        labels: pesosValidos.map(d => d.fecha && typeof formatDateShort === 'function' ? formatDateShort(d.fecha) : ""),
        datasets: [{
          data: pesosValidos.map(d => d.peso),
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59, 130, 246, 0.1)',
          fill: true,
          tension: 0.4,
          pointRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { 
          y: { grid: { color: '#222' }, ticks: { color: '#666' } },
          x: { grid: { display: false }, ticks: { color: '#666' } }
        }
      }
    });
  });
}

    <div></div>
  </div>
  ${state.modalSeries.map((s, i) => `
    <div style="display:grid;grid-template-columns:26px 1fr 1fr 30px;gap:6px;
      margin-bottom:6px;align-items:center;">
      <div style="font-family:'Bebas Neue';font-size:18px;color:#1e90ff;
        text-align:center;line-height:1;">${i+1}</div>
      <input id="ms_reps_${i}" class="form-input" style="padding:7px 10px;"
        value="${s.reps}" placeholder="10-12"
        oninput="updateModalSerie(${i},'reps',this.value)" />
      <input id="ms_rir_${i}" class="form-input" style="padding:7px 10px;"
        value="${s.rir}" placeholder="1-2"
        oninput="updateModalSerie(${i},'rir',this.value)" />
      <button type="button" onclick="removeModalSerie(${i})"
        ${state.modalSeries.length <= 1 ? 'disabled' : ''}
        style="height:34px;background:${state.modalSeries.length<=1?'#111':'#1a0000'};
        border:1px solid ${state.modalSeries.length<=1?'#222':'#330000'};
        color:${state.modalSeries.length<=1?'#333':'#ff4444'};
        border-radius:6px;cursor:${state.modalSeries.length<=1?'default':'pointer'};font-size:12px;">✕
      </button>
    </div>`).join('')}
</div>
        <div class="form-row col2">
          <div class="form-group">
            <label class="form-label">Descanso</label>
            <input class="form-input" id="f_exDescanso" value="${ex.descanso || '90seg'}" />
          </div>
          <div class="form-group">
            <label class="form-label">Orden</label>

        <div class="form-group">
          <label class="form-label">Notas</label>
          <input class="form-input" id="f_exNotas" value="${ex.notas || ''}" placeholder="Técnica, bajada controlada..." />

          <button class="btn btn-ghost" id="modalCancel">Cancelar</button>
          <button class="btn btn-primary" id="modalConfirm">Guardar Cambios</button>
        </div>
      </div>
    </div>`;
}

      <div class="modal">

        <div class="modal-sub">${c?.nombre} — ${mes}</div>

function setExMuscleFilter(muscle) {
  state.exMuscleFilter = muscle;
  render();
  setTimeout(() => {
    const input = document.getElementById('f_exNombre');
    if (input) searchExDB(input.value);
  }, 50);
}

async function searchExDB(query) {
  const dropdown = document.getElementById('exdbDropdown');
  if (!dropdown) return;

  const q = (query || '').toLowerCase();
  const muscleFilter = state.exMuscleFilter || 'Todos';

  let results = EXERCISE_DB_LOCAL.filter(e => {
    const matchMuscle = muscleFilter === 'Todos' || e.muscle === muscleFilter;
    const matchQuery = !q || e.name.toLowerCase().includes(q);
    return matchMuscle && matchQuery;
  }).slice(0, 40);

  if (!results.length) { dropdown.style.display = 'none'; return; }
  dropdown.style.display = 'block';
  dropdown.innerHTML = results.map(ex => {
    const name = ex.name.replace(/'/g, "\\'");
    const muscle = ex.muscle.replace(/'/g, "\\'");
    return `
      <div onclick="selectExDB('${name}','${ex.gif}','${muscle}','')"
        style="padding:10px 14px;cursor:pointer;font-size:13px;
        border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:10px;"
        onmouseover="this.style.background='#1a1a1a'"
        onmouseout="this.style.background='transparent'">
        <img src="${ex.gif}" style="width:52px;height:52px;object-fit:cover;border-radius:4px;flex-shrink:0;" onerror="this.style.display='none'" />
        <div>
          <div style="color:#fff;font-weight:600;">${ex.name}</div>
          <div style="color:#555;font-size:11px;text-transform:uppercase;">${ex.muscle}</div>
        </div>
      </div>`;
  }).join('');
}

function selectExDB(name, gifUrl, bodyPart, equipment) {
  const dropdown = document.getElementById('exdbDropdown');
  if (dropdown) dropdown.style.display = 'none';

  // Si estamos en modal de ejercicio (añadir o editar)
  const exNombre = document.getElementById('f_exNombre');
  const exGifUrl = document.getElementById('f_exGifUrl');
  if (exNombre) exNombre.value = name;
  if (exGifUrl) exGifUrl.value = gifUrl;

  // Si estamos en modal de biblioteca
  const gifPreview  = document.getElementById('bib_gifPreview');
  const previewBox  = document.getElementById('bib_preview');
  const previewName = document.getElementById('bib_previewName');
  const previewMeta = document.getElementById('bib_previewMeta');
  if (gifPreview) gifPreview.src = gifUrl;
  if (previewName) previewName.textContent = name;
  if (previewMeta) previewMeta.textContent = bodyPart;
  if (previewBox) previewBox.style.display = 'flex';
  const set = (id,v) => { const el=document.getElementById(id); if(el) el.value=v; };
  set('bib_nombreEn', name);
  set('bib_gifUrl',   gifUrl);
  set('bib_musculo',  bodyPart);
  set('bib_equipo',   equipment);
  const nombreEs = document.getElementById('bib_nombreEs');
  if (nombreEs && !nombreEs.value) nombreEs.value = name;
}

function filterBibSearch(query) {
  const q = (query||"").toLowerCase();
  const dropdown = document.getElementById('bibExDropdown');
  if (!dropdown) return;
  const matches = state.biblioteca.filter(e =>

function generateResumen(notaEntrenador) {
  const c = state.clientDetail;
  if (!c) return;

  const historial = c.registros || c.historial || [];
  const hoy = new Date();
  const hace30 = new Date(); hace30.setDate(hace30.getDate() - 30);
  const sesionesUltimoMes = historial.filter(s => s.fecha && new Date(s.fecha) >= hace30);
  const totalSesiones = sesionesUltimoMes.length;

  function getMuscleLocal(nombre) {
    const found = EXERCISE_DB_LOCAL.find(e => e.name.toLowerCase() === (nombre||'').toLowerCase());
    return found ? found.muscle : 'Otro';
  }

  // Progreso ejercicios
  const ejerciciosUnicos = [...new Set(historial.map(s => s.ejercicio).filter(Boolean))];
  const progresoEjercicios = [];
  ejerciciosUnicos.forEach(nombre => {
    const sesEj = historial
      .filter(s => s.ejercicio === nombre && s.fecha)
      .sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
    if (sesEj.length < 2) return;
    const getPeso = s => {
      const pesos = [...(s.series||'').matchAll(/(\d+)\s*kg/g)].map(m => parseInt(m[1]));
      return pesos.length ? Math.max(...pesos) : 0;
    };
    const pesoInicio = getPeso(sesEj[0]);
    const pesoFinal  = getPeso(sesEj[sesEj.length-1]);
    if (pesoInicio > 0 && pesoFinal > 0)
      progresoEjercicios.push({ nombre, inicio: pesoInicio, final: pesoFinal, diff: pesoFinal - pesoInicio });
  });
  progresoEjercicios.sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff));
  const top5 = progresoEjercicios.slice(0,5);

  // Volumen por músculo
  const MCOLORS = {
    'Pecho':'#3b82f6','Espalda':'#8b5cf6','Cuádriceps':'#10b981',
    'Isquiotibiales':'#f59e0b','Glúteos':'#ec4899','Hombros':'#06b6d4',
    'Bíceps':'#f97316','Tríceps':'#ef4444','Core':'#84cc16',
    'Gemelos':'#a78bfa','Trapecios':'#fb7185','Otro':'#6b7280'
  };
  const porMusculo = {};
  sesionesUltimoMes.forEach(s => {
    const m = getMuscleLocal(s.ejercicio);
    if (!porMusculo[m]) porMusculo[m] = 0;
    const bloques = (s.series||'').split('\n').filter(Boolean);
    porMusculo[m] += bloques.length || 1;
  });
  const musculosSorted = Object.entries(porMusculo).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxSeries = musculosSorted.length ? Math.max(...musculosSorted.map(m=>m[1])) : 1;
  const musculoPrincipal = musculosSorted[0]?.[0] || '—';

  // Tonelaje
  let volumenTotal = 0;
  sesionesUltimoMes.forEach(s => {
    (s.series||'').split('\n').filter(Boolean).forEach(b => {
      const pesos = [...b.matchAll(/(\d+(?:\.\d+)?)\s*kg/g)].map(m=>parseFloat(m[1]));
      const reps  = [...b.matchAll(/(\d+)\s*rep/g)].map(m=>parseInt(m[1]));
      volumenTotal += (pesos.length ? Math.max(...pesos) : 0) * (reps.length ? reps[0] : 0);
    });
  });

  const mesActual = hoy.toLocaleDateString('es-ES',{month:'long',year:'numeric'});

  const progressRows = top5.map(ex => {
    const arrow = ex.diff > 0 ? '↑' : ex.diff < 0 ? '↓' : '→';
    const color = ex.diff > 0 ? '#16a34a' : ex.diff < 0 ? '#dc2626' : '#888';
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;
        padding:12px 0;border-bottom:1px solid #f0f0f0;">
        <div style="font-size:14px;font-weight:600;color:#1a1a1a;flex:1;">${ex.nombre}</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:13px;color:#888;">${ex.inicio}kg</span>
          <span style="font-size:20px;font-weight:900;color:${color};">${arrow}</span>
          <span style="font-size:15px;font-weight:700;color:${color};">${ex.final}kg</span>
          <span style="font-size:12px;font-weight:700;color:#fff;background:${color};
            padding:2px 8px;border-radius:999px;">${ex.diff>0?'+':''}${ex.diff}kg</span>
        </div>
      </div>`;
  }).join('');

  const muscleBars = musculosSorted.map(([m,series]) => {
    const pct = maxSeries > 0 ? (series/maxSeries*100) : 0;
    const color = MCOLORS[m] || '#6b7280';
    return `
      <div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
          <span style="font-size:13px;font-weight:600;color:#1a1a1a;">${m}</span>
          <span style="font-size:13px;font-weight:700;color:${color};">${series} series</span>
        </div>
        <div style="background:#e5e7eb;border-radius:999px;height:8px;overflow:hidden;">
          <div style="width:${pct}%;height:100%;background:${color};border-radius:999px;"></div>
        </div>
      </div>`;
  }).join('');

  const html = `<!DOCTYPE html>

    </div>

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;">

      <div style="font-family:'Bebas Neue';font-size:26px;line-height:1.2;color:#1a1a1a;">${musculoPrincipal}</div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-top:6px;">Músculo más trabajado</div>
    </div>
  </div>

  ${top5.length>0?`
  <div style="margin-bottom:28px;">
    <div style="font-family:'Bebas Neue';font-size:20px;letter-spacing:1px;color:#1a1a1a;
      margin-bottom:14px;display:flex;align-items:center;gap:8px;">

      PROGRESO EN EJERCICIOS CLAVE
    </div>
    <div style="background:#fafafa;border-radius:12px;padding:4px 16px;">${progressRows}</div>
  </div>`:''}

  ${musculosSorted.length>0?`

    if (r) s.reps = r.value;

function removeModalSerie(idx) {
  state.modalSeries.forEach((s, i) => {
    const r = document.getElementById(`ms_reps_${i}`);
    const v = document.getElementById(`ms_rir_${i}`);
    if (r) s.reps = r.value;
    if (v) s.rir  = v.value;
  });
  if (state.modalSeries.length > 1) { state.modalSeries.splice(idx, 1); render(); }
}

}

function bindEvents() {
  // Login
  const loginBtn = document.getElementById('loginBtn');
  if (loginBtn) {
    loginBtn.addEventListener('click', handleLogin);
    document.getElementById('passInput')?.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  }

  // Logout
  document.querySelectorAll('#logoutBtn').forEach(el => {
    el.addEventListener('click', () => { state = { ...state, screen: 'login', loginError: '', clients: [] }; render(); });
  });

  // Nav
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => {
      const nav = el.dataset.nav;
      state.screen = nav;
      if (nav === 'clients' || nav === 'dashboard') { state.selectedClient = null; state.clientDetail = null; }
      render();
    });
  });

  // Client cards / rows
  document.querySelectorAll('[data-client]').forEach(el => {
    el.addEventListener('click', () => loadClientDetail(el.dataset.client));
  });

  // Add client
  document.getElementById('addClientBtn')?.addEventListener('click', () => { state.modal = 'addClient'; render(); });
  document.getElementById('editClientBtn')?.addEventListener('click', () => { state.modal = 'addClient'; render(); });
  document.getElementById('generateResumenBtn')?.addEventListener('click', () => { state.modal = 'generateResumen'; render(); });
  
  // Add routine
  document.getElementById('addRutinaBtn')?.addEventListener('click', () => { state.modal = 'addRoutine'; render(); });

  // Edit Exercise
  document.querySelectorAll('[data-editex]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const exId = el.dataset.editex;
      const ejercicio = state.clientDetail.ejercicios.find(e => String(e.id) === String(exId));
      const repsArr = (ejercicio.repeticiones || '10-12').split(',').map(s => s.trim());
      const rirArr  = (ejercicio.rir || '1-2').split(',').map(s => s.trim());
      const cnt = Math.max(parseInt(ejercicio.series) || 1, repsArr.length);
      state.modalSeries = Array.from({length: cnt}, (_, i) => ({
        reps: repsArr[i] || repsArr[0] || '10-12',
        rir:  rirArr[i]  || rirArr[0]  || '1-2'
      }));
      state.modal = 'editExercise';
      state.modalData = { ejercicio };
      render();
    });
  });
  
  // Add Exercise
  document.querySelectorAll('[data-addex]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      state.modal = 'addExercise';
      state.modalSeries = [{reps: '10-12', rir: '1-2'}];
      state.modalData = { rutinaId: el.dataset.addex };
      render();
    });
  });

  // Toggle Routine
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.dataset.addex) return;
      const rutinaId = el.dataset.toggle;
      state.expandedRoutine = state.expandedRoutine == rutinaId ? null : rutinaId;
      render();
    });
  });

  // Tabs
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => { state.activeTab = el.dataset.tab; render(); });
  });

  // Food Search
  const foodSearchInput = document.getElementById('foodSearchInput');
  if (foodSearchInput) {
    foodSearchInput.addEventListener('input', e => {
      state.foodSearch = e.target.value;
      clearTimeout(window.foodSearchTimeout);
      window.foodSearchTimeout = setTimeout(() => {
        render();
        const input = document.getElementById('foodSearchInput');
        if (input) {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }
      }, 120);
    });
  }

  // Food Filter
  document.querySelectorAll('[data-food-filter]').forEach(el => {
    el.addEventListener('click', () => {
      state.foodCategory = el.dataset.foodFilter;
      render();
    });
  });

  // Modal Controls
  document.getElementById('modalCancel')?.addEventListener('click', () => { state.modal = null; render(); });
  document.getElementById('modalOverlay')?.addEventListener('click', e => { if (e.target.id === 'modalOverlay') { state.modal = null; render(); } });
  document.getElementById('modalConfirm')?.addEventListener('click', handleModalConfirm);

  // Renovaciones: save date
  document.querySelectorAll('[data-renov-save]').forEach(btn => {
    btn.addEventListener('click', () => {
      const codigo = btn.dataset.renovSave;
      const input = document.querySelector(`[data-renov="${codigo}"]`);
      if (input && input.value) {
        state.renovaciones[codigo] = input.value;
        state.alert = { type: 'success', msg: `✅ Fecha de renovación guardada para ${state.clients.find(c=>c.codigo===codigo)?.nombre}` };
        render();
      }
    });
  });
  
  // Biblioteca
  document.getElementById('addBibBtn')?.addEventListener('click', () => {
    state.modal = 'addBib'; render();
  });

  // Eliminar cliente
  document.querySelectorAll('[data-delclient]').forEach(el => {
    el.addEventListener('click', async e => {
      e.stopPropagation();
      const codigo = el.dataset.delclient;
      const nombre = el.dataset.delname;
      if (!confirm(`⚠️ ¿Eliminar a ${nombre}?\n\nEsto borrará el cliente de Supabase. Esta acción no se puede deshacer.`)) return;
      try {
        await supabase('clientes', { method: 'DELETE', filter: `codigo=eq.${codigo}` });
        state.clients = state.clients.filter(c => c.codigo !== codigo);
        state.alert = { type: 'success', msg: `✅ Cliente "${nombre}" eliminado` };
        render();
      } catch(err) {
        state.alert = { type: 'error', msg: `❌ Error al eliminar: ${err.message}` };
        render();
      }
    });
  });

  // Eliminar Biblioteca
  document.querySelectorAll('[data-delbib]').forEach(el => {
    el.addEventListener('click', async e => {
      e.stopPropagation();
      if (!confirm('¿Eliminar de la biblioteca?')) return;
      await supabase('ejercicios_biblioteca', { method: 'DELETE', filter: `id=eq.${el.dataset.delbib}` });
      await loadBiblioteca();
    });
  });

  // Biblioteca Search
  const bibSearchInput = document.getElementById('bibSearchInput');
  if (bibSearchInput) {
    bibSearchInput.addEventListener('input', e => {
      state.bibSearch = e.target.value;
      clearTimeout(window._bibTimer);
      window._bibTimer = setTimeout(() => render(), 200);
    });
  }
}

// ── HANDLERS ──
async function handleLogin() {
  const pass = document.getElementById('passInput')?.value;
  if (pass !== 'JCTrainer2025') {
    state.loginError = 'Contraseña incorrecta';
    render();
    return;
  }
  state.screen = 'dashboard';
  state.loginError = '';
  render();
  loadClients();
  loadExerciseCache();
}

async function handleModalConfirm() {
  const alertEl = document.getElementById('modalAlert');

  if (state.modal === 'addClient') {
    const nombre = document.getElementById('f_nombre')?.value?.trim().toUpperCase();
    const plan = document.getElementById('f_plan')?.value?.toUpperCase();
    const modalidad = document.getElementById('f_modalidad')?.value?.toUpperCase();
    const revision = modalidad === 'PRESENCIAL' ? null : 'SEMANAL';
    const objetivo = document.getElementById('f_objetivo')?.value?.toUpperCase();
    const estadopago = document.getElementById('f_estadopago')?.value?.toUpperCase();
    const genero = document.getElementById('f_genero')?.value?.toUpperCase();
    const email = document.getElementById('f_email')?.value?.trim().toUpperCase();
    const whatsapp = document.getElementById('f_whatsapp')?.value?.trim().toUpperCase();
    const origen = document.getElementById('f_origen')?.value?.toUpperCase();
    const fecha = document.getElementById('f_fecha')?.value;
    const condicion = document.getElementById('f_condicion')?.value?.trim().toUpperCase();
    const notas = document.getElementById('f_notas')?.value?.trim() || '';
    const letras = nombre.substring(0,3).toUpperCase();
    const numeros = Math.floor(1000 + Math.random() * 9000);
    const codigo = `${letras}${numeros}`;
       
    if (!nombre) { alertEl.innerHTML = '<div class="alert alert-error">El nombre es obligatorio</div>'; return; }

    const btn = document.getElementById('modalConfirm');
    const isEdit = !!state.clientDetail?.codigo;

    btn.textContent = isEdit ? 'Guardando...' : 'Creando...';
    btn.disabled = true;

    try {
      const payload = {
        nombre,
        codigo: isEdit ? state.clientDetail.codigo : codigo,
        plan,
        modalidad,
        revision,
        objetivo,
        genero,
        estadopago,
        email,
        whatsapp,
        origen,
        fecha,
        condicion
      };

      let data;
      if (isEdit) {
        await supabase('clientes', {
          method: 'PATCH',
          filter: `codigo=eq.${state.clientDetail.codigo}`,
          body: {
            nombre: payload.nombre || null,
            codigo: payload.codigo || null,
            plan: payload.plan || null,
            modalidad: payload.modalidad || null,
            revision: payload.revision || null,
            objetivo: payload.objetivo || null,
            genero: payload.genero || null,
            estado_pago: payload.estadopago || null,
            estado_cliente: 'ACTIVO',
            email: payload.email || null,
            whatsapp: payload.whatsapp || null,
            origen: payload.origen || null,
            fecha_inicio: payload.fecha || null,
            condicion_medica: payload.condicion || null,
            notas: payload.notas || null
          }
        });
        data = { ok: true };
      } else {
        await supabase('clientes', {
          method: 'POST',
          body: {
            nombre: payload.nombre,
            codigo: payload.codigo,
            plan: payload.plan,
            modalidad: payload.modalidad,
            revision: payload.revision,
            objetivo: payload.objetivo,
            genero: payload.genero,
            estado_pago: payload.estadopago,
            estado_cliente: 'ACTIVO',
            email: payload.email,
            whatsapp: payload.whatsapp,
            origen: payload.origen,
            fecha_inicio: payload.fecha || null,
            condicion_medica: payload.condicion,
            notas: payload.notas || null
          }
        });
        data = { ok: true, codigo: payload.codigo };
      }

      state.modal = null;
      state.alert = {
        type: 'success',
        msg: isEdit
          ? `✅ Cliente ${nombre} actualizado`
          : `✅ Cliente ${nombre} creado con código ${data.codigo}`
      };

      await loadClients();
      if (isEdit) {
        await loadClientDetail(state.clientDetail.codigo);
      }
    } catch(e) {
      alertEl.innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
      btn.textContent = isEdit ? 'Guardar Cambios' : 'Crear Cliente';
      btn.disabled = false;
    }
    return;
  } // Termina addClient de forma limpia y la función global SIGUE abierta

  if (state.modal === 'addRoutine') {
    const nombre = document.getElementById('f_rutNombre')?.value?.trim();
    const orden = parseInt(document.getElementById('f_rutOrden')?.value) || 1;
    if (!nombre) { alertEl.innerHTML = '<div class="alert alert-error">Nombre y código son obligatorios</div>'; return; }
    const btn = document.getElementById('modalConfirm');
    btn.textContent = 'Creando...'; btn.disabled = true;
    try {
      const rutinaId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'rut-' + Math.random().toString(36).substr(2, 9);
      await supabase('rutinas', {
        method: 'POST',
        body: { nombre, cliente_id: state.clientDetail.id, codigo_cliente: state.clientDetail.codigo, orden, id: rutinaId }
      });
      state.modal = null;
      state.alert = { type: 'success', msg: `✅ Rutina "${nombre}" creada` };
      await loadClientDetail(state.clientDetail.codigo);
    } catch(e) {
      alertEl.innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
      btn.textContent = 'Crear Rutina'; btn.disabled = false;
    }
    return;
  }

  if (state.modal === 'editExercise') {
    const ex = state.modalData.ejercicio;
    const nombre = document.getElementById('f_exNombre')?.value?.trim();
    const series = parseInt(document.getElementById('f_exSeries')?.value) || 3;
    const repeticiones = document.getElementById('f_exReps')?.value?.trim() || '10-12';
    const rir = document.getElementById('f_exRir')?.value?.trim() || '1-2';
    const descanso = document.getElementById('f_exDescanso')?.value?.trim() || '90seg';
    const notas = document.getElementById('f_exNotas')?.value?.trim() || '';
    const orden = parseInt(document.getElementById('f_exOrden')?.value) || 1;
    if (!nombre) { document.getElementById('modalAlert').innerHTML = '<div class="alert alert-error">El nombre es obligatorio</div>'; return; }
    const btn = document.getElementById('modalConfirm');
    btn.textContent = 'Guardando...'; btn.disabled = true;
    const gif_url = document.getElementById('f_exGifUrl')?.value || '';
    try {
      await supabase('ejercicios', {
        method: 'PATCH',
        filter: `id=eq.${ex.id}`,
        body: { nombre, series, repeticiones, rir, descanso, notas, orden, gif_url }
      });
      state.modal = null;
      state.expandedRoutine = ex.rutina_id;
      state.alert = { type: 'success', msg: `✅ Ejercicio "${nombre}" actualizado` };
      await loadClientDetail(state.clientDetail.codigo);
    } catch(e) {
      document.getElementById('modalAlert').innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
      btn.textContent = 'Guardar Cambios'; btn.disabled = false;
    }
    return;
  }
       
  if (state.modal === 'generateResumen') {
    const nota = document.getElementById('f_notaResumen')?.value?.trim() || '';
    state.modal = null;
    render();
    generateResumen(nota);
    return;
  }

  if (state.modal === 'addExercise') {
    const nombre = document.getElementById('f_exNombre')?.value?.trim();
    const series = parseInt(document.getElementById('f_exSeries')?.value) || 3;
    const repeticiones = document.getElementById('f_exReps')?.value?.trim() || '10-12';
    const rir = document.getElementById('f_exRir')?.value?.trim() || '1-2';
    const descanso = document.getElementById('f_exDescanso')?.value?.trim() || '90seg';
    const notas = document.getElementById('f_exNotas')?.value?.trim() || '';
    const orden = parseInt(document.getElementById('f_exOrden')?.value) || 1;
    if (!nombre) { alertEl.innerHTML = '<div class="alert alert-error">El nombre es obligatorio</div>'; return; }
    const btn = document.getElementById('modalConfirm');
    btn.textContent = 'Añadiendo...'; btn.disabled = true;
    const gif_url = document.getElementById('f_exGifUrl')?.value || '';
    try {
      const exId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'ex-' + Math.random().toString(36).substr(2, 9);
      await supabase('ejercicios', {
        method: 'POST',
        body: { id: exId, nombre, rutina_id: state.modalData.rutinaId, series, repeticiones, rir, descanso, notas, orden, gif_url }
      });
      state.modal = null;
      state.expandedRoutine = state.modalData.rutinaId;
      state.alert = { type: 'success', msg: `✅ Ejercicio "${nombre}" añadido` };
      await loadClientDetail(state.clientDetail.codigo);
    } catch(e) {
      alertEl.innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
      btn.textContent = 'Añadir Ejercicio'; btn.disabled = false;
    }
    return;
  }

  if (state.modal === 'addBib') {
    const nombre_es = document.getElementById('bib_nombreEs')?.value?.trim();
    const nombre_en = document.getElementById('bib_nombreEn')?.value || '';
    const gif_url   = document.getElementById('bib_gifUrl')?.value   || '';
    const musculo   = document.getElementById('bib_musculo')?.value  || '';
    const equipo    = document.getElementById('bib_equipo')?.value   || '';
    if (!nombre_es || !gif_url) {
      alertEl.innerHTML = '<div class="alert alert-error">Selecciona un ejercicio y pon nombre en español</div>';
      return;
    }
    const btn = document.getElementById('modalConfirm');
    btn.textContent = 'Guardando...'; btn.disabled = true;
    try {
      await supabase('ejercicios_biblioteca', {
        method: 'POST',
        body: { nombre_es, nombre_en, gif_url, musculo, equipo }
      });
      state.modal = null;
      state.alert = { type:'success', msg:`Ejercicio guardado en biblioteca` };
      await loadBiblioteca();
    } catch(e) {
      alertEl.innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
      btn.textContent = 'Guardar en Biblioteca'; btn.disabled = false;
    }
    return;
  }
} // <--- AHORA SÍ: Esta llave cierra TODA la función de forma impecable.
     
// ── API ──
async function loadClients() {
  state.loadingClients = true; render();
  try {
    const data = await supabase('clientes', { select: '*', filter: 'order=nombre.asc' });
    state.clients = data.map(c => ({
      ...c,
      estado: c.estado_cliente
    }));
  } catch(e) { console.error(e); state.clients = []; }
  state.loadingClients = false;
  // Cargar sesiones para el dashboard
  try {
    const sesiones = await supabase('sesiones', { filter: 'order=fecha.desc' });
    state.dashSesiones = sesiones;
  } catch(e) { state.dashSesiones = []; }
  render();
}

async function loadBiblioteca() {
  state.loadingBiblioteca = true; render();
  try {
    const data = await supabase('ejercicios_biblioteca', { filter: 'order=nombre_es.asc' });
    state.biblioteca = data;
  } catch(e) { state.biblioteca = []; }
  state.loadingBiblioteca = false; render();
}

async function loadClientDetail(codigo) {
  state.screen = 'detail'; state.loadingDetail = true;
  state.activeTab = 'rutinas'; state.expandedRoutine = null;
  state.clientDetail = state.clients.find(c => c.codigo === codigo) || null;
  render();
  try {
    const cliente = state.clients.find(c => c.codigo === codigo);
    const clienteId = cliente?.id;
    const [rutinas, ejercicios, sesiones] = await Promise.all([
      supabase('rutinas', { filter: `cliente_id=eq.${clienteId}&order=orden.asc` }),
      supabase('ejercicios', { filter: `rutina_id=in.(${await getRutinaIds(clienteId)})&order=orden.asc` }),
      supabase('sesiones', { filter: `codigo_cliente=eq.${codigo}&order=fecha.desc` })
    ]);
    state.clientDetail = {
      ...state.clientDetail,
      rutinas,
      ejercicios,
      historial: sesiones.map(s => ({
        fecha: s.fecha,
        ejercicio: s.ejercicio,
        series: s.series_detalle
      }))
    };
  } catch(e) {
    console.error(e);
    state.clientDetail = { ...state.clientDetail, rutinas: [], ejercicios: [], historial: [] };
  }
  state.loadingDetail = false; render();
}

async function getRutinaIds(clienteId) {
  try {
    const r = await supabase('rutinas', { select: 'id', filter: `cliente_id=eq.${clienteId}` });
    if (!r.length) return 'null';
    return r.map(x => x.id).join(',');
  } catch { return 'null'; }
}

// ── UTILS ──
function formatDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' }); }
  catch { return iso; }
}
function formatDateShort(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }); }
  catch { return iso; }
}
function formatDateShort2(date) {
  try { return date.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' }); }
  catch { return ''; }
}

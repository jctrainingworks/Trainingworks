<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JC Training — Panel Entrenador</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Barlow:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --card: #181818;
      --border: #222;
      --blue: #1e90ff;
      --yellow: #e8ff00;
      --text: #f0f0f0;
      --muted: #666;
      --danger: #ff4444;
      --radius: 10px;
      --mobile-nav-h: 64px;
      --mobile-header-h: 56px;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #0d2040 0%, #0a0a0a 70%);
      padding: 20px;
    }
    .login-box {
      width: 100%; max-width: 400px; padding: 48px 40px;
      background: #111; border: 1px solid #1e90ff33; border-radius: 16px;
      text-align: center;
    }
    @media (max-width: 480px) {
      .login-box { padding: 36px 24px; }
    }
    .login-logo { font-family: 'Bebas Neue'; font-size: 42px; color: var(--blue); letter-spacing: 2px; }
    .login-sub { font-family: 'Barlow'; font-size: 11px; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }
    .login-label { font-size: 12px; color: var(--muted); text-align: left; display: block; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
    .login-input {
      width: 100%; padding: 13px 16px; background: #0d0d0d; border: 1px solid #2a2a2a;
      color: var(--text); border-radius: 8px; font-family: 'DM Sans'; font-size: 15px;
      outline: none; transition: border .15s; margin-bottom: 20px; letter-spacing: 2px;
    }
    .login-input:focus { border-color: var(--blue); }
    .login-btn {
      width: 100%; padding: 14px; background: var(--blue); color: #fff;
      border: none; border-radius: 8px; font-family: 'Bebas Neue'; font-size: 20px;
      letter-spacing: 2px; cursor: pointer; transition: filter .15s;
    }
    .login-btn:hover { filter: brightness(1.1); }
    .login-error { color: #ff6b6b; font-size: 13px; margin-bottom: 12px; }

    /* ── LAYOUT ── */
    .app { display: flex; min-height: 100vh; }

    /* ── SIDEBAR (desktop only) ── */
    .sidebar {
      width: 240px; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 24px 20px; border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .brand { font-family: 'Bebas Neue'; font-size: 22px; color: var(--blue); letter-spacing: 1px; }
    .sidebar-logo .role { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: 8px; cursor: pointer; color: var(--muted); font-size: 14px;
      font-weight: 500; transition: all .15s; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: #1a1a1a; color: var(--text); }
    .nav-item.active { background: #0d2040; color: var(--blue); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
    .btn-logout {
      width: 100%; padding: 10px; background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; font-family: 'DM Sans'; font-size: 13px;
      cursor: pointer; transition: all .15s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── MOBILE TOP HEADER ── */
    .mobile-header {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--mobile-header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      align-items: center;
      padding: 0 16px;
      justify-content: space-between;
    }
    .mobile-header .brand {
      font-family: 'Bebas Neue'; font-size: 22px; color: var(--blue); letter-spacing: 1px;
    }
    .mobile-header-right {
      display: flex; align-items: center; gap: 8px;
    }
    .mobile-logout-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 7px;
      font-family: 'DM Sans'; font-size: 12px;
      padding: 6px 12px; cursor: pointer; transition: all .15s;
    }
    .mobile-logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── MOBILE BOTTOM NAV ── */
    .mobile-bottom-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--mobile-nav-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 100;
      align-items: stretch;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .mobile-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; cursor: pointer; background: none; border: none;
      color: var(--muted); font-family: 'DM Sans'; font-size: 10px; font-weight: 600;
      letter-spacing: .5px; text-transform: uppercase; transition: color .15s;
      padding: 8px 4px;
    }
    .mobile-nav-item.active { color: var(--blue); }
    .mobile-nav-item .nav-icon { font-size: 20px; width: auto; }
    .mobile-nav-dot {
      width: 4px; height: 4px; border-radius: 50%; background: var(--blue);
      opacity: 0; transition: opacity .15s; margin-top: 2px;
    }
    .mobile-nav-item.active .mobile-nav-dot { opacity: 1; }

    /* ── MAIN ── */
    .main { margin-left: 240px; flex: 1; padding: 32px; min-height: 100vh; }
    .page-title { font-family: 'Bebas Neue'; font-size: 36px; letter-spacing: 1px; margin-bottom: 6px; }
    .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    /* ── STATS ROW ── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; display: flex; flex-direction: column; gap: 6px;
    }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-family: 'Bebas Neue'; font-size: 40px; color: var(--blue); line-height: 1; }
    .stat-note { font-size: 12px; color: var(--muted); }

    /* ── CARDS ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 16px;
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
    }
    .card-title { font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: .05em; color: var(--text); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 7px; border: none;
      font-family: 'DM Sans'; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: #444; }
    .btn-danger { background: #1a0000; color: var(--danger); border: 1px solid #330000; }
    .btn-danger:hover { background: #220000; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-xs { padding: 4px 10px; font-size: 12px; }

    /* ── CLIENT GRID ── */
    .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .client-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
    }
    .client-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--blue); opacity: 0; transition: opacity .2s;
    }
    .client-card:hover { border-color: #333; transform: translateY(-1px); }
    .client-card:hover::before { opacity: 1; }
    .client-name { font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: .5px; margin-bottom: 8px; }
    .client-code { font-family: monospace; font-size: 12px; color: var(--blue); background: #0d2040; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
    .client-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .tag-premium { background: #001a2a; color: #00bcd4; border: 1px solid #003a4a; }
    .tag-elite   { background: #1a0010; color: #ff6b9d; border: 1px solid #3a0020; }
    .tag-essential { background: #1a1a00; color: var(--yellow); border: 1px solid #3a3a00; }
    .tag-activo  { background: #001a00; color: #4caf50; border: 1px solid #003a00; }
    .tag-inactivo { background: #1a0000; color: #ff4444; border: 1px solid #3a0000; }

    /* ── INPUTS ── */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 13px; background: #0d0d0d; border: 1px solid #2a2a2a;
      color: var(--text); border-radius: 7px; font-family: 'DM Sans'; font-size: 14px;
      outline: none; transition: border .15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--blue); }
    .form-select option { background: #111; }
    .form-row { display: grid; gap: 12px; }
    .form-row.col2 { grid-template-columns: 1fr 1fr; }
    .form-row.col3 { grid-template-columns: 1fr 1fr 1fr; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--surface); border: 1px solid #2a2a2a; border-radius: 14px;
      padding: 32px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-family: 'Bebas Neue'; font-size: 26px; margin-bottom: 6px; color: var(--blue); }
    .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* ── DETAIL VIEW ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 14px;
      cursor: pointer; margin-bottom: 20px; background: none; border: none; padding: 0;
      transition: color .15s;
    }
    .back-btn:hover { color: var(--text); }
    .detail-header {
      background: linear-gradient(135deg, #0d1a30, #111827);
      border: 1px solid #1e3a5f; border-radius: var(--radius);
      padding: 24px; margin-bottom: 20px;
    }
    .detail-name { font-family: 'Bebas Neue'; font-size: 38px; letter-spacing: 1px; }
    .detail-meta { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; align-items: center; }

    /* ── ROUTINE SECTION ── */
    .routine-block { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
    .routine-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px; background: #141414; border-bottom: 1px solid #1a1a1a; cursor: pointer;
    }
    .routine-name { font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: .5px; }
    .routine-code { font-family: monospace; font-size: 11px; color: var(--blue); }
    .routine-body { padding: 12px 18px; }
    .ex-row {
      display: grid; grid-template-columns: 1fr 50px 60px 40px 70px;
      gap: 8px; padding: 10px 0; border-bottom: 1px solid #1a1a1a;
      align-items: center; font-size: 13px;
    }
    .ex-row:last-child { border-bottom: none; }
    .ex-name { font-weight: 600; font-size: 14px; }
    .ex-val { text-align: center; color: var(--blue); font-weight: 700; }
    .ex-head { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; text-align: center; }

    /* ── HISTORY ── */
    .history-session {
      background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 8px;
      padding: 16px 18px; margin-bottom: 10px;
    }
    .history-date { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: 600; }
    .history-routine { font-family: 'Bebas Neue'; font-size: 16px; color: var(--blue); margin-bottom: 8px; }
    .history-ex { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid #151515; }
    .history-ex:last-child { border-bottom: none; }

    /* ── LOADING / EMPTY ── */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .loading-spin { font-size: 30px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }

    /* ── ALERTS ── */
    .alert { padding: 12px 16px; border-radius: 7px; font-size: 13px; margin-bottom: 12px; }
    .alert-success { background: #001a00; border: 1px solid #003a00; color: #4caf50; }
    .alert-error { background: #1a0000; border: 1px solid #3a0000; color: #ff6b6b; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #111; border-radius: 9px; padding: 4px; border: 1px solid var(--border); }
    .tab { flex: 1; padding: 9px; border-radius: 6px; border: none; font-family: 'DM Sans'; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--muted); transition: all .2s; }
    .tab.active { background: var(--card); color: var(--text); border: 1px solid var(--border); }

    /* ══════════════════════════════════════
       RESPONSIVE — TABLET (≤1024px)
    ══════════════════════════════════════ */
    @media (max-width: 1024px) {
      .sidebar { width: 200px; }
      .main { margin-left: 200px; padding: 28px 24px; }
      .stats-row { gap: 12px; }
      .stat-value { font-size: 34px; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — MOBILE (≤768px)
    ══════════════════════════════════════ */
    @media (max-width: 768px) {

      /* Hide desktop sidebar, show mobile chrome */
      .sidebar { display: none; }
      .mobile-header { display: flex; }
      .mobile-bottom-nav { display: flex; }

      /* Main content: account for top header + bottom nav */
      .main {
        margin-left: 0;
        padding: 16px;
        padding-top: calc(var(--mobile-header-h) + 16px);
        padding-bottom: calc(var(--mobile-nav-h) + 16px);
      }

      /* Page titles smaller */
      .page-title { font-size: 28px; margin-bottom: 4px; }
      .page-sub { margin-bottom: 20px; }

      /* Stats: 2 columns on mobile */
      .stats-row {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
      }
      .stat-card { padding: 16px; gap: 4px; }
      .stat-value { font-size: 36px; }
      .stat-label { font-size: 10px; }

      /* Client grid: 1 column */
      .client-grid { grid-template-columns: 1fr; gap: 10px; }

      /* Cards */
      .card { padding: 16px; }
      .card-title { font-size: 16px; }

      /* Forms */
      .form-row.col2, .form-row.col3 { grid-template-columns: 1fr; }

      /* Detail view */
      .detail-header { padding: 18px; }
      .detail-name { font-size: 30px; }

      /* Exercise table: condensed on mobile */
      .ex-row {
        grid-template-columns: 1fr 40px 50px 35px 55px;
        gap: 4px;
        font-size: 12px;
      }
      .ex-name { font-size: 13px; }

      /* Routine header */
      .routine-header { padding: 12px 14px; }
      .routine-body { padding: 10px 14px; }

      /* Modal: full width on mobile */
      .modal-overlay { padding: 12px; align-items: flex-end; }
      .modal {
        border-radius: 16px 16px 0 0;
        max-height: 88vh;
        padding: 24px 20px;
      }

      /* Clients page header */
      .clients-header {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 12px;
        margin-bottom: 20px !important;
      }
      .clients-header .btn { width: 100%; justify-content: center; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — SMALL MOBILE (≤380px)
    ══════════════════════════════════════ */
    @media (max-width: 380px) {
      .stats-row { grid-template-columns: 1fr; }
      .stat-value { font-size: 40px; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script>
const WORKER_URL = 'https://jc-training-notion.jctrainingworks.workers.dev';
const TRAINER_PASS = 'JCTrainer2025';

// ── STATE ──
let state = {
  screen: 'login',
  loginError: '',
  clients: [],
  loadingClients: false,
  selectedClient: null,
  clientDetail: null,
  loadingDetail: false,
  modal: null,
  modalData: {},
  alert: null,
  activeTab: 'rutinas',
  expandedRoutine: null,
};

// ── RENDER ──
function render() {
  const root = document.getElementById('root');
  if (state.screen === 'login') {
    root.innerHTML = renderLogin();
  } else {
    root.innerHTML = `
      <div class="app">
        ${renderSidebar()}
        ${renderMobileHeader()}
        <main class="main">
          ${renderMain()}
        </main>
        ${renderMobileBottomNav()}
      </div>
      ${state.modal ? renderModal() : ''}
    `;
  }
  bindEvents();
}

function renderLogin() {
  return `
    <div class="login-wrap">
      <div class="login-box">
        <div class="login-logo">JC TRAINING</div>
        <div class="login-sub">Panel Entrenador</div>
        ${state.loginError ? `<div class="login-error">${state.loginError}</div>` : ''}
        <label class="login-label">Contraseña</label>
        <input class="login-input" type="password" id="passInput" placeholder="••••••••••••" />
        <button class="login-btn" id="loginBtn">ACCEDER</button>
      </div>
    </div>
  `;
}

// ── DESKTOP SIDEBAR ──
function renderSidebar() {
  const navItems = [
    { id: 'dashboard', icon: '⚡', label: 'Dashboard' },
    { id: 'clients', icon: '👥', label: 'Clientes' },
  ];
  return `
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="brand">JC TRAINING</div>
        <div class="role">Panel Entrenador</div>
      </div>
      <nav class="sidebar-nav">
        ${navItems.map(item => `
          <button class="nav-item ${state.screen === item.id || (state.screen === 'detail' && item.id === 'clients') ? 'active' : ''}" data-nav="${item.id}">
            <span class="nav-icon">${item.icon}</span>
            ${item.label}
          </button>
        `).join('')}
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>
  `;
}

// ── MOBILE HEADER ──
function renderMobileHeader() {
  const titles = {
    dashboard: 'Dashboard',
    clients: 'Clientes',
    detail: state.clientDetail?.nombre || 'Cliente',
  };
  return `
    <header class="mobile-header">
      <div class="brand">JC TRAINING</div>
      <div class="mobile-header-right">
        <button class="mobile-logout-btn" id="logoutBtn">Salir</button>
      </div>
    </header>
  `;
}

// ── MOBILE BOTTOM NAV ──
function renderMobileBottomNav() {
  const navItems = [
    { id: 'dashboard', icon: '⚡', label: 'Dashboard' },
    { id: 'clients', icon: '👥', label: 'Clientes' },
  ];
  return `
    <nav class="mobile-bottom-nav">
      ${navItems.map(item => {
        const isActive = state.screen === item.id || (state.screen === 'detail' && item.id === 'clients');
        return `
          <button class="mobile-nav-item ${isActive ? 'active' : ''}" data-nav="${item.id}">
            <span class="nav-icon">${item.icon}</span>
            <span>${item.label}</span>
            <div class="mobile-nav-dot"></div>
          </button>
        `;
      }).join('')}
    </nav>
  `;
}

function renderMain() {
  if (state.alert) {
    setTimeout(() => { state.alert = null; render(); }, 3000);
  }
  const alertHtml = state.alert ? `<div class="alert alert-${state.alert.type}">${state.alert.msg}</div>` : '';

  if (state.screen === 'dashboard') return alertHtml + renderDashboard();
  if (state.screen === 'clients') return alertHtml + renderClients();
  if (state.screen === 'detail') return alertHtml + renderDetail();
  return '';
}

function renderDashboard() {
  const activos = state.clients.filter(c => c.estado === 'ACTIVO').length;
  const premium = state.clients.filter(c => c.plan === 'PREMIUM').length;
  const elite = state.clients.filter(c => c.plan === 'ELITE').length;
  return `
    <div class="page-title">Dashboard</div>
    <div class="page-sub">Resumen de tu negocio</div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Clientes Activos</div>
        <div class="stat-value">${activos}</div>
        <div class="stat-note">de ${state.clients.length} totales</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Premium</div>
        <div class="stat-value">${premium}</div>
        <div class="stat-note">99€/mes</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Elite</div>
        <div class="stat-value">${elite}</div>
        <div class="stat-note">149€/mes</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">Clientes recientes</div>
        <button class="btn btn-primary btn-sm" data-nav="clients">Ver todos</button>
      </div>
      ${state.clients.length === 0
        ? '<div class="empty">Cargando clientes...</div>'
        : state.clients.slice(0, 4).map(c => renderClientRow(c)).join('')
      }
    </div>
  `;
}

function renderClients() {
  return `
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px;" class="clients-header">
      <div>
        <div class="page-title">Clientes</div>
        <div class="page-sub">${state.clients.length} cliente${state.clients.length !== 1 ? 's' : ''} registrados</div>
      </div>
      <button class="btn btn-primary" id="addClientBtn">+ Nuevo Cliente</button>
    </div>
    ${state.loadingClients
      ? '<div class="loading"><div class="loading-spin">⚙</div><div>Cargando clientes...</div></div>'
      : state.clients.length === 0
        ? '<div class="empty">No hay clientes aún. ¡Añade el primero!</div>'
        : `<div class="client-grid">${state.clients.map(c => renderClientCard(c)).join('')}</div>`
    }
  `;
}

function renderClientCard(c) {
  const planTag = `tag-${(c.plan || 'essential').toLowerCase()}`;
  const estadoTag = c.estado === 'ACTIVO' ? 'tag-activo' : 'tag-inactivo';
  return `
    <div class="client-card" data-client="${c.codigo}">
      <div class="client-name">${c.nombre}</div>
      <div class="client-code">${c.codigo}</div>
      <div class="client-tags">
        <span class="tag ${planTag}">${c.plan || 'ESSENTIAL'}</span>
        <span class="tag ${estadoTag}">${c.estado || 'ACTIVO'}</span>
        ${c.objetivo ? `<span class="tag" style="background:#111;border:1px solid #333;color:#888;">${c.objetivo}</span>` : ''}
      </div>
    </div>
  `;
}

function renderClientRow(c) {
  const planTag = `tag-${(c.plan || 'essential').toLowerCase()}`;
  return `
    <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;" data-client="${c.codigo}">
      <div style="width:38px;height:38px;border-radius:50%;background:#0d2040;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:16px;color:var(--blue);flex-shrink:0;">
        ${c.nombre.charAt(0)}
      </div>
      <div style="flex:1;">
        <div style="font-weight:600;font-size:14px;">${c.nombre}</div>
        <div style="font-family:monospace;font-size:11px;color:var(--muted);">${c.codigo}</div>
      </div>
      <span class="tag ${planTag}">${c.plan || 'ESSENTIAL'}</span>
    </div>
  `;
}

function renderDetail() {
  const c = state.clientDetail;
  if (!c) return '<div class="loading"><div class="loading-spin">⚙</div><div>Cargando...</div></div>';

  const planTag = `tag-${(c.plan || 'essential').toLowerCase()}`;
  const estadoTag = c.estado === 'ACTIVO' ? 'tag-activo' : 'tag-inactivo';

  return `
    <button class="back-btn" data-nav="clients">← Volver a clientes</button>

    <div class="detail-header">
      <div class="detail-name">${c.nombre}</div>
      <div class="detail-meta">
        <span class="client-code">${c.codigo}</span>
        <span class="tag ${planTag}">${c.plan || 'ESSENTIAL'}</span>
        <span class="tag ${estadoTag}">${c.estado || 'ACTIVO'}</span>
        ${c.objetivo ? `<span class="tag" style="background:#111;border:1px solid #333;color:#888;">${c.objetivo}</span>` : ''}
      </div>
    </div>

    <div class="tabs">
      <button class="tab ${state.activeTab === 'rutinas' ? 'active' : ''}" data-tab="rutinas">💪 Rutinas</button>
      <button class="tab ${state.activeTab === 'historial' ? 'active' : ''}" data-tab="historial">📊 Historial</button>
    </div>

    ${state.activeTab === 'rutinas' ? renderDetailRutinas(c) : renderDetailHistorial(c)}
  `;
}

function renderDetailRutinas(c) {
  const rutinas = c.rutinas || [];
  const ejercicios = c.ejercicios || [];

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-size:13px;color:var(--muted);">${rutinas.length} rutina${rutinas.length !== 1 ? 's' : ''} asignadas</div>
      <button class="btn btn-primary btn-sm" id="addRutinaBtn">+ Añadir Rutina</button>
    </div>
    ${rutinas.length === 0
      ? '<div class="empty">No hay rutinas. Añade la primera 💪</div>'
      : rutinas.map(r => {
          const exsDeRutina = ejercicios.filter(e => e.rutina_id === r.codigo);
          const expanded = state.expandedRoutine === r.codigo;
          return `
            <div class="routine-block">
              <div class="routine-header" data-toggle="${r.codigo}">
                <div>
                  <div class="routine-name">${r.nombre}</div>
                  <div class="routine-code">${r.codigo} · ${exsDeRutina.length} ejercicios</div>
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                  <button class="btn btn-ghost btn-xs" data-addex="${r.codigo}">+ Ejercicio</button>
                  <span style="color:var(--muted);font-size:12px;">${expanded ? '▲' : '▼'}</span>
                </div>
              </div>
              ${expanded ? `
                <div class="routine-body">
                  ${exsDeRutina.length === 0
                    ? '<div style="color:var(--muted);font-size:13px;padding:10px 0;">Sin ejercicios aún</div>'
                    : `
                      <div class="ex-row" style="padding:6px 0;">
                        <div class="ex-head">Ejercicio</div>
                        <div class="ex-head">Sets</div>
                        <div class="ex-head">Reps</div>
                        <div class="ex-head">RIR</div>
                        <div class="ex-head">Desc</div>
                      </div>
                      ${exsDeRutina.map(ex => `
                        <div class="ex-row">
                          <div>
                            <div class="ex-name">${ex.nombre}</div>
                            ${ex.notas ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;">${ex.notas}</div>` : ''}
                          </div>
                          <div class="ex-val">${ex.series}</div>
                          <div class="ex-val">${ex.repeticiones}</div>
                          <div class="ex-val">${ex.rir}</div>
                          <div class="ex-val" style="font-size:11px;">${ex.descanso || '—'}</div>
                        </div>
                      `).join('')}
                    `
                  }
                </div>
              ` : ''}
            </div>
          `;
        }).join('')
    }
  `;
}

function renderDetailHistorial(c) {
  const historial = c.historial || [];
  if (state.loadingDetail) return '<div class="loading"><div class="loading-spin">⚙</div><div>Cargando historial...</div></div>';
  if (historial.length === 0) return '<div class="empty">Aún no hay sesiones registradas</div>';

  return historial.map(s => `
    <div class="history-session">
      <div class="history-date">${formatDate(s.fecha)}</div>
      <div class="history-routine">${s.rutina || 'Sesión'}</div>
      ${s.ejercicios ? s.ejercicios.map(e => `
        <div class="history-ex">
          <span style="color:#aaa;">${e.nombre}</span>
          <span style="font-weight:700;color:var(--blue);">${e.peso} kg</span>
        </div>
      `).join('') : ''}
    </div>
  `).join('');
}

// ── MODALS ──
function renderModal() {
  if (state.modal === 'addClient') return renderModalAddClient();
  if (state.modal === 'addRoutine') return renderModalAddRoutine();
  if (state.modal === 'addExercise') return renderModalAddExercise();
  return '';
}

function renderModalAddClient() {
  return `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-title">Nuevo Cliente</div>
        <div class="modal-sub">Rellena los datos del cliente. El código se generará automáticamente.</div>
        <div class="form-group">
          <label class="form-label">Nombre completo *</label>
          <input class="form-input" id="f_nombre" placeholder="Ej: Juan García López" />
        </div>
        <div class="form-row col2">
          <div class="form-group">
            <label class="form-label">Plan *</label>
            <select class="form-select" id="f_plan">
              <option value="ESSENTIAL">ESSENTIAL — 70€/mes</option>
              <option value="PREMIUM" selected>PREMIUM — 99€/mes</option>
              <option value="ELITE">ELITE — 149€/mes</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Objetivo</label>
            <select class="form-select" id="f_objetivo">
              <option value="Hipertrofia">Hipertrofia</option>
              <option value="Definición">Definición</option>
              <option value="Fuerza">Fuerza</option>
              <option value="Pérdida de peso">Pérdida de peso</option>
              <option value="Salud">Salud</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="f_email" type="email" placeholder="email@ejemplo.com" />
        </div>
        <div id="modalAlert"></div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="modalCancel">Cancelar</button>
          <button class="btn btn-primary" id="modalConfirm">Crear Cliente</button>
        </div>
      </div>
    </div>
  `;
}

function renderModalAddRoutine() {
  return `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-title">Nueva Rutina</div>
        <div class="modal-sub">Para ${state.clientDetail?.nombre}</div>
        <div class="form-group">
          <label class="form-label">Nombre de la rutina *</label>
          <input class="form-input" id="f_rutNombre" placeholder="Ej: Sesión 1, Empuje, Pierna..." />
        </div>
        <div class="form-group">
          <label class="form-label">Código (identificador único) *</label>
          <input class="form-input" id="f_rutCodigo" placeholder="Ej: JUAN_S1" />
        </div>
        <div class="form-group">
          <label class="form-label">Orden</label>
          <input class="form-input" id="f_rutOrden" type="number" value="1" min="1" />
        </div>
        <div id="modalAlert"></div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="modalCancel">Cancelar</button>
          <button class="btn btn-primary" id="modalConfirm">Crear Rutina</button>
        </div>
      </div>
    </div>
  `;
}

function renderModalAddExercise() {
  return `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-title">Nuevo Ejercicio</div>
        <div class="modal-sub">Rutina: ${state.modalData.rutinaId}</div>
        <div class="form-group">
          <label class="form-label">Ejercicio *</label>
          <input class="form-input" id="f_exNombre" placeholder="Ej: Press Banca" />
        </div>
        <div class="form-row col3">
          <div class="form-group">
            <label class="form-label">Series</label>
            <input class="form-input" id="f_exSeries" type="number" value="3" min="1" />
          </div>
          <div class="form-group">
            <label class="form-label">Repeticiones</label>
            <input class="form-input" id="f_exReps" type="number" value="10" min="1" />
          </div>
          <div class="form-group">
            <label class="form-label">RIR</label>
            <input class="form-input" id="f_exRir" type="number" value="2" min="0" max="5" />
          </div>
        </div>
        <div class="form-row col2">
          <div class="form-group">
            <label class="form-label">Descanso</label>
            <input class="form-input" id="f_exDescanso" placeholder="90seg" />
          </div>
          <div class="form-group">
            <label class="form-label">Orden</label>
            <input class="form-input" id="f_exOrden" type="number" value="1" min="1" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notas</label>
          <input class="form-input" id="f_exNotas" placeholder="Técnica, bajada controlada..." />

        <div id="modalAlert"></div>
        <div class="modal-footer">

}

// ── EVENTS ──
function bindEvents() {
  // Login
  const loginBtn = document.getElementById('loginBtn');
  if (loginBtn) {
    loginBtn.addEventListener('click', handleLogin);
    document.getElementById('passInput')?.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  }

  // Logout (both desktop and mobile)
  document.querySelectorAll('#logoutBtn').forEach(el => {
    el.addEventListener('click', () => {
      state = { ...state, screen: 'login', loginError: '', clients: [] };
      render();
    });
  });

  // Nav items (sidebar + mobile bottom nav)
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => {
      const nav = el.dataset.nav;
      state.screen = nav;
      if (nav === 'clients' || nav === 'dashboard') {
        state.selectedClient = null;
        state.clientDetail = null;
      }
      render();
    });
  });

  // Client cards
  document.querySelectorAll('[data-client]').forEach(el => {
    el.addEventListener('click', () => loadClientDetail(el.dataset.client));
  });

  // Add client
  document.getElementById('addClientBtn')?.addEventListener('click', () => {
    state.modal = 'addClient';
    render();
  });

  // Add rutina
  document.getElementById('addRutinaBtn')?.addEventListener('click', () => {
    state.modal = 'addRoutine';
    render();
  });

  // Add exercise buttons
  document.querySelectorAll('[data-addex]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      state.modal = 'addExercise';
      state.modalData = { rutinaId: el.dataset.addex };
      render();
    });
  });

  // Toggle routine expand
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.dataset.addex) return;
      const codigo = el.dataset.toggle;
      state.expandedRoutine = state.expandedRoutine === codigo ? null : codigo;
      render();
    });
  });

  // Tabs
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => {
      state.activeTab = el.dataset.tab;
      render();
    });
  });

  // Modal
  document.getElementById('modalCancel')?.addEventListener('click', () => { state.modal = null; render(); });
  document.getElementById('modalOverlay')?.addEventListener('click', e => { if (e.target.id === 'modalOverlay') { state.modal = null; render(); } });
  document.getElementById('modalConfirm')?.addEventListener('click', handleModalConfirm);

  // Auto-generate code in add routine
  document.getElementById('f_rutNombre')?.addEventListener('input', e => {
    const codigo = document.getElementById('f_rutCodigo');
    if (codigo && !codigo.dataset.manual) {
      const base = state.clientDetail?.codigo?.split('2')[0] || 'CLI';
      const slug = e.target.value.trim().substring(0, 6).toUpperCase().replace(/\s+/g, '_');
      codigo.value = base + '_' + slug;
    }
  });
  document.getElementById('f_rutCodigo')?.addEventListener('input', e => {
    e.target.dataset.manual = 'true';
  });
}

// ── HANDLERS ──
function handleLogin() {
  const pass = document.getElementById('passInput')?.value;
  if (pass === TRAINER_PASS) {
    state.screen = 'dashboard';
    state.loginError = '';
    render();
    loadClients();
  } else {
    state.loginError = 'Contraseña incorrecta';
    render();
  }
}

async function handleModalConfirm() {
  const alertEl = document.getElementById('modalAlert');

  if (state.modal === 'addClient') {
    const nombre = document.getElementById('f_nombre')?.value?.trim();
    const plan = document.getElementById('f_plan')?.value;
    const objetivo = document.getElementById('f_objetivo')?.value;
    const email = document.getElementById('f_email')?.value?.trim();

    if (!nombre) { alertEl.innerHTML = '<div class="alert alert-error">El nombre es obligatorio</div>'; return; }

    const btn = document.getElementById('modalConfirm');
    btn.textContent = 'Creando...'; btn.disabled = true;

    try {
      const res = await fetch(`${WORKER_URL}/cliente`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, plan, objetivo, email })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      state.modal = null;
      state.alert = { type: 'success', msg: `✅ Cliente ${nombre} creado con código ${data.codigo}` };
      await loadClients();
    } catch(e) {
      alertEl.innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
      btn.textContent = 'Crear Cliente'; btn.disabled = false;
    }
  }

  if (state.modal === 'addRoutine') {
    const nombre = document.getElementById('f_rutNombre')?.value?.trim();
    const codigo = document.getElementById('f_rutCodigo')?.value?.trim().toUpperCase();
    const orden = parseInt(document.getElementById('f_rutOrden')?.value) || 1;

    if (!nombre || !codigo) { alertEl.innerHTML = '<div class="alert alert-error">Nombre y código son obligatorios</div>'; return; }

    const btn = document.getElementById('modalConfirm');
    btn.textContent = 'Creando...'; btn.disabled = true;

    try {
      const res = await fetch(`${WORKER_URL}/rutina`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, codigo, cliente: state.clientDetail.codigo, orden })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      state.modal = null;
      state.alert = { type: 'success', msg: `✅ Rutina "${nombre}" creada` };
      await loadClientDetail(state.clientDetail.codigo);
    } catch(e) {
      alertEl.innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
      btn.textContent = 'Crear Rutina'; btn.disabled = false;
    }
  }

  if (state.modal === 'addExercise') {
    const nombre = document.getElementById('f_exNombre')?.value?.trim();
    const series = parseInt(document.getElementById('f_exSeries')?.value) || 3;
    const repeticiones = parseInt(document.getElementById('f_exReps')?.value) || 10;
    const rir = parseInt(document.getElementById('f_exRir')?.value) || 2;
    const descanso = document.getElementById('f_exDescanso')?.value?.trim() || '90seg';
    const notas = document.getElementById('f_exNotas')?.value?.trim() || '';
    const orden = parseInt(document.getElementById('f_exOrden')?.value) || 1;

    if (!nombre) { alertEl.innerHTML = '<div class="alert alert-error">El nombre es obligatorio</div>'; return; }

    const btn = document.getElementById('modalConfirm');
    btn.textContent = 'Añadiendo...'; btn.disabled = true;

    try {
      const res = await fetch(`${WORKER_URL}/ejercicio`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, rutina_id: state.modalData.rutinaId, series, repeticiones, rir, descanso, notas, orden })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      state.modal = null;
      state.expandedRoutine = state.modalData.rutinaId;
      state.alert = { type: 'success', msg: `✅ Ejercicio "${nombre}" añadido` };
      await loadClientDetail(state.clientDetail.codigo);
    } catch(e) {
      alertEl.innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
      btn.textContent = 'Añadir Ejercicio'; btn.disabled = false;
    }
  }
}

// ── API CALLS ──
async function loadClients() {
  state.loadingClients = true;
  render();
  try {
    const res = await fetch(`${WORKER_URL}/clientes`);
    const data = await res.json();
    state.clients = data.clientes || [];
  } catch(e) {
    state.clients = [];
  }
  state.loadingClients = false;
  render();
}

async function loadClientDetail(codigo) {
  state.screen = 'detail';
  state.loadingDetail = true;
  state.activeTab = 'rutinas';
  state.expandedRoutine = null;
  state.clientDetail = state.clients.find(c => c.codigo === codigo) || null;
  render();

  try {
    const [rutRes, histRes] = await Promise.all([
      fetch(`${WORKER_URL}/rutinas?codigo=${codigo}`),
      fetch(`${WORKER_URL}/historial?codigo=${codigo}`)
    ]);
    const rutData = await rutRes.json();
    const histData = await histRes.json();

    state.clientDetail = {
      ...state.clientDetail,
      rutinas: rutData.rutinas || [],
      ejercicios: rutData.ejercicios || [],
      historial: histData.registros || []
    };
  } catch(e) {
    state.clientDetail = { ...state.clientDetail, rutinas: [], ejercicios: [], historial: [] };
  }
  state.loadingDetail = false;
  render();
}

// ── UTILS ──
function formatDate(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' });
  } catch { return iso; }
}

// ── INIT ──
render();
</script>
